<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flow8">
<meta name="theme-color" content="#161920">
<title>Flow8 — Field Service Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#161920;--surface2:#1e2230;--border:#2a2f3d;
  --accent:#3b82f6;--accent2:#06b6d4;--green:#10b981;--orange:#f59e0b;
  --red:#ef4444;--purple:#8b5cf6;--text:#e8ecf4;--muted:#6b7694;--radius:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body.light{--bg:#f0f2f7;--surface:#fff;--surface2:#e8ecf4;--border:#d1d8e8;--text:#1a1f2e;--muted:#7a8299}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
body.app-active{display:flex;height:100vh;overflow:hidden;width:100%}
.hidden{display:none!important}
#app{display:flex;width:100%;height:100vh;overflow:hidden}
#app.hidden{display:none!important}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#2563eb;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);background:var(--surface2)}
.btn-danger{background:var(--red);color:#fff}.btn-sm{padding:5px 10px;font-size:12px}.btn-icon{padding:7px}
.input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-blue{background:rgba(59,130,246,.15);color:var(--accent)}.tag-green{background:rgba(16,185,129,.15);color:var(--green)}
.tag-orange{background:rgba(245,158,11,.15);color:var(--orange)}.tag-red{background:rgba(239,68,68,.15);color:var(--red)}
.tag-purple{background:rgba(139,92,246,.15);color:var(--purple)}.tag-muted{background:rgba(107,118,148,.15);color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-group label{font-size:12px;font-weight:600;color:var(--muted)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:min(640px,95vw);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:modalIn .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes modalIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800}
.modal-body{padding:16px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px;transition:all .2s}
.modal-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:rgba(16,185,129,.4)}#toast.error{border-color:rgba(239,68,68,.4)}
/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface)}
th{text-align:left;padding:10px 14px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;border-bottom:2px solid var(--border);background:var(--surface)}
td{padding:12px 14px;border-bottom:1px solid rgba(42,47,61,.4);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(59,130,246,.06);color:var(--text)}
/* Login */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:calc(20px + var(--safe-top)) 20px calc(20px + var(--safe-bottom));z-index:1000;overflow-y:auto}
.login-logo-text{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;text-align:center;margin-bottom:4px}
.login-logo-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:28px}
/* Sidebar */
#sidebar{width:220px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.sidebar-logo-sub{font-size:11px;color:var(--muted);margin-top:2px}
.nav-section{padding:12px 16px 4px;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;border-radius:8px;margin:1px 8px;transition:all .15s;position:relative}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--text);background:rgba(59,130,246,.1);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:0 3px 3px 0}
.nav-item svg{opacity:.6;flex-shrink:0}.nav-item.active svg{opacity:1;color:var(--accent)}
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);margin-top:auto}
/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;flex:1}
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg);color:var(--text);min-height:0}
.page{display:none}.page.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Filter chips */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;transition:all .15s}
.chip:hover{color:var(--text);border-color:var(--muted)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Search */
.search-wrap{position:relative}
.search-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px 9px 34px;font-size:13px;font-family:inherit;outline:none;width:100%;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
/* Panel */
.panel{position:fixed;top:0;right:0;width:460px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:24px;box-shadow:-10px 0 40px rgba(0,0,0,.3)}
.panel.open{transform:translateX(0)}
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.panel-overlay.open{display:block}
.panel-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.panel-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.stat-value{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:2px}
.stat-label{font-size:12px;color:var(--muted)}
/* Progress */
.progress{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.pg-controls{display:flex;gap:4px}
.pg-btn{min-width:30px;height:28px;padding:0 8px;border-radius:6px;font-size:12px;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s}
.pg-btn:hover:not(:disabled){color:var(--text);background:var(--surface2)}
.pg-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}
/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:9px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Debug log */
#log-panel{position:fixed;bottom:0;right:0;width:480px;height:300px;background:var(--surface);border:1px solid var(--border);border-radius:12px 0 0 0;z-index:9998;display:flex;flex-direction:column;box-shadow:-4px -4px 20px rgba(0,0,0,.3)}
#log-body{flex:1;overflow-y:auto;padding:8px 12px;font-family:monospace;font-size:11px}
.log-entry{padding:3px 0;border-bottom:1px solid var(--border)}
.log-entry .lt{color:var(--muted)}.log-entry .ll-OK{color:var(--green)}.log-entry .ll-INFO{color:var(--accent)}.log-entry .ll-WARN{color:var(--orange)}.log-entry .ll-ERROR{color:var(--red)}
@media(max-width:768px){
  /* ── BODY & APP ── */
  body.app-active{flex-direction:column;overflow:hidden}
  #app{display:flex;flex-direction:column;width:100%;height:100vh;overflow:hidden}

  /* ── SIDEBAR: volledig off-canvas ── */
  #sidebar{
    position:fixed;left:-100%;width:80%;max-width:280px;
    z-index:50;transition:left .25s ease;height:100%;
    top:0;box-shadow:4px 0 24px rgba(0,0,0,.4)
  }
  #sidebar.open{left:0}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}
  .sidebar-overlay.open{display:block}

  /* ── MAIN: vult het scherm ── */
  #main{flex:1;display:flex;flex-direction:column;width:100%;overflow:hidden;min-width:0}

  /* ── TOPBAR ── */
  .topbar{
    padding:0 12px calc(8px);
    padding-top:calc(8px + var(--safe-top));
    height:auto;gap:8px;flex-shrink:0
  }
  .topbar-title{font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #topbar-actions #log-btn{display:none}

  /* ── CONTENT: scrollbaar, niet breder dan scherm ── */
  .content{
    flex:1;overflow-y:auto;overflow-x:hidden;
    padding:12px;
    padding-bottom:calc(72px + var(--safe-bottom));
    width:100%;box-sizing:border-box;
    -webkit-overflow-scrolling:touch
  }

  /* ── GRIDS ── */
  .stats-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px}
  .form-grid{grid-template-columns:1fr!important}
  .form-grid.cols-3{grid-template-columns:1fr!important}

  /* ── CARDS ── */
  .card{padding:12px}

  /* ── TABELLEN: horizontaal scrollen ── */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:calc(100vw - 24px)}
  table{min-width:480px}

  /* ── MODALS: bottom sheet ── */
  .modal-overlay{align-items:flex-end;padding:0}
  .modal{
    width:100%!important;max-width:100%!important;
    border-radius:16px 16px 0 0!important;
    max-height:88vh!important;
    animation:slideUp .3s cubic-bezier(.4,0,.2,1)
  }
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-header{padding:16px 16px 0!important}
  .modal-body{padding:12px 16px!important;-webkit-overflow-scrolling:touch}
  .modal-footer{
    padding:12px 16px!important;
    padding-bottom:calc(12px + var(--safe-bottom))!important;
    position:sticky;bottom:0;background:var(--surface)
  }

  /* ── PANEL: full width ── */
  .panel{width:100%!important;max-width:100%!important}

  /* ── FILTER CHIPS: horizontaal scrollen ── */
  .filter-row{
    overflow-x:auto;flex-wrap:nowrap!important;
    -webkit-overflow-scrolling:touch;padding-bottom:4px;
    max-width:100%;scrollbar-width:none
  }
  .filter-row::-webkit-scrollbar{display:none}
  .chip{flex-shrink:0;white-space:nowrap}

  /* ── TOUCH TARGETS ── */
  .btn{min-height:40px}
  .btn-sm{min-height:34px}
  .nav-item{min-height:44px}

  /* ── INPUT: voorkomt zoom op iOS ── */
  .input,input,select,textarea{font-size:16px!important}

  /* ── LOGIN ── */
  #login-screen .card{padding:20px}
  .login-logo-text{font-size:26px}

  /* ── LOG PANEL ── */
  #log-panel{width:100%!important;left:0!important;right:0!important}

  /* ── PAGINATION ── */
  .pagination{flex-wrap:wrap;gap:6px;font-size:11px;padding:8px 12px}
}

/* ── Extra klein (iPhone SE etc) ── */
@media(max-width:390px){
  .stats-grid{gap:6px}
  .card{padding:10px}
  .topbar-title{font-size:14px}
  table{min-width:400px}
}

/* Bottom navigation bar voor mobiel */
#bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  z-index:300;padding:6px 0 calc(6px + var(--safe-bottom));
  justify-content:space-around;align-items:center;
}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 0;cursor:pointer;border:none;background:none;
  color:var(--muted);font-size:9px;font-weight:600;font-family:inherit;
  transition:color .15s;min-width:56px;
}
.bn-item.active{color:var(--accent)}
.bn-item svg{width:20px;height:20px}

/* Hamburger */
#hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--text);flex-shrink:0}
@media(max-width:768px){#hamburger{display:flex}}
</style>
</head>
<body>
<div id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div style="width:100%;max-width:380px">
    <div class="login-logo-text">Flow<span style="color:var(--accent)">8</span></div>
    <div class="login-logo-sub">Field Service Management</div>
    <div class="card" style="padding:28px">
      <div class="form-group">
        <label>E-mailadres</label>
        <input type="email" id="login-email" class="input" placeholder="naam@bedrijf.nl">
      </div>
      <div class="form-group" style="margin-bottom:6px">
        <label>Wachtwoord</label>
        <input type="password" id="login-pass" class="input" placeholder="••••••••">
      </div>
      <div id="login-err" style="font-size:12px;color:var(--red);min-height:18px;margin-bottom:12px"></div>
      <button id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center">Inloggen</button>
      <div style="text-align:center;margin-top:10px">
        <button id="pw-vergeten-btn" style="background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer">Wachtwoord vergeten?</button>
      </div>
    </div>
    <div style="text-align:center;margin-top:12px">
      <button id="toggle-log-btn" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer">🔍 Debug log</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">Flow<span style="color:var(--accent)">8</span></div>
      <div class="sidebar-logo-sub">Field Service Management</div>
    </div>
    <div id="sidebar-nav" style="flex:1;padding:8px 0"></div>
    <div class="sidebar-footer">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="avatar" id="sb-av" style="width:34px;height:34px;font-size:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff"></div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="sb-naam">—</div>
          <div style="font-size:11px;color:var(--muted)" id="sb-rol">—</div>
        </div>
        <button id="uitloggen-btn" class="btn btn-icon btn-ghost btn-sm" title="Uitloggen">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </nav>
  <div id="main">
    <div class="topbar">
      <button id="hamburger" aria-label="Menu">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div id="topbar-actions" style="display:flex;align-items:center;gap:8px">
        <button id="theme-btn" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 8px;font-size:14px;cursor:pointer">☀️</button>
        <button id="log-btn" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">🔍 Log</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- Bottom nav (mobiel) -->
<nav id="bottom-nav">
  <button class="bn-item" data-page="dashboard">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    Dashboard

// ═══════════════════════════════════════════════
// LOGGING
// ═══════════════════════════════════════════════
var LOGS = [];
function log(level, mod, msg, data) {
  var e = { t: new Date().toLocaleTimeString('nl-NL'), level: level, mod: mod, msg: msg, data: data };
  LOGS.push(e);
  if (LOGS.length > 300) LOGS.shift();
  var c = { OK: '#10b981', INFO: '#3b82f6', WARN: '#f59e0b', ERROR: '#ef4444' };
  console.log('%c[' + level + '] ' + mod + ': ' + msg, 'color:' + (c[level]||'#fff'), data||'');
  refreshLog();
}
function refreshLog() {
  var el = document.getElementById('log-body');
  if (!el || document.getElementById('log-panel').classList.contains('hidden')) return;
  el.innerHTML = LOGS.slice().reverse().map(function(e) {
    return '<div class="log-entry"><span class="lt">' + e.t + '</span> '
      + '<span class="ll-' + e.level + '">[' + e.level + ']</span> '
      + '<span style="color:var(--accent2)">' + e.mod + '</span>: ' + e.msg
      + (e.data ? '<br><span style="color:var(--muted);padding-left:12px">' + JSON.stringify(e.data).slice(0,300) + '</span>' : '')
      + '</div>';
  }).join('');
}

// ═══════════════════════════════════════════════
// DB HELPERS
// ═══════════════════════════════════════════════
function dbPath() {
  var parts = Array.from(arguments);
  return ['flow8', 'bedrijven', APP.bedrijfId].concat(parts).join('/');
}
function dbSaveItem(key, id, data) {
  if (!APP.bedrijfId) { log('ERROR', 'DB', 'Geen bedrijfId bij saveItem ' + key); return Promise.reject('no bedrijfId'); }
  var path = dbPath(key, String(id));
  log('INFO', 'DB', 'Opslaan: ' + path);
  return FB.ref(path).set(data)
    .then(function() { log('OK', 'DB', 'Opgeslagen: ' + path); })
    .catch(function(e) { log('ERROR', 'DB', 'Fout bij opslaan: ' + path, { code: e.code, msg: e.message }); toast('Opslaan mislukt', 'error'); });
}
function dbRemove(key, id) {
  if (!APP.bedrijfId) { log('ERROR', 'DB', 'Geen bedrijfId bij remove ' + key); return; }
  var path = dbPath(key, String(id));
  log('INFO', 'DB', 'Verwijderen: ' + path);
  return FB.ref(path).remove()
    .then(function() { log('OK', 'DB', 'Verwijderd: ' + path); })
    .catch(function(e) { log('ERROR', 'DB', 'Fout bij verwijderen: ' + path, { msg: e.message }); });
}
function dbLoad(key, appKey) {
  return new Promise(function(resolve) {
    if (!APP.bedrijfId) { APP[appKey] = []; resolve([]); return; }
    FB.ref(dbPath(key)).once('value')
      .then(function(snap) {
        var val = snap.val();
        if (val === null || val === undefined) { APP[appKey] = []; resolve([]); return; }
        var arr = (val && typeof val === 'object' && !Array.isArray(val)) ? objToArr(val) : (Array.isArray(val) ? val : []);
        APP[appKey] = arr;
        log('OK', 'DB', 'Geladen: ' + key + ' (' + arr.length + ' items)');
        resolve(arr);
      })
      .catch(function(e) { log('ERROR', 'DB', 'Fout bij laden: ' + key, { msg: e.message }); APP[appKey] = []; resolve([]); });
  });
}
function dbListen(key, appKey, cb) {
  var ref = FB.ref(dbPath(key));
  ref.on('value', function(snap) {
    var val = snap.val();
    APP[appKey] = (!val) ? [] : (typeof val === 'object' && !Array.isArray(val) ? objToArr(val) : val);
    if (cb) cb(APP[appKey]);
  });
  APP.listeners[key] = ref;
}
function dbUnlistenAll() {
  Object.keys(APP.listeners).forEach(function(k) { try { APP.listeners[k].off(); } catch(e) {} });
  APP.listeners = {};
}
function objToArr(obj) {
  if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return obj || [];
  return Object.keys(obj).map(function(k) {
    var item = obj[k];
    if (item && typeof item === 'object' && item.id == null) item = Object.assign({}, item, { id: k });
    return item;
  }).filter(Boolean);
}

// AUTH

AUTH.onAuthStateChanged(function(user) {
  if (user) {
    log('OK', 'AUTH', 'Ingelogd: ' + user.email, { uid: user.uid });
    APP.user = user;
    laadProfiel(user.uid);
  } else {
    log('INFO', 'AUTH', 'Uitgelogd');
    APP.user = null; APP.profiel = null;
    toonLogin();
  }
});

async function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pass  = document.getElementById('login-pass').value;
  var errEl = document.getElementById('login-err');
  var btn   = document.getElementById('login-btn');
  errEl.textContent = '';
  if (!email || !pass) { errEl.textContent = 'Vul e-mail en wachtwoord in.'; return; }
  btn.textContent = 'Bezig...'; btn.disabled = true;
  log('INFO', 'LOGIN', 'Poging voor ' + email);
  try {
    await AUTH.signInWithEmailAndPassword(email, pass);
    log('OK', 'LOGIN', 'Auth geslaagd');
  } catch(e) {
    log('ERROR', 'LOGIN', 'Auth mislukt: ' + e.code, { msg: e.message });
    var msgs = { 'auth/user-not-found': 'E-mail niet gevonden.', 'auth/wrong-password': 'Onjuist wachtwoord.', 'auth/too-many-requests': 'Te veel pogingen. Wacht even.', 'auth/invalid-email': 'Ongeldig e-mailadres.' };
    errEl.textContent = msgs[e.code] || 'Inloggen mislukt: ' + e.message;
    btn.textContent = 'Inloggen'; btn.disabled = false;
  }
}

async function doUitloggen() {
  log('INFO', 'AUTH', 'Uitloggen');
  dbUnlistenAll();
  APP.dataLoaded = false;
  ['medewerkers','serviceklanten','debiteuren','opdrachten','verlof','overuren','onkosten','verzuim','agenda','storingsDienst','blokkadeDagen']
    .forEach(function(k) { APP[k] = []; });
  await AUTH.signOut();
}

async function laadProfiel(uid) {
  log('INFO', 'PROFIEL', 'Laden voor uid: ' + uid);
  try {
    var snap = await FB.ref('flow8/gebruikers/' + uid).once('value');
    if (snap.exists()) {
      APP.profiel   = snap.val();
      APP.bedrijfId = APP.profiel.bedrijfId || 'demo';
      log('OK', 'PROFIEL', 'Gevonden', { naam: APP.profiel.naam, rol: APP.profiel.rol, bedrijfId: APP.bedrijfId });
    } else {
      log('WARN', 'PROFIEL', 'Nieuw - eerste login, admin aanmaken');
      var email = APP.user.email;
      var naam  = email.split('@')[0].replace(/[._-]/g,' ').split(' ').map(function(w){ return w.charAt(0).toUpperCase()+w.slice(1); }).join(' ');
      APP.profiel   = { uid: uid, naam: naam, email: email, rol: 'admin', bedrijfId: 'demo', actief: true };
      APP.bedrijfId = 'demo';
      await FB.ref('flow8/gebruikers/' + uid).set(APP.profiel);
      log('OK', 'PROFIEL', 'Admin profiel aangemaakt voor ' + email);
    }
    await laadData();
    toonApp();
  } catch(e) {
    log('ERROR', 'PROFIEL', 'Mislukt: ' + e.message, { code: e.code });
    toast('Fout bij inloggen: ' + e.message, 'error');
    await AUTH.signOut();
  }
}

async function laadData() {
  log('INFO', 'DATA', 'Laden voor bedrijf: ' + APP.bedrijfId);
  // Contracttypes
  var ctSnap = await FB.ref(dbPath('contracten')).once('value');
  if (ctSnap.exists()) {
    APP.contracten = ctSnap.val();
    if (!Array.isArray(APP.contracten)) APP.contracten = Object.values(APP.contracten);
    log('OK','DATA','Contracten geladen: '+APP.contracten.length);
  } else {
    APP.contracten = STANDAARD_CONTRACTEN;
    await FB.ref(dbPath('contracten')).set(APP.contracten);
    log('OK','DATA','Standaard contracten aangemaakt');
  }

  // Rollen
  var rolSnap = await FB.ref(dbPath('rollen')).once('value');
  if (rolSnap.exists()) {
    APP.rollen = rolSnap.val();
    log('OK', 'DATA', 'Rollen geladen: ' + Object.keys(APP.rollen).length);
  } else {
    APP.rollen = maakStandaardRollen();
    await FB.ref(dbPath('rollen')).set(APP.rollen);
    log('OK', 'DATA', 'Standaard rollen aangemaakt');
  }
  // Alle data parallel laden
  await Promise.all([
    dbLoad('medewerkers',    'medewerkers'),
    dbLoad('serviceklanten', 'serviceklanten'),
    dbLoad('debiteuren',     'debiteuren'),
    dbLoad('opdrachten',     'opdrachten'),
    dbLoad('verlof',         'verlof'),
    dbLoad('overuren',       'overuren'),
    dbLoad('onkosten',       'onkosten'),
    dbLoad('verzuim',        'verzuim'),
    dbLoad('agenda',         'agenda'),
    dbLoad('storingsDienst', 'storingsDienst'),
    dbLoad('blokkadeDagen',  'blokkadeDagen'),
  ]);
  APP.dataLoaded = true;
  log('OK', 'DATA', 'Alles geladen', {
    medewerkers: APP.medewerkers.length, serviceklanten: APP.serviceklanten.length,
    debiteuren: APP.debiteuren.length, opdrachten: APP.opdrachten.length,
  });
  ensureMedewerkerProfiel();
  // Realtime listeners
  dbListen('medewerkers',    'medewerkers',    function() { if (APP.activePage==='medewerkers') renderMedewerkers(); });
  dbListen('opdrachten',     'opdrachten',     function() { if (APP.activePage==='planning')    renderPlanning(); });
  dbListen('storingsDienst', 'storingsDienst', function() { if (APP.activePage==='storingsdienst') renderStoringsdienst(); });
}

function maakStandaardRollen() {
  var mods = ['dashboard','planning','medewerkers','serviceklanten','debiteuren','verlof','overuren','onkosten','verzuim','storingsdienst','locatie','klantmails','rapportage','instellingen'];
  function r(lees, schrijf) {
    var obj = {};
    mods.forEach(function(m) { obj[m] = { lezen: lees.indexOf(m)>=0||lees[0]==='*', schrijven: schrijf.indexOf(m)>=0||schrijf[0]==='*' }; });
    return obj;
  }
  return {
    admin:         { naam:'Beheerder',    kleur:'#3b82f6', rechten: r(['*'],['*']) },
    planner:       { naam:'Planner',      kleur:'#8b5cf6', rechten: r(['dashboard','planning','medewerkers','serviceklanten','debiteuren','locatie','klantmails','rapportage','storingsdienst','verlof'],['planning','serviceklanten','debiteuren','klantmails','storingsdienst']) },
    monteur:       { naam:'Monteur',      kleur:'#f59e0b', rechten: r(['dashboard','planning','locatie','verlof','overuren','onkosten','verzuim','storingsdienst'],['verlof','overuren','onkosten','verzuim']) },
    verkoop:       { naam:'Verkoop',      kleur:'#10b981', rechten: r(['dashboard','serviceklanten','debiteuren','klantmails','rapportage','verlof','overuren','onkosten'],['serviceklanten','debiteuren','klantmails','verlof','overuren','onkosten']) },
    administratie: { naam:'Administratie',kleur:'#06b6d4', rechten: r(['dashboard','debiteuren','rapportage','verlof','overuren','onkosten','verzuim'],['debiteuren','verlof','overuren','onkosten','verzuim']) },
    magazijn:      { naam:'Magazijn',     kleur:'#6b7694', rechten: r(['dashboard','verlof','overuren','onkosten'],['verlof','overuren','onkosten']) },
  };
}
function getRol()          { return APP.rollen[APP.profiel && APP.profiel.rol] || null; }
function magLezen(mod)     { var r=getRol(); return !!(r && r.rechten && r.rechten[mod] && r.rechten[mod].lezen); }
function magSchrijven(mod) { var r=getRol(); return !!(r && r.rechten && r.rechten[mod] && r.rechten[mod].schrijven); }
function isAdmin()         { return APP.profiel && APP.profiel.rol === 'admin'; }

function bouwNav() {
  var nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  var sectie = '';
  NAV.forEach(function(m) {
    if (!magLezen(m.id) && !isAdmin()) return;
    if (m.sectie !== sectie) {
      var s = document.createElement('div');
      s.className = 'nav-section';
      s.textContent = m.sectie;
      nav.appendChild(s);
      sectie = m.sectie;
    }
    var el = document.createElement('div');
    el.className = 'nav-item';
    el.id = 'nav-' + m.id;
    el.dataset.page = m.id;
    el.innerHTML = (SVGS[m.icon]||'') + '<span>' + m.label + '</span>';
    nav.appendChild(el);
  });
  nav.addEventListener('click', function(e) {
    var item = e.target.closest('.nav-item');
    if (item && item.dataset.page) toonPagina(item.dataset.page);
  });
}

function toonPagina(id) {
  APP.activePage = id;
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.toggle('active', el.dataset.page === id); });
  document.querySelectorAll('#bottom-nav .bn-item').forEach(function(el) { el.classList.toggle('active', el.dataset.page === id); });
  // Sluit sidebar op mobiel na navigatie
  document.getElementById('sidebar').classList.remove('open');
  var ov = document.getElementById('sidebar-overlay'); if(ov) ov.classList.remove('open');
  var mod = NAV.find(function(m) { return m.id === id; });
  document.getElementById('topbar-title').textContent = mod ? mod.label : id;
  var R = { dashboard:renderDashboard, medewerkers:renderMedewerkers, serviceklanten:renderServiceklanten, debiteuren:renderDebiteuren, verlof:renderVerlof, overuren:renderOveruren, onkosten:renderOnkosten, verzuim:renderVerzuim, storingsdienst:renderStoringsdienst, locatie:renderLocatie, klantmails:renderKlantmails, rapportage:renderRapportage, instellingen:renderInstellingen, planning:renderPlanning };
  if (R[id]) R[id]();
}

// Contracten helper
function getContracten() { return APP.contracten && APP.contracten.length ? APP.contracten : STANDAARD_CONTRACTEN; }
function getContract(id) { return getContracten().find(function(c){return c.id===id||c.code===id;}); }
function berekenVolgend(laatste, contractId) {
  if (!laatste) return '';
  var ct = getContract(contractId);
  if (!ct || !ct.intervalMaanden) return '';
  var d = new Date(laatste);
  d.setMonth(d.getMonth() + ct.intervalMaanden);
  return d.toISOString().split('T')[0];
}

// Stat card
function statCard(lbl, val, kleur, svg) {
  return '<div class="stat-card"><div class="stat-icon" style="background:'+kleur+'22;color:'+kleur+'">'+svg+'</div><div class="stat-value" style="color:'+kleur+'">'+val+'</div><div class="stat-label">'+lbl+'</div></div>';
}

// Pagination helper
function pgHtml(totaal, page, pageSize, setPageFn) {
  var pages = Math.ceil(totaal/pageSize) || 1;
  var from  = Math.max(1, page-2), to = Math.min(pages, page+2);
  var h = '<div class="pagination"><div>'+(totaal===0?0:(page-1)*pageSize+1)+'–'+Math.min(page*pageSize,totaal)+' van '+totaal+'</div><div class="pg-controls">';
  if (page > 1) h += '<button class="pg-btn" data-pg="'+(page-1)+'">‹</button>';
  for (var p=from; p<=to; p++) h += '<button class="pg-btn'+(p===page?' active':'')+'" data-pg="'+p+'">'+p+'</button>';
  if (page < pages) h += '<button class="pg-btn" data-pg="'+(page+1)+'">›</button>';
  h += '</div></div>';
  return h;
}

var _medFilter='alle', _medZoek='', _medSortKey='achternaam', _medSortDir=1, _medPage=1, _medPS=25;

  var rol = APP.rollen;

    return true;
  }).sort(function(a,b){ var va=(a[_medSortKey]||'').toLowerCase(),vb=(b[_medSortKey]||'').toLowerCase(); return va<vb?-_medSortDir:va>vb?_medSortDir:0; });

  var totaal=lijst.length, slice=lijst.slice((_medPage-1)*_medPS,_medPage*_medPS);

  ['alle'].concat(Object.keys(rol)).forEach(function(r) {
    var lbl=r==='alle'?'Alle':(rol[r]?rol[r].naam:r);
    var cnt=r==='alle'?APP.medewerkers.length:APP.medewerkers.filter(function(m){return m.rol===r;}).length;
    h+='<button class="chip'+((_medFilter===r)?' active':'')+'" data-filter="'+r+'">'+lbl+' ('+cnt+')</button>';
  });
  h+='</div>';

  h+='<div class="card" style="padding:0"><div class="table-wrap"><table><thead><tr>';
  [['naam','Naam'],['functie','Functie'],['rol','Rol'],['status','Status']].forEach(function(c){
    h+='<th style="cursor:pointer" data-sort="'+c[0]+'">'+c[1]+(_medSortKey===c[0]?(_medSortDir===1?' ↑':' ↓'):' ⇅')+'</th>';
  });
  if (magSchrijven('medewerkers')) h+='<th style="width:90px"></th>';
  h+='</tr></thead><tbody>';

  if (!slice.length) h+='<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted)">Geen medewerkers gevonden</td></tr>';

function openMedModal(id) {

  var rolOpts=Object.keys(APP.rollen).map(function(k){return [k,APP.rollen[k].naam];});
  var conOpts=[['vast','Vast'],['tijdelijk','Tijdelijk'],['zzp','ZZP/Extern']];
  var gelOpts=[['man','Man'],['vrouw','Vrouw'],['overig','Overig']];

  var b='<div class="form-grid">';
  b+=fg('Voornaam *',finp('mf-vn','text',m.voornaam,'Jan'));
  b+=fg('Achternaam *',finp('mf-an','text',m.achternaam,'de Vries'));
  b+=fg('Functietitel',finp('mf-fn','text',m.functie,'Servicemonteur'));
  b+=fg('Rol',fsel('mf-rol',rolOpts,m.rol));
  b+=fg('E-mail zakelijk',finp('mf-em','email',m.email,'jan@bedrijf.nl'));
  b+=fg('Telefoon zakelijk',finp('mf-tel','text',m.telefoon,'06-12345678'));
  b+=fg('E-mail privé',finp('mf-emp','email',m.emailPrive,''));
  b+=fg('Telefoon privé',finp('mf-telp','text',m.telefoonPrive,''));
  b+=fg('Geboortedatum',finp('mf-geb','date',m.geboortedatum,''));
  b+=fg('Geslacht',fsel('mf-gel',gelOpts,m.geslacht));
  b+=fg('Datum in dienst',finp('mf-did','date',m.datumInDienst,''));
  b+=fg('Contracttype',fsel('mf-con',conOpts,m.contractType));
  b+=fg('Uren/week',finp('mf-uur','number',m.contractUren||40,'40'));
  b+=fg('Verloftegoed basis (dagen bij 40u/week)',finp('mf-vb','number',m.verlofBasis||25,'25'));
  b+=fg('Contracturen/week (al ingevuld hierboven)','<div id="mf-verlof-calc" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;color:var(--accent)">Vul uren/week en basis in</div>');
  b+=fgf('Straat + huisnummer',finp('mf-str','text',m.straat,'Voorbeeldstraat 1'));
  b+=fg('Postcode',finp('mf-pc','text',m.postcode,'1234 AB'));
  b+=fg('Plaats',finp('mf-pl','text',m.plaats,'Amsterdam'));
  b+='</div>';

  var f='<button class="btn btn-ghost" id="mmod-cancel">Annuleren</button>';
  f+='<button class="btn btn-primary" id="mmod-save">Opslaan</button>';
  openModal(isNew?'Medewerker toevoegen':'Medewerker bewerken', b, f);

  document.getElementById('mmod-cancel').addEventListener('click', closeModal);

  // Live verlof berekening
  function updateVerlofCalc() {
    var basis = parseInt(document.getElementById('mf-vb').value) || 25;
    var uren  = parseInt(document.getElementById('mf-uur').value) || 40;
    var dagen = Math.round((basis * uren / 40) * 10) / 10;
    var uurPerDag = 8;
    var totalUren = Math.round(dagen * uurPerDag * 10) / 10;
    var el = document.getElementById('mf-verlof-calc');
    if (el) el.innerHTML = '<strong>' + dagen + ' dagen</strong> bij ' + uren + 'u/week &nbsp;·&nbsp; <strong>' + totalUren + ' uur</strong> totaal';
  }
  var mfVb  = document.getElementById('mf-vb');
  var mfUur = document.getElementById('mf-uur');
  if (mfVb)  mfVb.addEventListener('input',  updateVerlofCalc);
  if (mfUur) mfUur.addEventListener('input',  updateVerlofCalc);
  updateVerlofCalc();
  document.getElementById('mmod-save').addEventListener('click', function() { saveMed(id); });
}

function saveMed(id) {
  var vn=document.getElementById('mf-vn').value.trim();
  var an=document.getElementById('mf-an').value.trim();
  if(!vn||!an){toast('Naam is verplicht','error');return;}
  var isNew=!id; var bestaand=id?getMed(id)||{}:{};
  var verlofBasis=parseInt(document.getElementById('mf-vb').value)||25;
  var contractUren=parseInt(document.getElementById('mf-uur').value)||40;
  // Bereken verloftegoed op basis van contracturen
  var verlofTegoed = Math.round((verlofBasis * contractUren / 40) * 10) / 10;
  var vt = verlofTegoed;
  var data=Object.assign({},bestaand,{
    id:id||uid(), voornaam:vn, achternaam:an,
    functie:document.getElementById('mf-fn').value.trim(),
    rol:document.getElementById('mf-rol').value,
    email:document.getElementById('mf-em').value.trim(),
    telefoon:document.getElementById('mf-tel').value.trim(),
    emailPrive:document.getElementById('mf-emp').value.trim(),
    telefoonPrive:document.getElementById('mf-telp').value.trim(),
    geboortedatum:document.getElementById('mf-geb').value,
    geslacht:document.getElementById('mf-gel').value,
    datumInDienst:document.getElementById('mf-did').value,
    contractType:document.getElementById('mf-con').value,
    contractUren:parseInt(document.getElementById('mf-uur').value)||40,
    verlofBasis:verlofBasis,
    verlofTegoed:vt,
    verlofSaldo:isNew?vt:(bestaand.verlofSaldo!=null?bestaand.verlofSaldo:vt),
    straat:document.getElementById('mf-str').value.trim(),
    postcode:document.getElementById('mf-pc').value.trim(),
    plaats:document.getElementById('mf-pl').value.trim(),
    status:bestaand.status||'actief',
    kleur:bestaand.kleur||rolKleur(document.getElementById('mf-rol').value),
  });
  if(isNew) APP.medewerkers.push(data);
  else { var i=APP.medewerkers.findIndex(function(m){return String(m.id)===String(id);}); if(i>-1) APP.medewerkers[i]=data; }
  dbSaveItem('medewerkers',data.id,data);
  closeModal(); renderMedewerkers();
  toast(isNew?'Medewerker toegevoegd':'Medewerker bijgewerkt','success');
}

function verwijderMed(id) {
  var m=getMed(id); if(!m||!confirm('Medewerker '+m.voornaam+' '+m.achternaam+' verwijderen?')) return;
  APP.medewerkers=APP.medewerkers.filter(function(x){return String(x.id)!==String(id);});
  dbRemove('medewerkers',id); renderMedewerkers();
  toast('Medewerker verwijderd','success');
}

var _skFilter='alle', _skZoek='', _skPage=1, _skPS=25;

function saveSk(id) {
  var naam=document.getElementById('sk-nm').value.trim();
  if(!naam){toast('Naam is verplicht','error');return;}
  var isNew=!id; var bestaand=id?(APP.serviceklanten.find(function(x){return String(x.id)===String(id);})||{}):{};
  var laatste=document.getElementById('sk-ld').value;
  var ct=document.getElementById('sk-con').value;
  var debId=document.getElementById('sk-deb').value||null;
  var debNr=debId?(function(){var d=APP.debiteuren.find(function(x){return String(x.id)===String(debId);});return d?d.nr:'';})():'';
  var data=Object.assign({},bestaand,{
    id:id||uid(),naam:naam,debId:debId,debNr:debNr,
    contactpersoon:document.getElementById('sk-ct').value.trim(),
    adres:document.getElementById('sk-adr').value.trim(),
    postcode:document.getElementById('sk-pc').value.trim(),
    plaats:document.getElementById('sk-pl').value.trim(),
    email:document.getElementById('sk-em').value.trim(),
    telefoon:document.getElementById('sk-tel').value.trim(),
    contractType:ct,pomptype:document.getElementById('sk-pt').value.trim(),
    besturing:document.getElementById('sk-bs').value.trim(),
    laatsteDatum:laatste,volgendeDatum:berekenVolgend(laatste,ct),
    notitie:document.getElementById('sk-nt').value.trim(),
  });
  if(isNew) APP.serviceklanten.push(data);
  else{var i=APP.serviceklanten.findIndex(function(x){return String(x.id)===String(id);});if(i>-1)APP.serviceklanten[i]=data;}
  dbSaveItem('serviceklanten',data.id,data); closeModal(); renderServiceklanten();
  toast(isNew?'Serviceklant toegevoegd':'Serviceklant bijgewerkt','success');
}

function verwijderSk(id){
  var k=APP.serviceklanten.find(function(x){return String(x.id)===String(id);});
  if(!k||!confirm('Serviceklant "'+k.naam+'" verwijderen?'))return;
  APP.serviceklanten=APP.serviceklanten.filter(function(x){return String(x.id)!==String(id);});
  dbRemove('serviceklanten',id); renderServiceklanten(); toast('Serviceklant verwijderd','success');
}

function importSkCsv(){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.csv';
  inp.onchange=function(e){
    var f=e.target.files[0]; if(!f) return;
    var r=new FileReader(); r.onload=function(ev){verwerkSkCsv(ev.target.result);}; r.readAsText(f,'utf-8');
  }; inp.click();
}
function verwerkSkCsv(txt){
  var regels=txt.split('\n').filter(function(r){return r.trim();});
  if(regels.length<2){toast('CSV heeft te weinig regels','error');return;}
  var hdrs=regels[0].split(';').map(function(h){return h.trim().toLowerCase();});
  var add=0,upd=0;
  regels.slice(1).forEach(function(regel){
    var cols=regel.split(';');
    var rij={};
    hdrs.forEach(function(h,i){rij[h]=(cols[i]||'').trim();});
    var naam=rij['naam']||rij['naam (relatie)']||''; if(!naam) return;
    var bestaand=APP.serviceklanten.find(function(k){return k.naam.toLowerCase()===naam.toLowerCase();});
    var ct=(rij['contract']||rij['soort']||'').toUpperCase()||'B';
    var laatste=rij['datum']||rij['laatste']||'';
    var data=Object.assign(bestaand||{},{
      id:bestaand?bestaand.id:uid(),naam:naam,debNr:rij['debiteur']||rij['nr']||'',
      adres:rij['straat']||rij['adres']||'',postcode:rij['postcode']||'',
      plaats:rij['plaats']||rij['woonplaats']||'',email:rij['email']||rij['e-mail']||'',
      telefoon:rij['telefoon']||rij['tel']||'',contractType:ct,
      pomptype:rij['pomptype']||'',besturing:rij['besturing']||'',
      laatsteDatum:laatste,volgendeDatum:berekenVolgend(laatste,ct),
    });
    if(bestaand){Object.assign(bestaand,data);upd++;}else{APP.serviceklanten.push(data);add++;}
    dbSaveItem('serviceklanten',data.id,data);
  });
  renderServiceklanten(); toast(add+' toegevoegd, '+upd+' bijgewerkt','success');
}

var _debZoek='', _debPage=1, _debPS=25;

function renderDebiteuren(){
  var lijst=APP.debiteuren.filter(function(d){

    var q=_debZoek.toLowerCase();
    return(d.naam||'').toLowerCase().includes(q)||(d.nr||'').toLowerCase().includes(q)||(d.plaats||'').toLowerCase().includes(q);
  });
  var totaal=lijst.length,slice=lijst.slice((_debPage-1)*_debPS,_debPage*_debPS);
  var metCtrt=APP.debiteuren.filter(function(d){return APP.serviceklanten.some(function(k){return k.debNr===d.nr||k.debId===d.id;});}).length;

function saveDeb(id){

  var data=Object.assign({},bestaand,{
    id:id||uid(),nr:document.getElementById('df-nr').value.trim(),naam:naam,
    adres:document.getElementById('df-adr').value.trim(),postcode:document.getElementById('df-pc').value.trim(),
    plaats:document.getElementById('df-pl').value.trim(),contactpersoon:document.getElementById('df-ct').value.trim(),

  });

function verwijderDeb(id){

}

function importDebCsv(){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.csv';
  inp.onchange=function(e){
    var f=e.target.files[0]; if(!f) return;
    var r=new FileReader(); r.onload=function(ev){verwerkDebCsv(ev.target.result);}; r.readAsText(f,'utf-8');
  }; inp.click();
}
function verwerkDebCsv(txt){
  var regels=txt.split('\n').filter(function(r){return r.trim();});
  if(regels.length<2){toast('CSV heeft te weinig regels','error');return;}
  var hdrs=regels[0].split(';').map(function(h){return h.trim().toLowerCase();});
  var add=0,upd=0;
  regels.slice(1).forEach(function(regel){
    var cols=regel.split(';'); var rij={};
    hdrs.forEach(function(h,i){rij[h]=(cols[i]||'').trim();});
    var naam=rij['naam']||rij['naam (relatie)']||''; if(!naam) return;
    var nr=rij['debiteur']||rij['nr']||rij['debiteurnummer']||'';
    var bestaand=nr?APP.debiteuren.find(function(d){return d.nr===nr;}):null;
    var data=Object.assign(bestaand||{},{
      id:bestaand?bestaand.id:uid(),nr:nr,naam:naam,
      adres:rij['straat']||rij['adres']||'',postcode:rij['postcode']||'',
      plaats:rij['woonplaats']||rij['plaats']||'',
      contactpersoon:rij['contact']||rij['contactpersoon']||'',
      email:rij['email']||rij['e-mail']||'',telefoon:rij['telefoon']||rij['tel']||'',
    });
    if(bestaand){Object.assign(bestaand,data);upd++;}else{APP.debiteuren.push(data);add++;}
    dbSaveItem('debiteuren',data.id,data);
  });
  renderDebiteuren(); toast(add+' toegevoegd, '+upd+' bijgewerkt','success');
}

function openVerlofModal(){
  var medOpts=APP.medewerkers.filter(function(m){return m.status!=='inactief';}).map(function(m){return [m.id,m.voornaam+' '+m.achternaam];});
  var mijnId=getMijnMedId();
  var b='<div class="form-grid">';
  b+=fgf('Medewerker',fsel('vl-med',medOpts,mijnId));
  b+=fg('Van',finp('vl-van','date','',''));
  b+=fg('Tot',finp('vl-tot','date','',''));
  b+=fg('Type',fsel('vl-type',[['Vakantie','Vakantie'],['Bijzonder verlof','Bijzonder verlof'],['Onbetaald verlof','Onbetaald verlof'],['ATV','ATV']],'Vakantie'));
  b+=fgf('Opmerking',finp('vl-opm','text','','Optioneel'));
  b+='</div>';
  var f='<button class="btn btn-ghost" id="vmod-cancel">Annuleren</button><button class="btn btn-primary" id="vmod-save">Indienen</button>';
  openModal('Verlof aanvragen',b,f);
  document.getElementById('vmod-cancel').addEventListener('click',closeModal);
  document.getElementById('vmod-save').addEventListener('click',submitVerlof);
}

function submitVerlof(){
  var medId=document.getElementById('vl-med').value;
  var van=document.getElementById('vl-van').value;
  var tot=document.getElementById('vl-tot').value;
  if(!medId||!van||!tot){toast('Vul alle verplichte velden in','error');return;}
  if(van>tot){toast('Einddatum moet na startdatum liggen','error');return;}
  var dagen=Math.max(1,Math.round((new Date(tot)-new Date(van))/(86400000)*5/7));
  var data={id:uid(),medId:medId,van:van,tot:tot,dagen:Math.round(dagen),type:document.getElementById('vl-type').value,opmerking:document.getElementById('vl-opm').value.trim(),status:'aangevraagd',aangevraagdOp:new Date().toISOString().split('T')[0]};
  APP.verlof.push(data); dbSaveItem('verlof',data.id,data); closeModal(); renderVerlof();
  toast('Verlofaanvraag ingediend','success');
}

function keurVerlof(id,goed){
  var v=APP.verlof.find(function(x){return String(x.id)===String(id);}); if(!v) return;
  v.status=goed?'goedgekeurd':'afgewezen';
  v.beoordeeldOp=new Date().toISOString().split('T')[0];
  v.beoordeeldDoor=APP.profiel?APP.profiel.naam:'';
  if(goed){var m=getMed(v.medId);if(m){m.verlofSaldo=Math.max(0,(m.verlofSaldo||0)-(v.dagen||0));dbSaveItem('medewerkers',m.id,m);}}
  dbSaveItem('verlof',v.id,v); renderVerlof();
  toast(goed?'Verlof goedgekeurd':'Verlof afgewezen','success');
}

function verwijderVerlof(id){
  if(!confirm('Verlofaanvraag verwijderen?'))return;
  APP.verlof=APP.verlof.filter(function(x){return String(x.id)!==String(id);});
  dbRemove('verlof',id); renderVerlof(); toast('Verlofaanvraag verwijderd','success');
}

// ═══════════════════════════════════════════════
// EVENT LISTENERS (op veilige manier, geen inline)
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  // Login
  // Hamburger menu
  var hamburger = document.getElementById('hamburger');
  var sidebarOverlay = document.getElementById('sidebar-overlay');
  var sidebar = document.getElementById('sidebar');
  if (hamburger) {
    hamburger.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('open');
    });
  }
  if (sidebarOverlay) {
    sidebarOverlay.addEventListener('click', function() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    });
  }

  // Bottom nav
  document.querySelectorAll('#bottom-nav .bn-item').forEach(function(btn) {
    btn.addEventListener('click', function() {
      toonPagina(btn.dataset.page);
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    });
  });

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('login-email').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('login-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('pw-vergeten-btn').addEventListener('click',function(){
    var email=document.getElementById('login-email').value.trim();
    if(!email){alert('Voer eerst je e-mailadres in.');return;}
    AUTH.sendPasswordResetEmail(email).then(function(){toast('Reset e-mail verstuurd','success');}).catch(function(e){toast('Mislukt: '+e.message,'error');});
  });

  // App
  document.getElementById('uitloggen-btn').addEventListener('click', doUitloggen);
  document.getElementById('theme-btn').addEventListener('click', function(){document.body.classList.toggle('light');});

  // Modal/Panel
  document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('panel-overlay').addEventListener('click', closePanel);
  document.getElementById('panel-close').addEventListener('click', closePanel);

  // Log panel
  var logPanel=document.getElementById('log-panel');
  function toggleLog(){logPanel.classList.toggle('hidden');if(!logPanel.classList.contains('hidden'))refreshLog();}
  document.getElementById('log-btn').addEventListener('click', toggleLog);
  document.getElementById('toggle-log-btn').addEventListener('click', toggleLog);
  document.getElementById('log-clear').addEventListener('click',function(){LOGS=[];refreshLog();});
  document.getElementById('log-close').addEventListener('click',function(){logPanel.classList.add('hidden');});
});
</script>
</body>
</html>
