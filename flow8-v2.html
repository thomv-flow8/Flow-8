var _medFilter='alle', _medZoek='', _medSortKey='achternaam', _medSortDir=1, _medPage=1, _medPS=25;
var _medKol = { functie:true, contract:true, verlofOp:true, verlofGp:true, resterend:true, overuren:false };

function renderMedewerkers() {
  try {
  var rol = APP.rollen;
  var lijst = APP.medewerkers.filter(function(m) {
    if (_medFilter!=='alle' && m.rol!==_medFilter) return false;
    if (_medZoek) { var q=_medZoek.toLowerCase(); return (m.voornaam||'').toLowerCase().includes(q)||(m.achternaam||'').toLowerCase().includes(q)||(m.email||'').toLowerCase().includes(q); }
    return true;
  });
  var vandaagMedS = new Date().toISOString().split('T')[0];
  lijst = enrichSortVelden(lijst, {
    __verlofOp: function(m){
      return APP.verlof.filter(function(v){return String(v.medId)===String(m.id)&&v.status==='goedgekeurd'&&(v.tot||v.van)<=vandaagMedS;}).reduce(function(s,v){return s+(v.dagen||0);},0);
    },
    __verlofGp: function(m){
      return APP.verlof.filter(function(v){return String(v.medId)===String(m.id)&&v.status==='goedgekeurd'&&v.van>vandaagMedS;}).reduce(function(s,v){return s+(v.dagen||0);},0);
    },
    __resterend: function(m){
      var jaarTegoed = m.verlofBasis != null ? m.verlofBasis : ((APP.teamInstellingen&&APP.teamInstellingen.verlofBasis!=null)?APP.teamInstellingen.verlofBasis:25);
      var opgenomen = APP.verlof.filter(function(v){return String(v.medId)===String(m.id)&&v.status==='goedgekeurd'&&(v.tot||v.van)<=vandaagMedS;}).reduce(function(s,v){return s+(v.dagen||0);},0);
      return jaarTegoed - opgenomen;
    },
    __ouSaldo: function(m){
      var jr = new Date().getFullYear().toString();
      var gecomp = APP.overuren.filter(function(o){return String(o.medId)===String(m.id)&&o.status==='gecompenseerd'&&(o.datum||'').startsWith(jr);}).reduce(function(s,o){return s+(o.uren||0);},0);
      var uitbet = APP.overuren.filter(function(o){return String(o.medId)===String(m.id)&&o.status==='uitbetaald'&&(o.datum||'').startsWith(jr);}).reduce(function(s,o){return s+(o.uren||0);},0);
      return Math.round((gecomp-uitbet)*10)/10;
    },
  });
  lijst = sorteerLijst(lijst, _medSortKey, _medSortDir);

  var totaal=lijst.length, slice=lijst.slice((_medPage-1)*_medPS,_medPage*_medPS);
  var el=document.getElementById('content');

  var h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">';
  h+='<div class="search-wrap" style="flex:1;min-width:160px"><span class="search-ico">'+SVGS.users+'</span><input class="search-input" id="med-zoek" placeholder="Zoek medewerker..." value="'+esc(_medZoek)+'"></div>';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-left:auto">';
  h+='<button class="btn btn-ghost btn-sm" id="med-kolom-toolbar-btn">⚙ Kolommen</button>';
  h+='<button class="btn btn-ghost btn-sm" id="med-export-btn">⬇ Export</button>';
  if (magSchrijven('medewerkers')) h+='<button class="btn btn-primary btn-sm" id="med-add-btn">+ Toevoegen</button>';
  h+='</div></div>';

  h+='<div class="filter-row">';
  ['alle'].concat(Object.keys(rol)).forEach(function(r) {
    var lbl=r==='alle'?'Alle':(rol[r]?rol[r].naam:r);
    var cnt=r==='alle'?APP.medewerkers.length:APP.medewerkers.filter(function(m){return m.rol===r;}).length;
    h+='<button class="chip'+((_medFilter===r)?' active':'')+'" data-filter="'+r+'">'+lbl+' ('+cnt+')</button>';
  });
  h+='</div>';

  h+='<div class="card" style="padding:0"><div class="table-wrap"><table><thead><tr>';
  // Kolommen definitie
  var medKolDef = [
    { k:'naam',     l:'Medewerker',        always:true, sort:'achternaam' },
    { k:'functie',  l:'Functie / Rol',     always:true, sort:'functie' },
    { k:'contract', l:'Contract',          d:true,      sort:'contractType' },
    { k:'verlofOp', l:'Verlof opgenomen',  d:true,      sort:'__verlofOp' },
    { k:'verlofGp', l:'Verlof gepland',    d:true,      sort:'__verlofGp' },
    { k:'resterend',l:'Resterend',         d:true,      sort:'__resterend' },
    { k:'overuren', l:'Overuren',          d:false,     sort:'__ouSaldo' },
    { k:'status',   l:'Status',            always:true, sort:'status' },
  ];
  medKolDef.forEach(function(c) {
    if (!c.always && _medKol[c.k] === false) return;
    var sortIco = c.sort ? (_medSortKey===c.sort?(_medSortDir===1?' ↑':' ↓'):' ⇅') : '';
    h += '<th'+(c.sort?' style="cursor:pointer" data-sort="'+c.sort+'"':'')+'>'+c.l+sortIco+'</th>';
  });
  if (magSchrijven('medewerkers')) h+='<th style="width:70px"></th>';
  h+='</tr></thead><tbody>';

  if (!slice.length) h+='<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--muted)">Geen medewerkers gevonden</td></tr>';
  slice.forEach(function(m){
    var kl=medKleur(m);
    // Verlof berekeningen
    var _stdB = (APP.teamInstellingen && APP.teamInstellingen.verlofBasis != null) ? APP.teamInstellingen.verlofBasis : 25;
    var basis      = (function(){var _b=parseFloat(m.verlofBasis);return isNaN(_b)?_stdB:_b;})();
    var uren       = parseInt(m.contractUren)   || 40;
    var jaarTegoed = Math.round(basis * uren / 40 * 10) / 10;
    var saldo      = parseFloat(m.verlofSaldo)  || 0;
    var vandaagMed = new Date().toISOString().split('T')[0];
    var opgenomen  = APP.verlof.filter(function(v){return String(v.medId)===String(m.id)&&v.status==='goedgekeurd'&&(v.tot||v.van)<=vandaagMed;})
                    .reduce(function(s,v){return s+(v.dagen||0);},0);
    var gepland    = APP.verlof.filter(function(v){return String(v.medId)===String(m.id)&&v.status==='goedgekeurd'&&v.van>vandaagMed;})
                    .reduce(function(s,v){return s+(v.dagen||0);},0);
    var resterend  = Math.round((saldo) * 10) / 10;
    var urenPD     = getUrenPerDag(m);
    var contractUren = uren * 52;
    var gewerktUren = 0;
    // Balk: hoeveel van jaarTegoed nog resterend (groen=veel over, rood=bijna op)
    var pctRest    = jaarTegoed > 0 ? Math.min(100, Math.max(0, Math.round(resterend / jaarTegoed * 100))) : 0;
    var balkKleur  = pctRest <= 20 ? 'var(--red)' : pctRest <= 50 ? 'var(--orange)' : 'var(--green)';

    function pijl(v) { return v > 0 ? '<span style="color:var(--red)">▼ '+v+'d</span>' : '<span style="color:var(--muted)">—</span>'; }

    h+='<tr data-id="'+m.id+'" class="med-row" style="cursor:pointer">';

    // Naam kolom
    h+='<td><div style="display:flex;align-items:center;gap:10px">';
    h+='<div style="position:relative"><div class="avatar" style="width:36px;height:36px;font-size:12px;background:'+medKleur(m)+';color:#fff;flex-shrink:0">'+initials(m)+'</div>';
    if(m.geslacht==='man') h+='<div style="position:absolute;bottom:-1px;right:-1px;font-size:9px">♂</div>';
    else if(m.geslacht==='vrouw') h+='<div style="position:absolute;bottom:-1px;right:-1px;font-size:9px">♀</div>';
    h+='</div>';
    h+='<div><div style="font-weight:600;font-size:13px">'+esc(m.voornaam)+' '+esc(m.achternaam)+'</div>';
    h+='<div style="font-size:11px;color:var(--muted)">'+esc(m.email||'')+'</div></div></div></td>';

    // Functie / Rol
    if (_medKol.functie !== false || true) {
      var r = APP.rollen[m.rol];
      h+='<td><div style="font-size:13px">'+esc(m.functie||'—')+'</div>';
      h+='<span class="tag" style="background:'+kl+'22;color:'+kl+';margin-top:3px;display:inline-flex">'+esc(r?r.naam:m.rol||'—')+'</span></td>';
    }

    // Contract
    if (_medKol.contract !== false) {
      h+='<td>';
      h+='<div style="font-size:13px;font-weight:600">'+uren+' uur/wk</div>';
      // Progressiebalk gewerkt/contract uren (placeholder)
      h+='<div style="font-size:11px;color:var(--muted)">0/'+Math.round(contractUren/52*4)+' uur</div>';
      h+='<div class="progress" style="width:80px;margin-top:3px"><div class="progress-fill" style="width:0%;background:var(--accent)"></div></div>';
      h+='</td>';
    }

    // Verlof opgenomen
    if (_medKol.verlofOp !== false) {
      h+='<td style="font-size:12px">';
      h+='<div>'+opgenomen+' dagen</div>';
      h+='<div style="color:var(--muted)">('+Math.round(opgenomen*urenPD)+'u)</div>';
      h+='</td>';
    }

    // Verlof gepland
    if (_medKol.verlofGp !== false) {
      h+='<td style="font-size:12px">';
      h+='<div>'+gepland+' dagen</div>';
      h+='<div style="color:var(--muted)">('+Math.round(gepland*urenPD)+'u)</div>';
      h+='</td>';
    }

    // Resterend
    if (_medKol.resterend !== false) {
      var restKleur = resterend <= 3 ? 'var(--red)' : resterend <= 7 ? 'var(--orange)' : 'var(--green)';
      h+='<td>';
      h+='<div style="font-weight:700;color:'+restKleur+'">'+resterend+'d</div>';
      h+='<div style="font-size:11px;color:var(--muted)">'+Math.round(resterend*urenPD)+'u · tegoed: '+jaarTegoed+'d</div>';
      h+='<div class="progress" style="width:80px;margin-top:3px" title="'+pctRest+'% van jaarTegoed resterend"><div class="progress-fill" style="width:'+pctRest+'%;background:'+balkKleur+'"></div></div>';
      h+='</td>';
    }

    // Overuren
    if (_medKol.overuren === true) {
      var _ouJr = new Date().getFullYear().toString();
      var _ouGecomp = APP.overuren ? APP.overuren.filter(function(o){return String(o.medId)===String(m.id)&&o.status==='gecompenseerd'&&(o.datum||'').startsWith(_ouJr);}).reduce(function(s,o){return s+(o.uren||0);},0) : 0;
      var _ouUitbet = APP.overuren ? APP.overuren.filter(function(o){return String(o.medId)===String(m.id)&&o.status==='uitbetaald'&&(o.datum||'').startsWith(_ouJr);}).reduce(function(s,o){return s+(o.uren||0);},0) : 0;
      var ouTotal = Math.round((_ouGecomp - _ouUitbet) * 10) / 10;
      h+='<td style="font-size:12px;color:'+(ouTotal>0?'var(--orange)':'var(--muted)')+'">'+ouTotal+' uur</td>';
    }

    // Status
    h+='<td>'+tagMedStatus(m.status)+'</td>';

    if (magSchrijven('medewerkers')) h+='<td onclick="event.stopPropagation()" style="white-space:nowrap"><button class="btn btn-ghost btn-sm btn-icon med-edit-btn" data-id="'+m.id+'" title="Bewerken">✏️</button> <button class="btn btn-ghost btn-sm btn-icon med-del-btn" data-id="'+m.id+'" style="color:var(--red)" title="Verwijderen">🗑</button></td>';
    h+='<td></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  h+=pgHtml(totaal,_medPage,_medPS,'_medPage');
  h+='</div>';
  el.innerHTML=h;

  // Events via delegation - geen inline onclick!
  el.querySelector('#med-zoek').addEventListener('input', function(e){
    _medZoek=e.target.value;
    var pos=e.target.selectionStart;
    _medPage=1;
    renderMedewerkers();
    var ni=document.getElementById('med-zoek');
    if(ni){ ni.focus(); ni.setSelectionRange(pos,pos); }
  });
  el.querySelectorAll('.chip[data-filter]').forEach(function(b){b.addEventListener('click',function(){_medFilter=b.dataset.filter;_medPage=1;renderMedewerkers();});});
  var medKolBtn = el.querySelector('#med-kolom-btn'); if(medKolBtn) medKolBtn.addEventListener('click', openMedKolomKiezer);
  el.querySelectorAll('th[data-sort]').forEach(function(th){th.addEventListener('click',function(){if(_medSortKey===th.dataset.sort)_medSortDir*=-1;else{_medSortKey=th.dataset.sort;_medSortDir=1;}_medPage=1;renderMedewerkers();});});
  el.querySelectorAll('.med-row').forEach(function(tr){tr.addEventListener('click',function(e){if(!e.target.closest('button'))openMedPanel(tr.dataset.id);});});
  el.querySelectorAll('.med-edit-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();openMedModal(b.dataset.id);});});
  el.querySelectorAll('.med-del-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();verwijderMed(b.dataset.id);});});
  el.querySelectorAll('.pg-btn[data-pg]').forEach(function(b){b.addEventListener('click',function(){_medPage=parseInt(b.dataset.pg);renderMedewerkers();});});
  var addBtn=el.querySelector('#med-add-btn'); if(addBtn) addBtn.addEventListener('click',function(){openMedModal(null);});
  var medKolBtn = el.querySelector('#med-kolom-btn'); if(medKolBtn) medKolBtn.addEventListener('click', openMedKolomKiezer);
  var medKolToolbarBtn = el.querySelector('#med-kolom-toolbar-btn'); if(medKolToolbarBtn) medKolToolbarBtn.addEventListener('click', openMedKolomKiezer);
  var medExpBtn=el.querySelector('#med-export-btn'); if(medExpBtn) medExpBtn.addEventListener('click',function(){
    var rows=APP.medewerkers.filter(function(m){return m.status!=='inactief';}).map(function(m){
      var r=APP.rollen[m.rol]||{};
      return[m.voornaam||'',m.achternaam||'',m.functie||'',r.naam||m.rol||'',m.email||'',m.telefoon||'',m.contractType||'',m.contractUren||'',m.verlofBasis||'',m.verlofSaldo||0,fmtD(m.datumInDienst),m.status||'actief'];
    });
    csvExport(['Voornaam','Achternaam','Functie','Rol','Email','Telefoon','Contracttype','Uren/week','Verlofbasis','Verlof saldo','In dienst','Status'],rows,'medewerkers');
  });
  } catch(e) {
    console.error('renderMedewerkers fout:', e);
    document.getElementById('content').innerHTML = '<div style="padding:40px;text-align:center;color:var(--red)"><div style="font-size:32px;margin-bottom:12px">⚠</div><div style="font-weight:700;margin-bottom:8px">Fout bij laden medewerkers</div><div style="font-size:13px;color:var(--muted);margin-bottom:16px">'+esc(e.message)+'</div><button class="btn btn-primary" onclick="renderMedewerkers()">Opnieuw proberen</button></div>';
  }
}

function openMedPanel(id) {
  var m=getMed(id); if(!m) return;
  var kl=medKleur(m);
  var r=APP.rollen[m.rol];
  var h='<div style="display:flex;align-items:center;gap:14px;background:var(--surface2);border-radius:10px;padding:16px;margin-bottom:20px">';
  h+='<div class="avatar" style="width:56px;height:56px;font-size:20px;background:'+medKleur(m)+';color:#fff">'+initials(m)+'</div>';
  h+='<div><div style="font-family:Syne,sans-serif;font-size:17px;font-weight:800">'+esc(m.voornaam+' '+m.achternaam)+'</div>';
  h+='<div style="font-size:12px;color:var(--muted);margin-top:2px">'+esc(m.functie||'')+'</div>';
  h+='<span class="tag" style="background:'+kl+'22;color:'+kl+';margin-top:6px">'+esc(r?r.naam:m.rol||'—')+'</span></div></div>';

  function v(l,w){return '<div style="background:var(--surface2);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px">'+l+'</div><div style="font-size:13px;font-weight:600;margin-top:3px">'+esc(w||'—')+'</div></div>';}
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';
  h+=v('E-mail zakelijk',m.email); h+=v('Telefoon',m.telefoon);
  h+=v('Geboortedatum',fmtD(m.geboortedatum)); h+=v('In dienst',fmtD(m.datumInDienst));
  h+=v('Contract',m.contractType); h+=v('Uren/week',m.contractUren?m.contractUren+' uur':'—');
  h+=v('Verloftegoed/jaar',m.verlofTegoed?m.verlofTegoed+' dagen':'—'); h+=v('Verlof saldo',(m.verlofSaldo!=null?m.verlofSaldo:0)+' dagen');
  h+='</div>';

  // Verlof blok
  var _saldo      = parseFloat(m.verlofSaldo)  || 0;
  var _stdB2 = (APP.teamInstellingen && APP.teamInstellingen.verlofBasis != null) ? APP.teamInstellingen.verlofBasis : 25;
  var _basis      = (function(){var _b=parseFloat(m.verlofBasis);return isNaN(_b)?_stdB2:_b;})();
  var _uren       = parseInt(m.contractUren)   || 40;
  var _jaarTegoed = Math.round((_basis * _uren / 40) * 10) / 10;
  var _urenPerDag = _uren / 5;
  var _saldoUren  = Math.round(_saldo * _urenPerDag * 10) / 10;
  var _opgenomen  = Math.max(0, Math.round((_jaarTegoed - _saldo) * 10) / 10);
  var _pct        = _jaarTegoed > 0 ? Math.min(100, Math.round(_opgenomen / _jaarTegoed * 100)) : 0;
  var _nu         = new Date();
  var _volgJr     = new Date(_nu.getFullYear() + 1, 0, 1);
  var _dagenTot   = Math.ceil((_volgJr - _nu) / 86400000);

  h += '<div style="background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:12px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">';
  h += '<div><div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Huidig saldo</div>';
  h += '<div style="font-family:Syne,sans-serif;font-size:22px;font-weight:800;color:var(--green)">' + _saldo + '<span style="font-size:13px;font-weight:500;margin-left:4px">dagen</span></div>';
  h += '<div style="font-size:12px;color:var(--muted)">' + _saldoUren + ' uur</div></div>';
  h += '<div style="text-align:right"><div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px">Per jaar (' + _uren + 'u)</div>';
  h += '<div style="font-size:16px;font-weight:700;color:var(--accent)">' + _jaarTegoed + ' dagen</div></div></div>';
  h += '<div class="progress" style="margin-bottom:5px"><div class="progress-fill" style="width:' + _pct + '%;background:var(--orange)"></div></div>';
  h += '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted)">';
  h += '<span>' + _opgenomen + ' opgenomen</span><span>' + _jaarTegoed + ' totaal dit jaar</span></div></div>';

function saveMed(id) {
  wisValidatieStijlen();
  var vn=document.getElementById('mf-vn').value.trim();
  var an=document.getElementById('mf-an').value.trim();
  var ok = true;
  if(!vn){ ok = valideerVeld('mf-vn', false, 'Voornaam is verplicht') && ok; } else { valideerVeld('mf-vn', true, ''); }
  if(!an){ ok = valideerVeld('mf-an', false, 'Achternaam is verplicht') && ok; } else { valideerVeld('mf-an', true, ''); }
  if(!ok){ scrollNaarEersteFout(); return; }
  var isNew=!id; var bestaand=id?getMed(id)||{}:{};
  var _saveContractType = document.getElementById('mf-con').value;
  var _saveIsZzp = _saveContractType === 'zzp';
  var contractUren = _saveIsZzp ? 0 : (parseInt(document.getElementById('mf-uur').value) || 40);
  var verlofBasis = _saveIsZzp ? 0 : (function(){var _b=parseFloat(document.getElementById('mf-vb').value);return isNaN(_b)?(APP.teamInstellingen&&APP.teamInstellingen.verlofBasis!=null?APP.teamInstellingen.verlofBasis:25):_b;})();
  var verlofSaldo = _saveIsZzp ? 0 : (parseFloat(document.getElementById('mf-saldo').value)||0);
  // Bereken verloftegoed op basis van contracturen
  var verlofTegoed = Math.round((verlofBasis * contractUren / 40) * 10) / 10;
  var vt = verlofTegoed;
  // Werkrooster ophalen
  var wrPatroonSave = document.querySelector('input[name="wr-patroon"]:checked');
  var wrPatroonVal = wrPatroonSave ? wrPatroonSave.value : 'week';
  var DGNSL = ['ma','di','wo','do','vr','za','zo'];
  var wrWeek1 = {}, wrWeek2 = {};
  document.querySelectorAll('.wr-uren[data-week="1"]').forEach(function(inp){ wrWeek1[inp.dataset.dag] = parseFloat(inp.value)||0; });
  document.querySelectorAll('.wr-uren[data-week="2"]').forEach(function(inp){ wrWeek2[inp.dataset.dag] = parseFloat(inp.value)||0; });
  var werkrooster = { patroon: wrPatroonVal, week1: wrWeek1 };
  if(wrPatroonVal === 'tweeweken') werkrooster.week2 = wrWeek2;

  var data=Object.assign({},bestaand,{
    id:id||uid(), voornaam:vn, achternaam:an,
    functie:document.getElementById('mf-fn').value.trim(),
    rol:document.getElementById('mf-rol').value,
    email:document.getElementById('mf-em').value.trim(),
    telefoon:document.getElementById('mf-tel').value.trim(),
    emailPrive:document.getElementById('mf-emp').value.trim(),
    telefoonPrive:document.getElementById('mf-telp').value.trim(),
    geboortedatum:document.getElementById('mf-geb').value,
    geslacht:document.getElementById('mf-gel').value,
    datumInDienst:document.getElementById('mf-did').value,
    contractType:document.getElementById('mf-con').value,
    contractUren:contractUren,
    verlofBasis:verlofBasis,
    verlofTegoed:vt,
    verlofSaldo:verlofSaldo,
    werkrooster:werkrooster,
    straat:document.getElementById('mf-str').value.trim(),
    postcode:document.getElementById('mf-pc').value.trim(),
    plaats:document.getElementById('mf-pl').value.trim(),
    status:bestaand.status||'actief',
    kleur: document.getElementById('mf-kleur') ? document.getElementById('mf-kleur').value : (bestaand.kleur||rolKleur(document.getElementById('mf-rol').value)),
  });
  if(isNew) APP.medewerkers.push(data);
  else { var i=APP.medewerkers.findIndex(function(m){return String(m.id)===String(id);}); if(i>-1) APP.medewerkers[i]=data; }
  dbSaveItem('medewerkers',data.id,data);

  // Log saldowijziging in mutatiehistorie als het saldo is veranderd
  if(!isNew && !_saveIsZzp) {
    var oudSaldo = parseFloat(bestaand.verlofSaldo) || 0;
    if(Math.abs(verlofSaldo - oudSaldo) > 0.01) {
      var verschil = Math.round((verlofSaldo - oudSaldo) * 10) / 10;
      slaVerlofMutatie(
        data.id,
        'correctie',
        verschil,
        'Handmatige aanpassing via medewerker bewerken (oud: '+oudSaldo+'d → nieuw: '+verlofSaldo+'d)',
        verlofSaldo
      );
    }
  }

  closeModal(); renderMedewerkers();
  toast(isNew?'Medewerker toegevoegd':'Medewerker bijgewerkt','success');
}

function verwijderMed(id) {
  var m=getMed(id); if(!m) return;
  bevestigActie('Medewerker verwijderen', m.voornaam+' '+m.achternaam+' definitief verwijderen?', function(){
    var backup=JSON.parse(JSON.stringify(m));
    APP.medewerkers=APP.medewerkers.filter(function(x){return String(x.id)!==String(id);});
    renderMedewerkers();
    var verwijderd=false;
    var timer=setTimeout(function(){ verwijderd=true; dbRemove('medewerkers',id); },6000);
    toast('Medewerker verwijderd','success',function(){
      clearTimeout(timer);
      if(!verwijderd){ APP.medewerkers.push(backup); dbSaveItem('medewerkers',backup.id,backup); renderMedewerkers(); toast('Verwijdering ongedaan gemaakt','success'); }
    });
  });
}

function skHistorie(k) {
  // Zoek alle opdrachten gekoppeld aan deze serviceklant of debiteur
  var hist = APP.opdrachten.filter(function(o) {
    return (o.skId  && String(o.skId)  === String(k.id))
        || (o.debId && String(o.debId) === String(k.debId) && k.debId)
        || (o.klantNaam && k.naam && o.klantNaam.toLowerCase() === k.naam.toLowerCase());
  }).sort(function(a,b){ return (b.datum||'') > (a.datum||'') ? 1 : -1; });

  var aantalOps = hist.length;
  // Standaard open bij 0-3 opdrachten, ingeklapt bij 4+
  var defaultOpen = aantalOps <= 3;
  var headerTekst = aantalOps === 0
    ? 'Servicehistorie — Nog geen opdrachten'
    : 'Servicehistorie — ' + aantalOps + ' opdracht' + (aantalOps === 1 ? '' : 'en');

  var inhoud = '';
  if (aantalOps === 0) {
    inhoud += '<div style="background:var(--surface2);border-radius:8px;padding:12px;font-size:13px;color:var(--muted);text-align:center">Nog geen opdrachten gevonden voor deze klant</div>';
  } else {
    hist.forEach(function(o) {
      var m = o.monteurId ? getMed(o.monteurId) : null;
      var monteurNaam = m ? m.voornaam + ' ' + m.achternaam : (o.monteurNaam || '—');
      var isAfgehandeld = o.status === 'afgehandeld';
      inhoud += '<div style="border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;background:var(--surface2);'+(isAfgehandeld?'opacity:.8':'')+'\">';
      inhoud += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">';
      inhoud += '<div style="font-weight:600;font-size:13px">'+esc(o.type||'Opdracht')+'</div>';
      inhoud += '<div style="font-size:12px;color:var(--muted)">'+fmtD(o.datum)+'</div></div>';
      inhoud += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+tagStatus(o.status);
      if(monteurNaam !== '—') inhoud += '<span style="font-size:12px;color:var(--muted)">👤 '+esc(monteurNaam)+'</span>';
      inhoud += '</div>';
      if(o.werkomschrijving) inhoud += '<div style="font-size:12px;color:var(--muted);margin-top:4px">'+esc(o.werkomschrijving)+'</div>';
      if(o.notitie) inhoud += '<div style="font-size:12px;color:var(--text);background:var(--surface);border-radius:6px;padding:6px 8px;margin-top:6px">'+esc(o.notitie)+'</div>';
      inhoud += '</div>';
    });
  }

  // Accordion wrapper
  var h = '<div style="margin-top:16px;border:1px solid var(--border);border-radius:10px;overflow:hidden">';
  h += '<div id="sk-hist-header" style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;background:var(--surface2);user-select:none">';
  h += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px">'+headerTekst+'</div>';
  h += '<svg id="sk-hist-pijl" style="transition:transform .2s;transform:rotate('+(defaultOpen?'90':'0')+'deg);flex-shrink:0" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>';
  h += '</div>';
  h += '<div id="sk-hist-body" style="'+(defaultOpen?'':'display:none')+';padding:12px 14px;border-top:1px solid var(--border)">';
  h += inhoud;
  h += '</div></div>';
  return h;
}

function saveSk(id) {
  var k=id?(APP.serviceklanten.find(function(x){return String(x.id)===String(id);})):null;
  if(!k){toast('Serviceklant niet gevonden','error');return;}
  var laatste=document.getElementById('sk-ld').value;
  var ct=document.getElementById('sk-con').value;
  var data=Object.assign({},k,{
    contractType:ct,
    heeftBContract: document.getElementById('sk-bcontract') ? document.getElementById('sk-bcontract').checked : !!(k.heeftBContract),
    uitvoerder: document.getElementById('sk-uitvoerder') ? document.getElementById('sk-uitvoerder').value : (k.uitvoerder||'intern'),
    pomptype:document.getElementById('sk-pt').value.trim(),
    besturing:document.getElementById('sk-bs').value.trim(),
    duurUren:parseFloat(document.getElementById('sk-duur').value)||null,
    werkomschrijving:document.getElementById('sk-wo')?document.getElementById('sk-wo').value.trim():'',
    notitie:document.getElementById('sk-nt').value.trim(),
    laatsteDatum:laatste,
    volgendeDatum:berekenVolgend(laatste,ct),
  });
  var i=APP.serviceklanten.findIndex(function(x){return String(x.id)===String(id);});
  if(i>-1) APP.serviceklanten[i]=data;
  dbSaveItem('serviceklanten',data.id,data); closeModal(); renderServiceklanten();
  toast('Serviceklant bijgewerkt','success');
}

function verwijderSk(id){
  var k=APP.serviceklanten.find(function(x){return String(x.id)===String(id);});
  if(!k) return;

  if(k.status === 'passief'){
    bevestigActie('Serviceklant definitief verwijderen', '"'+k.naam+'" definitief verwijderen?', function(){
      var backup=JSON.parse(JSON.stringify(k));
      APP.serviceklanten=APP.serviceklanten.filter(function(x){return String(x.id)!==String(id);});
      renderServiceklanten();
      var verwijderd=false;
      var timer=setTimeout(function(){ verwijderd=true; dbRemove('serviceklanten',id); },6000);
      toast(k.naam+' verwijderd','success',function(){
        clearTimeout(timer);
        if(!verwijderd){ APP.serviceklanten.push(backup); dbSaveItem('serviceklanten',backup.id,backup); renderServiceklanten(); toast('Verwijdering ongedaan gemaakt','success'); }
      });
    });
  } else {
    // Actief → op passief zetten
    bevestigActie('Klant op passief zetten', k.naam+' op passief zetten? De klant blijft bewaard maar wordt niet meer actief ingepland.', function(){
      var vandaag = new Date().toISOString().split('T')[0];
      k.status = 'passief';
      k.passiefDatum = vandaag;
      var skIdx = APP.serviceklanten.findIndex(function(x){return String(x.id)===String(id);});
      if(skIdx>-1) APP.serviceklanten[skIdx]=k;
      dbSaveItem('serviceklanten',k.id,k);
      if(k.debId){
        var deb=APP.debiteuren.find(function(d){return String(d.id)===String(k.debId);});
        if(deb){deb.skStatus='passief';deb.skPassiefDatum=vandaag;dbSaveItem('debiteuren',deb.id,deb);}
      }
      renderServiceklanten();
      toast(k.naam+' is op passief gezet per '+fmtD(vandaag),'success');
    }, 'warn');
  }
}

function reactiverenSk(id){
  var k=APP.serviceklanten.find(function(x){return String(x.id)===String(id);});
  if(!k) return;
  bevestigActie('Klant activeren', k.naam+' weer activeren? De klant wordt opnieuw actief ingepland.', function(){
    delete k.status; delete k.passiefDatum;
    var skIdx=APP.serviceklanten.findIndex(function(x){return String(x.id)===String(id);});
    if(skIdx>-1) APP.serviceklanten[skIdx]=k;
    dbSaveItem('serviceklanten',k.id,k);
    if(k.debId){
      var deb=APP.debiteuren.find(function(d){return String(d.id)===String(k.debId);});
      if(deb){delete deb.skStatus;delete deb.skPassiefDatum;dbSaveItem('debiteuren',deb.id,deb);}
    }
    renderServiceklanten();
    toast(k.naam+' is weer actief','success');
  }, 'warn');
}

function getDebMemos(debId) {
  var d = APP.debiteuren.find(function(x){return String(x.id)===String(debId);});
  if(!d||!d.memos) return [];
  return Object.values(d.memos).sort(function(a,b){return b.datum>a.datum?1:-1;});
}
function getActieveMemos(debId) {
  return getDebMemos(debId).filter(function(m){return !m.opgelost;});
}
function saveMemo(debId, memoId, data) {
  var dIdx = APP.debiteuren.findIndex(function(x){return String(x.id)===String(debId);});
  if(dIdx<0) return;
  if(!APP.debiteuren[dIdx].memos) APP.debiteuren[dIdx].memos = {};
  APP.debiteuren[dIdx].memos[memoId] = data;
  FB.ref(dbPath('debiteuren', debId, 'memos', memoId)).set(data);
}
function verwijderMemo(debId, memoId) {
  var dIdx = APP.debiteuren.findIndex(function(x){return String(x.id)===String(debId);});
  if(dIdx<0) return;
  if(APP.debiteuren[dIdx].memos) delete APP.debiteuren[dIdx].memos[memoId];
  FB.ref(dbPath('debiteuren', debId, 'memos', memoId)).remove();
}
function memoTypeInfo(type) {
  return {
    waarschuwing: { label:'Waarschuwing', kleur:'var(--red)',    bg:'rgba(239,68,68,0.1)',    border:'rgba(239,68,68,0.25)',    icon:'<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' },
    info:         { label:'Info',         kleur:'var(--accent)',  bg:'rgba(59,130,246,0.1)',   border:'rgba(59,130,246,0.25)',   icon:'<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' },
    opgelost:     { label:'Opgelost',     kleur:'var(--green)',   bg:'rgba(16,185,129,0.08)',  border:'rgba(16,185,129,0.2)',    icon:'<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' },
  }[type] || { label:type, kleur:'var(--muted)', bg:'var(--surface2)', border:'var(--border)', icon:'' };
}

function bindMemoEvents(debId) {
  var pb = document.getElementById('panel-body');
  if(!pb) return;
  var addBtn = pb.querySelector('#memo-add-btn');
  if(addBtn) addBtn.addEventListener('click', function(){ openMemoModal(debId); });
  pb.querySelectorAll('.memo-oplossen-btn').forEach(function(b){
    b.addEventListener('click', function(){
      var memos = getDebMemos(debId);
      var m = memos.find(function(x){return String(x.id)===b.dataset.memoid;});
      if(!m) return;
      m.opgelost = true; m.opgelostDatum = new Date().toISOString().split('T')[0];
      saveMemo(debId, m.id, m);
      document.getElementById('memo-sectie').outerHTML = renderMemoSectie(debId, true);
      bindMemoEvents(debId);
      toast('Memo gemarkeerd als opgelost','success');

        verwijderMemo(debId, b.dataset.memoid);
        var ms = document.getElementById('memo-sectie');

    if(!tekst){toast('Vul een memo in','error');return;}
    var memoId = 'memo_'+uid();
    var data = {
      id: memoId,
      type: document.getElementById('memo-type').value,
      tekst: tekst,
      auteur: APP.profiel ? APP.profiel.naam : 'Onbekend',
      datum: new Date().toISOString().split('T')[0],
      opgelost: false,
    };
    saveMemo(debId, memoId, data);
    closeModal();

    bindMemoEvents(debId);
    toast('Memo toegevoegd','success');
  });
}

function renderDebiteuren(){
  var lijst=APP.debiteuren.filter(function(d){
    if(!_debZoek) return true;
    var q=_debZoek.toLowerCase();
    return(d.naam||'').toLowerCase().includes(q)||(d.nr||'').toLowerCase().includes(q)||(d.plaats||'').toLowerCase().includes(q)||(d.adres||'').toLowerCase().includes(q)||(d.contactpersoon||'').toLowerCase().includes(q)||(d.email||'').toLowerCase().includes(q);
  });
  lijst = sorteerLijst(lijst, _debSortKey, _debSortDir);
  var totaal=lijst.length,slice=lijst.slice((_debPage-1)*_debPS,_debPage*_debPS);
  var metCtrt=APP.debiteuren.filter(function(d){return APP.serviceklanten.some(function(k){return k.debNr===d.nr||k.debId===d.id;});}).length;

  h+='<button class="btn btn-ghost btn-sm" id="deb-import-btn">📥 Import</button>';
  h+='<button class="btn btn-ghost btn-sm" id="deb-kolom-toolbar-btn">⚙ Kolommen</button>';
  h+='<button class="btn btn-ghost btn-sm" id="deb-export-btn">⬇ Export</button>';
  if(magSchrijven('debiteuren')) h+='<button class="btn btn-primary btn-sm" id="deb-add-btn">+ Toevoegen</button>';
  h+='</div></div>';

  h+='<div class="stats-grid" style="margin-bottom:16px">';
  h+=statCard('Totaal debiteuren',APP.debiteuren.length,'#3b82f6',SVGS.credit);
  h+=statCard('Met servicecontract',metCtrt,'#10b981',SVGS.file);
  h+=statCard('Zonder contract',APP.debiteuren.length-metCtrt,'#6b7694',SVGS.credit);
  h+=statCard('Contract B',metBContract,'#f59e0b',SVGS.bell);
  h+='</div>';

  var _debSortKeys = { nr:'nr', naam:'naam', adres:'adres', postcode:'postcode', plaats:'plaats', contact:'contactpersoon', email:'email' };
  h+='<div class="card" style="padding:0"><div class="table-wrap"><table><thead><tr>';
  _debKolom.forEach(function(c) {
    if (!c.aan) return;
    var sk = _debSortKeys[c.k];
    if (sk) {
      var ico = _debSortKey===sk ? (_debSortDir===1?' ↑':' ↓') : ' ⇅';
      h += '<th class="deb-sort-th" data-sort="'+sk+'" style="cursor:pointer;user-select:none;white-space:nowrap">'+c.l+'<span style="opacity:.5;font-size:10px">'+ico+'</span></th>';
    } else { h += '<th>'+c.l+'</th>'; }
  });
  if(magSchrijven('debiteuren')) h+='<th style="width:90px"></th>';
  h+='</tr></thead><tbody>';
  if(!slice.length) h+='<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted)">Geen debiteuren gevonden</td></tr>';
  slice.forEach(function(d){
    var sk=APP.serviceklanten.find(function(k){return k.debNr===d.nr||k.debId===d.id;});
    h+='<tr data-id="'+d.id+'" class="deb-row" style="cursor:pointer">';
    _debKolom.forEach(function(c) {
      if (!c.aan) return;
      switch(c.k) {
        case 'nr':              h+='<td style="font-weight:600;color:var(--accent);white-space:nowrap">'+esc(d.nr||'—')+'</td>'; break;
        case 'naam': {
          var actieveMemos = getActieveMemos(d.id);
          var badge = '';
          if(actieveMemos.length) {
            var hasWaarschuwing = actieveMemos.some(function(m){return m.type==='waarschuwing';});
            var badgeKleur = hasWaarschuwing ? 'var(--red)' : 'var(--accent)';
            badge = '<span title="'+actieveMemos.length+' actieve memo(\'s)" style="display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;background:'+badgeKleur+';color:#fff;font-size:9px;font-weight:700;margin-left:6px;vertical-align:middle;flex-shrink:0">'+actieveMemos.length+'</span>';
          }
          h+='<td><strong>'+esc(d.naam)+'</strong>'+badge+'</td>'; break;
        }
        case 'adres':           h+='<td style="font-size:12px">'+esc(d.adres||'—')+'</td>'; break;
        case 'postcode':        h+='<td style="font-size:12px;font-weight:600">'+esc(d.postcode||'—')+'</td>'; break;
        case 'plaats':          h+='<td style="font-size:12px;color:var(--muted)">'+esc(d.plaats||'—')+'</td>'; break;
        case 'contact':         h+='<td style="font-size:12px">'+esc(d.contactpersoon||'—')+'</td>'; break;
        case 'email':           h+='<td style="font-size:12px;color:var(--accent)">'+esc(d.email||'—')+'</td>'; break;
        case 'website':         h+='<td style="font-size:12px;color:var(--accent2)">'+(d.website?'<a href="'+esc(d.website)+'" target="_blank" style="color:var(--accent2)">'+esc(d.website.replace('https://','').replace('http://',''))+'</a>':'—')+'</td>'; break;
        case 'servicecontract': {
          var _ctTooltip = '';
          if(sk && sk.contractType) {
            var _ctObj = getContracten().find(function(c){ return c.id===sk.contractType||c.code===sk.contractType; });

          }

          break;
        }
      }
    });
    if(magSchrijven('debiteuren')) h+='<td style="white-space:nowrap"><button class="btn btn-ghost btn-sm btn-icon deb-edit-btn" data-id="'+d.id+'">✏️</button><button class="btn btn-ghost btn-sm btn-icon deb-del-btn" data-id="'+d.id+'" style="color:var(--red)">🗑</button></td>';
    h+='<td></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>'+pgHtml(totaal,_debPage,_debPS,'_debPage')+'</div>';
  el.innerHTML=h;

  el.querySelector('#deb-zoek').addEventListener('input',function(e){
    _debZoek=e.target.value;
    _debPage=1;
    var pos=e.target.selectionStart;
    renderDebiteuren();
    var ni=document.getElementById('deb-zoek');
    if(ni){ni.focus();ni.setSelectionRange(pos,pos);}
  });
  var debKolBtn = el.querySelector('#deb-kolom-btn');
  if(debKolBtn) debKolBtn.addEventListener('click', openDebKolomKiezer);
  var debKolToolbarBtn = el.querySelector('#deb-kolom-toolbar-btn');
  if(debKolToolbarBtn) debKolToolbarBtn.addEventListener('click', openDebKolomKiezer);
  el.querySelectorAll('.deb-sort-th').forEach(function(th){th.addEventListener('click',function(){
    if(_debSortKey===th.dataset.sort) _debSortDir*=-1; else{_debSortKey=th.dataset.sort;_debSortDir=1;}
    _debPage=1; renderDebiteuren();
  });});
  el.querySelectorAll('.deb-row').forEach(function(tr){tr.addEventListener('click',function(e){if(!e.target.closest('button'))openDebPanel(tr.dataset.id);});});
  el.querySelectorAll('.deb-edit-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();openDebModal(b.dataset.id);});});
  el.querySelectorAll('.deb-del-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();verwijderDeb(b.dataset.id);});});
  el.querySelectorAll('.pg-btn[data-pg]').forEach(function(b){b.addEventListener('click',function(){_debPage=parseInt(b.dataset.pg);renderDebiteuren();});});
  var addBtn=el.querySelector('#deb-add-btn'); if(addBtn) addBtn.addEventListener('click',function(){openDebModal(null);});
  el.querySelector('#deb-import-btn').addEventListener('click',importDebCsv);
  var debExpBtn=el.querySelector('#deb-export-btn'); if(debExpBtn) debExpBtn.addEventListener('click',function(){
    var rows=APP.debiteuren.map(function(d){
      var sk=APP.serviceklanten.find(function(k){return k.debId===d.id||k.debNr===d.nr;});
      return[d.nr||'',d.naam||'',d.adres||'',d.postcode||'',d.plaats||'',d.contactpersoon||'',d.email||'',d.telefoon||'',sk?sk.contractType:'',''];
    });
    csvExport(['Deb.nr','Naam','Adres','Postcode','Plaats','Contactpersoon','Email','Telefoon','Contract','Notitie'],rows,'debiteuren');
  });
}

function openDebPanel(id){
  var d=APP.debiteuren.find(function(x){return String(x.id)===String(id);}); if(!d) return;
  var sk=APP.serviceklanten.find(function(k){return k.debNr===d.nr||k.debId===d.id;});
  function v(l,w){return '<div style="background:var(--surface2);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase">'+l+'</div><div style="font-size:13px;font-weight:600;margin-top:3px">'+esc(w||'—')+'</div></div>';}

  // Actieve memo waarschuwingen bovenaan
  var actiefMemos = getActieveMemos(id);
  var h = '';
  if(actiefMemos.length) {
    actiefMemos.forEach(function(m){
      var ti = memoTypeInfo(m.type);
      h += '<div style="background:'+ti.bg+';border:1px solid '+ti.border+';border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start">';
      h += '<div style="color:'+ti.kleur+';flex-shrink:0;margin-top:1px">'+ti.icon+'</div>';
      h += '<div style="flex:1"><div style="font-size:11px;font-weight:700;color:'+ti.kleur+';margin-bottom:3px">'+memoTypeInfo(m.type).label.toUpperCase()+'</div>';
      h += '<div style="font-size:13px;line-height:1.5">'+esc(m.tekst)+'</div>';
      h += '<div style="font-size:10px;color:var(--muted);margin-top:4px">'+esc(m.auteur||'')+(m.datum?' · '+fmtD(m.datum):'')+'</div></div>';
      h += '</div>';
    });
  }

  h+='<div style="background:var(--surface2);border-radius:10px;padding:16px;margin-bottom:16px"><div style="font-family:Syne,sans-serif;font-size:16px;font-weight:800">'+esc(d.naam)+'</div><div style="font-size:13px;color:var(--accent);margin-top:4px;font-weight:600">Deb.nr: '+esc(d.nr||'—')+'</div></div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">';
  h+=v('Adres',(d.adres||'')+(d.postcode?' '+d.postcode:'')+(d.plaats?', '+d.plaats:''));
  h+=v('Contactpersoon',d.contactpersoon); h+=v('Email',d.email); h+=v('Telefoon',d.telefoon); h+=v('Website',d.website);
  h+='</div>';
  if(sk){
    h+='<div style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:12px;margin-bottom:16px">';
    h+='<div style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:4px">✓ Servicecontract</div>';
    h+='<div style="font-size:13px;font-weight:600">'+esc(sk.naam)+'</div>';
    h+='<div style="font-size:12px;color:var(--muted);margin-top:2px">Contract '+esc(sk.contractType)+' · Volgende: '+fmtD(sk.volgendeDatum)+'</div>';
    if(sk.heeftBContract) h+='<div style="margin-top:8px">'+bContractBadge(false)+'</div>';
    h+='</div>';
  }
  else{h+='<div style="background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--muted)">Geen servicecontract gekoppeld</div>';}
  h+='<div style="display:flex;flex-direction:column;gap:8px">';
  if(magSchrijven('debiteuren')){h+='<button class="btn btn-ghost" id="dp-edit" style="justify-content:center">✏️ Bewerken</button>';h+='<button class="btn btn-ghost" id="dp-del" style="justify-content:center;color:var(--red)">🗑 Verwijderen</button>';}
  h+='</div>';

  // Locaties sectie
  var locaties = d.locaties ? Object.values(d.locaties) : [];
  h+='<div style="margin-top:16px">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  h+='<div style="font-family:Syne,sans-serif;font-weight:700;font-size:13px">Locaties ('+locaties.length+')</div>';
  h+='<button id="dp-add-loc" class="btn btn-ghost btn-sm">+ Locatie</button>';
  h+='</div>';
  if(locaties.length===0){
    h+='<div style="font-size:12px;color:var(--muted);padding:10px 0">Geen extra locaties — alleen hoofdadres.</div>';
  } else {
    locaties.forEach(function(loc){
      h+='<div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between">';
      h+='<div><div style="font-size:13px;font-weight:600">'+esc(loc.naam||'Naamloos')+'</div>';
      h+='<div style="font-size:11px;color:var(--muted)">'+esc([loc.adres,loc.postcode,loc.plaats].filter(Boolean).join(', '))+'</div>';
      if(loc.pomptype) h+='<div style="font-size:11px;color:var(--muted)">'+esc(loc.pomptype)+'</div>';
      h+='</div>';
      h+='<div style="display:flex;gap:4px">';
      h+='<button class="btn-icon dp-loc-edit" data-locid="'+loc.id+'" style="font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer">✏</button>';
      h+='<button class="btn-icon dp-loc-del" data-locid="'+loc.id+'" style="font-size:11px;color:var(--red);background:none;border:none;cursor:pointer">×</button>';
      h+='</div></div>';
    });
  }
  h+='</div>';

  // Memo sectie
  h += renderMemoSectie(id, true);

  openPanel(d.naam,h);
  var pb=document.getElementById('panel-body');
  var e=pb.querySelector('#dp-edit'); if(e) e.addEventListener('click',function(){openDebModal(id);closePanel();});
  var dl=pb.querySelector('#dp-del');  if(dl) dl.addEventListener('click',function(){verwijderDeb(id);closePanel();});

  // Locatie events
  var addLoc=pb.querySelector('#dp-add-loc');
  if(addLoc) addLoc.addEventListener('click',function(){ openLocatieModal(id,null); });
  pb.querySelectorAll('.dp-loc-edit').forEach(function(btn){
    btn.addEventListener('click',function(){ openLocatieModal(id,btn.dataset.locid); });
  });
  pb.querySelectorAll('.dp-loc-del').forEach(function(btn){
    btn.addEventListener('click',function(){
      bevestigActie('Locatie verwijderen', 'Weet je zeker dat je deze locatie wilt verwijderen?', function(){
        FB.ref(dbPath('debiteuren',id,'locaties',btn.dataset.locid)).remove();
        var dIdx=APP.debiteuren.findIndex(function(x){return String(x.id)===String(id);});
        if(dIdx>-1&&APP.debiteuren[dIdx].locaties) delete APP.debiteuren[dIdx].locaties[btn.dataset.locid];
        openDebPanel(id);
      });
    });
  });

  // Memo events
  bindMemoEvents(id);
}

function openLocatieModal(debId, locId) {
  var d=APP.debiteuren.find(function(x){return String(x.id)===String(debId);})||{};
  var loc = locId && d.locaties ? (d.locaties[locId]||{}) : {};
  var isNew = !locId;
  var b='<div class="form-grid">';
  b+=fgf('Naam locatie *',finp('lf-naam','text',loc.naam||'','Bijv. Vestiging Utrecht, Depot Noord'));
  b+=fgf('Adres',finp('lf-adr','text',loc.adres||'','Straat + nummer'));
  b+=fg('Postcode',finp('lf-pc','text',loc.postcode||'',''));
  b+=fg('Plaats',finp('lf-pl','text',loc.plaats||'',''));
  b+=fg('Contactpersoon',finp('lf-ct','text',loc.contactpersoon||'',''));
  b+=fg('Telefoon',finp('lf-tel','text',loc.telefoon||'',''));
  b+=fg('Pomptype',finp('lf-pomp','text',loc.pomptype||'','Bijv. TP50V17/2DT'));
  b+=fg('Besturing',finp('lf-best','text',loc.besturing||'','Bijv. Hcon 25D'));
  b+='</div>';
  var f='<button class="btn btn-ghost" id="lmod-cancel">Annuleren</button><button class="btn btn-primary" id="lmod-save">Opslaan</button>';
  openModal(isNew?'Locatie toevoegen':'Locatie bewerken',b,f);
  document.getElementById('lmod-cancel').addEventListener('click',closeModal);
  document.getElementById('lmod-save').addEventListener('click',function(){
    var naam=document.getElementById('lf-naam').value.trim();
    if(!naam){toast('Naam is verplicht','error');return;}
    var newLocId=locId||('loc_'+Date.now());
    var locData={id:newLocId,naam:naam,
      adres:document.getElementById('lf-adr').value.trim(),
      postcode:document.getElementById('lf-pc').value.trim(),
      plaats:document.getElementById('lf-pl').value.trim(),
      contactpersoon:document.getElementById('lf-ct').value.trim(),
      telefoon:document.getElementById('lf-tel').value.trim(),
      pomptype:document.getElementById('lf-pomp').value.trim(),
      besturing:document.getElementById('lf-best').value.trim(),
    };
    FB.ref(dbPath('debiteuren',debId,'locaties',newLocId)).set(locData);
    var dIdx=APP.debiteuren.findIndex(function(x){return String(x.id)===String(debId);});
    if(dIdx>-1){if(!APP.debiteuren[dIdx].locaties)APP.debiteuren[dIdx].locaties={};APP.debiteuren[dIdx].locaties[newLocId]=locData;}
    closeModal();
    toast(isNew?'Locatie toegevoegd':'Locatie bijgewerkt','success');
    openDebPanel(debId);
  });
}

function verwijderDeb(id){
  var d=APP.debiteuren.find(function(x){return String(x.id)===String(id);});
  if(!d) return;
  var heeftSk = APP.serviceklanten.some(function(k){return String(k.debId)===String(id);});
  var extraTekst = heeftSk ? ' De gekoppelde serviceklant wordt ook verwijderd.' : '';
  bevestigActie('Debiteur verwijderen', '"'+d.naam+'" definitief verwijderen?'+extraTekst, function(){
    var backupDeb = JSON.parse(JSON.stringify(d));
    var backupSks = APP.serviceklanten.filter(function(k){return String(k.debId)===String(id);}).map(function(k){return JSON.parse(JSON.stringify(k));});
    APP.serviceklanten = APP.serviceklanten.filter(function(k){return String(k.debId)!==String(id);});
    APP.debiteuren=APP.debiteuren.filter(function(x){return String(x.id)!==String(id);});
    renderDebiteuren();
    var verwijderd=false;
    var timer=setTimeout(function(){
      verwijderd=true;
      backupSks.forEach(function(k){ dbRemove('serviceklanten',k.id); });
      dbRemove('debiteuren',id);
    },6000);
    toast('Debiteur'+(heeftSk?' en serviceklant':'')+' verwijderd','success',function(){
      clearTimeout(timer);
      if(!verwijderd){
        APP.debiteuren.push(backupDeb); dbSaveItem('debiteuren',backupDeb.id,backupDeb);
        backupSks.forEach(function(k){ APP.serviceklanten.push(k); dbSaveItem('serviceklanten',k.id,k); });
        renderDebiteuren(); toast('Verwijdering ongedaan gemaakt','success');
      }
    });
  });
}

function importDebCsv(){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.csv';
  inp.onchange=function(e){
    var f=e.target.files[0]; if(!f) return;
    var r=new FileReader(); r.onload=function(ev){verwerkDebCsv(ev.target.result);}; r.readAsText(f,'utf-8');
  }; inp.click();
}
function verwerkDebCsv(txt){
  // Ondersteuning voor zowel ; als , als scheidingsteken
  var regels=txt.split('\n').filter(function(r){return r.trim();});
  if(regels.length<2){toast('CSV heeft te weinig regels','error');return;}
  // Detecteer scheidingsteken
  var scheidingsteken = regels[0].indexOf(';') >= 0 ? ';' : ',';
  var hdrs=regels[0].split(scheidingsteken).map(function(h){return h.trim().toLowerCase().replace(/"/g,'');});
  var add=0, upd=0, skip=0;
  regels.slice(1).forEach(function(regel){
    if(!regel.trim()) return;
    var cols=regel.split(scheidingsteken);
    var rij={};
    hdrs.forEach(function(h,i){rij[h]=(cols[i]||'').trim().replace(/"/g,'');});
    var naam=rij['naam']||rij['naam (relatie)']||rij['bedrijfsnaam']||'';
    if(!naam) return;
    var nr=rij['debiteur']||rij['nr']||rij['debiteurnummer']||rij['klantnummer']||'';
    // Match op debiteursnummer (meest betrouwbaar), dan op naam
    var bestaand = nr
      ? APP.debiteuren.find(function(d){ return d.nr && String(d.nr).trim()===String(nr).trim(); })
      : APP.debiteuren.find(function(d){ return d.naam && d.naam.toLowerCase()===naam.toLowerCase(); });
    var data=Object.assign({}, bestaand||{}, {
      id:      bestaand ? bestaand.id : uid(),
      nr:      nr || (bestaand ? bestaand.nr : ''),
      naam:    naam,
      adres:   rij['straat']||rij['adres']||rij['straatnaam']||(bestaand?bestaand.adres:'')||'',
      postcode:rij['postcode']||(bestaand?bestaand.postcode:'')||'',
      plaats:  rij['woonplaats']||rij['plaats']||(bestaand?bestaand.plaats:'')||'',
      contactpersoon:rij['contact']||rij['contactpersoon']||(bestaand?bestaand.contactpersoon:'')||'',
      email:   rij['email']||rij['e-mail']||(bestaand?bestaand.email:'')||'',
      telefoon:rij['telefoon']||rij['tel']||rij['telefoonnummer']||(bestaand?bestaand.telefoon:'')||'',
    });
    if(bestaand){
      Object.assign(bestaand, data);
      upd++;
    } else {
      APP.debiteuren.push(data);
      add++;
    }
    dbSaveItem('debiteuren', data.id, data);
  });
  renderDebiteuren();
  var msg = [];
  if(add)  msg.push(add+' nieuw toegevoegd');
  if(upd)  msg.push(upd+' bijgewerkt');
  if(skip) msg.push(skip+' overgeslagen');
  toast(msg.join(' · ') || 'Geen wijzigingen','success');
}

// Bereken netto verlofuren rekening houdend met pauzes
// Werkdag 08:00-17:00, pauzes: 10:00-10:15, 12:30-13:00, 15:00-15:15
function berekenVerlofDagen(vanDatum, totDatum, tijdVan, tijdTot) {
  // Meerdere dagen (hele dagen)
  if(vanDatum !== totDatum || !tijdVan || !tijdTot) {
    var msPerDag = 86400000;
    var p1 = vanDatum.split('-'); var p2 = totDatum.split('-');
    var d1 = new Date(Date.UTC(+p1[0],+p1[1]-1,+p1[2]));
    var d2 = new Date(Date.UTC(+p2[0],+p2[1]-1,+p2[2]));
    var werkdagen = 0;
    for(var d=new Date(d1); d<=d2; d.setUTCDate(d.getUTCDate()+1)) {
      var dow = d.getUTCDay(); if(dow>0&&dow<6) werkdagen++;
    }
    return werkdagen;
  }
  // Gedeeltelijke dag: bereken netto uren
  var toMin = function(t){ var p=t.split(':'); return +p[0]*60+(+p[1]||0); };
  var vMin = toMin(tijdVan); var tMin = toMin(tijdTot);
  if(tMin <= vMin) return 0;
  var brutMin = tMin - vMin;
  // Haal pauzes op uit teamInstellingen, fallback op standaard
  var pauzeInst = (APP.teamInstellingen && APP.teamInstellingen.pauzes) || [
    {van:'10:00',tot:'10:15'}, {van:'12:30',tot:'13:00'}, {van:'15:00',tot:'15:15'}
  ];
  var pauzeMin = 0;
  pauzeInst.forEach(function(p){
    var pVan = toMin(p.van), pTot = toMin(p.tot);
    var overlap = Math.max(0, Math.min(tMin,pTot) - Math.max(vMin,pVan));
    pauzeMin += overlap;
  });
  var nettoMin = Math.max(0, brutMin - pauzeMin);
  // Werkuren per dag uit instellingen, standaard 8u
  var urenPerDag = (APP.teamInstellingen && APP.teamInstellingen.werkUrenPerDag) || 8;
  return Math.round((nettoMin / (urenPerDag * 60)) * 10) / 10;
}

function submitVerlof(){
  var medId=document.getElementById('vl-med').value;
  var van=document.getElementById('vl-van').value;
  var tot=document.getElementById('vl-tot').value;
  if(!medId||!van||!tot){toast('Vul alle verplichte velden in','error');return;}
  if(van>tot){toast('Einddatum moet na startdatum liggen','error');return;}
  // Tijdstip voor gedeeltelijke dag
  var isZelfdeDag = van===tot;
  var heelDagCb = document.getElementById('vl-hele-dag');
  var isHeledag = !heelDagCb || heelDagCb.checked || !isZelfdeDag;
  var tijdVanEl = document.getElementById('vl-tijd-van');
  var tijdTotEl = document.getElementById('vl-tijd-tot');
  var tijdBlokZichtbaar = document.getElementById('vl-tijd-blok').style.display !== 'none';
  var tijdVan = (!isHeledag && tijdVanEl && tijdBlokZichtbaar) ? tijdVanEl.value : null;
  var tijdTot = (!isHeledag && tijdTotEl && tijdBlokZichtbaar) ? tijdTotEl.value : null;
  // Veiligheidsnet: als tijden toch een volledige dag zijn → hele dag
  if (tijdVan && tijdTot) { var vd = berekenVerlofDagen(van, tot, tijdVan, tijdTot); if(vd >= 1.0){tijdVan=null;tijdTot=null;} }
  if(tijdVan && tijdTot && tijdTot <= tijdVan){toast('Eindtijd moet na begintijd liggen','error');return;}
  var dagen = berekenVerlofDagen(van, tot, tijdVan, tijdTot);
  if(dagen <= 0){toast('Ongeldige verlofperiode','error');return;}
  var data={id:uid(),medId:medId,van:van,tot:tot,tijdVan:tijdVan||null,tijdTot:tijdTot||null,
    gedeeltelijk:!!(tijdVan&&tijdTot&&dagen<1.0),dagen:dagen,
    type:document.getElementById('vl-type').value,
    opmerking:document.getElementById('vl-opm').value.trim(),
    status:'aangevraagd',aangevraagdOp:new Date().toISOString().split('T')[0]};
  APP.verlof.push(data); dbSaveItem('verlof',data.id,data); closeModal(); renderVerlof();
  // Notificatie naar goedkeurder
  if(typeof stuurNotificatie==='function') {
    var gkMedId = magGoedkeuren('verlof') ? null : getMijnMedId();
    // Stuur naar alle admins/goedkeurders
    APP.medewerkers.filter(function(m){return m.status!=='inactief'&&(isAdmin()||(APP.rollen[m.rol]||{}).rechten&&(APP.rollen[m.rol]||{}).rechten.verlof&&(APP.rollen[m.rol]||{}).rechten.verlof.schrijven);}).forEach(function(m){
      if(String(m.id)!==String(medId)) stuurNotificatie(m.id,'verlof','Nieuwe verlofaanvraag',
        (getMed(medId)?getMed(medId).voornaam+' '+getMed(medId).achternaam:'')+ ' heeft verlof aangevraagd voor '+fmtD(van),'verlof');
    });
  }
  toast('Verlofaanvraag ingediend','success');
}

function keurVerlof(id,goed){
  var v=APP.verlof.find(function(x){return String(x.id)===String(id);}); if(!v) return;
  v.status=goed?'goedgekeurd':'afgewezen';
  v.beoordeeldOp=new Date().toISOString().split('T')[0];
  v.beoordeeldDoor=APP.profiel?APP.profiel.naam:'';
  if(goed){
    var m=getMed(v.medId);
    if(m){
      var aftrek = -(v.dagen||0);
      var nieuwSaldo = Math.max(0, (m.verlofSaldo||0) - (v.dagen||0));
      m.verlofSaldo = nieuwSaldo;
      dbSaveItem('medewerkers',m.id,m);
      slaVerlofMutatie(m.id, 'opname', aftrek,
        'Verlof goedgekeurd: ' + fmtD(v.van) + ' t/m ' + fmtD(v.tot) + ' (' + (v.type||'Vakantie') + ')',
        nieuwSaldo);
    }
  }
  dbSaveItem('verlof',v.id,v); renderVerlof();
  toast(goed?'Verlof goedgekeurd':'Verlof afgewezen','success');
  // Notificatie naar medewerker
  if(typeof stuurNotificatie==='function' && magNotificatie('verlof', goed?'goedgekeurd':'afgewezen')) {
    stuurNotificatie(v.medId,'verlof',
      goed?'Verlof goedgekeurd ✓':'Verlof afgewezen',
      goed
        ? 'Jouw verlofaanvraag van '+fmtD(v.van)+' t/m '+fmtD(v.tot)+' ('+v.dagen+' dag'+(v.dagen!==1?'en':'')+') is goedgekeurd.'
        : 'Jouw verlofaanvraag van '+fmtD(v.van)+' is afgewezen.'+(v.notitie?' Reden: '+v.notitie:''),
      'verlof');
  }
}

function verwijderVerlof(id){
  bevestigActie('Verlofaanvraag verwijderen', 'Weet je zeker dat je deze verlofaanvraag wilt verwijderen?', function(){
    var v = APP.verlof.find(function(x){return String(x.id)===String(id);});
    if(v && v.status==='goedgekeurd' && v.dagen){
      var m = getMed(v.medId);
      if(m){
        var terugboek = Math.round((parseFloat(v.dagen)||0) * 10) / 10;
        var nieuwSaldo = Math.round(((parseFloat(m.verlofSaldo)||0) + terugboek) * 10) / 10;
        m.verlofSaldo = nieuwSaldo;
        dbSaveItem('medewerkers', m.id, m);
        // Terugboekingsmutatie aanmaken
        slaVerlofMutatie(m.id, 'correctie', terugboek,
          'Verlof verwijderd — terugboeking: '+fmtD(v.van)+
          (v.tot && v.tot!==v.van?' t/m '+fmtD(v.tot):'')+
          ' ('+(v.type||'Vakantie')+')',
          nieuwSaldo);
      }
    }
    APP.verlof = APP.verlof.filter(function(x){return String(x.id)!==String(id);});
    dbRemove('verlof', id);
    renderVerlof();
    toast('Verlofaanvraag verwijderd — saldo teruggestort','success');
  });
}

  var aantalDagen = new Date(jaar, maand+1, 0).getDate();

    h += '<div class="rw-dag" data-datum="'+dagStr+'" style="'+stijl+'">';
    h += dag;
    if(heeftOps) h += '<div style="width:4px;height:4px;border-radius:50%;background:'+(geselecteerd?'#fff':'var(--accent)')+';margin:1px auto 0"></div>';

function _genRouteVoorstel() {
  var resultaat = [];
  var startMin = parseInt(_rwStarttijd.split(':')[0])*60 + parseInt(_rwStarttijd.split(':')[1]||0);

  _rwDatums.forEach(function(datum){
    var opsDag = APP.opdrachten.filter(function(o){
      return o.datum === datum
        && o.status !== 'afgehandeld'
        && o.status !== 'niet_thuis';
    });
    if(!opsDag.length) return;

    var dagResultaat = { datum: datum, monteurs: [] };

    // Groepeer per monteur (gefilterd op geselecteerde monteurs + geen monteur)
    var perMonteur = {};
    opsDag.forEach(function(o){
      var mid = o.monteurId || '_geen';
      if(mid !== '_geen' && _rwMonteurs.indexOf(String(mid)) < 0) return;
      if(!perMonteur[mid]) perMonteur[mid] = [];
      perMonteur[mid].push(JSON.parse(JSON.stringify(o)));
    });

    Object.keys(perMonteur).forEach(function(mid){
      var ops = perMonteur[mid];
      if(!ops.length) return;

      // Sorteer op postcode
      var gesorteerd = ops.slice().sort(function(a,b){
        return postcodeNummer(a.postcode) - postcodeNummer(b.postcode);
      });

      // Starttijd: eerste bestaande tijdVan of ingestelde starttijd
      var eersteVan = gesorteerd[0].tijdVan;
      var huidigeMin = eersteVan
        ? parseInt(eersteVan.split(':')[0])*60 + parseInt(eersteVan.split(':')[1]||0)
        : startMin;

      var rijen = gesorteerd.map(function(o, idx){
        var duur = o.duurUren ? Math.round(o.duurUren*60) : 90;
        var nieuwVan = minToTijd(huidigeMin);
        var nieuwTot = minToTijd(huidigeMin + duur);
        var gewijzigd = nieuwVan !== (o.tijdVan||'');
        huidigeMin += duur + _rwReistijd;
        return {
          id:        o.id,
          klantNaam: o.klantNaam||'—',
          postcode:  o.postcode||'—',
          oudVan:    o.tijdVan||'—',
          nieuwVan:  nieuwVan,
          nieuwTot:  nieuwTot,
          duur:      duur,
          gewijzigd: gewijzigd,
          status:    o.status,
        };
      });

      var m = getMed(mid);
      dagResultaat.monteurs.push({
        mid:   mid,
        naam:  m ? m.voornaam+' '+m.achternaam : 'Niet toegewezen',
        kleur: m ? medKleur(m) : '#6b7694',
        rijen: rijen,
        inclDag: true,
      });
    });

    if(dagResultaat.monteurs.length) resultaat.push(dagResultaat);
  });

  return resultaat;
}
