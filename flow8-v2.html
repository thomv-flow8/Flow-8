// ═══════════════════════════════════════════════════════════════
// MODULE: OVERUREN
// Data: APP.overuren = [{
//   id, medId, datum, uren, type:'compensatie'|'uitbetaling',
//   opdrachtId (optioneel), omschrijving, status:'aangevraagd'|'goedgekeurd'|'afgewezen'|'uitbetaald'|'gecompenseerd',
//   aangemaaktOp, door, beoordeeldDoor, beoordeeldOp, notitie
// }]
// ═══════════════════════════════════════════════════════════════
var _ouFilter  = 'alle';   // 'alle'|'aangevraagd'|'goedgekeurd'|'afgewezen'
var _ouZoek    = '';
var _ouSortKey = 'datum';
var _ouSortDir = -1;
var _ouPage    = 1;
var _ouPS      = 25;

function renderOveruren() {
  var el = document.getElementById('content');
  var mijnId = getMijnMedId();
  var kanGoedkeuren = isAdmin() || magSchrijven('overuren');

  // Filter lijst via filterEigen (E = alleen eigen, L = alles zien)
  var zichtbaarOU = filterEigen(APP.overuren, 'medId', 'overuren');
  var lijst = zichtbaarOU.filter(function(o){
    if (_ouFilter !== 'alle' && o.status !== _ouFilter) return false;
    if (_ouZoek) {
      var q = _ouZoek.toLowerCase();
      var m = getMed(o.medId);
      var naam = m ? (m.voornaam+' '+m.achternaam).toLowerCase() : '';
      return naam.includes(q) || (o.omschrijving||'').toLowerCase().includes(q) || fmtD(o.datum).includes(q);
    }
    return true;
  });
  lijst = enrichSortVelden(lijst, { medNaam: function(o){ return medNaamSort(o.medId); } });
  lijst = sorteerLijst(lijst, _ouSortKey, _ouSortDir);

  // Stats — berekend op volledige rechten-gefilterde dataset (niet afhankelijk van actief filter/zoek)
  var _ouJrStr = new Date().getFullYear().toString();
  var openUren  = zichtbaarOU.filter(function(o){return o.status==='aangevraagd';}).reduce(function(s,o){return s+(o.uren||0);},0);
  var compUren  = zichtbaarOU.filter(function(o){return o.status==='gecompenseerd'&&(o.datum||'').startsWith(_ouJrStr);}).reduce(function(s,o){return s+(o.uren||0);},0);
  var uitbUren  = zichtbaarOU.filter(function(o){return o.status==='uitbetaald'&&(o.datum||'').startsWith(_ouJrStr);}).reduce(function(s,o){return s+(o.uren||0);},0);
  var saldoUren = Math.round((compUren - uitbUren) * 10) / 10;

  var h = '';

  // ── Toolbar ──
  h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">';
  h += '<input class="input" id="ou-zoek" placeholder="🔍 Zoek medewerker..." value="'+esc(_ouZoek)+'" style="max-width:260px">';
  h += '<div style="flex:1"></div>';
  h += '<button class="btn btn-ghost btn-sm" id="ou-export-btn">⬇ Export</button>';
  h += '<button class="btn btn-primary btn-sm" id="ou-add-btn">+ Overuren registreren</button>';
  h += '</div>';

  // ── Stats ──
  h += '<div class="stats-grid" style="margin-bottom:16px">';
  h += statCard('Open',                       openUren+'u',    '#f59e0b', SVGS.alert);
  h += statCard('Gecompenseerd '+_ouJrStr,    compUren+'u',    '#3b82f6', SVGS.file);
  h += statCard('Uitbetaald '+_ouJrStr,       uitbUren+'u',    '#10b981', SVGS.file);
  h += statCard('Saldo '+_ouJrStr,            saldoUren+'u',   saldoUren>0?'#3b82f6':'#6b7694', SVGS.alert);
  h += '</div>';

  // ── Filter chips ──
  h += '<div class="filter-row" style="margin-bottom:12px">';
  [['alle','Alle'],['aangevraagd','Aangevraagd'],['gecompenseerd','Gecompenseerd'],['uitbetaald','Uitbetaald'],['afgewezen','Afgewezen']].forEach(function(f){
    h += '<button class="chip'+(_ouFilter===f[0]?' active':'')+'" data-filter="'+f[0]+'">'+f[1]+'</button>';
  });
  h += '</div>';

  // ── Tabel ──
  var totaal = lijst.length;
  var slice  = lijst.slice((_ouPage-1)*_ouPS, _ouPage*_ouPS);

  // Lege staat als er helemaal geen overuren zijn
  if (!APP.overuren.length) {
    el.innerHTML = h + legeStaat(
      '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
      'Nog geen overuren geregistreerd',
      'Registreer hier extra gewerkte uren. Ze worden ter goedkeuring aangeboden aan de beheerder.',
      '+ Overuren registreren', 'ls-ou-add'
    );
    var lsBtn = el.querySelector('#ls-ou-add'); if(lsBtn) lsBtn.addEventListener('click', function(){ openOverurenModal(null); });
    return;
  }

  h += '<div class="card" style="padding:0"><div class="table-wrap"><table style="width:100%"><thead><tr>';
  var cols = [['datum','Datum'],['medNaam','Medewerker'],['uren','Uren'],['type','Type'],['omschrijving','Omschrijving'],['status','Status']];
  cols.forEach(function(c){
    var ico = _ouSortKey===c[0]?(_ouSortDir===1?' ↑':' ↓'):'<span style="opacity:.4;font-size:9px"> ⇅</span>';
    h += '<th class="ou-sort-th" data-sort="'+c[0]+'" style="cursor:pointer;white-space:nowrap">'+c[1]+ico+'</th>';
  });
  if (kanGoedkeuren) h += '<th style="width:160px">Actie</th>';
  h += '</tr></thead><tbody>';

  if (!slice.length) {
    h += '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted)">Geen overuren gevonden</td></tr>';
  } else {
    slice.forEach(function(o){
      var m   = getMed(o.medId);
      var kl  = m ? (medKleur(m)) : '#6b7694';
      var ops = o.opdrachtId ? APP.opdrachten.find(function(x){return String(x.id)===String(o.opdrachtId);}) : null;
      var statusTag = {
        aangevraagd:  '<span class="tag tag-orange">Aangevraagd</span>',
        goedgekeurd:  '<span class="tag tag-blue">Goedgekeurd</span>',
        afgewezen:    '<span class="tag tag-red">Afgewezen</span>',
        gecompenseerd:'<span class="tag tag-green">Gecompenseerd</span>',
        uitbetaald:   '<span class="tag tag-muted">Uitbetaald</span>',
      }[o.status] || '<span class="tag tag-muted">'+esc(o.status)+'</span>';

      h += '<tr style="cursor:pointer" class="ou-rij" data-id="'+o.id+'">';
      h += '<td style="white-space:nowrap;padding:10px 14px;font-size:13px">'+fmtD(o.datum)+'</td>';
      h += '<td style="padding:10px 14px">';
      if (m) h += '<div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:26px;height:26px;font-size:9px;background:'+kl+';color:#fff">'+initials(m)+'</div><span style="font-size:13px;font-weight:600">'+esc(m.voornaam+' '+m.achternaam)+'</span></div>';
      else   h += '<span style="color:var(--muted)">—</span>';
      h += '</td>';
      h += '<td style="font-weight:700;font-size:14px;color:var(--accent);padding:10px 14px">'+( o.uren||0)+'u</td>';
      h += '<td style="padding:10px 14px"><span class="tag '+(o.type==='uitbetaling'?'tag-muted':'tag-blue')+'">'+(o.type==='uitbetaling'?'💰 Uitbetaling':'🔄 Compensatie')+'</span></td>';
      h += '<td style="font-size:12px;color:var(--muted);padding:10px 14px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">';
      h += esc(o.omschrijving||'—');
      if (ops) h += '<br><span style="font-size:11px;color:var(--accent2)">📋 '+esc(ops.klantNaam||'Opdracht')+'</span>';
      h += '</td>';
      h += '<td style="padding:10px 14px">'+statusTag+'</td>';

      if (kanGoedkeuren) {
        h += '<td style="padding:6px 10px;white-space:nowrap" onclick="event.stopPropagation()">';
        if (o.status === 'aangevraagd') {
          h += '<button class="btn btn-ghost btn-sm ou-goed-btn" data-id="'+o.id+'" style="color:var(--green)" title="Goedkeuren & compenseren">✓ Goed</button>';
          h += '<button class="btn btn-ghost btn-sm ou-af-btn" data-id="'+o.id+'" style="color:var(--red)" title="Afwijzen">✗ Af</button>';
          h += '<button class="btn btn-ghost btn-sm ou-del-btn" data-id="'+o.id+'" style="color:var(--red)" title="Verwijderen">🗑</button>';
        } else if (o.status === 'gecompenseerd' || o.status === 'goedgekeurd') {
          h += '<button class="btn btn-ghost btn-sm ou-uitb-btn" data-id="'+o.id+'" style="font-size:11px" title="Uitbetalen">💰 Uitb.</button>';
          h += '<button class="btn btn-ghost btn-sm ou-del-btn" data-id="'+o.id+'" style="color:var(--red)" title="Verwijderen">🗑</button>';
        } else if (o.status === 'afgewezen') {
          h += '<button class="btn btn-ghost btn-sm ou-del-btn" data-id="'+o.id+'" style="color:var(--red)" title="Verwijderen">🗑</button>';
        }
        h += '</td>';
      }
      h += '</tr>';
    });
  }

  h += '</tbody></table></div>';
  h += pgHtml(totaal, _ouPage, _ouPS, '_ouPage');
  h += '</div>';

  el.innerHTML = h;

  // Events
  el.querySelector('#ou-zoek').addEventListener('input',function(e){
    _ouZoek=e.target.value; _ouPage=1;
    var pos=e.target.selectionStart; renderOveruren();
    var ni=document.getElementById('ou-zoek'); if(ni){ni.focus();ni.setSelectionRange(pos,pos);}
  });
  el.querySelector('#ou-add-btn').addEventListener('click',function(){openOverurenModal(null);});
  var ouExpBtn=el.querySelector('#ou-export-btn'); if(ouExpBtn) ouExpBtn.addEventListener('click',function(){
    var rows=APP.overuren.map(function(o){var m=getMed(o.medId);return[m?m.voornaam+' '+m.achternaam:'',fmtD(o.datum),o.uren||'',o.type||'',o.status||'',o.omschrijving||''];});
    csvExport(['Medewerker','Datum','Uren','Type','Status','Omschrijving'],rows,'overuren');
  });
  el.querySelectorAll('.chip[data-filter]').forEach(function(b){b.addEventListener('click',function(){_ouFilter=b.dataset.filter;_ouPage=1;renderOveruren();});});
  el.querySelectorAll('.ou-sort-th').forEach(function(th){th.addEventListener('click',function(){
    if(_ouSortKey===th.dataset.sort) _ouSortDir*=-1; else{_ouSortKey=th.dataset.sort;_ouSortDir=1;}
    renderOveruren();
  });});
  el.querySelectorAll('.pg-btn[data-pg]').forEach(function(b){b.addEventListener('click',function(){_ouPage=parseInt(b.dataset.pg);renderOveruren();});});
  el.querySelectorAll('.ou-rij').forEach(function(r){r.addEventListener('click',function(){openOverurenPanel(r.dataset.id);});});
  el.querySelectorAll('.ou-goed-btn').forEach(function(b){b.addEventListener('click',function(){keurOveruren(b.dataset.id,'goedgekeurd');});});
  el.querySelectorAll('.ou-af-btn').forEach(function(b){b.addEventListener('click',function(){keurOveruren(b.dataset.id,'afgewezen');});});
  el.querySelectorAll('.ou-uitb-btn').forEach(function(b){b.addEventListener('click',function(){
    var o=APP.overuren.find(function(x){return String(x.id)===String(b.dataset.id);}); if(!o) return;
    var m=getMed(o.medId); var naam=m?m.voornaam+' '+m.achternaam:'onbekend';
    bevestigActie('💰 Uitbetaling bevestigen','Weet je zeker dat je '+o.uren+'u overuren van '+esc(naam)+' uitbetaalt? Dit kan niet ongedaan gemaakt worden.',function(){_voerKeuringOveruren(b.dataset.id,'uitbetaald',null);});
  });});
  el.querySelectorAll('.ou-del-btn').forEach(function(b){b.addEventListener('click',function(e){
    e.stopPropagation();
    var o=APP.overuren.find(function(x){return String(x.id)===String(b.dataset.id);}); if(!o) return;
    var m=getMed(o.medId); var naam=m?m.voornaam+' '+m.achternaam:'onbekend';
    var waarschuwing = o.status==='gecompenseerd'
      ? '\n\n⚠️ Let op: de gecompenseerde verlofdagen worden van het saldo afgetrokken.'
      : '';
    bevestigActie('🗑 Overuren verwijderen','Weet je zeker dat je de overuren registratie van '+esc(naam)+' ('+o.uren+'u) wilt verwijderen?'+waarschuwing,function(){
      _verwijderOveruren(b.dataset.id);
    });
  });});
}

function _verwijderOveruren(id) {
  var o = APP.overuren.find(function(x){ return String(x.id)===String(id); });
  if(!o) return;
  // Saldocorrectie als overuren al gecompenseerd waren
  if(o.status === 'gecompenseerd') {
    var med = getMed(o.medId);
    if(med) {
      var urenPerDag = (parseInt(med.contractUren)||40) / 5;
      var compensatieDagen = Math.round((o.uren / urenPerDag) * 100) / 100;
      var nieuwSaldo = Math.round(((med.verlofSaldo||0) - compensatieDagen) * 100) / 100;
      med.verlofSaldo = nieuwSaldo;
      dbSaveItem('medewerkers', med.id, med);
      slaVerlofMutatie(med.id, 'correctie', -compensatieDagen,
        'Terugboeking compensatie — verwijderde overuren '+fmtD(o.datum)+' ('+o.uren+'u)', nieuwSaldo);
    }
  }
  APP.overuren = APP.overuren.filter(function(x){ return String(x.id)!==String(id); });
  dbRemove('overuren', id);
  renderOveruren();
  toast('Overuren verwijderd'+(o.status==='gecompenseerd'?' — saldo gecorrigeerd':''),'success');
}

function openOverurenModal(id, prefill) {
  var isNew = !id;
  var o     = id ? (APP.overuren.find(function(x){return String(x.id)===String(id);}) || {}) : (prefill||{});
  var mijnId = getMijnMedId();
  var kanGoedkeuren = isAdmin() || magSchrijven('overuren');

  // Medewerker opties
  var medOpts = '';
  APP.medewerkers.filter(function(m){return m.status!=='inactief';}).forEach(function(m){
    var sel = String(o.medId||mijnId)===String(m.id)?' selected':'';
    medOpts += '<option value="'+m.id+'"'+sel+'>'+esc(m.voornaam+' '+m.achternaam)+'</option>';
  });

  // Locatie change → adres overschrijven + locaties vullen bij SK klant
  var locSel2 = document.getElementById('op-locatie');
  if(locSel2) locSel2.addEventListener('change', function(){
    var locId = this.value;
    if(!locId) {
      // Terug naar hoofdadres
      var klantVal0 = document.getElementById('op-klant').value;
      if(!klantVal0) return;
      var parts0 = klantVal0.split(':');
      var klant0 = parts0[0]==='sk'
        ? APP.serviceklanten.find(function(k){return String(k.id)===parts0[1];})
        : APP.debiteuren.find(function(d){return String(d.id)===parts0[1];});
      if(!klant0) return;
      // Bij SK: gebruik debiteur hoofdadres
      var debK = klant0.debId ? APP.debiteuren.find(function(d){return String(d.id)===String(klant0.debId);}) : null;
      var bron = debK || klant0;
      document.getElementById('op-adres').value = bron.adres||'';
      document.getElementById('op-pc').value    = bron.postcode||'';
      document.getElementById('op-pl').value    = bron.plaats||'';
      return;
    }
    // Zoek debiteur op voor locaties — ook via SK
    var klantVal = document.getElementById('op-klant').value;
    if(!klantVal) return;
    var parts = klantVal.split(':');
    var debId2 = null;
    if(parts[0]==='deb') {
      debId2 = parts[1];
    } else if(parts[0]==='sk') {
      var sk2 = APP.serviceklanten.find(function(k){return String(k.id)===parts[1];});
      if(sk2) debId2 = sk2.debId;
    }
    if(!debId2) return;
    var deb2 = APP.debiteuren.find(function(d){return String(d.id)===debId2;});
    if(!deb2||!deb2.locaties||!deb2.locaties[locId]) return;
    var loc2 = deb2.locaties[locId];
    document.getElementById('op-adres').value = loc2.adres||'';
    document.getElementById('op-pc').value    = loc2.postcode||'';
    document.getElementById('op-pl').value    = loc2.plaats||'';
  });

  // Opdracht opties: alleen verleden/vandaag, max 60 dagen terug
  var vandaag60 = new Date(); vandaag60.setDate(vandaag60.getDate()-60);
  var grens60   = vandaag60.toISOString().split('T')[0];
  var vandaag   = new Date().toISOString().split('T')[0];
  var opOpts = '<option value="">— Geen opdracht —</option>';
  var recent = APP.opdrachten.filter(function(op){
    return op.datum && op.datum <= vandaag && op.datum >= grens60;
  }).sort(function(a,b){return (b.datum||'')>(a.datum||'')?1:-1;});
  if(recent.length===0) opOpts += '<option disabled>Geen opdrachten in afgelopen 60 dagen</option>';
  recent.forEach(function(op){
    var sel = String(o.opdrachtId)===String(op.id)?' selected':'';
    var monteur = op.monteurId ? getMed(op.monteurId) : null;
    var montNaam = monteur ? ' · '+monteur.voornaam : '';
    opOpts += '<option value="'+op.id+'"'+sel+'>'+fmtD(op.datum)+' — '+esc(op.klantNaam||'Opdracht')+montNaam+'</option>';
  });

  var b = '<div class="form-grid">';
  if (kanGoedkeuren) b += fgf('Medewerker','<select class="input" id="ou-med">'+medOpts+'</select>');
  b += fg('Datum', finp('ou-datum','date', o.datum||new Date().toISOString().split('T')[0],''));
  b += fg('Aantal uren', '<div style="display:flex;align-items:center;gap:8px"><input class="input" type="number" id="ou-uren" value="'+(o.uren||'')+'" min="0.5" max="24" step="0.5" style="width:100px"> <span style="font-size:13px;color:var(--muted)">uur</span></div>');
  b += fg('Type', '<select class="input" id="ou-type"><option value="compensatie"'+(o.type!=='uitbetaling'?' selected':'')+'>🔄 Compensatie (tijd voor tijd)</option><option value="uitbetaling"'+(o.type==='uitbetaling'?' selected':'')+'>💰 Uitbetaling</option></select>');
  b += fgf('Gekoppelde opdracht','<select class="input" id="ou-opdracht">'+opOpts+'</select>');
  b += fgf('Omschrijving', finp('ou-omschr','text',o.omschrijving||'','Bijv. avondwerk storing, reistijd buiten werktijd'));
  b += fgf('Notitie', ftxt('ou-notitie', o.notitie||''));
  b += '</div>';

  var f = '<button class="btn btn-ghost" id="ou-modal-cancel">Annuleren</button>';
  f += '<button class="btn btn-primary" id="ou-modal-save">Opslaan</button>';
  openModal(isNew?'Overuren registreren':'Overuren bewerken', b, f);
  document.getElementById('ou-modal-cancel').addEventListener('click', closeModal);
  document.getElementById('ou-modal-save').addEventListener('click',function(){saveOveruren(id);});

  // Auto-fill datum/omschrijving vanuit opdracht
  var opSel = document.getElementById('ou-opdracht');
  if (opSel) opSel.addEventListener('change',function(){
    var op = APP.opdrachten.find(function(x){return String(x.id)===opSel.value;});
    if (!op) return;
    var datEl=document.getElementById('ou-datum'); if(datEl&&!datEl.value) datEl.value=op.datum||'';
    var omEl=document.getElementById('ou-omschr'); if(omEl&&!omEl.value) omEl.value='Overwerk '+esc(op.klantNaam||'opdracht');
  });
}

function saveOveruren(id) {
  var mijnId    = getMijnMedId();
  var kanGoedkeuren = isAdmin() || magSchrijven('overuren');
  var medIdEl   = document.getElementById('ou-med');
  var medId     = medIdEl ? medIdEl.value : mijnId;
  var datum     = document.getElementById('ou-datum').value;
  var uren      = parseFloat(document.getElementById('ou-uren').value);
  if (!datum)        { toast('Datum is verplicht','error'); return; }
  if (!uren || uren<=0) { toast('Voer een geldig aantal uren in','error'); return; }

  var isNew    = !id;
  var bestaand = id ? (APP.overuren.find(function(x){return String(x.id)===String(id);})||{}) : {};
  var data = Object.assign({}, bestaand, {
    id:          id || uid(),
    medId:       medId,
    datum:       datum,
    uren:        uren,
    type:        document.getElementById('ou-type').value,
    opdrachtId:  document.getElementById('ou-opdracht').value || null,
    omschrijving:document.getElementById('ou-omschr').value.trim(),
    notitie:     document.getElementById('ou-notitie').value.trim(),
    status:      bestaand.status || 'aangevraagd',
    aangemaaktOp:bestaand.aangemaaktOp || new Date().toISOString().split('T')[0],
    door:        bestaand.door || (APP.profiel?APP.profiel.naam:''),
  });

  if (isNew) APP.overuren.push(data);
  else { var idx=APP.overuren.findIndex(function(x){return String(x.id)===String(id);}); if(idx>-1) APP.overuren[idx]=data; }
  dbSaveItem('overuren', data.id, data);
  closeModal();
  renderOveruren();
  toast(isNew?'Overuren geregistreerd':'Overuren bijgewerkt','success');
}

function keurOveruren(id, status) {
  var o = APP.overuren.find(function(x){return String(x.id)===String(id);}); if(!o) return;

  // Afwijzing via custom modal
  if (status === 'afgewezen') {
    var b='<div class="form-group">'+
      '<label style="font-size:13px;color:var(--muted);margin-bottom:8px;display:block">Geef een reden voor de afwijzing (optioneel):</label>'+
      '<textarea class="input" id="ou-afwijs-reden" rows="3" placeholder="Bijv. Niet van toepassing, al gecompenseerd..." style="resize:vertical"></textarea>'+
      '</div>';
    var f='<button class="btn btn-ghost" id="ou-afwijs-ann">Annuleren</button>'+
         '<button class="btn btn-primary" id="ou-afwijs-bev" style="background:var(--red)">✗ Afwijzen</button>';
    openModal('Overuren afwijzen', b, f);
    document.getElementById('ou-afwijs-ann').addEventListener('click', closeModal);
    document.getElementById('ou-afwijs-bev').addEventListener('click', function(){
      var reden = document.getElementById('ou-afwijs-reden').value.trim();
      closeModal();
      _voerKeuringOveruren(id, 'afgewezen', reden);
    });
    return;
  }

  // Goedkeuren = direct compenseren
  if (status === 'goedgekeurd') status = 'gecompenseerd';

  _voerKeuringOveruren(id, status, null);
}

function _voerKeuringOveruren(id, status, reden) {
  var o = APP.overuren.find(function(x){return String(x.id)===String(id);}); if(!o) return;

  if (reden) o.notitie = reden;

  // Compensatie → voeg uren toe aan verlofsaldo
  if (status === 'gecompenseerd' && o.status !== 'gecompenseerd') {
    var med = getMed(o.medId);
    if (med) {
      var urenPerDag = (parseInt(med.contractUren)||40) / 5;
      var compensatieDagen = Math.round((o.uren / urenPerDag) * 100) / 100;
      var nieuwSaldo = Math.round(((med.verlofSaldo||0) + compensatieDagen) * 100) / 100;
      med.verlofSaldo = nieuwSaldo;
      dbSaveItem('medewerkers', med.id, med);
      slaVerlofMutatie(med.id, 'bijschrijving', compensatieDagen,
        'Compensatie overuren '+fmtD(o.datum)+' ('+o.uren+'u → '+compensatieDagen+'d)', nieuwSaldo);
      toast('✓ '+compensatieDagen+' verlofdagen bijgeschreven aan '+med.voornaam, 'success');
    }
  }

  o.status        = status;
  o.beoordeeldOp  = new Date().toISOString().split('T')[0];
  o.beoordeeldDoor= APP.profiel ? APP.profiel.naam : '';
  dbSaveItem('overuren', o.id, o);
  renderOveruren();
  var labels = { gecompenseerd:'Goedgekeurd & gecompenseerd', afgewezen:'Afgewezen', uitbetaald:'Uitbetaald' };
  toast(labels[status]||status,'success');
  if(typeof stuurNotificatie==='function' && magNotificatie('overuren', status)) {
    var ouTitels = {gecompenseerd:'Overuren goedgekeurd & gecompenseerd ✓', afgewezen:'Overuren afgewezen', uitbetaald:'Overuren uitbetaald'};
    stuurNotificatie(o.medId,'overuren',ouTitels[status]||status,
      'Jouw overuren registratie ('+o.uren+'u) is '+(status==='gecompenseerd'?'goedgekeurd en gecompenseerd':status)+(reden?' — '+reden:'')+'.','overuren');
  }
}

function openOverurenPanel(id) {
  var o = APP.overuren.find(function(x){return String(x.id)===String(id);}); if(!o) return;
  var m = getMed(o.medId);
  var kl = m ? (medKleur(m)) : '#6b7694';
  var ops = o.opdrachtId ? APP.opdrachten.find(function(x){return String(x.id)===String(o.opdrachtId);}) : null;
  var kanGoedkeuren = isAdmin() || magSchrijven('overuren');

  function v(l,w){ return '<div style="background:var(--surface2);border-radius:8px;padding:10px 12px"><div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase">'+l+'</div><div style="font-size:13px;font-weight:600;margin-top:3px">'+esc(w||'—')+'</div></div>'; }

  var statusTag = { aangevraagd:'<span class="tag tag-orange">Aangevraagd</span>', goedgekeurd:'<span class="tag tag-blue">Goedgekeurd</span>', afgewezen:'<span class="tag tag-red">Afgewezen</span>', gecompenseerd:'<span class="tag tag-green">Gecompenseerd</span>', uitbetaald:'<span class="tag tag-muted">Uitbetaald</span>' }[o.status]||'';

  var h = '';
  // Header
  h += '<div style="display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:10px;padding:14px;margin-bottom:16px">';
  if(m){ h+='<div class="avatar" style="width:42px;height:42px;font-size:14px;background:'+kl+';color:#fff">'+initials(m)+'</div>'; }
  h += '<div><div style="font-family:Syne,sans-serif;font-size:16px;font-weight:800">'+(m?esc(m.voornaam+' '+m.achternaam):'—')+'</div>';
  h += '<div style="font-size:13px;color:var(--muted);margin-top:2px">'+fmtD(o.datum)+'</div>';
  h += '<div style="margin-top:6px">'+statusTag+'</div></div>';
  h += '<div style="margin-left:auto;text-align:right"><div style="font-family:DM Sans,sans-serif;font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent)">'+(o.uren||0)+'</div><div style="font-size:12px;color:var(--muted)">uur</div></div>';
  h += '</div>';

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">';
  h += v('Type', o.type==='uitbetaling'?'💰 Uitbetaling':'🔄 Compensatie');
  h += v('Aangevraagd door', o.door);
  h += v('Aangevraagd op', fmtD(o.aangemaaktOp));
  if(o.beoordeeldDoor) h += v('Beoordeeld door', o.beoordeeldDoor+' · '+fmtD(o.beoordeeldOp));
  h += '</div>';

  if(ops) {
    h += '<div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:10px 12px;margin-bottom:12px">';
    h += '<div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:4px">GEKOPPELDE OPDRACHT</div>';
    h += '<div style="font-size:13px;font-weight:600">'+esc(ops.klantNaam||'—')+'</div>';
    h += '<div style="font-size:12px;color:var(--muted)">'+fmtD(ops.datum)+(ops.tijdVan?' · '+ops.tijdVan:'')+'</div>';
    h += '</div>';
  }

  if(o.omschrijving) { h += '<div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:12px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;font-weight:600">Omschrijving</div><div style="font-size:13px">'+esc(o.omschrijving)+'</div></div>'; }
  if(o.notitie)      { h += '<div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:12px"><div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;font-weight:600">Notitie</div><div style="font-size:13px">'+esc(o.notitie)+'</div></div>'; }

  // Acties
  h += '<div style="display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--border);padding-top:14px;margin-top:4px">';
  if(kanGoedkeuren && o.status==='aangevraagd'){
    h += '<button class="btn btn-primary" id="op-goed" style="justify-content:center">✓ Goedkeuren & compenseren</button>';
    h += '<button class="btn btn-ghost" id="op-af" style="justify-content:center;color:var(--red)">✗ Afwijzen</button>';
  }
  if(kanGoedkeuren && (o.status==='gecompenseerd'||o.status==='goedgekeurd')){
    h += '<button class="btn btn-ghost" id="op-uitb" style="justify-content:center">💰 Uitbetalen</button>';
  }
  h += '<button class="btn btn-ghost" id="op-edit" style="justify-content:center">✏️ Bewerken</button>';
  if(kanGoedkeuren && o.status!=='uitbetaald'){
    h += '<button class="btn btn-ghost" id="op-del" style="justify-content:center;color:var(--red)">🗑 Verwijderen</button>';
  }
  h += '</div>';

  openPanel((o.uren||0)+' overuren — '+(m?m.voornaam:''), h);
  var pb = document.getElementById('panel-body');
  var gB=pb.querySelector('#op-goed'); if(gB) gB.addEventListener('click',function(){keurOveruren(id,'goedgekeurd');closePanel();});
  var aB=pb.querySelector('#op-af');   if(aB) aB.addEventListener('click',function(){closePanel();keurOveruren(id,'afgewezen');});
  var uB=pb.querySelector('#op-uitb'); if(uB) uB.addEventListener('click',function(){
    var o2=APP.overuren.find(function(x){return String(x.id)===String(id);}); if(!o2) return;
    var m2=getMed(o2.medId); var naam2=m2?m2.voornaam+' '+m2.achternaam:'onbekend';
    bevestigActie('💰 Uitbetaling bevestigen','Weet je zeker dat je '+o2.uren+'u overuren van '+esc(naam2)+' uitbetaalt? Dit kan niet ongedaan gemaakt worden.',function(){
      _voerKeuringOveruren(id,'uitbetaald',null); closePanel();
    });
  });
  var eB=pb.querySelector('#op-edit'); if(eB) eB.addEventListener('click',function(){closePanel();openOverurenModal(id);});
  var dB=pb.querySelector('#op-del');  if(dB) dB.addEventListener('click',function(){
    var o2=APP.overuren.find(function(x){return String(x.id)===String(id);}); if(!o2) return;
    var waarschuwing = o2.status==='gecompenseerd'
      ? '\n\n⚠️ Let op: de gecompenseerde verlofdagen worden van het saldo afgetrokken.'
      : '';
    bevestigActie('🗑 Overuren verwijderen','Weet je zeker dat je deze registratie wilt verwijderen?'+waarschuwing,function(){
      closePanel(); _verwijderOveruren(id);
    });
  });
}

// MODULE: ONKOSTEN
// Data: APP.onkosten = [{
//   id, medId, datum, bedrag, categorie, omschrijving, opdrachtId,
//   status:'aangevraagd'|'goedgekeurd'|'afgewezen'|'uitbetaald',
//   bon (bestandsnaam), aangemaaktOp, door, beoordeeldDoor, beoordeeldOp, notitie
// }]
// ═══════════════════════════════════════════════════════════════
var _okFilter='alle', _okZoek='', _okSortKey='datum', _okSortDir=-1, _okPage=1, _okPS=25;
var OK_CATEGORIEEN=['Brandstof','Parkeren','Tolkosten','Materiaal','Maaltijd','Overnachting','Overig'];

function renderOnkosten() {
  var el=document.getElementById('content');
  var mijnId=getMijnMedId();
  var kanGoedkeuren=isAdmin()||magGoedkeuren('onkosten')||magSchrijven('onkosten');
  var zichtbaarOK = filterEigen(APP.onkosten, 'medId', 'onkosten');

  var lijst=zichtbaarOK.filter(function(o){
    if(_okFilter!=='alle'&&o.status!==_okFilter) return false;
    if(_okZoek){
      var q=_okZoek.toLowerCase();
      var m=getMed(o.medId);
      var naam=m?(m.voornaam+' '+m.achternaam).toLowerCase():'';
      return naam.includes(q)||(o.omschrijving||'').toLowerCase().includes(q)||(o.categorie||'').toLowerCase().includes(q)||fmtD(o.datum).includes(q);
    }
    return true;
  });
  lijst = enrichSortVelden(lijst, { medNaam: function(o){ return medNaamSort(o.medId); } });
  lijst=sorteerLijst(lijst,_okSortKey,_okSortDir);

  // Stats — berekend op volledige rechten-gefilterde dataset (niet afhankelijk van actief filter/zoek)
  var _okJrStr = new Date().getFullYear().toString();
  var openBedrag = zichtbaarOK.filter(function(o){return o.status==='aangevraagd';}).reduce(function(s,o){return s+(o.bedrag||0);},0);
  var goedBedrag = zichtbaarOK.filter(function(o){return o.status==='goedgekeurd'&&(o.datum||'').startsWith(_okJrStr);}).reduce(function(s,o){return s+(o.bedrag||0);},0);
  var uitbBedrag = zichtbaarOK.filter(function(o){return o.status==='uitbetaald'&&(o.datum||'').startsWith(_okJrStr);}).reduce(function(s,o){return s+(o.bedrag||0);},0);
  var totBedrag  = Math.round((goedBedrag + uitbBedrag) * 100) / 100;

  var h='';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">';
  h+='<input class="input" id="ok-zoek" placeholder="🔍 Zoek medewerker, categorie..." value="'+esc(_okZoek)+'" style="max-width:280px">';
  h+='<div style="flex:1"></div>';
  h+='<button class="btn btn-ghost btn-sm" id="ok-export-btn">⬇ Export</button>';
  h+='<button class="btn btn-primary btn-sm" id="ok-add-btn">+ Onkosten declareren</button>';
  h+='</div>';

  // Stats
  h+='<div class="stats-grid" style="margin-bottom:16px">';
  h+=statCard('Open',                  '€ '+openBedrag.toFixed(2), '#f59e0b', SVGS.alert);
  h+=statCard('Goedgekeurd '+_okJrStr, '€ '+goedBedrag.toFixed(2), '#3b82f6', SVGS.file);
  h+=statCard('Uitbetaald '+_okJrStr,  '€ '+uitbBedrag.toFixed(2), '#10b981', SVGS.file);
  h+=statCard('Totaal '+_okJrStr,      '€ '+totBedrag.toFixed(2),  '#6b7694', SVGS.file);
  h+='</div>';

  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">';
  h+='<div class="filter-row" style="margin:0">';
  [['alle','Alle'],['aangevraagd','Aangevraagd'],['goedgekeurd','Goedgekeurd'],['uitbetaald','Uitbetaald'],['afgewezen','Afgewezen']].forEach(function(f){
    h+='<button class="chip'+(_okFilter===f[0]?' active':'')+'" data-ok-filter="'+f[0]+'">'+f[1]+'</button>';
  });
  h+='</div></div>';

  var slice=lijst.slice((_okPage-1)*_okPS,_okPage*_okPS);

  if (!APP.onkosten.length) {
    el.innerHTML = h + legeStaat(
      '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>',
      'Nog geen onkosten gedeclareerd',
      'Declareer hier gemaakte kosten zoals brandstof, parkeren of materiaal. Ze worden ter goedkeuring aangeboden aan de beheerder.',
      '+ Onkosten declareren', 'ls-ok-add'
    );
    var lsBtn = el.querySelector('#ls-ok-add'); if(lsBtn) lsBtn.addEventListener('click', function(){ openOnkostenModal(null); });
    return;
  }

  h+='<div class="card" style="padding:0"><div class="table-wrap"><table style="width:100%"><thead><tr>';
  [['datum','Datum'],['medNaam','Medewerker'],['categorie','Categorie'],['bedrag','Bedrag'],['omschrijving','Omschrijving'],['status','Status']].forEach(function(c){
    var ico=_okSortKey===c[0]?(_okSortDir===1?' ↑':' ↓'):'<span style="opacity:.4;font-size:9px"> ⇅</span>';
    h+='<th class="ok-sort-th" data-sort="'+c[0]+'" style="cursor:pointer;white-space:nowrap">'+c[1]+ico+'</th>';
  });
  if(kanGoedkeuren) h+='<th style="width:120px">Actie</th>';
  h+='</tr></thead><tbody>';

  if(!slice.length){
    h+='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--muted)">Geen resultaten voor deze zoekopdracht</td></tr>';
  } else {
    slice.forEach(function(o){
      var m=getMed(o.medId);
      var kl=m?(medKleur(m)):'#6b7694';
      var ops=o.opdrachtId?APP.opdrachten.find(function(x){return String(x.id)===String(o.opdrachtId);}):null;
      var stTag={aangevraagd:'<span class="tag tag-orange">Aangevraagd</span>',goedgekeurd:'<span class="tag tag-blue">Goedgekeurd</span>',afgewezen:'<span class="tag tag-red">Afgewezen</span>',uitbetaald:'<span class="tag tag-green">Uitbetaald</span>'}[o.status]||'<span class="tag tag-muted">'+esc(o.status)+'</span>';
      h+='<tr class="ok-rij" data-id="'+o.id+'" style="cursor:pointer">';
      h+='<td style="white-space:nowrap;padding:10px 14px;font-size:13px">'+fmtD(o.datum)+'</td>';
      h+='<td style="padding:10px 14px">'+(m?'<div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:26px;height:26px;font-size:9px;background:'+kl+';color:#fff">'+initials(m)+'</div><span style="font-size:13px;font-weight:600">'+esc(m.voornaam+' '+m.achternaam)+'</span></div>':'<span style="color:var(--muted)">—</span>')+'</td>';
      h+='<td style="padding:10px 14px"><span class="tag tag-muted">'+esc(o.categorie||'—')+'</span></td>';
      h+='<td style="padding:10px 14px;font-weight:700;font-size:14px;color:var(--accent)">€ '+(o.bedrag||0).toFixed(2)+'</td>';
      h+='<td style="font-size:12px;color:var(--muted);padding:10px 14px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(o.omschrijving||'—')+(ops?'<br><span style="font-size:11px;color:var(--accent2)">📋 '+esc(ops.klantNaam||'')+'</span>':'')+(o.bonnen&&o.bonnen.length?'<br><span style="font-size:10px;color:var(--accent)">📎 '+o.bonnen.length+' bon'+(o.bonnen.length===1?'':'nen')+'</span>':'')+'</td>';
      h+='<td style="padding:10px 14px">'+stTag+'</td>';
      if(kanGoedkeuren){
        h+='<td style="padding:6px 10px;white-space:nowrap" onclick="event.stopPropagation()">';
        if(o.status==='aangevraagd'){
          h+='<button class="btn btn-ghost btn-sm ok-goed-btn" data-id="'+o.id+'" style="color:var(--green)">✓</button>';
          h+='<button class="btn btn-ghost btn-sm ok-af-btn" data-id="'+o.id+'" style="color:var(--red)">✗</button>';
        } else if(o.status==='goedgekeurd'){
          h+='<button class="btn btn-ghost btn-sm ok-uitb-btn" data-id="'+o.id+'" style="font-size:11px">💶 Uitbet.</button>';
        }
        h+='</td>';
      }
      h+='</tr>';
    });
  }
  h+='</tbody></table></div>'+pgHtml(lijst.length,_okPage,_okPS,'_okPage')+'</div>';
  el.innerHTML=h;

  el.querySelector('#ok-zoek').addEventListener('input',function(e){
    _okZoek=e.target.value; _okPage=1;
    var pos=e.target.selectionStart; renderOnkosten();
    var ni=document.getElementById('ok-zoek'); if(ni){ni.focus();ni.setSelectionRange(pos,pos);}
  });
  el.querySelector('#ok-add-btn').addEventListener('click',function(){openOnkostenModal(null);});
  var okExpBtn=el.querySelector('#ok-export-btn'); if(okExpBtn) okExpBtn.addEventListener('click',function(){
    var rows=APP.onkosten.map(function(o){var m=getMed(o.medId);return[m?m.voornaam+' '+m.achternaam:'',fmtD(o.datum),o.categorie||'',o.bedrag||'',o.status||'',o.omschrijving||''];});
    csvExport(['Medewerker','Datum','Categorie','Bedrag (€)','Status','Omschrijving'],rows,'onkosten');
  });
  el.querySelectorAll('.chip[data-ok-filter]').forEach(function(b){b.addEventListener('click',function(){_okFilter=b.dataset.okFilter;_okPage=1;renderOnkosten();});});
  el.querySelectorAll('.ok-sort-th').forEach(function(th){th.addEventListener('click',function(){if(_okSortKey===th.dataset.sort)_okSortDir*=-1;else{_okSortKey=th.dataset.sort;_okSortDir=1;}renderOnkosten();});});
  el.querySelectorAll('.pg-btn[data-pg]').forEach(function(b){b.addEventListener('click',function(){_okPage=parseInt(b.dataset.pg);renderOnkosten();});});
  el.querySelectorAll('.ok-rij').forEach(function(r){r.addEventListener('click',function(){openOnkostenPanel(r.dataset.id);});});
  el.querySelectorAll('.ok-goed-btn').forEach(function(b){b.addEventListener('click',function(){keurOnkosten(b.dataset.id,'goedgekeurd');});});
  el.querySelectorAll('.ok-af-btn').forEach(function(b){b.addEventListener('click',function(){keurOnkosten(b.dataset.id,'afgewezen');});});
  el.querySelectorAll('.ok-uitb-btn').forEach(function(b){b.addEventListener('click',function(){
    var o=APP.onkosten.find(function(x){return String(x.id)===String(b.dataset.id);});
    if(!o) return;
    var m=getMed(o.medId);
    var naam=m?m.voornaam+' '+m.achternaam:'onbekend';
    bevestigActie('💶 Uitbetaling bevestigen','Weet je zeker dat je € '+(o.bedrag||0).toFixed(2)+' voor '+esc(naam)+' markeert als uitbetaald? Dit kan niet ongedaan gemaakt worden.',function(){keurOnkosten(b.dataset.id,'uitbetaald');});
  });});
}

  b+=fgf('Omschrijving',finp('ok-omschr','text',o.omschrijving||'','Bijv. brandstof retour Gorinchem-Utrecht'));

  b+='<div style="grid-column:1/-1">';
  b+='<label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:8px">Bon(nen) toevoegen</label>';
  b+='<label for="ok-bon-input" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:16px;border:2px dashed var(--border);border-radius:8px;cursor:pointer;background:var(--surface2);font-size:13px;color:var(--muted);transition:border .15s">';
  b+='📸 Foto of bon toevoegen (meerdere mogelijk)<input type="file" id="ok-bon-input" accept="image/*,application/pdf" multiple style="display:none"></label>';
  b+='<div id="ok-bon-preview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px"></div>';
  b+='</div>';
  b+='</div>';
  var f='<button class="btn btn-ghost" id="ok-modal-cancel">Annuleren</button><button class="btn btn-primary" id="ok-modal-save">Opslaan</button>';
  openModal(isNew?'Onkosten declareren':'Onkosten bewerken',b,f);
  document.getElementById('ok-modal-cancel').addEventListener('click',closeModal);
  document.getElementById('ok-modal-save').addEventListener('click',function(){saveOnkosten(id);});

  // Foto preview
  var _bonnen = o.bonnen ? o.bonnen.slice() : []; // base64 strings

  function updateBonPreview() {
    var prev = document.getElementById('ok-bon-preview'); if(!prev) return;
    prev.innerHTML = '';
    _bonnen.forEach(function(b64, idx) {
      var wrap = document.createElement('div');
      wrap.style.cssText = 'position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;border:1px solid var(--border)';
      var img = document.createElement('img');
      img.src = b64; img.style.cssText = 'width:100%;height:100%;object-fit:cover;cursor:pointer';
      img.addEventListener('click', function(){ openFotoLightbox(b64, 'Bon '+(idx+1)); });
      var del = document.createElement('button');
      del.innerHTML = '×'; del.dataset.idx = idx;
      del.style.cssText = 'position:absolute;top:2px;right:2px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1';
      del.addEventListener('click', function(e){ e.stopPropagation(); _bonnen.splice(parseInt(del.dataset.idx),1); updateBonPreview(); });
      wrap.appendChild(img); wrap.appendChild(del);
      prev.appendChild(wrap);
    });
    if(_bonnen.length > 0) {
      var tel = document.createElement('div');
      tel.style.cssText = 'font-size:11px;color:var(--muted);align-self:center';
      tel.textContent = _bonnen.length+' bon'+(  _bonnen.length===1?'':'nen');
      prev.appendChild(tel);
    }
  }

  updateBonPreview();

  var bonInput = document.getElementById('ok-bon-input');
  if(bonInput) bonInput.addEventListener('change', function(e){
    var files = Array.from(e.target.files);
    var remaining = 5 - _bonnen.length;
    files.slice(0, remaining).forEach(function(file){
      if(file.size > 3*1024*1024){ toast('Foto te groot (max 3MB)','error'); return; }
      var reader = new FileReader();
      reader.onload = function(ev){
        _bonnen.push(ev.target.result);
        updateBonPreview();
      };
      reader.readAsDataURL(file);
    });
    if(files.length > remaining) toast('Maximum 5 bonnen per declaratie','error');
    bonInput.value = ''; // reset zodat je dezelfde foto opnieuw kunt kiezen
  });
}

function saveOnkosten(id){
  var mijnId=getMijnMedId();
  var kanGoedkeuren=isAdmin()||magGoedkeuren('onkosten')||magSchrijven('onkosten');
  var medIdEl=document.getElementById('ok-med');
  var medId=medIdEl?medIdEl.value:mijnId;
  var datum=document.getElementById('ok-datum').value;
  var bedrag=parseFloat(document.getElementById('ok-bedrag').value);
  var cat=document.getElementById('ok-cat').value;
  if(!datum){toast('Datum is verplicht','error');return;}
  if(!bedrag||bedrag<=0){toast('Voer een geldig bedrag in','error');return;}
  if(!cat){toast('Kies een categorie','error');return;}
  var isNew=!id;
  var bestaand=id?(APP.onkosten.find(function(x){return String(x.id)===String(id);})||{}):{};
  // Haal bonnen op uit preview state (_bonnen is gedefinieerd in modal scope)
  var bonnen = bestaand.bonnen || [];
  var prevEl = document.getElementById('ok-bon-preview');
  // _bonnen is een closured variabele in de modal - haal via imgs op
  if(prevEl) {
    var imgs = prevEl.querySelectorAll('img');
    if(imgs.length > 0) bonnen = Array.from(imgs).map(function(img){return img.src;});
  }
  var data=Object.assign({},bestaand,{
    id:id||uid(), medId:medId, datum:datum, bedrag:bedrag, categorie:cat,
    opdrachtId:document.getElementById('ok-opdracht').value||null,
    omschrijving:document.getElementById('ok-omschr').value.trim(),
    notitie:document.getElementById('ok-notitie').value.trim(),
    bonnen:bonnen,
    status:bestaand.status||'aangevraagd',
    aangemaaktOp:bestaand.aangemaaktOp||new Date().toISOString().split('T')[0],
    door:bestaand.door||(APP.profiel?APP.profiel.naam:''),
  });
  if(isNew) APP.onkosten.push(data);
  else{var idx=APP.onkosten.findIndex(function(x){return String(x.id)===String(id);});if(idx>-1)APP.onkosten[idx]=data;}
  dbSaveItem('onkosten',data.id,data);
  closeModal(); renderOnkosten();
  toast(isNew?'Onkosten gedeclareerd':'Onkosten bijgewerkt','success');
}

function keurOnkosten(id,status){
  var o=APP.onkosten.find(function(x){return String(x.id)===String(id);}); if(!o) return;
  if(status==='afgewezen'){
    var b='<div class="form-group">'+
      '<label style="font-size:13px;color:var(--muted);margin-bottom:8px;display:block">Geef een reden voor de afwijzing (optioneel):</label>'+
      '<textarea class="input" id="ok-afwijs-reden" rows="3" placeholder="Bijv. Bon ontbreekt, bedrag klopt niet..." style="resize:vertical"></textarea>'+
      '</div>';
    var f='<button class="btn btn-ghost" id="ok-afwijs-ann">Annuleren</button>'+
         '<button class="btn btn-primary" id="ok-afwijs-bev" style="background:var(--red)">✗ Afwijzen</button>';
    openModal('Onkosten afwijzen', b, f);
    document.getElementById('ok-afwijs-ann').addEventListener('click', closeModal);
    document.getElementById('ok-afwijs-bev').addEventListener('click', function(){
      var reden = document.getElementById('ok-afwijs-reden').value.trim();
      closeModal();
      _voerKeuringOnkosten(id, 'afgewezen', reden);
    });
    return;
  }
  _voerKeuringOnkosten(id, status, null);
}

function _voerKeuringOnkosten(id, status, reden){
  var o=APP.onkosten.find(function(x){return String(x.id)===String(id);}); if(!o) return;
  if(reden) o.notitie=reden;
  o.status=status; o.beoordeeldOp=new Date().toISOString().split('T')[0]; o.beoordeeldDoor=APP.profiel?APP.profiel.naam:'';
  dbSaveItem('onkosten',o.id,o); renderOnkosten();
  toast({goedgekeurd:'Goedgekeurd',afgewezen:'Afgewezen',uitbetaald:'Uitbetaald'}[status]||status,'success');
  // Notificatie naar medewerker
  if(typeof stuurNotificatie==='function' && magNotificatie('onkosten', status)) {
    var okTitels = {goedgekeurd:'Onkosten goedgekeurd ✓',afgewezen:'Onkosten afgewezen',uitbetaald:'Onkosten uitbetaald'};
    stuurNotificatie(o.medId,'onkosten',okTitels[status]||status,
      'Jouw declaratie van € '+(o.bedrag||0).toFixed(2)+' is '+status+(reden?' — '+reden:'')+'.','onkosten');
  }
}

// MODULE: VERZUIM
// Data: APP.verzuim = [{
//   id, medId, van, tot, type:'ziek'|'geoorloofd'|'ongeoorloofd'|'gedeeltelijk',
//   omschrijving, status:'actief'|'hersteld'|'langdurig',
//   aangemaaktOp, door, herstelledOp, notitie
// }]
// ═══════════════════════════════════════════════════════════════
var _vzFilter='alle', _vzZoek='', _vzSortKey='van', _vzSortDir=-1, _vzPage=1, _vzPS=25;

function renderVerzuim() {
  var el=document.getElementById('content');
  var mijnId=getMijnMedId();
  var kanBeheren=isAdmin()||magGoedkeuren('verzuim')||magSchrijven('verzuim');
  var vandaag=new Date().toISOString().split('T')[0];
  var zichtbaarVZ = filterEigen(APP.verzuim, 'medId', 'verzuim');

  var lijst=zichtbaarVZ.filter(function(v){
    if(_vzFilter!=='alle'&&v.status!==_vzFilter) return false;
    if(_vzZoek){
      var q=_vzZoek.toLowerCase();
      var m=getMed(v.medId);
      var naam=m?(m.voornaam+' '+m.achternaam).toLowerCase():'';
      return naam.includes(q)||(v.omschrijving||'').toLowerCase().includes(q)||(v.type||'').toLowerCase().includes(q);
    }
    return true;
  });
  lijst = enrichSortVelden(lijst, {
    medNaam: function(v){ return medNaamSort(v.medId); },
    duur: function(v){
      if(!v.van) return 0;
      var tot = v.tot || new Date().toISOString().split('T')[0];
      return Math.ceil((new Date(tot) - new Date(v.van)) / 86400000);
    }
  });
  lijst=sorteerLijst(lijst,_vzSortKey,_vzSortDir);

  // Stats
  var actief=lijst.filter(function(v){return v.status==='actief';}).length;
  var langdurig=lijst.filter(function(v){return v.status==='langdurig';}).length;
  var hersteld=lijst.filter(function(v){return v.status==='hersteld';}).length;
  var totDagen=lijst.filter(function(v){return v.status==='actief'||v.status==='langdurig';}).reduce(function(s,v){
    if(!v.van) return s;
    var tot=v.tot&&v.tot<=vandaag?v.tot:vandaag;
    return s+Math.max(0,Math.ceil((new Date(tot)-new Date(v.van))/86400000)+1);
  },0);

  var h='';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">';
  h+='<input class="input" id="vz-zoek" placeholder="🔍 Zoek medewerker..." value="'+esc(_vzZoek)+'" style="max-width:260px">';
  h+='<div style="flex:1"></div>';
  h+='<button class="btn btn-ghost btn-sm" id="vz-export-btn">⬇ Export</button>';
  if(kanBeheren) h+='<button class="btn btn-primary btn-sm" id="vz-add-btn">+ Verzuim registreren</button>';
  h+='</div>';

  h+='<div class="stats-grid" style="margin-bottom:16px">';
  h+=statCard('Actief',      actief+'',   '#ef4444', SVGS.alert);
  h+=statCard('Langdurig',   langdurig+'','#f59e0b', SVGS.alert);
  h+=statCard('Hersteld',    hersteld+'', '#10b981', SVGS.file);
  h+=statCard('Verzuimdagen',totDagen+'', '#6b7694', SVGS.file);
  h+='</div>';

  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap"><div class="filter-row" style="margin:0">';
  [['alle','Alle'],['actief','Actief'],['langdurig','Langdurig'],['hersteld','Hersteld']].forEach(function(f){
    h+='<button class="chip'+(_vzFilter===f[0]?' active':'')+'" data-vz-filter="'+f[0]+'">'+f[1]+'</button>';
  });
  h+='</div></div>';

  var slice=lijst.slice((_vzPage-1)*_vzPS,_vzPage*_vzPS);

  if (!APP.verzuim.length) {
    el.innerHTML = h + legeStaat(
      '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
      'Nog geen verzuim geregistreerd',
      'Registreer hier ziekmeldingen en verzuim van medewerkers. Zo houd je een overzicht bij van afwezigheid en herstel.',
      kanBeheren ? '+ Verzuim registreren' : null, kanBeheren ? 'ls-vz-add' : null
    );
    if(kanBeheren) { var lsBtn=el.querySelector('#ls-vz-add'); if(lsBtn) lsBtn.addEventListener('click',function(){openVerzuimModal(null);}); }
    return;
  }

  h+='<div class="card" style="padding:0"><div class="table-wrap"><table style="width:100%"><thead><tr>';
  [['van','Van'],['medNaam','Medewerker'],['type','Type'],['tot','Tot/Hersteld'],['duur','Duur'],['status','Status']].forEach(function(c){
    var ico=_vzSortKey===c[0]?(_vzSortDir===1?' ↑':' ↓'):'<span style="opacity:.4;font-size:9px"> ⇅</span>';
    h+='<th class="vz-sort-th" data-sort="'+c[0]+'" style="cursor:pointer;white-space:nowrap">'+c[1]+ico+'</th>';
  });
  if(kanBeheren) h+='<th style="width:120px">Actie</th>';
  h+='</tr></thead><tbody>';

  if(!slice.length){
    h+='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--muted)">Geen resultaten voor deze zoekopdracht</td></tr>';
  } else {
    slice.forEach(function(v){
      var m=getMed(v.medId);
      var kl=m?(medKleur(m)):'#6b7694';

  var mijnId=getMijnMedId();
  var kanBeheren=isAdmin()||magGoedkeuren('verzuim')||magSchrijven('verzuim');
  var medOpts='';
  APP.medewerkers.filter(function(m){return m.status!=='inactief';}).forEach(function(m){
    medOpts+='<option value="'+m.id+'"'+(String(v.medId||mijnId)===String(m.id)?' selected':'')+'>'+esc(m.voornaam+' '+m.achternaam)+'</option>';
  });
  var b='<div class="form-grid">';

  b+=fg('Type','<select class="input" id="vz-type"><option value="ziek"'+(v.type!=='geoorloofd'&&v.type!=='ongeoorloofd'&&v.type!=='gedeeltelijk'?' selected':'')+'>🤒 Ziek</option><option value="geoorloofd"'+(v.type==='geoorloofd'?' selected':'')+'>✓ Geoorloofd afwezig</option><option value="ongeoorloofd"'+(v.type==='ongeoorloofd'?' selected':'')+'>⚠️ Ongeoorloofd afwezig</option><option value="gedeeltelijk"'+(v.type==='gedeeltelijk'?' selected':'')+'>◑ Gedeeltelijk ziek</option></select>');
  // Gedeeltelijk: uren ziek + uren werk per dag
  b+='<div id="vz-gedeeltelijk-wrap" style="'+(v.type==='gedeeltelijk'?'':'display:none')+';grid-column:1/-1;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:12px;display:'+(v.type==='gedeeltelijk'?'grid':'none')+';grid-template-columns:1fr 1fr;gap:10px">';
  b+=fg('Uren ziek per dag','<div style="display:flex;align-items:center;gap:6px"><input class="input" type="number" id="vz-uren-ziek" value="'+(v.urenZiek||'')+'" min="0.5" max="12" step="0.5" style="width:90px"> <span style="font-size:12px;color:var(--muted)">uur/dag</span></div>');
  b+=fg('Uren werkt per dag','<div style="display:flex;align-items:center;gap:6px"><input class="input" type="number" id="vz-uren-werk" value="'+(v.urenWerk||'')+'" min="0.5" max="12" step="0.5" style="width:90px"> <span style="font-size:12px;color:var(--muted)">uur/dag</span></div>');
  b+='</div>';
  b+=fg('Eerste ziektedag',finp('vz-van','date',v.van||new Date().toISOString().split('T')[0],''));
  b+=fg('Hersteldatum (leeg = nog ziek)',finp('vz-tot','date',v.tot||'',''));
  b+=fgf('Omschrijving',finp('vz-omschr','text',v.omschrijving||'','Optioneel'));
  b+=fgf('Notitie (intern)',ftxt('vz-notitie',v.notitie||''));
  b+='</div>';
  var f='<button class="btn btn-ghost" id="vz-modal-cancel">Annuleren</button><button class="btn btn-primary" id="vz-modal-save">Opslaan</button>';
  openModal(isNew?'Verzuim registreren':'Verzuim bewerken',b,f);
  document.getElementById('vz-modal-cancel').addEventListener('click',closeModal);
  document.getElementById('vz-modal-save').addEventListener('click',function(){saveVerzuim(id);});

  // Toon/verberg gedeeltelijk uren veld
  var vzTypeSel = document.getElementById('vz-type');

function saveVerzuim(id){
  var mijnId=getMijnMedId();
  var kanBeheren=isAdmin()||magGoedkeuren('verzuim')||magSchrijven('verzuim');
  var medIdEl=document.getElementById('vz-med');
  var medId=medIdEl?medIdEl.value:mijnId;
  var van=document.getElementById('vz-van').value;
  if(!van){toast('Eerste ziektedag is verplicht','error');return;}
  var isNew=!id;
  var bestaand=id?(APP.verzuim.find(function(x){return String(x.id)===String(id);})||{}):{};
  var tot=document.getElementById('vz-tot').value||null;
  var duren=tot?Math.ceil((new Date(tot)-new Date(van))/86400000)+1:null;
  var status=tot?'hersteld':(duren&&duren>42?'langdurig':'actief');
  var vzType = document.getElementById('vz-type').value;
  var urenZiekEl = document.getElementById('vz-uren-ziek');
  var urenWerkEl = document.getElementById('vz-uren-werk');
  var data=Object.assign({},bestaand,{
    id:id||uid(), medId:medId, van:van, tot:tot||null,
    type:vzType,
    urenZiek: vzType==='gedeeltelijk'&&urenZiekEl ? (parseFloat(urenZiekEl.value)||null) : null,
    urenWerk: vzType==='gedeeltelijk'&&urenWerkEl ? (parseFloat(urenWerkEl.value)||null) : null,
    omschrijving:document.getElementById('vz-omschr').value.trim(),
    notitie:document.getElementById('vz-notitie').value.trim(),
    status:tot?'hersteld':(bestaand.status||'actief'),
    aangemaaktOp:bestaand.aangemaaktOp||new Date().toISOString().split('T')[0],
    door:bestaand.door||(APP.profiel?APP.profiel.naam:''),
  });
  if(isNew) APP.verzuim.push(data);
  else{var idx=APP.verzuim.findIndex(function(x){return String(x.id)===String(id);});if(idx>-1)APP.verzuim[idx]=data;}
  dbSaveItem('verzuim',data.id,data);
  closeModal(); renderVerzuim();
  toast(isNew?'Verzuim geregistreerd':'Verzuim bijgewerkt','success');
  // Notificatie bij nieuw aanmaken
  if(isNew && typeof stuurNotificatie==='function' && magNotificatie('verzuim','ziekmelding')) {
    var _vzMed = getMed(data.medId);
    var _vzTypes = {ziek:'Ziekmelding',geoorloofd:'Geoorloofd verzuim',ongeoorloofd:'Ongeoorloofd verzuim',gedeeltelijk:'Gedeeltelijk verzuim'};
    var _vzTypeTekst = _vzTypes[data.type]||'Verzuim';
    // Notificatie naar medewerker zelf
    stuurNotificatie(data.medId,'verzuim',_vzTypeTekst+' geregistreerd',
      'Jouw '+_vzTypeTekst.toLowerCase()+' per '+fmtD(data.van)+' is geregistreerd.','verzuim');
    // Notificatie naar beheerders als een monteur ziek is gemeld
    if(String(data.medId) !== String(getMijnMedId())) {
      var _vzNaam = _vzMed ? _vzMed.voornaam+' '+_vzMed.achternaam : 'Onbekend';
      APP.medewerkers.filter(function(m){
        return (m.rol==='admin'||m.rol==='planner') && String(m.id)!==String(data.medId);
      }).forEach(function(beheerder){
        stuurNotificatie(beheerder.id,'verzuim',_vzTypeTekst+': '+esc(_vzNaam),
          _vzNaam+' heeft zich ziek gemeld per '+fmtD(data.van)+'.','verzuim');
      });
    }
  }
}

function herstelVerzuim(id){
  var v=APP.verzuim.find(function(x){return String(x.id)===String(id);}); if(!v) return;
  var vandaag=new Date().toISOString().split('T')[0];
  var b='<div class="form-group">'+
    '<label style="font-size:13px;color:var(--muted);margin-bottom:8px;display:block">Hersteldatum</label>'+
    '<input class="input" type="date" id="vz-hersteld-datum" value="'+vandaag+'">'+
    '</div>';
  var f='<button class="btn btn-ghost" id="vz-hersteld-ann">Annuleren</button>'+
       '<button class="btn btn-primary" id="vz-hersteld-bev">✓ Hersteld melden</button>';
  openModal('Hersteld melden', b, f);
  document.getElementById('vz-hersteld-ann').addEventListener('click', closeModal);
  document.getElementById('vz-hersteld-bev').addEventListener('click', function(){
    var datum=document.getElementById('vz-hersteld-datum').value;
    if(!datum){ toast('Vul een hersteldatum in','error'); return; }
    closeModal();
    v.tot=datum; v.status='hersteld'; v.herstelledOp=datum;
    dbSaveItem('verzuim',v.id,v); renderVerzuim();
    toast('Hersteld op '+fmtD(datum),'success');
    if(typeof stuurNotificatie==='function' && magNotificatie('verzuim','hersteld')) {
      stuurNotificatie(v.medId,'verzuim','Verzuim afgemeld ✓',
        'Jouw ziekmelding is afgemeld. Hersteldatum: '+fmtD(datum)+'. Welkom terug!','verzuim');
    }
  });
}

function zetLangdurig(id){
  var v=APP.verzuim.find(function(x){return String(x.id)===String(id);}); if(!v) return;
  v.status='langdurig';
  dbSaveItem('verzuim',v.id,v); renderVerzuim();
  toast('Gemarkeerd als langdurig verzuim','success');
  if(typeof stuurNotificatie==='function') {
    stuurNotificatie(v.medId,'verzuim','Verzuim gemarkeerd als langdurig',
      'Jouw verzuim is geregistreerd als langdurig verzuim.','verzuim');
  }
}

  return t;
}

// ICS bestand genereren
function maakICS(afspraak) {
  var nu = new Date().toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  var deelnemers = (afspraak.deelnemerIds||[]).map(function(id){
    var m = getMed(id);
    return m && m.email ? 'ATTENDEE;CN='+m.voornaam+' '+m.achternaam+':mailto:'+m.email : null;
  }).filter(Boolean).join('\r\n');

  var startDT, eindDT;
  if (afspraak.heelDag || afspraak.type === 'vrije_dag') {
    startDT = 'DTSTART;VALUE=DATE:' + afspraak.van.replace(/-/g,'');
    var eindDag = afspraak.tot || afspraak.van;
    // ICS all-day: DTEND is dag erna
    var e = new Date(eindDag+'T00:00:00'); e.setDate(e.getDate()+1);
    eindDT = 'DTEND;VALUE=DATE:' + e.toISOString().split('T')[0].replace(/-/g,'');
  } else {
    startDT = 'DTSTART:' + afspraak.van.replace(/-/g,'') + 'T' + (afspraak.tijdVan||'08:00').replace(':','') + '00';
    eindDT  = 'DTEND:'   + (afspraak.tot||afspraak.van).replace(/-/g,'') + 'T' + (afspraak.tijdTot||'09:00').replace(':','') + '00';
  }

  var ics = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Flow8//Homa Pompen//NL',
    'CALSCALE:GREGORIAN',
    'METHOD:REQUEST',
    'BEGIN:VEVENT',
    'UID:'+afspraak.id+'@flow8.homapompen.nl',
    'DTSTAMP:'+nu,
    startDT,
    eindDT,
    'SUMMARY:'+(afspraak.titel||'Afspraak').replace(/[\r\n]/g,' '),
    'DESCRIPTION:'+(afspraak.omschrijving||'').replace(/[\r\n]/g,'\\n'),
    'LOCATION:'+(afspraak.locatie||''),
    'STATUS:CONFIRMED',
    'TRANSP:OPAQUE',
    deelnemers,
    'END:VEVENT',
    'END:VCALENDAR'
  ].filter(Boolean).join('\r\n');
  return ics;
}

function downloadICS(afspraak) {
  var ics  = maakICS(afspraak);
  var blob = new Blob([ics], {type:'text/calendar;charset=utf-8'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = (afspraak.titel||'afspraak').replace(/\s+/g,'_')+'.ics';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('ICS gedownload — open het bestand om toe te voegen aan Outlook','success');
}

// Hulpfuncties datum
function tijdNaarMin(tijd) {
  if(!tijd) return 0;
  var d = tijd.split(':');
  return parseInt(d[0])*60 + (parseInt(d[1])||0);
}

function agMaandag(datum) {
  var p=datum.split('-');
  var d=new Date(Date.UTC(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])));
  var dag=d.getUTCDay()||7;
  d.setUTCDate(d.getUTCDate()-(dag-1));
  return d.toISOString().split('T')[0];
}
function agDagStr(datum, n) {
  var p=datum.split('-');
  var d=new Date(Date.UTC(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])));
  d.setUTCDate(d.getUTCDate()+n);
  return d.toISOString().split('T')[0];
}
function agEersteDagMaand(datum) { return datum.slice(0,7)+'-01'; }
function agLaatsteDagMaand(datum) {
  var j=parseInt(datum.slice(0,4)), m=parseInt(datum.slice(5,7));
  return j+'-'+('0'+m).slice(-2)+'-'+('0'+new Date(Date.UTC(j,m,0)).getUTCDate()).slice(-2);
}
function agVerlofAlsAfspraken() {
  // Geef goedgekeurde verlofaanvragen terug als pseudo-agendapunten
  return (APP.verlof||[]).filter(function(v){
    return v.status === 'goedgekeurd';
  }).map(function(v){
    var m = getMed(v.medId);
    return {
      id:          'verlof_'+v.id,
      type:        'vrije_dag',
      titel:       (m ? m.voornaam+' '+m.achternaam : 'Medewerker') + (v.gedeeltelijk ? ' — Gedeeltelijk verlof' : ' — Verlof'),
      van:         v.van,
      tot:         v.tot || v.van,
      heelDag:     !v.gedeeltelijk,
      tijdVan:     v.gedeeltelijk ? (v.tijdVan || null) : null,
      tijdTot:     v.gedeeltelijk ? (v.tijdTot || null) : null,
      deelnemerIds:m ? [String(m.id)] : [],
      isVerlof:    true,
      verlofType:  v.type,
      verlofDagen: v.dagen,
    };
  });
}

function agStoringsdienstAlsAfspraken() {
  var sd = APP.storingsdienst || {};
  var vandaag = new Date().toISOString().split('T')[0];
  var items = [];
  var gezienDagen = {};

  function maandagNaarDagStr(ma, offsetDagen) {
    // UTC-safe: bouw datum string op zonder toISOString() timezone shift
    var d = new Date(Date.UTC(ma.getUTCFullYear(), ma.getUTCMonth(), ma.getUTCDate() + offsetDagen));
    return d.getUTCFullYear()+'-'+('0'+(d.getUTCMonth()+1)).slice(-2)+'-'+('0'+d.getUTCDate()).slice(-2);
  }

  function getMaandagVanWeekUTC(jaar, week) {
    // ISO week maandag berekening in UTC
    var jan4 = new Date(Date.UTC(jaar, 0, 4));
    var dow = jan4.getUTCDay() || 7;
    var dag1 = new Date(Date.UTC(jaar, 0, 4 - (dow - 1)));
    var ma = new Date(Date.UTC(dag1.getUTCFullYear(), dag1.getUTCMonth(), dag1.getUTCDate() + (week-1)*7));
    return ma;
  }

  // Dag-overrides eerst
  Object.keys(sd).forEach(function(k){
    if(k.match(/^\d{4}-W\d{2}-\d$/)) {
      var parts = k.split('-');
      var jaar = parseInt(parts[0]);
      var week = parseInt(parts[1].slice(1));
      var dagIdx = parseInt(parts[2]);
      var ma = getMaandagVanWeekUTC(jaar, week);
      var dagStr = maandagNaarDagStr(ma, dagIdx);
      if(dagStr < vandaag) return;
      var m = getMed(sd[k].medId);
      if(m) {
        gezienDagen[dagStr] = true;
        items.push({ id:'sd_'+k, type:'storingsdienst', titel:'Storingsdienst — '+m.voornaam+' '+m.achternaam, van:dagStr, tot:dagStr, heelDag:true, deelnemerIds:[String(m.id)], isStoringsdienst:true, medKleur:medKleur(m) });
      }
    }
  });

  // Week defaults (ma t/m zo)
  Object.keys(sd).forEach(function(k){
    if(k.match(/^\d{4}-W\d{2}$/)) {
      var parts = k.split('-');
      var jaar = parseInt(parts[0]);
      var week = parseInt(parts[1].slice(1));
      var ma = getMaandagVanWeekUTC(jaar, week);
      for(var i=0;i<7;i++){
        var dagStr2 = maandagNaarDagStr(ma, i);
        if(dagStr2 < vandaag) continue;
        if(gezienDagen[dagStr2]) continue;
        var m2 = getMed(sd[k].medId);
        if(m2) {
          items.push({ id:'sd_'+k+'_'+i, type:'storingsdienst', titel:'Storingsdienst — '+m2.voornaam+' '+m2.achternaam, van:dagStr2, tot:dagStr2, heelDag:true, deelnemerIds:[String(m2.id)], isStoringsdienst:true, medKleur:medKleur(m2) });
        }
      }
    }
  });
  return items;
}

function agBlokkadeAlsAfspraken() {
  var bd = APP.blokkadeDagen || {};
  var vandaag = new Date().toISOString().split('T')[0];
  return Object.keys(bd).filter(function(k){ return k !== '_v' && k >= vandaag; }).map(function(datum){
    var label = bd[datum].label || 'Geblokkeerd';
    return { id:'bd_'+datum, type:'blokkade', titel:label, van:datum, tot:datum, heelDag:true, deelnemerIds:[], isBlokkade:true, blokkadeKleur:'#ef4444' };
  });
}

function agAlleAfspraken() {
  return APP.agenda.concat(agVerlofAlsAfspraken()).concat(agStoringsdienstAlsAfspraken()).concat(agBlokkadeAlsAfspraken());
}

function agAfsprakenOp(datum) {
  return agAlleAfspraken().filter(function(a){
    var vanD = a.van || datum;
    var totD = a.tot || a.van || datum;
    if(a.heelDag && a.isVerlof) {
      // Verlof: inclusieve eindgrens (tot = laatste dag verlof)
      return vanD <= datum && totD >= datum;
    }
    if(a.heelDag) {
      // Normale hele-dag afspraak: inclusieve eindgrens
      return vanD <= datum && totD >= datum;
    }
    // Tijdgebonden afspraken: inclusief
    return vanD <= datum && totD >= datum;
  });
}
function agAfsprakenInPeriode(van, tot) {
  return agAlleAfspraken().filter(function(a){
    var aVan = a.van || van;
    var aTot = a.tot || a.van || van;
    if(a.heelDag && a.isVerlof) {
      // Inclusieve eindgrens voor verlof
      return aVan <= tot && aTot >= van;
    }
    return aVan <= tot && aTot >= van;
  });
}

function saveAgenda(id) {
  var isNew = !id;
  var bestaand = id ? (APP.agenda.find(function(x){return String(x.id)===String(id);})||{}) : {};

  var van = document.getElementById('ag-van').value;
  if(!van){toast('Datum is verplicht','error');return;}
  var tot = document.getElementById('ag-tot').value || van;
  var deelSel = document.getElementById('ag-deelnemers');
  var deelIds = Array.from(deelSel.selectedOptions).map(function(o){return o.value;});

  var data = Object.assign({}, bestaand, {
    id:           id || uid(),
    type:         document.getElementById('ag-type').value,
    titel:        document.getElementById('ag-titel').value.trim(),
    van:          van,
    tot:          tot,
    heelDag:      heelDag,
    tijdVan:      heelDag ? null : document.getElementById('ag-tijdvan').value,
    tijdTot:      heelDag ? null : document.getElementById('ag-tijdtot').value,
    locatie:      document.getElementById('ag-locatie').value.trim(),
    omschrijving: document.getElementById('ag-omschr').value.trim(),
    deelnemerIds: deelIds,
    aangemaaktOp: bestaand.aangemaaktOp || new Date().toISOString().split('T')[0],
    door:         bestaand.door || (APP.profiel?APP.profiel.naam:''),
  });

  if(isNew) APP.agenda.push(data);
  else { var idx=APP.agenda.findIndex(function(x){return String(x.id)===String(id);}); if(idx>-1) APP.agenda[idx]=data; }
  dbSaveItem('agenda', data.id, data);
  // Navigeer naar de datum van de afspraak zodat deze direct zichtbaar is
  _agDatum = van;
  closeModal(); renderAgenda();
  toast(isNew?'Afspraak aangemaakt':'Afspraak bijgewerkt','success');
}

// MODULE: STORINGSDIENST
// Data model:
//   APP.storingsdienst = {
//     'YYYY-WNN': { medId, naam }          ← week default
//     'YYYY-WNN-D': { medId, naam }        ← dag override (D=0..6, ma=0)
//   }
// ═══════════════════════════════════════════════════════════════
var _sdView  = 'kwartaal'; // 'jaar' | 'kwartaal'
var _sdJaar  = new Date().getFullYear();
var _sdKwart = Math.ceil((new Date().getMonth()+1)/3);

function getMaandagVanWeek(jaar, week) {
  var jan4 = new Date(jaar, 0, 4);
  var dag1 = new Date(jan4); dag1.setDate(jan4.getDate()-((jan4.getDay()||7)-1));
  var ma = new Date(dag1); ma.setDate(dag1.getDate()+(week-1)*7);
  return ma;
}

function getISOWeek(datum) {
  var d = new Date(datum); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-((d.getDay()||7)-1));
  var w1=new Date(d.getFullYear(),0,4);
  return 1+Math.round(((d-w1)/86400000-3+((w1.getDay()||7)-1))/7);
}

function getISOWeekJaar(datum) {
  var d=new Date(datum); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-((d.getDay()||7)-1));
  return d.getFullYear();
}

function getWekenInPeriode(jaar, kwart) {
  // kwart=0 → heel jaar, kwart=1..4 → kwartaal
  var weken=[];
  var startMnd = kwart ? (kwart-1)*3 : 0;
  var eindMnd  = kwart ? startMnd+2  : 11;
  var d=new Date(jaar,startMnd,1);
  while(d.getMonth()<=eindMnd && d.getFullYear()===jaar) {
    var week=getISOWeek(d); var wjaar=getISOWeekJaar(d);
    var key=wjaar+'-W'+('0'+week).slice(-2);
    if(!weken.find(function(w){return w.key===key;})){
      var ma=getMaandagVanWeek(wjaar,week);
      var zo=new Date(ma); zo.setDate(ma.getDate()+6);
      weken.push({key:key,week:week,jaar:wjaar,ma:ma,zo:zo});
    }
    d.setDate(d.getDate()+7);
  }
  return weken;
}

// Effectieve monteur voor een specifieke dag (override > week default)
function getSdMedVoorDag(datum) {
  var d     = new Date(datum+'T00:00:00');
  var week  = getISOWeek(datum);
  var wjaar = getISOWeekJaar(datum);
  var dagIdx= (d.getDay()||7)-1; // ma=0 t/m zo=6
  var sd    = APP.storingsdienst||{};
  var weekKey = wjaar+'-W'+('0'+week).slice(-2);
  var dagKey  = weekKey+'-'+dagIdx;
  return sd[dagKey] || sd[weekKey] || null;
}

  // ── Rooster ──
  var weken=getWekenInPeriode(_sdJaar, _sdView==='jaar'?0:_sdKwart);
  var dagNamen=['ma','di','wo','do','vr','za','zo'];

  if(_sdView==='jaar') {
    // Jaarweergave: compacte tabel, 1 rij per week, 7 dag-cellen
    h+='<div class="card" style="padding:0"><div class="table-wrap"><table style="width:100%"><thead><tr>';
    h+='<th style="width:60px">Week</th><th style="width:120px">Periode</th>';
