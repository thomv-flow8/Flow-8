<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0c16;--surface:#13162a;--surface2:#1a1d2e;--border:rgba(255,255,255,0.08);
  --accent:#4a6cf7;--accent2:#5ecfea;--green:#10b981;--orange:#f59e0b;
  --red:#ef4444;--purple:#8b5cf6;--text:#f0f2ff;--muted:rgba(240,242,255,0.45);--radius:12px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --bg-gradient: radial-gradient(ellipse at 20% 20%, rgba(74,108,247,0.07) 0%, transparent 60%),
                 radial-gradient(ellipse at 80% 80%, rgba(94,207,234,0.05) 0%, transparent 60%),
                 var(--bg);
}
body.light{--bg:#f0f2f7;--surface:#ffffff;--surface2:#e8ecf4;--border:rgba(0,0,0,0.09);--text:#0d0f1a;--muted:#6b7299;--bg-gradient:radial-gradient(ellipse at 20% 20%, rgba(74,108,247,0.04) 0%, transparent 60%), #f0f2f7}
body{font-family:DM Sans,sans-serif;background:var(--bg);color:var(--text);-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
body.app-active{display:flex;height:100vh;overflow:hidden;width:100%}
.hidden{display:none!important}
#app{display:flex;width:100%;height:100vh;overflow:hidden}
#app.hidden{display:none!important}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}
.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#5a7af7,#4a6cf7);color:#fff;box-shadow:0 2px 12px rgba(74,108,247,0.3)}.btn-primary:hover{background:linear-gradient(135deg,#6a8af7,#5a7cf7);transform:translateY(-1px);box-shadow:0 4px 18px rgba(74,108,247,0.45)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:hover{color:var(--text);background:var(--surface2)}
.btn-danger{background:var(--red);color:#fff}.btn-sm{padding:5px 10px;font-size:12px}.btn-icon{padding:7px}
.input{width:100%;box-sizing:border-box;max-width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.text-xs{font-size:11px}.text-xxs{font-size:10px}.text-muted{color:var(--muted)}.text-bold{font-weight:700}
.tag-blue{background:rgba(59,130,246,.15);color:var(--accent)}.tag-green{background:rgba(16,185,129,.15);color:var(--green)}
.tag-orange{background:rgba(245,158,11,.15);color:var(--orange)}.tag-red{background:rgba(239,68,68,.15);color:var(--red)}
.tag-purple{background:rgba(139,92,246,.15);color:var(--purple)}.tag-muted{background:rgba(107,118,148,.15);color:var(--muted)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:0 4px 24px rgba(0,0,0,0.18);transition:border-color 0.2s,box-shadow 0.2s}.card:hover{border-color:rgba(74,108,247,0.22);box-shadow:0 6px 32px rgba(0,0,0,0.28)}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-group label{font-size:12px;font-weight:600;color:var(--muted)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:350;backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:min(640px,95vw);max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:modalIn .25s cubic-bezier(.34,1.56,.64,1)}
@keyframes modalIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:20px 24px 0;display:flex;justify-content:space-between;align-items:flex-start;flex-shrink:0}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800}
.modal-body{padding:16px 24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.modal-close{background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:16px;transition:all .2s}
.modal-close:hover{background:var(--red);color:#fff;border-color:var(--red)}
/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.success{border-color:rgba(16,185,129,.4)}#toast.error{border-color:rgba(239,68,68,.4)}
/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface)}
thead{position:sticky;top:0;z-index:2}
thead th{background:var(--surface)}
.td-datum{white-space:nowrap;font-size:12px}
.td-acties{white-space:nowrap;display:flex;gap:4px;align-items:center}
.kolom-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:2px 6px;border-radius:4px;transition:color .15s}
.kolom-btn:hover{color:var(--text)}
th{text-align:left;padding:10px 14px;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;border-bottom:2px solid var(--border);background:var(--surface)}
td{padding:12px 14px;border-bottom:1px solid rgba(42,47,61,.4);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(59,130,246,.06);color:var(--text)}
/* Login */
#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px 16px;z-index:1000;overflow-y:auto;background:#0b0c14;overflow:hidden}
.login-logo-sub{font-size:12px;color:rgba(240,242,255,0.35);text-align:center;margin-top:8px;margin-bottom:32px;letter-spacing:0.12em;text-transform:uppercase;font-weight:400}
.login-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:1;animation:loginOrbFloat linear infinite;opacity:0;animation-fill-mode:forwards}
.login-orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(74,108,247,0.15) 0%,transparent 70%);top:-150px;left:-150px;animation-duration:20s;animation-delay:0s}
.login-orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(94,207,234,0.12) 0%,transparent 70%);bottom:-100px;right:-100px;animation-duration:25s;animation-delay:-8s}
.login-orb-3{width:350px;height:350px;background:radial-gradient(circle,rgba(160,100,255,0.1) 0%,transparent 70%);top:35%;left:55%;animation-duration:30s;animation-delay:-15s}
@keyframes loginOrbFloat{0%{opacity:0;transform:translate(0,0) scale(1)}10%{opacity:1}50%{transform:translate(30px,-40px) scale(1.08)}90%{opacity:1}100%{opacity:.8;transform:translate(-20px,20px) scale(.95)}}
@keyframes loginFadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes loginSpin{to{transform:rotate(360deg)}}
.login-wrap{position:relative;z-index:10;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center}
.login-logo-anim{animation:loginFadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s both}
.login-card-new{width:100%;background:rgba(20,23,42,0.85);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:32px 28px;backdrop-filter:blur(24px) saturate(180%);box-shadow:0 0 0 1px rgba(255,255,255,0.04),0 24px 80px rgba(0,0,0,0.5),0 0 60px rgba(74,108,247,0.08);animation:loginFadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.25s both}
.login-label{display:block;font-size:13px;font-weight:500;color:rgba(240,242,255,0.5);margin-bottom:8px}
.login-input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#f0f2ff;font-family:'DM Sans',inherit;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
.login-input::placeholder{color:rgba(240,242,255,0.28)}
.login-input:focus{border-color:rgba(74,108,247,0.5);box-shadow:0 0 0 3px rgba(74,108,247,0.15)}
.login-btn-new{width:100%;padding:14px;background:linear-gradient(135deg,#5a7af7,#4a6cf7);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;margin-bottom:16px;transition:opacity .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 20px rgba(74,108,247,0.35);position:relative;overflow:hidden;font-family:inherit}
.login-btn-new::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(255,255,255,0.08),transparent);pointer-events:none}
.login-btn-new:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 28px rgba(74,108,247,0.45)}
.login-btn-new:active{transform:translateY(0)}
.login-divider{display:flex;align-items:center;gap:12px;margin-bottom:14px;font-size:12px;color:rgba(240,242,255,0.28)}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08)}
.login-google-new{width:100%;padding:13px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:rgba(240,242,255,0.5);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s,color .2s,border-color .2s;font-family:inherit;-webkit-appearance:none}
.login-google-new:hover{background:rgba(255,255,255,0.08);color:#f0f2ff;border-color:rgba(255,255,255,0.15)}
.login-pw-wrap{position:relative}
.login-pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(240,242,255,0.28);cursor:pointer;padding:2px;display:flex;align-items:center;transition:color .15s}
.login-pw-toggle:hover{color:rgba(240,242,255,0.55)}
.login-err-new{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);border-radius:8px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:14px;display:none}
.login-err-new.show{display:block;animation:loginFadeUp .3s ease}
.login-spinner{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;animation:loginSpin .7s linear infinite;display:none}
.login-btn-new.loading .login-btn-text{display:none}
.login-btn-new.loading .login-spinner{display:block}
.login-btn-inner{display:flex;align-items:center;justify-content:center;gap:8px}
@media(max-width:768px){.login-orb-1{width:350px;height:350px}.login-orb-2{width:300px;height:300px}.login-orb-3{display:none}.login-card-new{padding:24px 20px}}
/* Sidebar */
#sidebar{width:220px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;transition:width .25s ease}
#sidebar.collapsed{width:60px;overflow:hidden}
#sidebar.collapsed .sidebar-logo-text,#sidebar.collapsed .sidebar-logo-sub,#sidebar.collapsed .nav-sectie,#sidebar.collapsed .sb-user-info,#sidebar.collapsed #pwa-install-btn,#sidebar.collapsed #sb-versie{display:none!important}
#sidebar.collapsed .sidebar-logo{padding:14px 0;justify-content:center}
#sidebar.collapsed #sb-logo-tekst{display:none}
#sidebar.collapsed .sidebar-footer{padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:6px}
#sidebar.collapsed .sb-user-info{display:none!important}
#sidebar.collapsed #uitloggen-btn{display:flex!important}
#sidebar.collapsed .nav-item{justify-content:center;padding:10px 0;margin:1px 4px}
#sidebar.collapsed .nav-item::before{display:none}
#sidebar.collapsed #sb-collapse-btn svg{transform:rotate(180deg)}
#sidebar.collapsed .uitloggen-collapsed{display:flex!important}
/* Nav label animatie bij collapse */
.nav-label{display:inline-block;overflow:hidden;max-width:160px;opacity:1;transition:opacity .2s ease,max-width .25s ease;white-space:nowrap;vertical-align:middle}
#sidebar.collapsed .nav-label{opacity:0;max-width:0;pointer-events:none}
#main{transition:margin-left .25s ease}
.sidebar-logo{padding:20px 16px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
.sidebar-logo-sub{font-size:11px;color:var(--muted);margin-top:2px}
.nav-section{padding:12px 16px 4px;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:var(--muted);cursor:pointer;font-size:13px;font-weight:500;border-radius:8px;margin:1px 8px;transition:all .15s;position:relative}
.nav-item:hover{color:var(--text);background:var(--surface2)}
.nav-item.active{color:var(--text);background:rgba(74,108,247,.18);font-weight:600;box-shadow:inset 0 0 0 1px rgba(74,108,247,0.12)}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:linear-gradient(to bottom,#5ecfea,#4a6cf7);border-radius:0 3px 3px 0;box-shadow:0 0 8px rgba(94,207,234,0.4)}
.nav-item svg{opacity:.6;flex-shrink:0}.nav-item.active svg{opacity:1;color:var(--accent)}
.grecaptcha-badge { visibility: hidden !important; opacity: 0 !important; }
.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);margin-top:auto;padding-bottom:max(12px,env(safe-area-inset-bottom))}
/* Main */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0}
.topbar-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;flex:1}
.content{flex:1;overflow-y:auto;padding:24px;background:var(--bg-gradient);color:var(--text);min-height:0}
.page{display:none}.page.active{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* Filter chips */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.chip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;transition:all .15s}
.chip:hover{color:var(--text);border-color:var(--muted)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Search */
.search-wrap{position:relative}
.search-input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px 9px 34px;font-size:13px;font-family:inherit;outline:none;width:100%;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
/* Panel */
.panel{position:fixed;top:0;right:0;width:460px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:24px;box-shadow:-10px 0 40px rgba(0,0,0,.3)}
.panel.open{transform:translateX(0)}
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:99}
.panel-overlay.open{display:block}
.panel-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.panel-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;align-items:stretch}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;min-height:110px;display:flex;flex-direction:column;justify-content:flex-start}
.stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.stat-value{font-family:'DM Sans','Syne',sans-serif;font-size:26px;font-weight:700;margin-bottom:2px;font-variant-numeric:tabular-nums;line-height:1;letter-spacing:-0.5px}
.stat-label{font-size:12px;color:var(--muted)}
/* Progress */
.progress{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .4s}
/* Pagination */
.pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.pg-controls{display:flex;gap:4px}
.pg-btn{min-width:30px;height:28px;padding:0 8px;border-radius:6px;font-size:12px;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:inherit;transition:all .15s}
.pg-btn:hover:not(:disabled){color:var(--text);background:var(--surface2)}
.pg-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}
/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--border);margin-bottom:20px}
.tab{padding:9px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
/* Debug log */
#log-panel{position:fixed;bottom:0;right:0;width:480px;height:300px;background:var(--surface);border:1px solid var(--border);border-radius:12px 0 0 0;z-index:9998;display:flex;flex-direction:column;box-shadow:-4px -4px 20px rgba(0,0,0,.3)}
#log-body{flex:1;overflow-y:auto;padding:8px 12px;font-family:monospace;font-size:11px}
.log-entry{padding:3px 0;border-bottom:1px solid var(--border)}
.log-entry .lt{color:var(--muted)}.log-entry .ll-OK{color:var(--green)}.log-entry .ll-INFO{color:var(--accent)}.log-entry .ll-WARN{color:var(--orange)}.log-entry .ll-ERROR{color:var(--red)}
@media(max-width:768px){
  /* ── BODY & APP ── */
  body.app-active{flex-direction:column;overflow:hidden}
  #app{display:flex;flex-direction:column;width:100%;height:100vh;overflow:hidden}

  /* ── SIDEBAR: volledig off-canvas ── */
  #sidebar{
    position:fixed;left:-100%;width:80%;max-width:280px;
    z-index:50;transition:left .25s ease;height:100%;
    top:0;box-shadow:4px 0 24px rgba(0,0,0,.4)
  }
  #sidebar.open{left:0}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:49}
  .sidebar-overlay.open{display:block}

  /* ── MAIN: vult het scherm ── */
  #main{flex:1;display:flex;flex-direction:column;width:100%;overflow:hidden;min-width:0}

  /* ── TOPBAR ── */
  .topbar{
    padding:0 12px calc(8px);
    padding-top:calc(8px + var(--safe-top));
    height:auto;gap:8px;flex-shrink:0
  }
  .topbar-title{font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #topbar-actions #log-btn{display:none}

  /* ── CONTENT: scrollbaar, niet breder dan scherm ── */
  .content{
    flex:1;overflow-y:auto;overflow-x:hidden;
    padding:12px;
    padding-bottom:calc(84px + max(var(--safe-bottom), 16px));
    width:100%;box-sizing:border-box;max-width:100vw;
    -webkit-overflow-scrolling:touch
  }

  /* ── GRIDS ── */
  .stats-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px}
  .form-grid{grid-template-columns:1fr!important}
  .form-grid.cols-3{grid-template-columns:1fr!important}

  /* ── CARDS ── */
  .card{padding:12px;max-width:100%;box-sizing:border-box;overflow:hidden}

  /* ── TABELLEN: horizontaal scrollen ── */
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:calc(100vw - 24px)}
  table{min-width:300px}
  .table-wrap{overflow-x:auto!important;-webkit-overflow-scrolling:touch;max-width:100%}

  /* ── MODALS: bottom sheet ── */
  .modal-overlay{align-items:flex-end;padding:0}
  .modal{
    width:100%!important;max-width:100%!important;
    border-radius:16px 16px 0 0!important;
    max-height:90vh!important;
    animation:slideUp .3s cubic-bezier(.4,0,.2,1);
    display:flex!important;flex-direction:column!important;
    overflow:hidden!important
  }
  /* Verberg bottom-nav als modal open is */
  .modal-overlay.open ~ * #bottom-nav,
  body:has(.modal-overlay.open) #bottom-nav{display:none!important}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .modal-header{padding:16px 16px 0!important;flex-shrink:0!important}
  .modal-body{
    flex:1!important;overflow-y:auto!important;overflow-x:hidden!important;
    -webkit-overflow-scrolling:touch;
    padding:12px 16px!important;
    box-sizing:border-box!important;
    min-height:0!important
  }
  .modal-footer{
    flex-shrink:0!important;
    padding:12px 16px!important;
    padding-bottom:calc(12px + env(safe-area-inset-bottom))!important;
    background:var(--surface)!important;
    border-top:1px solid var(--border)!important;
    z-index:10!important
  }

  /* ── PANEL: full width ── */
  .panel{width:100%!important;max-width:100%!important}

  /* ── FILTER CHIPS: horizontaal scrollen ── */
  .filter-row{
    overflow-x:auto;flex-wrap:nowrap!important;
    -webkit-overflow-scrolling:touch;padding-bottom:4px;
    max-width:100%;scrollbar-width:none
  }
  .filter-row::-webkit-scrollbar{display:none}
  .chip{flex-shrink:0;white-space:nowrap}

  /* ── TOUCH TARGETS ── */
  .btn{min-height:40px}
  .btn-sm{min-height:40px;padding:6px 12px}
  .nav-item{min-height:44px}

  /* ── INPUT: voorkomt zoom op iOS ── */
  .input,input,select,textarea{font-size:16px!important}

  /* ── LOGIN ── */
  #login-screen .card{padding:20px}
  .login-logo-text{font-size:26px}

  /* ── LOG PANEL ── */
  #log-panel{width:100%!important;left:0!important;right:0!important}

  /* ── PAGINATION ── */
  .pagination{flex-wrap:wrap;gap:6px;font-size:11px;padding:8px 12px}
}

/* ── Extra klein (iPhone SE etc) ── */
@media(max-width:390px){
  .stats-grid{gap:6px}
  .card{padding:10px}
  .topbar-title{font-size:14px}
  table{min-width:400px}
}

/* ── Notificaties ── */
#notif-badge{display:none}
#notif-badge.heeft-notifs{display:flex!important}
.notif-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.notif-item:hover{background:var(--surface2)}
.notif-item.gelezen{opacity:.5}
.notif-icon{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-tekst{flex:1;min-width:0}
.notif-titel{font-size:13px;font-weight:600;margin-bottom:2px}
.notif-sub{font-size:11px;color:var(--muted)}
.notif-tijd{font-size:10px;color:var(--muted);white-space:nowrap;margin-left:4px;flex-shrink:0}
.notif-del{background:none;border:none;cursor:pointer;color:var(--muted);padding:2px 4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.notif-item:hover .notif-del{opacity:1}

/* ── Dashboard mobiel ── */
@media(max-width:768px){
  .dash-top-row{grid-template-columns:1fr 1fr !important}
  .dash-storingsdienst{grid-column:1/-1 !important;min-width:unset !important}
  .dash-main-grid{grid-template-columns:1fr !important}
  /* Formulieren */
  .form-grid{grid-template-columns:1fr !important;width:100%!important;overflow:hidden!important}
  .form-group{width:100%!important;min-width:0!important;overflow:hidden!important}
  .form-group .input,.form-group input,.form-group select,.form-group textarea{
    width:100%!important;max-width:100%!important;box-sizing:border-box!important;min-width:0!important
  }
  input[type="date"],input[type="time"],input[type="number"]{
    width:100%!important;max-width:100%!important;box-sizing:border-box!important;min-width:0!important;
    -webkit-appearance:none;appearance:none
  }
  /* Instellingen tabs 2 rijen */
  .inst-tabs{flex-wrap:wrap !important;overflow-x:visible !important}
  /* Tabellen scrollbaar */
  .rollen-tabel-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;max-width:calc(100vw - 24px)}
  /* Instellingen planning 1 kolom */
  .inst-plan-grid{grid-template-columns:1fr !important}
  /* Contracttypes/opdrachttypes tabel compact */
  .ct-tabel td,.ct-tabel th{padding:6px 8px !important;font-size:12px !important}
  /* Agenda week grid scrollbaar */
  .ag-week-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%}
  /* Modal footer altijd onderaan */
  .modal{display:flex;flex-direction:column}
  .modal-body{flex:1;overflow-y:auto}
}

/* Bottom navigation bar voor mobiel */
#bottom-nav{
  display:none;position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);border-top:1px solid var(--border);
  z-index:300;padding:6px 0 calc(6px + var(--safe-bottom));
  justify-content:space-around;align-items:center;
}
.bn-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 0;cursor:pointer;border:none;background:none;
  color:var(--muted);font-size:9px;font-weight:600;font-family:inherit;
  transition:color .15s;min-width:56px;
}
.bn-item.active{color:var(--accent)}
.bn-item svg{width:20px;height:20px}

/* Hamburger */
#hamburger{display:none;background:none;border:none;cursor:pointer;padding:6px;color:var(--text);flex-shrink:0}
@media(max-width:768px){
  #hamburger{display:flex}
  #bottom-nav{display:flex}
}
</style>

// file: File object (van input[type=file])
// returns: Promise<downloadURL>
async function storageUpload(pad, file, onProgress) {
  var volledigPad = 'flow8/'+APP.bedrijfId+'/'+pad;
  var ref = STORAGE.ref(volledigPad);
  var uploadTask = ref.put(file);
  return new Promise(function(resolve, reject){
    uploadTask.on('state_changed',
      function(snap){
        if(onProgress) onProgress(Math.round(snap.bytesTransferred/snap.totalBytes*100));
      },
      function(err){ reject(err); },
      async function(){
        var url = await uploadTask.snapshot.ref.getDownloadURL();
        resolve(url);
      }
    );
  });
}

  var path = dbPath(key, String(id));
  log('INFO', 'DB', 'Opslaan: ' + path);
  if (!navigator.onLine) { _pendingWrites++; _updateOfflineBanner(); }
  return FB.ref(path).set(data)
    .then(function() {

      if (_pendingWrites > 0) { _pendingWrites--; _updateOfflineBanner(); }

    .catch(function(e) { log('ERROR', 'DB', 'Fout bij opslaan: ' + path, { code: e.code, msg: e.message }); toast('Opslaan mislukt', 'error'); });
}
function dbRemove(key, id) {

  return FB.ref(path).remove()
    .then(function() { log('OK', 'DB', 'Verwijderd: ' + path); })
    .catch(function(e) { log('ERROR', 'DB', 'Fout bij verwijderen: ' + path, { msg: e.message }); });

        resolve(arr);
      })
      .catch(function(e) { log('ERROR', 'DB', 'Fout bij laden: ' + key, { msg: e.message }); APP[appKey] = []; resolve([]); });
  });
}
function dbListen(key, appKey, cb) {
  var ref = FB.ref(dbPath(key));
  ref.on('value', function(snap) {
    var val = snap.val();
    APP[appKey] = (!val) ? [] : (typeof val === 'object' && !Array.isArray(val) ? objToArr(val) : val);
    if (cb) cb(APP[appKey]);
  });
  APP.listeners[key] = ref;
}
function dbUnlistenAll() {
  Object.keys(APP.listeners).forEach(function(k) { try { APP.listeners[k].off(); } catch(e) {} });
  APP.listeners = {};
}
function objToArr(obj) {
  if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return obj || [];
  return Object.keys(obj).map(function(k) {
    var item = obj[k];
    if (item && typeof item === 'object' && item.id == null) item = Object.assign({}, item, { id: k });
    return item;
  }).filter(Boolean);
}

AUTH.onAuthStateChanged(function(user) {

});

async function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pass  = document.getElementById('login-pass').value;
  var errEl = document.getElementById('login-err');
  var btn   = document.getElementById('login-btn');
  errEl.textContent = ''; errEl.classList.remove('show');
  if (!email || !pass) {
    errEl.textContent = 'Vul e-mail en wachtwoord in.';
    errEl.classList.add('show'); return;
  }
  btn.classList.add('loading'); btn.disabled = true;
  log('INFO', 'LOGIN', 'Poging voor ' + email);
  try {
    await AUTH.signInWithEmailAndPassword(email, pass);
    log('OK', 'LOGIN', 'Auth geslaagd');
  } catch(e) {
    log('ERROR', 'LOGIN', 'Auth mislukt: ' + e.code, { msg: e.message });
    var msgs = { 'auth/user-not-found': 'E-mail niet gevonden.', 'auth/wrong-password': 'Onjuist wachtwoord.', 'auth/too-many-requests': 'Te veel pogingen. Wacht even.', 'auth/invalid-email': 'Ongeldig e-mailadres.', 'auth/internal-error': 'Verbindingsfout. Probeer het opnieuw.' };
    errEl.textContent = msgs[e.code] || 'Inloggen mislukt: ' + e.message;
    errEl.classList.add('show');
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

async function laadProfiel(uid) {
  log('INFO', 'PROFIEL', 'Laden voor uid: ' + uid);
  try {
    var snap = await FB.ref('flow8/gebruikers/' + uid).once('value');
    if (snap.exists()) {
      APP.profiel   = snap.val();
      APP.bedrijfId = APP.profiel.bedrijfId || 'demo';
      log('OK', 'PROFIEL', 'Gevonden', { naam: APP.profiel.naam, rol: APP.profiel.rol, bedrijfId: APP.bedrijfId });
    } else {
      log('WARN', 'PROFIEL', 'Nieuw - eerste login');
      var email = APP.user.email;
      var naam  = email.split('@')[0].replace(/[._-]/g,' ').split(' ').map(function(w){ return w.charAt(0).toUpperCase()+w.slice(1); }).join(' ');
      APP.profiel   = { uid: uid, naam: naam, email: email, rol: 'monteur', bedrijfId: 'demo', actief: false };
      APP.bedrijfId = 'demo';
      await FB.ref('flow8/gebruikers/' + uid).set(APP.profiel);
      log('WARN', 'PROFIEL', 'Nieuw profiel aangemaakt voor ' + email + ' — wacht op activatie door admin');
      document.getElementById('login-err').textContent = 'Je account wacht op activatie door een beheerder.';
      document.getElementById('login-err').classList.add('show');
      await AUTH.signOut();
      return;
    }
    await laadData();
    toonApp();
  } catch(e) {
    log('ERROR', 'PROFIEL', 'Mislukt: ' + e.message, { code: e.code });
    toast('Fout bij inloggen: ' + e.message, 'error');
    await AUTH.signOut();
  }
}

async function laadData() {
  log('INFO', 'DATA', 'Laden voor bedrijf: ' + APP.bedrijfId);
  // Instellingen laden
  var instSnap = await FB.ref(dbPath('instellingen')).once('value');
  if (instSnap.exists()) {
    var instData = instSnap.val();
    if (instData.bedrijf)       APP.bedrijfGegevens  = instData.bedrijf;
    if (instData.planningRollen) APP.planningRollen = instData.planningRollen;
    if (instData.planningMarge != null) APP.planningMarge = instData.planningMarge;
    if (instData.teamInstellingen) APP.teamInstellingen = Object.assign({}, APP.teamInstellingen, instData.teamInstellingen);
    if (instData.blokkadeDagen) {
      var bd = instData.blokkadeDagen;
      // Zorg dat het altijd een object is (niet array)
      APP.blokkadeDagen = (bd && typeof bd === 'object' && !Array.isArray(bd)) ? bd : {};
    }
    if (instData.goedkeuring)   APP.goedkeuringInst  = instData.goedkeuring;
    if (instData.notificaties)  APP.notifInstellingen = instData.notificaties;
  }

  // Opdrachttypes (uitbreidbaar)
  var otSnap = await FB.ref(dbPath('opdrachttypes')).once('value');
  if (otSnap.exists()) {
    APP.opdrachttypes = otSnap.val();
    if (!Array.isArray(APP.opdrachttypes)) APP.opdrachttypes = Object.values(APP.opdrachttypes);
  } else {
    APP.opdrachttypes = STANDAARD_OPDRACHTTYPES;
    await FB.ref(dbPath('opdrachttypes')).set(STANDAARD_OPDRACHTTYPES);
  }

  // Contracttypes
  var ctSnap = await FB.ref(dbPath('contracten')).once('value');
  if (ctSnap.exists()) {
    APP.contracten = ctSnap.val();
    if (!Array.isArray(APP.contracten)) APP.contracten = Object.values(APP.contracten);
    log('OK','DATA','Contracten geladen: '+APP.contracten.length);
  } else {
    APP.contracten = STANDAARD_CONTRACTEN;
    await FB.ref(dbPath('contracten')).set(APP.contracten);
    log('OK','DATA','Standaard contracten aangemaakt');
  }

  // Rollen
  var rolSnap = await FB.ref(dbPath('rollen')).once('value');
  if (rolSnap.exists()) {
    APP.rollen = rolSnap.val();
    // Normaliseer: zorg dat elke rol een rechten-object heeft met lezen/schrijven per module
    var standaard = maakStandaardRollen();
    var mods = ['dashboard','planning','medewerkers','serviceklanten','debiteuren','verlof','overuren','onkosten','verzuim','storingsdienst','locatie','klantmails','rapportage','instellingen'];
    Object.keys(APP.rollen).forEach(function(rolId) {
      var rol = APP.rollen[rolId];
      if (!rol.rechten || typeof rol.rechten !== 'object') {
        // Geen rechten: gebruik standaard als die bestaat, anders alles dicht
        rol.rechten = standaard[rolId] ? standaard[rolId].rechten : {};
      }
      // Zorg dat alle modules aanwezig zijn
      mods.forEach(function(mod) {
        if (!rol.rechten[mod]) rol.rechten[mod] = { lezen: false, schrijven: false };
      });
    });
    log('OK', 'DATA', 'Rollen geladen: ' + Object.keys(APP.rollen).length);
  } else {
    APP.rollen = maakStandaardRollen();
    await FB.ref(dbPath('rollen')).set(APP.rollen);
    log('OK', 'DATA', 'Standaard rollen aangemaakt');
  }
  // Alle data parallel laden
  await Promise.all([
    dbLoad('medewerkers',    'medewerkers'),
    dbLoad('serviceklanten', 'serviceklanten'),
    dbLoad('debiteuren',     'debiteuren'),
    dbLoad('opdrachten',     'opdrachten'),
    dbLoad('verlof',         'verlof'),
    dbLoad('verlofMutaties',  'verlofMutaties'),
    dbLoad('overuren',       'overuren'),
    dbLoad('onkosten',       'onkosten'),
    dbLoad('verzuim',        'verzuim'),
    dbLoad('agenda',         'agenda'),
    // MailTemplates laden (object, geen array)
    FB.ref(dbPath('mailTemplates')).once('value').then(function(snap){
      if(snap.exists() && snap.val() && typeof snap.val()==='object') {
        // Merge met defaults zodat nieuwe templates altijd beschikbaar zijn
        APP.mailTemplates = Object.assign({}, MAIL_TEMPLATES_DEFAULT, snap.val());
        log('OK', 'DATA', 'MailTemplates geladen uit Firebase');
      } else {
        APP.mailTemplates = null; // Valt terug op MAIL_TEMPLATES_DEFAULT
        log('INFO', 'DATA', 'Geen aangepaste mailTemplates in Firebase, gebruik standaard');
      }
    }),
    // Storingsdienst is een object (geen array), laad apart
    FB.ref(dbPath('storingsdienst')).once('value').then(function(snap){
      if(snap.exists() && snap.val() && typeof snap.val()==='object') {
        // Converteer underscore keys terug naar dash (Firebase slaat op met _)
        var raw = snap.val();
        var converted = {};
        Object.keys(raw).forEach(function(k){
          var dashKey = k.replace(/_/g,'-').replace(/W-/,'W'); // 2026_W14 → 2026-W14, 2026_W14_0 → 2026-W14-0
          converted[dashKey] = raw[k];
        });
        APP.storingsdienst = converted;
      } else {
        APP.storingsdienst = {};
      }
    }),
  ]);
  APP.dataLoaded = true;
  log('OK', 'DATA', 'Alles geladen', {
    medewerkers: APP.medewerkers.length, serviceklanten: APP.serviceklanten.length,
    debiteuren: APP.debiteuren.length, opdrachten: APP.opdrachten.length,
  });
  ensureMedewerkerProfiel();
  // Check jaarlijkse verlof bijschrijving (alleen admins)
  if (isAdmin()) checkJaarlijksVerlof();
  // Realtime listeners
  dbListen('medewerkers',    'medewerkers',    function() { if (APP.activePage==='medewerkers') renderMedewerkers(); });
  dbListen('opdrachten',     'opdrachten',     function() { if (APP.activePage==='planning')    renderPlanning(); });
  dbListen('agenda',         'agenda',         function() { if (APP.activePage==='agenda')      renderAgenda(); });
  // Storingsdienst realtime listener
  FB.ref(dbPath('storingsdienst')).on('value', function(snap) {
    if(snap.exists() && snap.val() && typeof snap.val()==='object') {
      var raw = snap.val(); var converted = {};
      Object.keys(raw).forEach(function(k){
        var dk = k.replace(/_/g,'-').replace(/W-(\d)/,'W$1');
        converted[dk] = raw[k];
      });
      APP.storingsdienst = converted;
    } else {
      APP.storingsdienst = {};
    }
    if (APP.activePage==='storingsdienst') renderStoringsdienst();
  });
}

function maakStandaardRollen() {
  var mods = ['dashboard','planning','medewerkers','serviceklanten','debiteuren','verlof','overuren','onkosten','verzuim','storingsdienst','locatie','klantmails','rapportage','instellingen'];
  function r(lees, schrijf) {
    var obj = {};
    mods.forEach(function(m) { obj[m] = { lezen: lees.indexOf(m)>=0||lees[0]==='*', schrijven: schrijf.indexOf(m)>=0||schrijf[0]==='*' }; });
    return obj;
  }
  return {
    admin:         { naam:'Beheerder',    kleur:'#3b82f6', rechten: r(['*'],['*']) },
    planner:       { naam:'Planner',      kleur:'#8b5cf6', rechten: r(['dashboard','planning','medewerkers','serviceklanten','debiteuren','locatie','klantmails','rapportage','storingsdienst','verlof'],['planning','serviceklanten','debiteuren','klantmails','storingsdienst']) },
    monteur:       { naam:'Monteur',      kleur:'#f59e0b', rechten: r(['dashboard','planning','locatie','verlof','overuren','onkosten','verzuim','storingsdienst'],['verlof','overuren','onkosten','verzuim']) },
    verkoop:       { naam:'Verkoop',      kleur:'#10b981', rechten: r(['dashboard','serviceklanten','debiteuren','klantmails','rapportage','verlof','overuren','onkosten'],['serviceklanten','debiteuren','klantmails','verlof','overuren','onkosten']) },
    administratie: { naam:'Administratie',kleur:'#06b6d4', rechten: r(['dashboard','debiteuren','rapportage','verlof','overuren','onkosten','verzuim'],['debiteuren','verlof','overuren','onkosten','verzuim']) },
    magazijn:      { naam:'Magazijn',     kleur:'#6b7694', rechten: r(['dashboard','verlof','overuren','onkosten'],['verlof','overuren','onkosten']) },
  };
}
function getRol()          { return APP.rollen[APP.profiel && APP.profiel.rol] || null; }
function magLezen(mod)     { var r=getRol(); return !!(r && r.rechten && r.rechten[mod] && r.rechten[mod].lezen); }
function magGoedkeuren(mod) {
  if (!APP.profiel) return false;
  if (isAdmin()) return true;
  var mijnId = String(getMijnMedId() || '');
  var inst   = APP.goedkeuringInst || {};
  // Nieuwe structuur: { medId: { verlof:'goedkeurderMedId', ... } }
  // Ik mag goedkeuren als ik als goedkeurder ben ingesteld voor iemand anders
  var kanGoedkeuren = false;
  Object.keys(inst).forEach(function(medId){
    if(medId === mijnId) return; // niet jezelf
    var medInst = inst[medId] || {};
    if(String(medInst[mod]) === mijnId) kanGoedkeuren = true;
  });
  return kanGoedkeuren;
}

// Goedkeurder voor specifieke medewerker+module
function getGoedkeurderVoor(medId, mod) {
  var inst = APP.goedkeuringInst || {};
  var medInst = inst[String(medId)] || {};
  if(medInst[mod]) {
    var gk = getMed(medInst[mod]);
    return gk;
  }
  return null; // standaard admin
}

function magSchrijven(mod) { var r=getRol(); return !!(r && r.rechten && r.rechten[mod] && r.rechten[mod].schrijven); }
function magEigen(mod)    { var r=getRol(); return !!(r && r.rechten && r.rechten[mod] && r.rechten[mod].eigen); }
// Filter data op basis van rechten: E=eigen, anders alles
function filterEigen(lijst, medIdField) {
  if(isAdmin() || magSchrijven(arguments[2]||'')) return lijst;
  if(magEigen(arguments[2]||'')) {
    var mijnId = String(getMijnMedId()||'');
    return lijst.filter(function(x){ return String(x[medIdField||'medId'])===mijnId; });
  }
  if(magLezen(arguments[2]||'')) return lijst;
  return [];
}
function isAdmin()         { return APP.profiel && APP.profiel.rol === 'admin'; }

function bouwNav() {
  var nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';
  var sectie = '';
  NAV.forEach(function(m) {
    if (!magLezen(m.id) && !isAdmin()) return;
    if (m.sectie !== sectie) {
      var s = document.createElement('div');
      s.className = 'nav-section nav-sectie';
      s.textContent = m.sectie;
      nav.appendChild(s);
      sectie = m.sectie;
    }
    var el = document.createElement('div');
    el.className = 'nav-item';
    el.id = 'nav-' + m.id;
    el.dataset.page = m.id;
    el.title = m.label; // tooltip voor collapsed mode
    el.innerHTML = '<span class="nav-ico">' + (SVGS[m.icon]||'') + '</span><span class="nav-label">' + esc(m.label) + '</span>';
    nav.appendChild(el);
  });
  nav.addEventListener('click', function(e) {
    var item = e.target.closest('.nav-item');
    if (item && item.dataset.page) toonPagina(item.dataset.page);
  });
}

// Bottom nav configuratie: altijd dashboard + de eerste 3 toegestane modules + meer
var BOTTOM_NAV_VOORKEUR = ['dashboard','planning','debiteuren','agenda'];

function bouwBottomNav() {
  var nav = document.getElementById('bottom-nav');
  nav.innerHTML = '';

  // Bepaal welke items zichtbaar zijn
  var toegestaan = BOTTOM_NAV_VOORKEUR.filter(function(id) {
    return id === 'dashboard' || isAdmin() || magLezen(id);
  }).slice(0, 4); // max 4 items + meer knop

  toegestaan.forEach(function(id) {
    var m = NAV.find(function(x){ return x.id === id; });
    if(!m) return;
    var btn = document.createElement('button');
    btn.className = 'bn-item';
    btn.dataset.page = id;
    btn.innerHTML = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">'+(SVGS[m.icon]||'').replace(/<svg[^>]*>/,'').replace('</svg>','')+'</svg>'+esc(m.label);
    nav.appendChild(btn);
  });

  // Meer knop altijd toevoegen
  var meer = document.createElement('button');
  meer.className = 'bn-item';
  meer.id = 'bn-meer';
  meer.innerHTML = '<svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>Meer';
  nav.appendChild(meer);

  // Events
  nav.querySelectorAll('.bn-item[data-page]').forEach(function(btn){
    btn.addEventListener('click', function(){ toonPagina(btn.dataset.page); });
  });
  document.getElementById('bn-meer').addEventListener('click', toggleMeerMenu);
}

function bouwMeerMenu() {
  var grid = document.getElementById('meer-menu-grid');
  if(!grid) return;
  grid.innerHTML = '';

  // Gewenste volgorde meer menu
  var MEER_VOLGORDE = [
    'verlof','overuren','onkosten',
    'verzuim','storingsdienst','serviceklanten',
    'klantmails','medewerkers','locatie',
    'rapportage','instellingen'
  ];

  var bottomIds = BOTTOM_NAV_VOORKEUR.filter(function(id){
    return id === 'dashboard' || isAdmin() || magLezen(id);
  }).slice(0, 4);

  // Sorteer NAV items op gewenste volgorde, overige achteraan
  var navMap = {};
  NAV.forEach(function(m){ navMap[m.id] = m; });

  var geordend = [];
  MEER_VOLGORDE.forEach(function(id){
    if(navMap[id]) geordend.push(navMap[id]);
  });
  // Eventuele overige items die niet in de lijst staan, achteraan toevoegen
  NAV.forEach(function(m){
    if(MEER_VOLGORDE.indexOf(m.id) < 0 && m.id !== 'dashboard') geordend.push(m);
  });

  geordend.forEach(function(m) {
    if (m.id === 'dashboard') return;
    if (bottomIds.indexOf(m.id) >= 0) return;
    if (!isAdmin() && !magLezen(m.id)) return;

    var btn = document.createElement('button');
    btn.className = 'meer-item';
    btn.dataset.page = m.id;
    btn.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;background:var(--surface2);border:none;border-radius:12px;cursor:pointer;color:var(--text);width:100%';
    var svgInner = (SVGS[m.icon]||'<circle cx="12" cy="12" r="3"/>').replace(/<svg[^>]*>/,'').replace('</svg>','');
    btn.innerHTML = '<span style="color:var(--accent)"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">'+svgInner+'</svg></span>'
      + '<span style="font-size:11px;font-weight:600">'+m.label+'</span>';
    btn.addEventListener('click', function(){ sluitMeerMenu(); toonPagina(m.id); });
    grid.appendChild(btn);
  });
}

function navigateTo(id) { toonPagina(id); }
function toonPagina(id) {
  // Rechtencheck — dashboard altijd toegestaan
  if (id !== 'dashboard' && !isAdmin() && !magLezen(id)) {
    APP.activePage = id;
    document.getElementById('content').innerHTML =
      '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center">' +
      '<svg width="48" height="48" fill="none" stroke="var(--muted)" stroke-width="1.5" viewBox="0 0 24 24" style="margin-bottom:16px"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>' +
      '<div style="font-family:Syne,sans-serif;font-size:20px;font-weight:800;margin-bottom:8px">Geen toegang</div>' +
      '<div style="font-size:14px;color:var(--muted)">Je hebt geen rechten voor deze module.<br>Neem contact op met de beheerder.</div>' +
      '</div>';
    document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.toggle('active', el.dataset.page === id); });
    document.querySelectorAll('#bottom-nav .bn-item').forEach(function(el) { el.classList.toggle('active', el.dataset.page === id); });
    document.getElementById('sidebar').classList.remove('open');
    var ov = document.getElementById('sidebar-overlay'); if(ov) ov.classList.remove('open');
    var mod = NAV.find(function(m) { return m.id === id; });
    document.getElementById('topbar-title').textContent = mod ? mod.label : id;
    return;
  }
  APP.activePage = id;
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.toggle('active', el.dataset.page === id); });
  document.querySelectorAll('#bottom-nav .bn-item').forEach(function(el) { el.classList.toggle('active', el.dataset.page === id); });
  // Sluit sidebar op mobiel na navigatie
  document.getElementById('sidebar').classList.remove('open');
  var ov = document.getElementById('sidebar-overlay'); if(ov) ov.classList.remove('open');
  var mod = NAV.find(function(m) { return m.id === id; });
  document.getElementById('topbar-title').textContent = mod ? mod.label : id;
  var R = { dashboard:renderDashboard, agenda:renderAgenda, medewerkers:renderMedewerkers, serviceklanten:renderServiceklanten, debiteuren:renderDebiteuren, verlof:renderVerlof, overuren:renderOveruren, onkosten:renderOnkosten, verzuim:renderVerzuim, storingsdienst:renderStoringsdienst, locatie:renderLocatie, klantmails:renderKlantmails, rapportage:renderRapportage, instellingen:renderInstellingen, planning:renderPlanning };
  if (R[id]) R[id]();
}

}

function bouwAdminSwitcher() {
  // Alleen zichtbaar voor admins
  if(!isAdmin()) return;
  var btn   = document.getElementById('admin-switcher-btn');
  var panel = document.getElementById('admin-switcher-panel');
  var label = document.getElementById('admin-switcher-label');
  var lijst = document.getElementById('admin-switcher-lijst');
  if(!btn) return;

  // Toon knop en zet huidig label
  btn.style.display = 'flex';
  label.textContent = APP.bedrijfId || 'demo';

  // Open/sluit panel
  btn.addEventListener('click', async function(e){
    e.stopPropagation();
    var open = panel.style.display !== 'none';
    if(open){ panel.style.display='none'; return; }

    // Laad beschikbare administraties
    lijst.innerHTML = '<div style="padding:12px 14px;font-size:12px;color:var(--muted)">Laden...</div>';
    panel.style.display = 'block';

    try {
      var snap = await FB.ref('flow8/bedrijven').once('value');
      var bedrijven = snap.val() || {};
      var ids = Object.keys(bedrijven).sort();

      if(!ids.length){ lijst.innerHTML='<div style="padding:12px 14px;font-size:12px;color:var(--muted)">Geen administraties gevonden</div>'; return; }

      lijst.innerHTML = ids.map(function(id){
        var bg = (bedrijven[id].instellingen && bedrijven[id].instellingen.bedrijf) || {};
        var naam = bg.naam || id;
        var actief = id === APP.bedrijfId;
        return '<div class="admin-sw-item" data-id="'+esc(id)+'" style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:'+(actief?'default':'pointer')+';background:'+(actief?'var(--accent)22':'transparent')+';transition:background .15s">'
          + '<svg width="13" height="13" fill="none" stroke="'+(actief?'var(--accent)':'currentColor')+'" stroke-width="2.5" viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>'
          + '<div style="flex:1;min-width:0">'
          + '<div style="font-size:13px;font-weight:'+(actief?'700':'500')+';color:'+(actief?'var(--accent)':'var(--text)')+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(naam)+'</div>'
          + '<div style="font-size:10px;color:var(--muted);font-family:monospace">'+esc(id)+'</div>'
          + '</div>'
          + (actief ? '<svg width="13" height="13" fill="none" stroke="var(--accent)" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>' : '')
          + '</div>';
      }).join('');

      // Klik op administratie
      lijst.querySelectorAll('.admin-sw-item').forEach(function(item){
        item.addEventListener('click', async function(){
          var nieuwId = item.dataset.id;
          if(nieuwId === APP.bedrijfId) return;
          panel.style.display = 'none';
          bevestigActie(
            'Wisselen naar "'+nieuwId+'"',
            'Je wisselt naar de administratie "'+nieuwId+'". De pagina wordt herladen met de nieuwe data.',
            async function(){
              // Update bedrijfId in Firebase profiel
              APP.bedrijfId = nieuwId;
              APP.profiel.bedrijfId = nieuwId;
              await FB.ref('flow8/gebruikers/'+APP.profiel.uid+'/bedrijfId').set(nieuwId);
              toast('Wisselen naar '+nieuwId+'...','success');
              // Herlaad data
              setTimeout(async function(){
                dbUnlistenAll();
                APP.dataLoaded = false;
                await laadData();
                label.textContent = nieuwId;
                navigateTo('dashboard');
                toast('✓ Administratie gewisseld naar '+nieuwId,'success');
              }, 300);
            }
          );
        });
      });
    } catch(e) {
      lijst.innerHTML = '<div style="padding:12px 14px;font-size:12px;color:var(--red)">Fout: '+esc(e.message)+'</div>';
    }
  });

  // Sluit panel bij klik buiten
  document.addEventListener('click', function(e){
    if(!panel.contains(e.target) && e.target !== btn){
      panel.style.display = 'none';
    }
  });

  // Beheer knop
  var beheerBtn = document.getElementById('admin-switcher-beheer');
  if(beheerBtn) beheerBtn.addEventListener('click', function(){
    panel.style.display = 'none';
    _instTab = 'administraties';
    navigateTo('instellingen');
  });
}

function toonApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
  document.body.classList.add('app-active');
  var naam = APP.profiel.naam || APP.profiel.email;
  document.getElementById('sb-naam').textContent = naam;
  var rol = APP.rollen[APP.profiel.rol];
  document.getElementById('sb-rol').textContent = rol ? rol.naam : APP.profiel.rol;
  document.getElementById('sb-av').textContent = naam.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
  bouwNav();
  bouwBottomNav();
  bouwMeerMenu();
  updateLogos();
  bouwAdminSwitcher();
  // Notificatie systeem starten
  if(typeof laadNotificaties === 'function') laadNotificaties();
  if(typeof checkVerjaardag === 'function') checkVerjaardag();
  if(typeof checkStoringsdienst === 'function') checkStoringsdienst();
  // Start notificatie systeem
  if(typeof laadNotificaties==='function') laadNotificaties();
  if(typeof checkVerjaardag==='function') checkVerjaardag();
  if(typeof checkStoringsdienst==='function') checkStoringsdienst();
  // Log-knop alleen voor admins
  var logBtn = document.getElementById('log-btn');
  var toggleLogBtn = document.getElementById('toggle-log-btn');
  var isAdminUser = isAdmin();
  if(logBtn) logBtn.style.display = isAdminUser ? '' : 'none';
  if(toggleLogBtn) toggleLogBtn.style.display = isAdminUser ? '' : 'none';
  // Versienummer bijwerken in sidebar
  var sbV = document.getElementById('sb-versie');
  if(sbV) sbV.textContent = 'v' + APP_VERSION + ' · ' + APP_BUILD;
  toonPagina('dashboard');
}

function checkJaarlijksVerlof() {
  if (!APP.dataLoaded || !APP.bedrijfId) return;
  var nu      = new Date();
  var jaar    = nu.getFullYear();
  var jaarKey = 'verlofJaar_' + jaar;
  FB.ref(dbPath('meta', jaarKey)).once('value').then(function(snap) {
    if (snap.exists()) {
      log('INFO', 'VERLOF', 'Jaarlijkse bijschrijving ' + jaar + ' al gedaan of in behandeling');
      return;
    }
    // Maak een pending bijschrijfverzoek aan in Firebase
    var verzoekKey = 'verlofBijschrijving_' + jaar;
    FB.ref(dbPath('meta', verzoekKey)).once('value').then(function(snap2) {
      if (snap2.exists()) return; // Al aangemaakt
      // Bouw voorstel op per medewerker
      var basis0 = (APP.teamInstellingen && APP.teamInstellingen.verlofBasis) || 25;
      var voorstellen = {};
      APP.medewerkers.forEach(function(m) {
        if (m.status === 'inactief') return;
        var basis    = !isNaN(parseFloat(m.verlofBasis)) ? parseFloat(m.verlofBasis) : basis0;
        if (basis === 0) return;
        var uren     = parseInt(m.contractUren) || 40;
        var voorstel = Math.round((basis * uren / 40) * 10) / 10;
        voorstellen[m.id] = { medId: m.id, naam: m.voornaam + ' ' + m.achternaam, voorstel: voorstel, goedgekeurd: null };
      });
      FB.ref(dbPath('meta', verzoekKey)).set({
        jaar:        jaar,
        aangemaakt:  nu.toISOString(),
        status:      'wacht_op_goedkeuring',
        voorstellen: voorstellen,
      });
      log('OK', 'VERLOF', 'Verlof bijschrijfverzoek aangemaakt voor ' + jaar);
    });
  });
}

function openVerlofBijschrijfModal(jaar) {
  jaar = jaar || new Date().getFullYear();
  var verzoekKey = 'verlofBijschrijving_' + jaar;
  FB.ref(dbPath('meta', verzoekKey)).once('value').then(function(snap) {
    var verzoek = snap.exists() ? snap.val() : null;
    if (!verzoek) {
      // Geen verzoek — maak live voorstel
      var basis0 = (APP.teamInstellingen && APP.teamInstellingen.verlofBasis) || 25;
      var voorstellen = {};
      APP.medewerkers.forEach(function(m) {
        if (m.status === 'inactief') return;
        var basis    = !isNaN(parseFloat(m.verlofBasis)) ? parseFloat(m.verlofBasis) : basis0;
        if (basis === 0) return;
        var uren     = parseInt(m.contractUren) || 40;
        var voorstel = Math.round((basis * uren / 40) * 10) / 10;
        voorstellen[m.id] = { medId: m.id, naam: m.voornaam + ' ' + m.achternaam, voorstel: voorstel, goedgekeurd: null };
      });
      verzoek = { jaar: jaar, status: 'wacht_op_goedkeuring', voorstellen: voorstellen };
    }

    var voorstellen = verzoek.voorstellen || {};
    var b = '<div style="margin-bottom:16px;padding:12px;background:rgba(59,130,246,.08);border-radius:8px;font-size:13px;color:var(--muted)">'
      + 'Controleer en pas het aantal vakantiedagen per medewerker aan. Klik op Goedkeuren om de dagen bij te schrijven.'
      + '</div>';
    b += '<div style="display:flex;flex-direction:column;gap:8px;max-height:420px;overflow-y:auto">';
    Object.values(voorstellen).forEach(function(v) {
      var med = getMed(v.medId);
      var kl  = med ? medKleur(med) : '#6b7694';

function valideerVeld(elId, conditie, bericht) {
  var el = document.getElementById(elId);

      errEl.style.cssText = 'font-size:11px;color:var(--red);margin-top:3px;font-weight:600';
      errEl.textContent = bericht;
      el.parentNode.insertBefore(errEl, el.nextSibling);
      el.dataset.errMsg = '1';
    }

    el.style.boxShadow = '';
    delete el.dataset.errMsg;
    var bestaand = el.parentNode.querySelector('.veld-fout[data-voor="'+elId+'"]');

    return true;

var _undoT  = null;

function toast(msg, type, undoCallback) {
  var el = document.getElementById('toast');
  if (_toastT) clearTimeout(_toastT);
  if (_undoT)  clearTimeout(_undoT);
  _undoFn = null;

  if (undoCallback) {
    _undoFn = undoCallback;
    el.innerHTML = '<span>'+msg+'</span><button id="toast-undo-btn" style="margin-left:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:5px;color:inherit;padding:2px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">↩ Ongedaan</button>';
    el.className = 'show ' + (type||'');
    var undoBtn = document.getElementById('toast-undo-btn');
    if(undoBtn) undoBtn.addEventListener('click', function(){
      if(_undoFn) { _undoFn(); _undoFn = null; }
      clearTimeout(_undoT);
      el.className = ''; el.innerHTML = '';
    });
    _undoT = setTimeout(function(){ el.className = ''; el.innerHTML = ''; _undoFn = null; }, 6000);
  } else {
    el.textContent = msg;
    el.className = 'show ' + (type||'');
    _toastT = setTimeout(function() { el.className = ''; }, 5000);
  }
}

// ── GENERIEK SORTEERSYSTEEM ──────────────────────────────────────
// Elke module heeft: _xxxSortKey, _xxxSortDir
// sorteerLijst(lijst, key, dir) returnt gesorteerde kopie

function sorteerLijst(lijst, key, dir) {
  if (!key) return lijst;
  return lijst.slice().sort(function(a, b) {
    var va = a['__sort_'+key] != null ? a['__sort_'+key] : (a[key] != null ? a[key] : '');
    var vb = b['__sort_'+key] != null ? b['__sort_'+key] : (b[key] != null ? b[key] : '');
    if (va == null || va === '' || va === '—') return 1;
    if (vb == null || vb === '' || vb === '—') return -1;
    if (/^\d{2}-\d{2}-\d{4}$/.test(va)) { va = va.split('-').reverse().join('-'); vb = vb.split('-').reverse().join('-'); }
    var na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return (na - nb) * dir;
    return String(va).toLowerCase() < String(vb).toLowerCase() ? -dir : dir;
  });
}

// Voeg berekende sorteervelden toe aan een lijst (prefix __sort_)
function enrichSortVelden(lijst, veldFns) {
  return lijst.map(function(item) {
    var enriched = Object.assign({}, item);
    Object.keys(veldFns).forEach(function(k) {
      enriched['__sort_'+k] = veldFns[k](item);
    });
    return enriched;
  });
}

// ── VERLOF MUTATIE HELPERS ────────────────────────────────────────
function slaVerlofMutatie(medId, type, dagen, omschrijving, saldoNa) {
  // type: 'bijschrijving' | 'opname' | 'correctie'
  var m    = getMed(medId);
  var uren = m ? Math.round(dagen * (parseInt(m.contractUren)||40) / 5 * 10) / 10 : dagen * 8;
  var mut  = {
    id:          'vm_' + Date.now() + '_' + Math.random().toString(36).slice(2,5),
    medId:       String(medId),
    datum:       new Date().toISOString().split('T')[0],
    type:        type,
    dagen:       dagen,
    uren:        uren,
    omschrijving:omschrijving,
    door:        APP.profiel ? APP.profiel.naam : 'systeem',
    saldoNa:     Math.round(saldoNa * 10) / 10,
  };
  APP.verlofMutaties.push(mut);
  dbSaveItem('verlofMutaties', mut.id, mut);
  log('OK', 'VERLOF', 'Mutatie opgeslagen: ' + type + ' ' + dagen + 'd voor ' + (m ? m.voornaam : medId));
}

function getMutaties(medId) {
  return APP.verlofMutaties
    .filter(function(v) { return String(v.medId) === String(medId); })
    .sort(function(a, b) { return b.datum > a.datum ? 1 : -1; });
}

  var h = '';

    h += '<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">Nog geen mutatiehistorie beschikbaar</div>';

  h += '<div style="display:flex;flex-direction:column;gap:6px">';
  mutaties.forEach(function(v) {
    var positief = v.type === 'bijschrijving' || (v.type === 'correctie' && v.dagen > 0);
    var kleur    = v.type === 'bijschrijving' ? 'var(--green)' : v.type === 'correctie' ? (v.dagen>0?'var(--green)':'var(--red)') : 'var(--red)';
    var icoon    = v.type === 'bijschrijving' ? '📥' : v.type === 'correctie' ? '✏️' : '📤';

    h += '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border-radius:8px;border-left:3px solid ' + kleur + '">';
    h += '<div style="font-size:18px;flex-shrink:0">' + icoon + '</div>';
    h += '<div style="flex:1;min-width:0">';
    h += '<div style="font-size:13px;font-weight:600">' + esc(v.omschrijving) + '</div>';

// Correctie toevoegen (admin)
function openCorrectieModal(medId) {
  var m = getMed(medId);
  if (!m) return;
  var urenPerDag = (APP.teamInstellingen && APP.teamInstellingen.werkUrenPerDag) || 8;
  var b = '<div class="form-grid">';
  b += fgf('Medewerker','<div style="padding:10px 12px;background:var(--surface2);border-radius:8px;font-weight:600">'+esc(m.voornaam+' '+m.achternaam)+' · huidig saldo: <strong style="color:var(--green)">'+parseFloat(m.verlofSaldo||0).toFixed(1)+' dagen</strong></div>');
  b += fgf('Eenheid','<div style="display:flex;gap:10px"><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="radio" name="cor-eenheid" value="dagen" checked> Dagen</label><label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="radio" name="cor-eenheid" value="uren"> Uren</label></div>');
  b += fg('Aantal (+ of -)', '<input class="input" type="number" id="cor-waarde" step="0.1" placeholder="Bijv. 2 of -1.5"><div id="cor-preview" style="font-size:11px;color:var(--muted);margin-top:4px"></div>');
  b += fgf('Omschrijving *', finp('cor-omschr','text','','Bijv. correctie ziekteverlof 2024'));
  b += '</div>';
  var f = '<button class="btn btn-ghost" id="cor-cancel">Annuleren</button>';
  f += '<button class="btn btn-primary" id="cor-save">Opslaan</button>';
  openModal('Verlof correctie — '+m.voornaam, b, f);

  document.getElementById('cor-cancel').addEventListener('click', closeModal);

  // Preview berekening
  function updatePreview() {
    var waarde = parseFloat(document.getElementById('cor-waarde').value) || 0;
    var eenheid = document.querySelector('input[name="cor-eenheid"]:checked').value;
    var prev = document.getElementById('cor-preview');
    if(!waarde){ prev.textContent=''; return; }
    if(eenheid === 'uren') {
      var dagen = Math.round(waarde / urenPerDag * 10) / 10;
      prev.textContent = waarde+'u ÷ '+urenPerDag+'u/dag = '+dagen+' dag'+(Math.abs(dagen)!==1?'en':'');
    } else {
      var uren = Math.round(waarde * urenPerDag * 10) / 10;
      prev.textContent = waarde+' dag'+(Math.abs(waarde)!==1?'en':'')+' × '+urenPerDag+'u/dag = '+uren+'u';
    }
  }
  document.getElementById('cor-waarde').addEventListener('input', updatePreview);
  document.querySelectorAll('input[name="cor-eenheid"]').forEach(function(r){ r.addEventListener('change', updatePreview); });

  document.getElementById('cor-save').addEventListener('click', function() {
    var waarde = parseFloat(document.getElementById('cor-waarde').value);
    var eenheid = document.querySelector('input[name="cor-eenheid"]:checked').value;
    var omschr = document.getElementById('cor-omschr').value.trim();
    if (isNaN(waarde) || waarde === 0) { toast('Voer een geldig getal in', 'error'); return; }
    if (!omschr) { toast('Omschrijving is verplicht', 'error'); return; }
    var dagen = eenheid === 'uren' ? Math.round(waarde / urenPerDag * 10) / 10 : Math.round(waarde * 10) / 10;
    var nieuwSaldo = Math.round(((parseFloat(m.verlofSaldo)||0) + dagen) * 10) / 10;
    m.verlofSaldo = nieuwSaldo;
    dbSaveItem('medewerkers', m.id, m);
    slaVerlofMutatie(m.id, 'correctie', dagen, omschr+(eenheid==='uren'?' ('+waarde+'u)':''), nieuwSaldo);
    closeModal();
    if (document.getElementById('panel').classList.contains('open')) openMedPanel(medId);
    toast('Correctie opgeslagen · nieuw saldo: '+nieuwSaldo.toFixed(1)+' dagen', 'success');
  });
}

  var vd = new Date(k.volgendeDatum);

  return vd < new Date();

// Bereken gemiddelde werkuren per dag op basis van werkrooster
function getUrenPerDag(med) {
  if(!med) return 8;
  var wr = med.werkrooster;
  if(!wr || !wr.week1) return Math.round((parseInt(med.contractUren)||40) / 5 * 10) / 10;
  var DGNSL = ['ma','di','wo','do','vr','za','zo'];
  var totaal1 = DGNSL.reduce(function(s,d){ return s + (parseFloat(wr.week1[d])||0); }, 0);
  if(wr.patroon === 'tweeweken' && wr.week2) {
    var totaal2 = DGNSL.reduce(function(s,d){ return s + (parseFloat(wr.week2[d])||0); }, 0);
    var werkdagen = DGNSL.filter(function(d){ return (wr.week1[d]||0)>0 || (wr.week2[d]||0)>0; }).length;
    return werkdagen > 0 ? Math.round((totaal1+totaal2)/werkdagen*10)/10 : 8;
  }
  var werkdagen = DGNSL.filter(function(d){ return (wr.week1[d]||0)>0; }).length;
  return werkdagen > 0 ? Math.round(totaal1/werkdagen*10)/10 : 8;
}

function berekenVolgend(laatste, contractId) {
  if (!laatste) return '';
  var ct = getContract(contractId);
  if (!ct || !ct.intervalMaanden) return '';
  // Frequentie 0 = niet inplannen (bijv. B-contract/servicewacht)

  d.setMonth(d.getMonth() + ct.intervalMaanden);
  return d.toISOString().split('T')[0];
}

// Stat card
var _countUpDone = false;
function easeOutExpo(t){ return t===1?1:1-Math.pow(2,-10*t); }
function countUp(el, target, duration){
  if(!el) return;
  var isFloat = String(target).indexOf('.')!==-1;
  var numTarget = parseFloat(target)||0;
  var prefix = '', suffix = '';
  var txt = el.textContent||'';
  var m = txt.match(/^([€\s]*)[\d.,]+([^0-9]*)$/);
  if(m){ prefix=m[1]; suffix=m[2]; }
  var start = performance.now();
  function step(now){
    var elapsed = now - start;
    var progress = Math.min(elapsed/(duration*1000),1);
    var eased = easeOutExpo(progress);
    var cur = eased * numTarget;
    var val = isFloat ? cur.toFixed(1) : String(Math.round(cur));
    el.textContent = prefix+val+suffix;
    if(progress<1) requestAnimationFrame(step);
    else el.textContent = prefix+(isFloat?numTarget.toFixed(1):String(numTarget))+suffix;
  }
  requestAnimationFrame(step);
}
function triggerCountUp(container){
  var scope = container || document;
  setTimeout(function(){
    scope.querySelectorAll('[data-countup]').forEach(function(el){
      countUp(el, el.dataset.countup, 0.5);
    });
  }, 80);
}

}

// Pagination helper
function pgHtml(totaal, page, pageSize, setPageFn) {
  if (totaal === 0) return '<div class="pagination"><div style="color:var(--muted)">Geen resultaten gevonden</div></div>';
  var pages = Math.ceil(totaal/pageSize) || 1;
  var from  = Math.max(1, page-2), to = Math.min(pages, page+2);
  var h = '<div class="pagination"><div>'+((page-1)*pageSize+1)+'–'+Math.min(page*pageSize,totaal)+' van '+totaal+'</div><div class="pg-controls">';
  if (page > 1) h += '<button class="pg-btn" data-pg="'+(page-1)+'">‹</button>';
  for (var p=from; p<=to; p++) h += '<button class="pg-btn'+(p===page?' active':'')+'" data-pg="'+p+'">'+p+'</button>';
  if (page < pages) h += '<button class="pg-btn" data-pg="'+(page+1)+'">›</button>';
  h += '</div></div>';
  return h;
}

// ═══════════════════════════════════════════════
// MODULE: MEDEWERKERS
