// MODULE: VERZUIM
// Data: APP.verzuim = [{
//   id, medId, van, tot, type:'ziek'|'geoorloofd'|'ongeoorloofd'|'gedeeltelijk',
//   omschrijving, status:'actief'|'hersteld'|'langdurig',
//   aangemaaktOp, door, herstelledOp, notitie
// }]
// ═══════════════════════════════════════════════════════════════
var _vzFilter='alle', _vzZoek='', _vzSortKey='van', _vzSortDir=-1, _vzPage=1, _vzPS=25;

function renderVerzuim() {
  var el=document.getElementById('content');
  var mijnId=getMijnMedId();
  var kanBeheren=isAdmin()||magGoedkeuren('verzuim')||magSchrijven('verzuim');
  var vandaag=new Date().toISOString().split('T')[0];

  var lijst=APP.verzuim.filter(function(v){
    if(!kanBeheren&&String(v.medId)!==String(mijnId)) return false;
    if(_vzFilter!=='alle'&&v.status!==_vzFilter) return false;
    if(_vzZoek){
      var q=_vzZoek.toLowerCase();
      var m=getMed(v.medId);
      var naam=m?(m.voornaam+' '+m.achternaam).toLowerCase():'';
      return naam.includes(q)||(v.omschrijving||'').toLowerCase().includes(q)||(v.type||'').toLowerCase().includes(q);
    }
    return true;
  });
  lijst=sorteerLijst(lijst,_vzSortKey,_vzSortDir);

  // Stats
  var actief=lijst.filter(function(v){return v.status==='actief';}).length;
  var langdurig=lijst.filter(function(v){return v.status==='langdurig';}).length;
  var hersteld=lijst.filter(function(v){return v.status==='hersteld';}).length;
  var totDagen=lijst.filter(function(v){return v.status==='actief'||v.status==='langdurig';}).reduce(function(s,v){
    if(!v.van) return s;
    var tot=v.tot&&v.tot<=vandaag?v.tot:vandaag;
    return s+Math.max(0,Math.ceil((new Date(tot)-new Date(v.van))/86400000)+1);
  },0);

  var h='';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap">';
  h+='<input class="input" id="vz-zoek" placeholder="🔍 Zoek medewerker..." value="'+esc(_vzZoek)+'" style="max-width:260px">';
  h+='<div style="flex:1"></div>';
  if(kanBeheren) h+='<button class="btn btn-primary btn-sm" id="vz-add-btn">+ Verzuim registreren</button>';
  h+='</div>';

  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px">';
  function statBox(l,v,kl,sub){return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px"><div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">'+l+'</div><div style="font-family:Syne,sans-serif;font-size:20px;font-weight:800;color:'+kl+'">'+v+'</div>'+(sub?'<div style="font-size:11px;color:var(--muted)">'+sub+'</div>':'')+'</div>';}
  h+=statBox('Actief',actief,'var(--red)','ziekmelding(en)');
  h+=statBox('Langdurig',langdurig,'var(--orange)','> 6 weken');
  h+=statBox('Hersteld',hersteld,'var(--green)','dit jaar');
  h+=statBox('Verzuimdagen',totDagen,'var(--text)','actief');
  h+='</div>';

  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap"><div class="filter-row" style="margin:0">';
  [['alle','Alle'],['actief','Actief'],['langdurig','Langdurig'],['hersteld','Hersteld']].forEach(function(f){
    h+='<button class="chip'+(_vzFilter===f[0]?' active':'')+'" data-vz-filter="'+f[0]+'">'+f[1]+'</button>';
  });
  h+='</div></div>';

  var slice=lijst.slice((_vzPage-1)*_vzPS,_vzPage*_vzPS);
  h+='<div class="card" style="padding:0"><div class="table-wrap"><table style="width:100%"><thead><tr>';
  [['van','Van'],['medNaam','Medewerker'],['type','Type'],['tot','Tot/Hersteld'],['duur','Duur'],['status','Status']].forEach(function(c){
    var ico=_vzSortKey===c[0]?(_vzSortDir===1?' ↑':' ↓'):'<span style="opacity:.4;font-size:9px"> ⇅</span>';
    h+='<th class="vz-sort-th" data-sort="'+c[0]+'" style="cursor:pointer;white-space:nowrap">'+c[1]+ico+'</th>';
  });
  if(kanBeheren) h+='<th style="width:120px">Actie</th>';
  h+='</tr></thead><tbody>';

  if(!slice.length){
    h+='<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--muted)">Geen verzuim gevonden</td></tr>';
  } else {
    slice.forEach(function(v){
      var m=getMed(v.medId);
      var kl=m?((APP.rollen[m.rol]||{}).kleur||m.kleur||'#6b7694'):'#6b7694';
      var tot=v.tot&&v.tot<=vandaag?v.tot:vandaag;
      var duren=v.van?Math.max(0,Math.ceil((new Date(tot)-new Date(v.van))/86400000)+1):0;
      var stKleur={actief:'var(--red)',langdurig:'var(--orange)',hersteld:'var(--green)'}[v.status]||'var(--muted)';
      var stTag='<span class="tag" style="background:'+stKleur+'22;color:'+stKleur+'">'+esc(v.status)+'</span>';
      var _vtmap={ziek:'🤒 Ziek',geoorloofd:'✓ Geoorloofd',ongeoorloofd:'⚠️ Ongeoorloofd',gedeeltelijk:'◑ Gedeeltelijk'};
      var typeTag=(_vtmap[v.type]||esc(v.type||'—'))+(v.type==='gedeeltelijk'&&v.urenZiek?' <span style="font-size:11px;color:var(--muted)">('+v.urenZiek+'u ziek'+(v.urenWerk?'/'+v.urenWerk+'u werk':'')+')</span>':'');
      h+='<tr class="vz-rij" data-id="'+v.id+'" style="cursor:pointer">';
      h+='<td style="white-space:nowrap;padding:10px 14px;font-size:13px">'+fmtD(v.van)+'</td>';
      h+='<td style="padding:10px 14px">'+(m?'<div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:26px;height:26px;font-size:9px;background:'+kl+';color:#fff">'+initials(m)+'</div><span style="font-size:13px;font-weight:600">'+esc(m.voornaam+' '+m.achternaam)+'</span></div>':'<span style="color:var(--muted)">—</span>')+'</td>';
      h+='<td style="padding:10px 14px;font-size:13px">'+typeTag+'</td>';
      h+='<td style="white-space:nowrap;padding:10px 14px;font-size:13px">'+(v.tot?fmtD(v.tot):'<span style="color:var(--red)">Nog ziek</span>')+'</td>';
      h+='<td style="padding:10px 14px;font-weight:700;color:'+(duren>42?'var(--orange)':'var(--text)')+'">'+duren+' dag'+(duren===1?'':'en')+'</td>';
      h+='<td style="padding:10px 14px">'+stTag+'</td>';
      if(kanBeheren){
        h+='<td style="padding:6px 10px;white-space:nowrap" onclick="event.stopPropagation()">';
        if(v.status==='actief'||v.status==='langdurig'){
          h+='<button class="btn btn-ghost btn-sm vz-herstel-btn" data-id="'+v.id+'" style="color:var(--green);font-size:11px">✓ Hersteld</button>';
          if(v.status==='actief'&&duren>42) h+='<button class="btn btn-ghost btn-sm vz-lang-btn" data-id="'+v.id+'" style="color:var(--orange);font-size:11px">⚠ Langdurig</button>';
        }
        h+='</td>';
      }
      h+='</tr>';
    });
  }
  h+='</tbody></table></div>'+pgHtml(lijst.length,_vzPage,_vzPS,'_vzPage')+'</div>';
  el.innerHTML=h;

  el.querySelector('#vz-zoek').addEventListener('input',function(e){
    _vzZoek=e.target.value; _vzPage=1;
    var pos=e.target.selectionStart; renderVerzuim();
    var ni=document.getElementById('vz-zoek'); if(ni){ni.focus();ni.setSelectionRange(pos,pos);}
  });
  var addBtn=el.querySelector('#vz-add-btn'); if(addBtn) addBtn.addEventListener('click',function(){openVerzuimModal(null);});
  el.querySelectorAll('.chip[data-vz-filter]').forEach(function(b){b.addEventListener('click',function(){_vzFilter=b.dataset.vzFilter;_vzPage=1;renderVerzuim();});});
  el.querySelectorAll('.vz-sort-th').forEach(function(th){th.addEventListener('click',function(){if(_vzSortKey===th.dataset.sort)_vzSortDir*=-1;else{_vzSortKey=th.dataset.sort;_vzSortDir=1;}renderVerzuim();});});
  el.querySelectorAll('.pg-btn[data-pg]').forEach(function(b){b.addEventListener('click',function(){_vzPage=parseInt(b.dataset.pg);renderVerzuim();});});
  el.querySelectorAll('.vz-rij').forEach(function(r){r.addEventListener('click',function(){openVerzuimPanel(r.dataset.id);});});
  el.querySelectorAll('.vz-herstel-btn').forEach(function(b){b.addEventListener('click',function(){
    var v=APP.verzuim.find(function(x){return String(x.id)===String(b.dataset.id);}); if(!v) return;
    var m=getMed(v.medId); var naam=m?m.voornaam+' '+m.achternaam:'onbekend';
    bevestigActie('✓ Hersteld melden','Markeer '+esc(naam)+' als hersteld? Je kunt daarna de hersteldatum opgeven.',function(){herstelVerzuim(b.dataset.id);});
  });});
  el.querySelectorAll('.vz-lang-btn').forEach(function(b){b.addEventListener('click',function(){zetLangdurig(b.dataset.id);});});
}

function openVerzuimModal(id,prefill){
  var isNew=!id;
  var v=id?(APP.verzuim.find(function(x){return String(x.id)===String(id);})||{}):(prefill||{});
  var mijnId=getMijnMedId();
  var kanBeheren=isAdmin()||magGoedkeuren('verzuim')||magSchrijven('verzuim');
  var medOpts='';
  APP.medewerkers.filter(function(m){return m.status!=='inactief';}).forEach(function(m){
    medOpts+='<option value="'+m.id+'"'+(String(v.medId||mijnId)===String(m.id)?' selected':'')+'>'+esc(m.voornaam+' '+m.achternaam)+'</option>';
  });
  var b='<div class="form-grid">';
  if(kanBeheren) b+=fgf('Medewerker','<select class="input" id="vz-med">'+medOpts+'</select>');
  b+=fg('Type','<select class="input" id="vz-type"><option value="ziek"'+(v.type!=='geoorloofd'&&v.type!=='ongeoorloofd'&&v.type!=='gedeeltelijk'?' selected':'')+'>🤒 Ziek</option><option value="geoorloofd"'+(v.type==='geoorloofd'?' selected':'')+'>✓ Geoorloofd afwezig</option><option value="ongeoorloofd"'+(v.type==='ongeoorloofd'?' selected':'')+'>⚠️ Ongeoorloofd afwezig</option><option value="gedeeltelijk"'+(v.type==='gedeeltelijk'?' selected':'')+'>◑ Gedeeltelijk ziek</option></select>');
  // Gedeeltelijk: uren ziek + uren werk per dag
  b+='<div id="vz-gedeeltelijk-wrap" style="'+(v.type==='gedeeltelijk'?'':'display:none')+';grid-column:1/-1;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:12px;display:'+(v.type==='gedeeltelijk'?'grid':'none')+';grid-template-columns:1fr 1fr;gap:10px">';
  b+=fg('Uren ziek per dag','<div style="display:flex;align-items:center;gap:6px"><input class="input" type="number" id="vz-uren-ziek" value="'+(v.urenZiek||'')+'" min="0.5" max="12" step="0.5" style="width:90px"> <span style="font-size:12px;color:var(--muted)">uur/dag</span></div>');
  b+=fg('Uren werkt per dag','<div style="display:flex;align-items:center;gap:6px"><input class="input" type="number" id="vz-uren-werk" value="'+(v.urenWerk||'')+'" min="0.5" max="12" step="0.5" style="width:90px"> <span style="font-size:12px;color:var(--muted)">uur/dag</span></div>');
  b+='</div>';
  b+=fg('Eerste ziektedag',finp('vz-van','date',v.van||new Date().toISOString().split('T')[0],''));
  b+=fg('Hersteldatum (leeg = nog ziek)',finp('vz-tot','date',v.tot||'',''));
  b+=fgf('Omschrijving',finp('vz-omschr','text',v.omschrijving||'','Optioneel'));
  b+=fgf('Notitie (intern)',ftxt('vz-notitie',v.notitie||''));
  b+='</div>';
  var f='<button class="btn btn-ghost" id="vz-modal-cancel">Annuleren</button><button class="btn btn-primary" id="vz-modal-save">Opslaan</button>';
  openModal(isNew?'Verzuim registreren':'Verzuim bewerken',b,f);
  document.getElementById('vz-modal-cancel').addEventListener('click',closeModal);
  document.getElementById('vz-modal-save').addEventListener('click',function(){saveVerzuim(id);});

  // Toon/verberg gedeeltelijk uren veld
  var vzTypeSel = document.getElementById('vz-type');
  var vzGedeelWrap = document.getElementById('vz-gedeeltelijk-wrap');
  if(vzTypeSel && vzGedeelWrap) {
    vzTypeSel.addEventListener('change', function(){
      vzGedeelWrap.style.display = vzTypeSel.value === 'gedeeltelijk' ? 'grid' : 'none';
    });
  }
}

function saveVerzuim(id){
  var mijnId=getMijnMedId();
  var kanBeheren=isAdmin()||magGoedkeuren('verzuim')||magSchrijven('verzuim');
  var medIdEl=document.getElementById('vz-med');
  var medId=medIdEl?medIdEl.value:mijnId;
  var van=document.getElementById('vz-van').value;
  if(!van){toast('Eerste ziektedag is verplicht','error');return;}
  var isNew=!id;
  var bestaand=id?(APP.verzuim.find(function(x){return String(x.id)===String(id);})||{}):{};
  var tot=document.getElementById('vz-tot').value||null;
  var duren=tot?Math.ceil((new Date(tot)-new Date(van))/86400000)+1:null;
  var status=tot?'hersteld':(duren&&duren>42?'langdurig':'actief');
  var vzType = document.getElementById('vz-type').value;
  var urenZiekEl = document.getElementById('vz-uren-ziek');
  var urenWerkEl = document.getElementById('vz-uren-werk');
  var data=Object.assign({},bestaand,{
    id:id||uid(), medId:medId, van:van, tot:tot||null,
    type:vzType,
    urenZiek: vzType==='gedeeltelijk'&&urenZiekEl ? (parseFloat(urenZiekEl.value)||null) : null,
    urenWerk: vzType==='gedeeltelijk'&&urenWerkEl ? (parseFloat(urenWerkEl.value)||null) : null,
    omschrijving:document.getElementById('vz-omschr').value.trim(),
    notitie:document.getElementById('vz-notitie').value.trim(),
    status:tot?'hersteld':(bestaand.status||'actief'),
    aangemaaktOp:bestaand.aangemaaktOp||new Date().toISOString().split('T')[0],
    door:bestaand.door||(APP.profiel?APP.profiel.naam:''),
  });
  if(isNew) APP.verzuim.push(data);
  else{var idx=APP.verzuim.findIndex(function(x){return String(x.id)===String(id);});if(idx>-1)APP.verzuim[idx]=data;}
  dbSaveItem('verzuim',data.id,data);
  closeModal(); renderVerzuim();
  toast(isNew?'Verzuim geregistreerd':'Verzuim bijgewerkt','success');
}

function herstelVerzuim(id){
  var v=APP.verzuim.find(function(x){return String(x.id)===String(id);}); if(!v) return;
  var datum=prompt('Hersteldatum (YYYY-MM-DD):',new Date().toISOString().split('T')[0]);
  if(!datum) return;
  v.tot=datum; v.status='hersteld'; v.herstelledOp=datum;
  dbSaveItem('verzuim',v.id,v); renderVerzuim();
  toast('Hersteld op '+fmtD(datum),'success');
}

function zetLangdurig(id){
  var v=APP.verzuim.find(function(x){return String(x.id)===String(id);}); if(!v) return;
  v.status='langdurig';
  dbSaveItem('verzuim',v.id,v); renderVerzuim();
  toast('Gemarkeerd als langdurig verzuim','success');
}

// MODULE: STORINGSDIENST
// Data model:
//   APP.storingsdienst = {
//     'YYYY-WNN': { medId, naam }          ← week default
//     'YYYY-WNN-D': { medId, naam }        ← dag override (D=0..6, ma=0)
//   }
// ═══════════════════════════════════════════════════════════════
var _sdView  = 'kwartaal'; // 'jaar' | 'kwartaal'
var _sdJaar  = new Date().getFullYear();
var _sdKwart = Math.ceil((new Date().getMonth()+1)/3);

function getMaandagVanWeek(jaar, week) {
  var jan4 = new Date(jaar, 0, 4);
  var dag1 = new Date(jan4); dag1.setDate(jan4.getDate()-((jan4.getDay()||7)-1));
  var ma = new Date(dag1); ma.setDate(dag1.getDate()+(week-1)*7);
  return ma;
}

function getISOWeek(datum) {
  var d = new Date(datum); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-((d.getDay()||7)-1));
  var w1=new Date(d.getFullYear(),0,4);
  return 1+Math.round(((d-w1)/86400000-3+((w1.getDay()||7)-1))/7);
}

function getISOWeekJaar(datum) {
  var d=new Date(datum); d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-((d.getDay()||7)-1));
  return d.getFullYear();
}

function getWekenInPeriode(jaar, kwart) {
  // kwart=0 → heel jaar, kwart=1..4 → kwartaal
  var weken=[];
  var startMnd = kwart ? (kwart-1)*3 : 0;
  var eindMnd  = kwart ? startMnd+2  : 11;
  var d=new Date(jaar,startMnd,1);
  while(d.getMonth()<=eindMnd && d.getFullYear()===jaar) {
    var week=getISOWeek(d); var wjaar=getISOWeekJaar(d);
    var key=wjaar+'-W'+('0'+week).slice(-2);
    if(!weken.find(function(w){return w.key===key;})){
      var ma=getMaandagVanWeek(wjaar,week);
      var zo=new Date(ma); zo.setDate(ma.getDate()+6);
      weken.push({key:key,week:week,jaar:wjaar,ma:ma,zo:zo});
    }
    d.setDate(d.getDate()+7);
  }
  return weken;
}

// Effectieve monteur voor een specifieke dag (override > week default)
function getSdMedVoorDag(datum) {
  var d     = new Date(datum+'T00:00:00');
  var week  = getISOWeek(datum);
  var wjaar = getISOWeekJaar(datum);
  var dagIdx= (d.getDay()||7)-1; // ma=0 t/m zo=6
  var sd    = APP.storingsdienst||{};
  var weekKey = wjaar+'-W'+('0'+week).slice(-2);
  var dagKey  = weekKey+'-'+dagIdx;
  return sd[dagKey] || sd[weekKey] || null;
}

function openSdDagModal(datum, weekKey, dagIdx, monteurs) {
  var dagNamen=['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag','Zondag'];
  var sd=APP.storingsdienst||{};
  var dagKey=weekKey+'-'+dagIdx;
  var weekDienst=sd[weekKey];
  var dagDienst=sd[dagKey];
  var weekMed=weekDienst?getMed(weekDienst.medId):null;

  var b='<div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:13px">';
  b+='<div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:2px">Weekdienst</div>';
  b+=(weekMed?'<strong>'+esc(weekMed.voornaam+' '+weekMed.achternaam)+'</strong>':'<span style="color:var(--muted)">Niet ingesteld</span>');
  b+='</div>';
  b+='<div class="form-group"><label>Dagwissel '+dagNamen[dagIdx]+' '+fmtD(datum)+'</label>';
  b+='<select class="input" id="sd-dag-sel">';
  b+='<option value="">— Geen dagwissel (gebruik weekdienst) —</option>';
  monteurs.forEach(function(m){
    var sel=dagDienst&&String(dagDienst.medId)===String(m.id)?' selected':'';
    b+='<option value="'+m.id+'"'+sel+'>'+esc(m.voornaam+' '+m.achternaam)+'</option>';
  });
  b+='</select></div>';

  var f='<button class="btn btn-ghost" id="sdd-cancel">Annuleren</button>';
  if(dagDienst) f+='<button class="btn btn-ghost" id="sdd-reset" style="color:var(--orange)">↩ Reset naar week</button>';
  f+='<button class="btn btn-primary" id="sdd-save">Opslaan</button>';

  openModal(dagNamen[dagIdx]+' '+fmtD(datum)+' — Dagwissel',b,f);
  document.getElementById('sdd-cancel').addEventListener('click',closeModal);

  var resetBtn=document.getElementById('sdd-reset');
  if(resetBtn) resetBtn.addEventListener('click',function(){
    if(!APP.storingsdienst) APP.storingsdienst={};
    delete APP.storingsdienst[dagKey];
    FB.ref(dbPath('storingsdienst',dagKey.replace(/-/g,'_'))).remove();
    closeModal(); renderStoringsdienst();
    toast('Dagwissel verwijderd — weekdienst actief','success');
  });

  document.getElementById('sdd-save').addEventListener('click',function(){
    var medId=document.getElementById('sd-dag-sel').value;
    if(!APP.storingsdienst) APP.storingsdienst={};
    if(medId){
      var m=getMed(medId);
      APP.storingsdienst[dagKey]={medId:medId,naam:m?m.voornaam+' '+m.achternaam:'',type:'dag'};
      dbSaveItem('storingsdienst',dagKey.replace(/-/g,'_'),APP.storingsdienst[dagKey]);
    } else {
      delete APP.storingsdienst[dagKey];
      FB.ref(dbPath('storingsdienst',dagKey.replace(/-/g,'_'))).remove();
    }
    closeModal(); renderStoringsdienst();
    toast('Dagwissel opgeslagen','success');
  });
}

  var lijst0=document.getElementById('rou-mont-lijst');

    item.addEventListener('dragstart',function(){ drag0=item; setTimeout(function(){item.style.opacity='0.4';},0); });
    item.addEventListener('dragend',function(){ item.style.opacity='1'; drag0=null; lijst0.querySelectorAll('.rou-mont-item').forEach(function(i){i.style.background='var(--surface2)';}); });
    item.addEventListener('dragover',function(e){
      e.preventDefault(); if(!drag0||drag0===item) return;
      item.style.background='rgba(59,130,246,.15)';

    });
    item.addEventListener('dragleave',function(){ item.style.background='var(--surface2)'; });
    item.addEventListener('drop',function(e){ e.preventDefault(); item.style.background='var(--surface2)'; });
  });

  document.getElementById('rou0-next').addEventListener('click',function(){
    // Bouw geordende monteurlijst op basis van volgorde + aanvinken
    var geselecteerdeMonteurs=[];

var _locMap = null, _locMarkers = {}, _locInfoWindows = {}, _locInterval = null, _locGPSWatch = null, _locFilter = 'alle';

function startLocatieTracking() {
  if (!navigator.geolocation) { toast('GPS niet beschikbaar op dit apparaat','error'); return; }
  if (_locGPSWatch) return;
  _locGPSWatch = navigator.geolocation.watchPosition(function(pos) {
    if (!APP.profiel) return;
    FB.ref(dbPath('locaties', APP.user.uid)).set({
      lat: pos.coords.latitude, lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy), timestamp: Date.now(),
      naam: APP.profiel.naam||'', medId: APP.profiel.medId||APP.user.uid,
    });
  }, function(err){ log('WARN','LOC','GPS fout: '+err.message); },
  { enableHighAccuracy:true, maximumAge:30000, timeout:15000 });
  toast('📍 Locatie wordt gedeeld','success');
}

function stopLocatieTracking() {
  if (_locGPSWatch) { navigator.geolocation.clearWatch(_locGPSWatch); _locGPSWatch = null; }
  if (APP.user) FB.ref(dbPath('locaties', APP.user.uid)).remove();
  toast('Locatie delen gestopt','success');
}

function maakMonteurMarker(map, loc, med) {
  var kl   = med ? ((APP.rollen[med.rol]||{}).kleur||med.kleur||'#3b82f6') : '#3b82f6';
  var init = med ? initials(med) : '?';
  var naam = med ? (med.voornaam+' '+med.achternaam) : (loc.naam||'Onbekend');
  var minGeleden = Math.round((Date.now() - loc.timestamp) / 60000);
  var tijdLabel  = minGeleden < 1 ? 'Nu actief' : minGeleden < 60 ? minGeleden+'m geleden' : Math.round(minGeleden/60)+'u geleden';
  var isOud = minGeleden > 60;
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="40" height="48" viewBox="0 0 40 48">' +
    '<path d="M20 0C9 0 0 9 0 20c0 15 20 28 20 28S40 35 40 20C40 9 31 0 20 0z" fill="'+(isOud?'#9ca3af':kl)+'"/>' +
    '<text x="20" y="26" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="13" fill="white">'+init+'</text></svg>';
  var marker = new google.maps.Marker({
    position:{lat:loc.lat,lng:loc.lng}, map:map, title:naam,
    icon:{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg), scaledSize:new google.maps.Size(40,48), anchor:new google.maps.Point(20,48)},
    zIndex:100,
  });
  var iw = new google.maps.InfoWindow({ content:
    '<div style="font-family:sans-serif;min-width:170px;padding:4px">'+
    '<div style="font-weight:700;font-size:14px;margin-bottom:4px">'+naam+'</div>'+
    '<div style="font-size:12px;color:'+(isOud?'#ef4444':'#10b981')+'">● '+tijdLabel+'</div>'+
    (loc.accuracy?'<div style="font-size:11px;color:#6b7280">Nauwkeurigheid: ±'+loc.accuracy+'m</div>':'')+
    '</div>',
  });
  marker.addListener('click',function(){ Object.values(_locInfoWindows).forEach(function(w){w.close();}); iw.open(map,marker); _locInfoWindows[loc.medId]=iw; });
  return marker;
}

function maakOpdrachtMarker(map, o, klant) {
  var adres = (o.adres||(klant?klant.adres:''))+' '+(o.postcode||(klant?klant.postcode:''))+' Nederland';
  if (!adres.trim()) return;
  var ot = getOpdrachttype(o.type); var spoed = o.status==='spoed';
  var kleur = spoed?'#ef4444':ot.kleur;
  new google.maps.Geocoder().geocode({address:adres},function(results,status){
    if(status!=='OK'||!results[0]) return;
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="30" height="36" viewBox="0 0 30 36">'+
      '<path d="M15 0C6.7 0 0 6.7 0 15c0 11 15 21 15 21S30 26 30 15C30 6.7 23.3 0 15 0z" fill="'+kleur+'"/>'+
      '<text x="15" y="19" text-anchor="middle" font-size="12">'+ot.icon+'</text></svg>';
    var marker = new google.maps.Marker({
      position:results[0].geometry.location, map:map, title:o.klantNaam||adres,
      icon:{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg), scaledSize:new google.maps.Size(30,36), anchor:new google.maps.Point(15,36)},
      zIndex:spoed?90:50,
    });
    var mont = o.monteurId?getMed(o.monteurId):null;
    var iw = new google.maps.InfoWindow({content:
      '<div style="font-family:sans-serif;min-width:170px;padding:4px">'+
      (spoed?'<div style="color:#ef4444;font-weight:700;font-size:11px">⚡ SPOED</div>':'')+
      '<div style="font-weight:700;font-size:13px">'+esc(o.klantNaam||'—')+'</div>'+
      '<div style="font-size:11px;color:#6b7280">'+esc(o.adres||'')+'</div>'+
      '<div style="font-size:12px;margin-top:3px">'+ot.icon+' '+esc(ot.label)+(o.tijdVan?' · '+o.tijdVan:'')+' </div>'+
      (mont?'<div style="font-size:11px;color:#3b82f6">👤 '+esc(mont.voornaam+' '+mont.achternaam)+'</div>':'')+
      '</div>',
    });
    marker.addListener('click',function(){Object.values(_locInfoWindows).forEach(function(w){w.close();}); iw.open(map,marker);});
    _locMarkers['opdracht_'+o.id]=marker;
  });
}

function maakSkMarker(map, k) {
  if(!k.adres) return;
  new google.maps.Geocoder().geocode({address:k.adres+' '+(k.postcode||'')+' Nederland'},function(results,status){
    if(status!=='OK'||!results[0]) return;
    var nu=new Date().toISOString().split('T')[0];
    var kleur=!k.volgendeDatum?'#6b7694':k.volgendeDatum<nu?'#ef4444':'#10b981';
    var svg='<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">'+
      '<circle cx="11" cy="11" r="9" fill="'+kleur+'" opacity="0.85" stroke="white" stroke-width="2"/>'+
      '<text x="11" y="15" text-anchor="middle" font-size="9">🏭</text></svg>';
    var marker=new google.maps.Marker({
      position:results[0].geometry.location, map:map, title:k.naam,
      icon:{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg),scaledSize:new google.maps.Size(22,22),anchor:new google.maps.Point(11,11)},
      zIndex:10,
    });
    var ct=getContract(k.contractType||k.contractId);
    var iw=new google.maps.InfoWindow({content:
      '<div style="font-family:sans-serif;min-width:150px;padding:4px">'+
      '<div style="font-weight:700;font-size:13px">'+esc(k.naam)+'</div>'+
      '<div style="font-size:11px;color:#6b7280">'+esc(k.adres||'')+'</div>'+
      (ct?'<div style="font-size:11px;margin-top:2px">📋 '+esc(ct.code)+'</div>':'')+
      (k.volgendeDatum?'<div style="font-size:11px;color:'+kleur+';margin-top:2px">Volgende: '+fmtD(k.volgendeDatum)+'</div>':'')+
      '</div>',
    });
    marker.addListener('click',function(){Object.values(_locInfoWindows).forEach(function(w){w.close();}); iw.open(map,marker);});
    _locMarkers['sk_'+k.id]=marker;
  });
}

function tekenMonteurRoute(map, monteurId) {
  var vandaag=new Date().toISOString().split('T')[0];
  var ops=APP.opdrachten.filter(function(o){return o.datum===vandaag&&String(o.monteurId)===String(monteurId)&&o.adres;}).sort(function(a,b){return(a.tijdVan||'99:99')>(b.tijdVan||'99:99')?1:-1;});
  if(ops.length<2) return;
  var waypoints=ops.slice(1,ops.length-1).map(function(o){return{location:o.adres+' '+(o.postcode||'')+' Nederland',stopover:true};});
  var dr=new google.maps.DirectionsRenderer({map:map,suppressMarkers:true,polylineOptions:{strokeColor:'#3b82f6',strokeWeight:3,strokeOpacity:0.6}});
  new google.maps.DirectionsService().route({
    origin:ops[0].adres+' '+(ops[0].postcode||'')+' Nederland',
    destination:ops[ops.length-1].adres+' '+(ops[ops.length-1].postcode||'')+' Nederland',
    waypoints:waypoints, travelMode:google.maps.TravelMode.DRIVING,
  },function(result,status){ if(status==='OK'){dr.setDirections(result); _locMarkers['route_'+monteurId]=dr;} });
}

function laadKaartData() {
  if(!_locMap) return;
  var vandaag=new Date().toISOString().split('T')[0];
  Object.values(_locMarkers).forEach(function(m){ if(m&&m.setMap) m.setMap(null); });
  _locMarkers={}; _locInfoWindows={};
  // Monteur locaties
  FB.ref(dbPath('locaties')).once('value').then(function(snap){
    if(!snap.exists()) return;
    var planRollen=APP.planningRollen||['monteur','extern'];
    snap.forEach(function(child){
      var loc=child.val(); if(!loc||!loc.lat||!loc.lng) return;
      var med=getMed(loc.medId)||APP.medewerkers.find(function(m){return m.id===child.key;});
      if(!med||planRollen.indexOf(med.rol)<0) return;
      if(_locFilter!=='alle'&&String(med.id)!==_locFilter) return;
      _locMarkers['mont_'+child.key]=maakMonteurMarker(_locMap,loc,med);
    });
  });
  // Opdrachten vandaag
  APP.opdrachten.filter(function(o){return o.datum===vandaag&&o.status!=='afgehandeld';}).forEach(function(o){
    if(_locFilter!=='alle'&&String(o.monteurId)!==_locFilter) return;
    var klant=null;
    if(o.skId) klant=APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);});
    if(!klant&&o.debId) klant=APP.debiteuren.find(function(d){return String(d.id)===String(o.debId);});
    maakOpdrachtMarker(_locMap,o,klant);
  });
  // Serviceklanten (max 50 om geocoding te beperken)
  APP.serviceklanten.slice(0,50).forEach(function(k){ maakSkMarker(_locMap,k); });
  // Routes
  var planRollen2=APP.planningRollen||['monteur','extern'];
  APP.medewerkers.filter(function(m){return m.status!=='inactief'&&planRollen2.indexOf(m.rol)>=0;}).forEach(function(m){
    if(_locFilter!=='alle'&&String(m.id)!==_locFilter) return;
    tekenMonteurRoute(_locMap,m.id);
  });
}

window.initialiseerKaart=function(){
  var mapEl=document.getElementById('loc-map'); if(!mapEl) return;
  _locMap=new google.maps.Map(mapEl,{
    center:{lat:51.8336,lng:4.9756}, zoom:10,
    mapTypeId:google.maps.MapTypeId.ROADMAP,
    styles:[{featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]}],
  });
  laadKaartData();
};

function renderLocatie() {
  var el=document.getElementById('content');
  // Storingsdienst: alle actieve medewerkers kunnen dienst draaien
  var monteurs=APP.medewerkers.filter(function(m){return m.status!=='inactief';});
  var isTracking=!!_locGPSWatch;
  var h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">';
  if(APP.profiel&&(APP.profiel.rol==='monteur'||APP.profiel.rol==='extern')){
    if(isTracking) h+='<button class="btn btn-ghost btn-sm" id="loc-stop-gps" style="color:var(--red)">⏹ Stop locatie delen</button>';
    else h+='<button class="btn btn-primary btn-sm" id="loc-start-gps">📍 Deel mijn locatie</button>';
  }
  h+='<div style="display:flex;gap:10px;font-size:12px;color:var(--muted);flex-wrap:wrap">';
  h+='<span>🔵 Monteur</span><span>🟢 Serviceklant</span><span>🔴 Vervallen/Spoed</span><span>📌 Opdracht vandaag</span>';
  h+='</div>';
  h+='<select class="input" id="loc-monteur-filter" style="width:180px;margin-left:auto">';
  h+='<option value="alle">Alle monteurs</option>';
  monteurs.forEach(function(m){h+='<option value="'+m.id+'"'+(_locFilter===String(m.id)?' selected':'')+'>'+esc(m.voornaam+' '+m.achternaam)+'</option>';});
  h+='</select>';
  h+='<button class="btn btn-ghost btn-sm" id="loc-refresh">↻</button>';
  h+='</div>';
  h+='<div id="loc-map" style="width:100%;height:calc(100vh - 210px);min-height:500px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)"></div>';
  el.innerHTML=h;
  var startBtn=el.querySelector('#loc-start-gps'); if(startBtn) startBtn.addEventListener('click',function(){startLocatieTracking();renderLocatie();});
  var stopBtn=el.querySelector('#loc-stop-gps');   if(stopBtn)  stopBtn.addEventListener('click',function(){stopLocatieTracking();renderLocatie();});
  var filtEl=el.querySelector('#loc-monteur-filter'); if(filtEl) filtEl.addEventListener('change',function(){_locFilter=filtEl.value;laadKaartData();});
  var refBtn=el.querySelector('#loc-refresh'); if(refBtn) refBtn.addEventListener('click',laadKaartData);
  // Laad Maps API
  if(typeof google!=='undefined'&&google.maps){ initialiseerKaart(); }
  else if(!document.getElementById('gmap-script')){
    var sc=document.createElement('script'); sc.id='gmap-script';
    sc.src='https://maps.googleapis.com/maps/api/js?key=AIzaSyCP3LqVySNrg3Pte80y2ZXLRrOmDxDGMGA&libraries=places&callback=initialiseerKaart';
    sc.async=true; document.head.appendChild(sc);
  } else { setTimeout(function(){if(typeof google!=='undefined'&&google.maps) initialiseerKaart();},500); }
  // Realtime interval
  if(_locInterval) clearInterval(_locInterval);
  _locInterval=setInterval(function(){if(APP.activePage==='locatie') laadKaartData(); else{clearInterval(_locInterval);_locInterval=null;}},30000);
}

function getMailTemplates() { return APP.mailTemplates || MAIL_TEMPLATES_DEFAULT; }

function vulMailIn(template, opdracht) {
  var klant = null;
  if (opdracht.skId) klant = APP.serviceklanten.find(function(k){return String(k.id)===String(opdracht.skId);});
  if (!klant && opdracht.debId) klant = APP.debiteuren.find(function(d){return String(d.id)===String(opdracht.debId);});
  var monteurIds = Array.isArray(opdracht.monteurIds) ? opdracht.monteurIds : (opdracht.monteurId ? [opdracht.monteurId] : []);
  var monteurNamen = monteurIds.map(function(id){var m=getMed(id);return m?m.voornaam+' '+m.achternaam:'';}).filter(Boolean).join(', ') || 'Wordt nog toegewezen';
  var vars = {
    bedrijfNaam:      (APP.bedrijfGegevens&&APP.bedrijfGegevens.naam)||'Homa Pompen B.V.',
    bedrijfTel:       (APP.bedrijfGegevens&&APP.bedrijfGegevens.telefoon)||'',
    bedrijfEmail:     (APP.bedrijfGegevens&&APP.bedrijfGegevens.email)||'',
    klantNaam:        opdracht.klantNaam||(klant?klant.naam:''),
    contactpersoon:   klant?(klant.contactpersoon||klant.naam||''):(opdracht.klantNaam||''),
    datum:            fmtD(opdracht.datum),
    tijdVan:          opdracht.tijdVan||'—',
    tijdTot:          opdracht.tijdTot||'—',
    adres:            opdracht.adres||(klant?klant.adres:''),
    postcode:         opdracht.postcode||(klant?klant.postcode:''),
    plaats:           opdracht.plaats||(klant?klant.plaats:''),
    monteur:          monteurNamen,
    type:             getOpdrachttype(opdracht.type).label,
    pomptype:         opdracht.pomptype||(klant?klant.pomptype:'')||'—',
    werkomschrijving: opdracht.werkomschrijving || '',
  };
  var tekst = template;
  Object.keys(vars).forEach(function(k){ tekst = tekst.split('{'+k+'}').join(vars[k]); });
  return tekst;
}

function stuurMail(opdrachtId, templateId) {
  var o = APP.opdrachten.find(function(x){return String(x.id)===String(opdrachtId);});
  if (!o) return;
  var klant = null;
  if (o.skId) klant = APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);});
  if (!klant && o.debId) klant = APP.debiteuren.find(function(d){return String(d.id)===String(o.debId);});
  var tpl = getMailTemplates()[templateId]; if (!tpl) return;
  var email = klant?(klant.email||''):'';
  var mailto = 'mailto:'+encodeURIComponent(email)+'?subject='+encodeURIComponent(vulMailIn(tpl.onderwerp,o))+'&body='+encodeURIComponent(vulMailIn(tpl.body,o));
  window.location.href = mailto;
  o.mailVerzonden = o.mailVerzonden||[];
  o.mailVerzonden.push({template:templateId, datum:new Date().toISOString().split('T')[0], door:APP.profiel?APP.profiel.naam:''});
  dbSaveItem('opdrachten',o.id,o);
  toast('Outlook geopend: '+tpl.naam,'success');
}

function openMailModal(opdrachtId) {

  var klant = null;
  if (o.skId) klant = APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);});

  var email = klant?(klant.email||''):'';
  var templates = getMailTemplates();

    b += '<strong>'+esc(klant?(klant.contactpersoon||klant.naam):o.klantNaam)+'</strong> <span style="color:var(--accent)">'+esc(email)+'</span></div>';
  }

  b += '<div style="display:flex;flex-direction:column;gap:10px">';
  Object.values(templates).forEach(function(tpl){
    var alVerzonden = o.mailVerzonden&&o.mailVerzonden.find(function(m){return m.template===tpl.id;});
    b += '<div style="border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--surface2)">';
    b += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">';
    b += '<div><div style="font-weight:600;font-size:13px">'+esc(tpl.naam)+'</div>';
    b += '<div style="font-size:12px;color:var(--muted);margin-top:2px">'+esc(vulMailIn(tpl.onderwerp,o))+'</div>';
    if(alVerzonden) b += '<div style="font-size:11px;color:var(--green);margin-top:4px">✓ Verstuurd op '+fmtD(alVerzonden.datum)+'</div>';
    b += '</div>';
    b += '<button class="btn btn-primary btn-sm mail-send-btn" data-tpl="'+tpl.id+'" data-op="'+opdrachtId+'">📧 Openen</button>';
    b += '</div>';
    b += '<details style="margin-top:8px"><summary style="font-size:11px;color:var(--muted);cursor:pointer">Voorbeeld tonen</summary>';
    b += '<pre style="font-size:11px;white-space:pre-wrap;margin-top:8px;padding:8px;background:var(--surface);border-radius:6px;font-family:inherit">'+esc(vulMailIn(tpl.body,o))+'</pre>';
    b += '</details></div>';
  });
  b += '</div>';
  if(o.mailVerzonden&&o.mailVerzonden.length){
    b += '<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px">';
    b += '<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Verzendhistorie</div>';
    o.mailVerzonden.forEach(function(m){var t=templates[m.template];b+='<div style="font-size:12px;color:var(--muted);margin-bottom:3px">📧 '+esc(t?t.naam:m.template)+' · '+fmtD(m.datum)+' · door '+esc(m.door)+'</div>';});
    b += '</div>';
  }
  var f = '<button class="btn btn-ghost" id="mail-modal-close">Sluiten</button>';
  openModal('📧 Mail versturen — '+esc(o.klantNaam||'klant'), b, f);
  document.getElementById('mail-modal-close').addEventListener('click', closeModal);
  document.querySelectorAll('.mail-send-btn').forEach(function(btn){btn.addEventListener('click',function(){stuurMail(btn.dataset.op,btn.dataset.tpl);});});
}

function renderKlantmails() {
  var el = document.getElementById('content');
  var templates = getMailTemplates();

  // Periode selector state
  if (typeof _mailPeriode === 'undefined') window._mailPeriode = new Date().toISOString().slice(0,7); // YYYY-MM

  var mndNamen = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  var pJaar    = parseInt(_mailPeriode.slice(0,4));
  var pMnd     = parseInt(_mailPeriode.slice(5,7)); // 1-12
  var periodeLabel = mndNamen[pMnd-1] + ' ' + pJaar;

  // Vorige maand
  var prevMnd  = pMnd === 1  ? 12 : pMnd - 1;
  var prevJaar = pMnd === 1  ? pJaar - 1 : pJaar;
  var nextMnd  = pMnd === 12 ? 1  : pMnd + 1;
  var nextJaar = pMnd === 12 ? pJaar + 1 : pJaar;
  var prevStr  = prevJaar + '-' + ('0'+prevMnd).slice(-2);
  var nextStr  = nextJaar + '-' + ('0'+nextMnd).slice(-2);

  // Filter op exact YYYY-MM prefix — geen timezone issues
  var vanDatum = _mailPeriode + '-01';
  // Laatste dag van de maand: gebruik pMnd direct
  var dagenInMaand = new Date(pJaar, pMnd, 0).getDate();
  var totDatum = _mailPeriode + '-' + ('0'+dagenInMaand).slice(-2);

  var opdrachtenMaand = APP.opdrachten.filter(function(o){
    if (!o.datum) return false;
    // Vergelijk alleen de YYYY-MM prefix voor maandfilter
    return o.datum.slice(0,7) === _mailPeriode && o.status !== 'afgehandeld';
  }).sort(function(a,b){ return a.datum > b.datum ? 1 : -1; });

  // Bereken stats
  var totaal       = opdrachtenMaand.length;
  var metEmail     = 0;
  var alVerzonden  = 0;
  var nogTeDoen    = 0;

  opdrachtenMaand.forEach(function(o){
    var klant = null;
    if (o.skId)  klant = APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);});
    if (!klant && o.debId) klant = APP.debiteuren.find(function(d){return String(d.id)===String(o.debId);});
    var email = klant ? klant.email : '';
    if (email) metEmail++;
    if (o.mailVerzonden && o.mailVerzonden.length) alVerzonden++;
    else if (email) nogTeDoen++;
  });

  var h = '';

  // ── Toolbar ──────────────────────────────────────────────────
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap">';
  h += '<div style="display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px">';
  h += '<button class="btn btn-ghost btn-sm" id="mail-prev">‹</button>';
  h += '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;min-width:160px;text-align:center">'+periodeLabel+'</div>';
  h += '<button class="btn btn-ghost btn-sm" id="mail-next">›</button>';
  h += '</div>';

  // Stats
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
  h += '<span style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:13px"><strong>'+totaal+'</strong> opdrachten</span>';
  if (nogTeDoen)  h += '<span class="tag tag-orange" style="padding:5px 12px"><strong>'+nogTeDoen+'</strong> te versturen</span>';
  if (alVerzonden)h += '<span class="tag tag-green"  style="padding:5px 12px"><strong>'+alVerzonden+'</strong> verstuurd</span>';
  if (metEmail < totaal) h += '<span class="tag tag-muted" style="padding:5px 12px">'+(totaal-metEmail)+' zonder e-mail</span>';
  h += '</div>';

  // Template keuze
  h += '<div style="margin-left:auto;display:flex;align-items:center;gap:8px">';
  h += '<label style="font-size:12px;color:var(--muted)">Template:</label>';
  h += '<select class="input" id="mail-tpl-keuze" style="width:200px">';
  var _tplLijst = Object.values(getMailTemplates());
  _tplLijst.forEach(function(tpl){
    h += '<option value="'+tpl.id+'">'+esc(tpl.naam)+'</option>';
  });
  h += '</select>';
  h += '</div>';
  h += '</div>';

  // ── Bulk overzicht ─────────────────────────────────────────────
  if (opdrachtenMaand.length === 0) {
    h += '<div style="text-align:center;padding:60px;color:var(--muted);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">';
    h += '<div style="font-size:32px;margin-bottom:12px">📭</div>';
    h += '<div style="font-size:15px;font-weight:600">Geen opdrachten in '+periodeLabel+'</div>';
    h += '</div>';
  } else {
    h += '<div class="card" style="padding:0"><div class="table-wrap"><table style="width:100%"><thead><tr>';
    h += '<th style="width:36px;padding:8px 10px"><input type="checkbox" id="mail-select-all" title="Alles selecteren"></th>';
    h += '<th>Klant</th><th>E-mail</th><th>Datum</th><th>Tijd</th><th>Monteur</th><th>Status</th><th style="width:150px">Mail</th>';
    h += '</tr></thead><tbody>';

    opdrachtenMaand.forEach(function(o){
      var klant = null;
      if (o.skId)  klant = APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);});
      if (!klant && o.debId) klant = APP.debiteuren.find(function(d){return String(d.id)===String(o.debId);});
      var email      = klant ? (klant.email||'') : '';
      var monteur    = o.monteurId ? getMed(o.monteurId) : null;
      var verzonden   = o.mailVerzonden && o.mailVerzonden.length > 0;
      var laasteMail  = verzonden ? o.mailVerzonden[o.mailVerzonden.length-1] : null;

      h += '<tr class="mail-rij" data-id="'+o.id+'" style="'+(verzonden?'opacity:.65':'')+(email?'':'background:rgba(239,68,68,.04)')+'">';

      // Checkbox
      h += '<td style="padding:8px 10px"><input type="checkbox" class="mail-check" data-id="'+o.id+'"'+(email?'':' disabled')+' style="width:15px;height:15px"></td>';

      // Klant
      h += '<td style="padding:10px"><div style="font-weight:600;font-size:13px">'+esc(o.klantNaam||'—')+'</div>';
      if(klant && klant.contactpersoon) h += '<div style="font-size:11px;color:var(--muted)">'+esc(klant.contactpersoon)+'</div>';
      h += '</td>';

      // Email
      if (email) {
        h += '<td style="font-size:12px;color:var(--accent)">'+esc(email)+'</td>';
      } else {
        h += '<td style="font-size:12px;color:var(--red)">Geen e-mail</td>';
      }

      // Datum + tijd
      h += '<td style="font-size:12px;font-weight:600;white-space:nowrap">'+fmtD(o.datum)+'</td>';
      h += '<td style="font-size:12px;color:var(--accent);white-space:nowrap">'+esc(o.tijdVan||'—')+(o.tijdTot?' – '+esc(o.tijdTot):'')+'</td>';

      // Monteur
      h += '<td style="font-size:12px">'+(monteur?esc(monteur.voornaam+' '+monteur.achternaam):'<span style="color:var(--muted)">—</span>')+'</td>';

      // Status opdracht
      h += '<td>'+tagStatus(o.status)+'</td>';

      // Mail knop
      h += '<td style="padding:6px 10px">';
      if (!email) {
        h += '<span style="font-size:11px;color:var(--muted)">Geen e-mail</span>';
      } else if (verzonden) {
        h += '<div style="font-size:11px;color:var(--green);margin-bottom:3px">✓ '+fmtD(laasteMail.datum)+'</div>';
        h += '<button class="btn btn-ghost btn-sm mail-bulk-btn" data-id="'+o.id+'" style="font-size:11px;padding:3px 8px">↻ Opnieuw</button>';
      } else {
        h += '<button class="btn btn-primary btn-sm mail-bulk-btn" data-id="'+o.id+'">📧 Versturen</button>';
      }
      h += '</td>';
      h += '</tr>';
    });

    h += '</tbody></table></div>';

    // Bulk actie balk
    h += '<div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px">';
    h += '<span id="mail-selected-count" style="font-size:12px;color:var(--muted)">0 geselecteerd</span>';
    h += '<button class="btn btn-primary btn-sm" id="mail-bulk-send" disabled>📧 Verstuur selectie</button>';
    h += '<span style="font-size:11px;color:var(--muted)">Elke mail opent apart in Outlook</span>';
    h += '</div>';
    h += '</div>';
  }

  // ── Template beheer ────────────────────────────────────────────
  h += '<div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">';
  h += '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;margin-bottom:14px">E-mailtemplates</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">';
  Object.values(templates).forEach(function(tpl){
    h += '<div class="card" style="padding:12px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h += '<div style="font-weight:600;font-size:13px">'+esc(tpl.naam)+'</div>';
    h += '<button class="btn btn-ghost btn-sm mail-tpl-edit" data-id="'+tpl.id+'">✏️</button></div>';
    h += '<div style="font-size:11px;color:var(--muted)">'+esc(tpl.onderwerp.slice(0,50))+'...</div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div style="margin-top:12px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:12px;font-size:13px;color:var(--muted)">';
  h += '💡 Beschikbare variabelen: {klantNaam} {contactpersoon} {datum} {tijdVan} {tijdTot} {adres} {postcode} {plaats} {monteur} {type} <strong style="color:var(--accent)">{werkomschrijving}</strong>';
  h += '</div></div>';

  el.innerHTML = h;

  // ── Events ─────────────────────────────────────────────────────
  var getTplId = function(){ return document.getElementById('mail-tpl-keuze').value; };

  // Periode navigatie - gebruik closure vars
  var _prevStr = prevStr, _nextStr = nextStr;
  el.querySelector('#mail-prev').addEventListener('click', function(){ _mailPeriode=_prevStr; renderKlantmails(); });
  el.querySelector('#mail-next').addEventListener('click', function(){ _mailPeriode=_nextStr; renderKlantmails(); });

  // Selectie
  function updateBulkBtn(){
    var checked = el.querySelectorAll('.mail-check:checked').length;
    var cnt = el.querySelector('#mail-selected-count');
    var btn = el.querySelector('#mail-bulk-send');
    if(cnt) cnt.textContent = checked+' geselecteerd';
    if(btn) btn.disabled = checked === 0;
  }

  var selectAll = el.querySelector('#mail-select-all');
  if(selectAll) selectAll.addEventListener('change', function(){
    el.querySelectorAll('.mail-check:not(:disabled)').forEach(function(cb){ cb.checked = selectAll.checked; });
    updateBulkBtn();
  });
  el.querySelectorAll('.mail-check').forEach(function(cb){ cb.addEventListener('change', updateBulkBtn); });

  // Individueel versturen
  el.querySelectorAll('.mail-bulk-btn').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      stuurMail(btn.dataset.id, getTplId());
      // Update rij visueel na korte delay
      setTimeout(function(){ renderKlantmails(); }, 500);
    });
  });

  // Bulk versturen (met delay tussen mails zodat browser ze kan openen)
  var bulkSend = el.querySelector('#mail-bulk-send');
  if(bulkSend) bulkSend.addEventListener('click', function(){
    var checked = Array.from(el.querySelectorAll('.mail-check:checked')).map(function(cb){return cb.dataset.id;});
    if(!checked.length) return;
    var tplId = getTplId();
    var delay = 0;
    checked.forEach(function(opId){
      setTimeout(function(){
        stuurMail(opId, tplId);
      }, delay);
      delay += 800; // 800ms tussen elke mail
    });
    toast('📧 '+checked.length+' mails worden geopend in Outlook...', 'success');
    setTimeout(function(){ renderKlantmails(); }, delay + 500);
  });

  // Template bewerken
  el.querySelectorAll('.mail-tpl-edit').forEach(function(btn){
    btn.addEventListener('click', function(){ openMailTemplateEditor(btn.dataset.id); });
  });
}

function openMailTemplateEditor(tplId) {
  var tpl = getMailTemplates()[tplId]; if(!tpl) return;
  var b = '<div class="form-grid">';
  b += fgf('Naam template', finp('tpl-naam','text',tpl.naam,''));
  b += fgf('Onderwerp', finp('tpl-onderwerp','text',tpl.onderwerp,''));
  b += fgf('Tekst', '<textarea class="input" id="tpl-body" rows="14" style="font-family:monospace;font-size:12px;resize:vertical">'+esc(tpl.body)+'</textarea>');
  b += '</div><div style="font-size:11px;color:var(--muted);margin-top:8px">Gebruik: {klantNaam} {contactpersoon} {datum} {tijdVan} {tijdTot} {adres} {postcode} {plaats} {monteur} {type}</div>';
  var f = '<button class="btn btn-ghost" id="tpl-cancel">Annuleren</button><button class="btn btn-primary" id="tpl-save">Opslaan</button>';
  openModal('Template bewerken — '+esc(tpl.naam), b, f);
  document.getElementById('tpl-cancel').addEventListener('click', closeModal);
  document.getElementById('tpl-save').addEventListener('click', function(){
    if(!APP.mailTemplates) APP.mailTemplates = JSON.parse(JSON.stringify(MAIL_TEMPLATES_DEFAULT));
    APP.mailTemplates[tplId].naam      = document.getElementById('tpl-naam').value.trim();
    APP.mailTemplates[tplId].onderwerp = document.getElementById('tpl-onderwerp').value.trim();
    APP.mailTemplates[tplId].body      = document.getElementById('tpl-body').value;
    dbSaveItem('mailTemplates', tplId, APP.mailTemplates[tplId]);
    closeModal(); renderKlantmails(); toast('Template opgeslagen','success');
  });
}

// ═══════════════════════════════════════════════════════════════
var _instTab = 'bedrijf';

function renderInstellingen() {
  var el = document.getElementById('content');

  var tabs = [
    { k:'bedrijf',      l:'🏢 Bedrijf' },
    { k:'contracten',   l:'📋 Contracttypes' },
    { k:'opdrachten',   l:'🔧 Opdrachttypes' },
    { k:'rollen',       l:'🛡 Rollen & rechten' },
    { k:'planning',     l:'📅 Planning' },
    { k:'gebruikers',   l:'👤 Gebruikers' },
    { k:'goedkeuring',  l:'✓ Goedkeuring' },
  ];

  var h = '<div class="tabs" style="margin-bottom:20px;border-bottom:2px solid var(--border);padding-bottom:0;flex-wrap:wrap">';
  tabs.forEach(function(t){
    h += '<div class="tab'+(_instTab===t.k?' active':'')+'" data-inst-tab="'+t.k+'" style="white-space:nowrap">'+t.l+'</div>';
  });
  h += '</div><div id="inst-content"></div>';
  el.innerHTML = h;

  el.querySelectorAll('.tab[data-inst-tab]').forEach(function(t){
    t.addEventListener('click',function(){ _instTab=t.dataset.instTab; renderInstellingen(); });
  });

  var c = document.getElementById('inst-content');
  if      (_instTab==='bedrijf')    renderInstBedrijf(c);
  else if (_instTab==='contracten') renderInstContracten(c);
  else if (_instTab==='opdrachten') renderInstOpdrachten(c);
  else if (_instTab==='rollen')     renderInstRollen(c);
  else if (_instTab==='planning')   renderInstPlanning(c);
  else if (_instTab==='gebruikers') renderInstGebruikers(c);
  else if (_instTab==='goedkeuring')renderInstGoedkeuring(c);
}

// ── TAB: CONTRACTTYPES ───────────────────────────────────────────
function renderInstContracten(el) {
  var contracten = getContracten();
  var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h += '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:16px">Contracttypes</div>';
  h += '<button class="btn btn-primary btn-sm" id="ct-add">+ Nieuw contracttype</button></div>';
  h += '<div class="card" style="padding:0"><div class="table-wrap"><table style="width:100%"><thead><tr>';
  h += '<th>Code</th><th>Naam</th><th>Interval</th><th>Kleur</th><th style="width:100px"></th></tr></thead><tbody>';
  contracten.forEach(function(ct){
    h += '<tr>';
    h += '<td style="padding:10px 14px;font-weight:700;font-size:14px"><span class="tag" style="background:'+ct.kleur+'22;color:'+ct.kleur+'">'+esc(ct.code)+'</span></td>';
    h += '<td style="padding:10px 14px;font-size:13px">'+esc(ct.naam)+'</td>';
    h += '<td style="padding:10px 14px;font-size:12px;color:var(--muted)">'+(ct.intervalMaanden?ct.intervalMaanden+' mnd':'Op aanvraag')+'</td>';
    h += '<td style="padding:10px 14px"><div style="width:24px;height:24px;border-radius:50%;background:'+ct.kleur+'"></div></td>';
    h += '<td style="padding:6px 10px;white-space:nowrap"><button class="btn btn-ghost btn-sm ct-edit" data-id="'+ct.id+'">✏️</button><button class="btn btn-ghost btn-sm ct-del" data-id="'+ct.id+'" style="color:var(--red)">🗑</button></td>';
    h += '</tr>';
  });
  h += '</tbody></table></div></div>';
  el.innerHTML = h;
  el.querySelector('#ct-add').addEventListener('click', function(){ openContractModal(null); });
  el.querySelectorAll('.ct-edit').forEach(function(b){ b.addEventListener('click',function(){ openContractModal(b.dataset.id); }); });
  el.querySelectorAll('.ct-del').forEach(function(b){ b.addEventListener('click',function(){
    bevestigActie('Contracttype verwijderen','Weet je zeker dat je dit contracttype wilt verwijderen?',function(){
      APP.contracten = APP.contracten.filter(function(c){return c.id!==b.dataset.id;});
      FB.ref(dbPath('contracten')).set(APP.contracten);
      renderInstellingen();
    });
  }); });
}

function openContractModal(id) {
  var ct = id ? getContracten().find(function(c){return c.id===id;}) : {};
  ct = ct || {};
  var b = '<div class="form-grid">';
  b += fg('Code (bijv. A10)', finp('ct-code','text',ct.code||'',''));
  b += fg('Naam', finp('ct-naam','text',ct.naam||'',''));
  b += fg('Interval (maanden, 0=op aanvraag)', finp('ct-interval','number',ct.intervalMaanden||0,''));
  b += fg('Frequentie/jaar', finp('ct-freq','number',ct.frequentie||1,''));
  b += fg('Kleur', '<input type="color" id="ct-kleur" value="'+(ct.kleur||'#3b82f6')+'" style="width:60px;height:36px;border:none;border-radius:6px;cursor:pointer;background:none">');
  b += fgf('Standaard werkomschrijving', '<textarea class="input" id="ct-werk" rows="3">'+esc(ct.werkomschrijving||'')+'</textarea>');
  b += '</div>';
  var f = '<button class="btn btn-ghost" id="ct-cancel">Annuleren</button><button class="btn btn-primary" id="ct-save">Opslaan</button>';
  openModal(id?'Contracttype bewerken':'Nieuw contracttype', b, f);
  document.getElementById('ct-cancel').addEventListener('click', closeModal);
  document.getElementById('ct-save').addEventListener('click', function(){
    var code = document.getElementById('ct-code').value.trim();
    if(!code){toast('Code is verplicht','error');return;}
    var data = {
      id: id||code, code: code,
      naam:            document.getElementById('ct-naam').value.trim(),
      intervalMaanden: parseInt(document.getElementById('ct-interval').value)||0,
      frequentie:      parseFloat(document.getElementById('ct-freq').value)||1,
      kleur:           document.getElementById('ct-kleur').value,
      werkomschrijving:document.getElementById('ct-werk').value.trim(),
    };
    if(!APP.contracten||!APP.contracten.length) APP.contracten = getContracten().slice();
    var idx = APP.contracten.findIndex(function(c){return c.id===id;});
    if(idx>-1) APP.contracten[idx]=data; else APP.contracten.push(data);
    FB.ref(dbPath('contracten')).set(APP.contracten);
    closeModal(); renderInstellingen(); toast('Contracttype opgeslagen','success');
  });
}

function openOpdrachtTypeModal(id) {
  var ot = id ? getOpdrachttypes().find(function(o){return o.id===id;}) : {};
  ot = ot||{};
  var b = '<div class="form-grid">';
  b += fg('ID (intern, geen spaties)', finp('ot-id','text',ot.id||'','bijv. inspectie'));
  b += fg('Label', finp('ot-label','text',ot.label||'','bijv. Inspectie'));
  b += fg('Icoon (emoji)', finp('ot-icon','text',ot.icon||'🔧',''));
  b += fg('Kleur', '<input type="color" id="ot-kleur" value="'+(ot.kleur||'#6b7694')+'" style="width:60px;height:36px;border:none;border-radius:6px;cursor:pointer;background:none">');
  b += '</div>';
  var f = '<button class="btn btn-ghost" id="ot-cancel">Annuleren</button><button class="btn btn-primary" id="ot-save">Opslaan</button>';
  openModal(id?'Opdrachttype bewerken':'Nieuw opdrachttype', b, f);
  document.getElementById('ot-cancel').addEventListener('click', closeModal);
  document.getElementById('ot-save').addEventListener('click', function(){
    var otId = document.getElementById('ot-id').value.trim().replace(/\s+/g,'_');
    if(!otId){toast('ID is verplicht','error');return;}
    var data = { id:id||otId, label:document.getElementById('ot-label').value.trim(), icon:document.getElementById('ot-icon').value.trim()||'🔧', kleur:document.getElementById('ot-kleur').value };
    if(!APP.opdrachttypes||!APP.opdrachttypes.length) APP.opdrachttypes = getOpdrachttypes().slice();
    var idx=APP.opdrachttypes.findIndex(function(o){return o.id===id;});
    if(idx>-1) APP.opdrachttypes[idx]=data; else APP.opdrachttypes.push(data);
    FB.ref(dbPath('opdrachttypes')).set(APP.opdrachttypes);
    closeModal(); renderInstellingen(); toast('Opdrachttype opgeslagen','success');
  });
}

// ── TAB: ROLLEN & RECHTEN ─────────────────────────────────────────
function renderInstRollen(el) {
  var rollen  = APP.rollen || {};
  var modules = [
    {k:'dashboard',     l:'Dashboard'},
    {k:'planning',      l:'Planning'},
    {k:'serviceklanten',l:'Serviceklanten'},
    {k:'debiteuren',    l:'Debiteuren'},
    {k:'medewerkers',   l:'Medewerkers'},
    {k:'verlof',        l:'Verlof'},
    {k:'overuren',      l:'Overuren'},
    {k:'onkosten',      l:'Onkosten'},
    {k:'verzuim',       l:'Verzuim'},
    {k:'storingsdienst',l:'Storingsdienst'},
    {k:'locatie',       l:'Live Locatie'},
    {k:'klantmails',    l:'Klantmails'},
    {k:'rapportage',    l:'Rapportage'},
    {k:'instellingen',  l:'Instellingen'},
  ];
  var rolNamen = Object.keys(rollen);
  if(!rolNamen.length) rolNamen = ['admin','planner','monteur','extern','verkoop','administratie','magazijn'];

  var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">';
  h += '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:16px">Rollen & rechten</div>';
  h += '<button class="btn btn-primary btn-sm" id="rol-nieuw">+ Nieuwe rol</button></div>';

  // Rol beheer chips
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">';
  rolNamen.forEach(function(r){
    var rol = rollen[r]||{};
    var kl  = rol.kleur||'#6b7694';
    h += '<div style="display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px 8px 4px 10px">';
    h += '<div style="width:10px;height:10px;border-radius:50%;background:'+kl+';flex-shrink:0"></div>';
    h += '<span style="font-size:13px;font-weight:600">'+esc(r)+'</span>';
    if(r!=='admin') {
      h += '<button class="btn-icon rol-bewerk" data-rol="'+r+'" title="Bewerken" style="background:none;border:none;cursor:pointer;color:var(--muted);padding:2px 4px;font-size:12px">✏️</button>';
      h += '<button class="btn-icon rol-verwijder" data-rol="'+r+'" title="Verwijderen" style="background:none;border:none;cursor:pointer;color:var(--red);padding:2px 4px;font-size:12px">×</button>';
    } else {
      h += '<span style="font-size:12px;margin-left:4px">⭐</span>';
    }
    h += '</div>';
  });
  h += '</div>';

  // Rechten matrix
  h += '<div class="table-wrap" style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">';
  h += '<table style="width:100%;border-collapse:collapse"><thead><tr style="background:var(--surface2)">';
  h += '<th style="padding:8px 14px;text-align:left;min-width:140px">Module</th>';
  rolNamen.forEach(function(r){
    var rol = rollen[r]||{}; var kl = rol.kleur||'#6b7694';
    h += '<th style="padding:8px 10px;text-align:center;min-width:80px"><span style="font-size:12px;font-weight:700;color:'+kl+'">'+esc(r)+'</span></th>';
  });
  h += '</tr></thead><tbody>';

  modules.forEach(function(mod, mi){
    h += '<tr style="'+(mi%2===0?'background:var(--surface)':'background:var(--surface2)')+';border-bottom:1px solid var(--border)">';
    h += '<td style="padding:8px 14px;font-size:13px;font-weight:500">'+mod.l+'</td>';
    rolNamen.forEach(function(r){
      var rDef = rollen[r]||{};
      var rechten = rDef.rechten||{};
      var lezen    = rechten[mod.k] ? rechten[mod.k].lezen!==false : true;
      var schrijven= rechten[mod.k] ? rechten[mod.k].schrijven===true : false;
      h += '<td style="padding:6px 10px;text-align:center">';
      if(r==='admin'){
        h += '<span title="Admin: altijd volledige toegang" style="font-size:16px">⭐</span>';
      } else {
        h += '<div style="display:flex;flex-direction:column;align-items:center;gap:4px">';
        h += '<label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;color:var(--muted)">';
        h += '<input type="checkbox" class="rol-lezen-cb" data-rol="'+r+'" data-mod="'+mod.k+'"'+(lezen?' checked':'')+' style="width:13px;height:13px">L</label>';
        h += '<label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:11px;color:var(--accent)">';
        h += '<input type="checkbox" class="rol-schrijven-cb" data-rol="'+r+'" data-mod="'+mod.k+'"'+(schrijven?' checked':'')+' style="width:13px;height:13px;accent-color:var(--accent)">S</label>';
        h += '</div>';
      }
      h += '</td>';
    });
    h += '</tr>';
  });
  h += '</tbody></table></div>';
  h += '<div style="font-size:11px;color:var(--muted);margin-top:8px">L = Lezen &nbsp;·&nbsp; S = Schrijven/bewerken &nbsp;·&nbsp; ⭐ = Admin heeft altijd volledige toegang</div>';
  h += '<div style="margin-top:14px"><button class="btn btn-primary" id="rol-save">Rechten opslaan</button></div>';
  el.innerHTML = h;

  // Nieuwe rol aanmaken
  el.querySelector('#rol-nieuw').addEventListener('click', function(){ openRolModal(null, rollen); });

  // Bewerk/verwijder rol
  el.querySelectorAll('.rol-bewerk').forEach(function(b){
    b.addEventListener('click',function(){ openRolModal(b.dataset.rol, rollen); });
  });
  el.querySelectorAll('.rol-verwijder').forEach(function(b){
    b.addEventListener('click',function(){
      bevestigActie('Rol verwijderen','Weet je zeker dat je de rol "'+b.dataset.rol+'" wilt verwijderen? Medewerkers met deze rol verliezen hun rechten.',function(){
        var nieuweRollen = JSON.parse(JSON.stringify(APP.rollen||{}));
        delete nieuweRollen[b.dataset.rol];
        APP.rollen = nieuweRollen;
        FB.ref(dbPath('rollen')).set(nieuweRollen);
        renderInstellingen(); toast('Rol verwijderd','success');
      });
    });
  });

  // Rechten opslaan
  el.querySelector('#rol-save').addEventListener('click', function(){
    var nieuweRechten = JSON.parse(JSON.stringify(APP.rollen||{}));
    rolNamen.forEach(function(r){ if(!nieuweRechten[r]) nieuweRechten[r]={naam:r,kleur:'#6b7694',rechten:{}}; });
    el.querySelectorAll('.rol-lezen-cb').forEach(function(cb){
      var r=cb.dataset.rol, m=cb.dataset.mod;
      if(!nieuweRechten[r]) return;
      if(!nieuweRechten[r].rechten) nieuweRechten[r].rechten={};
      if(!nieuweRechten[r].rechten[m]) nieuweRechten[r].rechten[m]={};
      nieuweRechten[r].rechten[m].lezen = cb.checked;
    });
    el.querySelectorAll('.rol-schrijven-cb').forEach(function(cb){
      var r=cb.dataset.rol, m=cb.dataset.mod;
      if(!nieuweRechten[r]) return;
      if(!nieuweRechten[r].rechten) nieuweRechten[r].rechten={};
      if(!nieuweRechten[r].rechten[m]) nieuweRechten[r].rechten[m]={};
      nieuweRechten[r].rechten[m].schrijven = cb.checked;
    });
    APP.rollen = nieuweRechten;
    FB.ref(dbPath('rollen')).set(nieuweRechten);
    toast('Rechten opgeslagen','success');
  });
}

function openRolModal(rolId, rollen) {
  var bestaand = rolId ? (rollen[rolId]||{}) : {};
  var b = '<div class="form-grid">';
  b += fg('Rolnaam (intern, geen spaties)', '<input class="input" id="rm-naam" value="'+esc(rolId||'')+'"'+(rolId?' readonly style="opacity:.6"':'')+' placeholder="bijv. teamleider">');
  b += fg('Weergavenaam', finp('rm-label','text',bestaand.naam||rolId||'','bijv. Teamleider'));
  b += fg('Kleur', '<input type="color" id="rm-kleur" value="'+(bestaand.kleur||'#6b7694')+'" style="width:60px;height:36px;border:none;border-radius:6px;cursor:pointer">');
  b += '</div>';
  var f = '<button class="btn btn-ghost" id="rm-cancel">Annuleren</button><button class="btn btn-primary" id="rm-save">Opslaan</button>';
  openModal(rolId?'Rol bewerken':'Nieuwe rol aanmaken', b, f);
  document.getElementById('rm-cancel').addEventListener('click', closeModal);
  document.getElementById('rm-save').addEventListener('click', function(){
    var naam = document.getElementById('rm-naam').value.trim().toLowerCase().replace(/\s+/g,'_');
    if(!naam){toast('Rolnaam is verplicht','error');return;}
    var nieuweRollen = JSON.parse(JSON.stringify(APP.rollen||{}));
    nieuweRollen[naam] = Object.assign({}, bestaand, {
      naam:  document.getElementById('rm-label').value.trim() || naam,
      kleur: document.getElementById('rm-kleur').value,
      rechten: bestaand.rechten || {},
    });
    APP.rollen = nieuweRollen;
    FB.ref(dbPath('rollen')).set(nieuweRollen);
    closeModal(); renderInstellingen();
    toast(rolId?'Rol bijgewerkt':'Nieuwe rol aangemaakt: '+naam,'success');
  });
}

  });
  h += '</div>';
  h += '<button class="btn btn-primary btn-sm" id="planrol-save" style="margin-top:14px">Opslaan</button></div>';

  // Blokkadedagen
  h += '<div class="card"><div style="font-family:Syne,sans-serif;font-weight:700;font-size:15px;margin-bottom:14px">Blokkadedagen</div>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:12px">Dagen waarop niet ingepland mag worden (feestdagen, bedrijfssluitingen).</p>';
  h += '<div id="blokkade-lijst" style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">';
  Object.keys(blokkades).sort().forEach(function(datum){
    h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:8px">';
    h += '<div style="flex:1"><div style="font-size:13px;font-weight:600">'+fmtD(datum)+'</div>';
    h += '<div style="font-size:12px;color:var(--muted)">'+esc(blokkades[datum].label||'Geblokkeerd')+'</div></div>';
    h += '<button class="btn btn-ghost btn-sm blok-del" data-datum="'+datum+'" style="color:var(--red)">🗑</button></div>';
  });
  if(!Object.keys(blokkades).length) h += '<div style="font-size:13px;color:var(--muted)">Geen blokkadedagen ingesteld</div>';
  h += '</div>';
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
  h += '<input type="date" class="input" id="blok-datum" style="width:160px">';
  h += '<input type="text" class="input" id="blok-label" placeholder="Omschrijving (bijv. Kerst)" style="flex:1;min-width:140px">';
  h += '<button class="btn btn-primary btn-sm" id="blok-add">+ Toevoegen</button></div></div>';
  h += '</div>';

  el.innerHTML = h;

  // Planningrollen opslaan
  el.querySelector('#planrol-save').addEventListener('click', function(){
    var nieuweRollen = Array.from(el.querySelectorAll('.planrol-cb:checked')).map(function(cb){return cb.dataset.rol;});
    APP.planningRollen = nieuweRollen;
    FB.ref(dbPath('instellingen','planningRollen')).set(nieuweRollen);
    toast('Planningrollen opgeslagen','success');
  });

  // Blokkadedag toevoegen
  el.querySelector('#blok-add').addEventListener('click', function(){
    var datum = document.getElementById('blok-datum').value;
    var label = document.getElementById('blok-label').value.trim();
    if(!datum){toast('Kies een datum','error');return;}
    if(!APP.blokkadeDagen) APP.blokkadeDagen={};
    APP.blokkadeDagen[datum] = {label:label||'Geblokkeerd', datum:datum};
    FB.ref(dbPath('instellingen','blokkadeDagen')).set(APP.blokkadeDagen);
    renderInstellingen();
    toast('Blokkadedag toegevoegd: '+fmtD(datum),'success');
  });

  // Blokkadedag verwijderen
  el.querySelectorAll('.blok-del').forEach(function(b){
    b.addEventListener('click',function(){
      delete APP.blokkadeDagen[b.dataset.datum];
      FB.ref(dbPath('instellingen','blokkadeDagen')).set(APP.blokkadeDagen||{});
      renderInstellingen();
    });
  });
}

// ── TAB: GEBRUIKERS ───────────────────────────────────────────────
function renderInstGebruikers(el) {
  var h = '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:16px;margin-bottom:8px">Gebruikers</div>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:16px">Gebruikers zijn gekoppeld aan medewerkers. Beheer ze via de Medewerkers module. Hier zie je de huidige login-status.</p>';
  h += '<div class="card" style="padding:0"><div class="table-wrap"><table style="width:100%"><thead><tr>';
  h += '<th>Medewerker</th><th>E-mail (login)</th><th>Rol</th><th>Status</th></tr></thead><tbody>';

  APP.medewerkers.forEach(function(m){
    var kl = (APP.rollen[m.rol]||{}).kleur||m.kleur||'#6b7694';
    h += '<tr>';
    h += '<td style="padding:10px 14px"><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:28px;height:28px;font-size:10px;background:'+kl+';color:#fff">'+initials(m)+'</div><span style="font-weight:600">'+esc(m.voornaam+' '+m.achternaam)+'</span></div></td>';
    h += '<td style="padding:10px 14px;font-size:13px;color:var(--accent)">'+esc(m.email||'—')+'</td>';
    h += '<td style="padding:10px 14px"><span class="tag" style="background:'+kl+'22;color:'+kl+'">'+esc(m.rol||'—')+'</span></td>';
    h += '<td style="padding:10px 14px">'+(m.status==='actief'?'<span class="tag tag-green">Actief</span>':'<span class="tag tag-muted">'+esc(m.status||'—')+'</span>')+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div></div>';
  h += '<div style="margin-top:14px;background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:8px;padding:12px;font-size:13px;color:var(--muted)">';
  h += '💡 Gebruikers loggen in met hun e-mailadres uit de Medewerkers module. Wachtwoorden worden beheerd via Firebase Authentication.';
  h += '</div>';
  el.innerHTML = h;
}

// ── TAB: GOEDKEURING ─────────────────────────────────────────────
function renderInstGoedkeuring(el) {
  var inst = APP.goedkeuringInst || {};
  // inst structuur:
  // { verlof: { rollen:['admin'], medewerkers:['medId1'] }, ... }

  var goedkeuringModules = [
    { k:'verlof',    l:'Verlofaanvragen',      icon:'🏖' },
    { k:'overuren',  l:'Overuren',             icon:'⏱' },
    { k:'onkosten',  l:'Onkosten declaraties', icon:'💶' },
    { k:'verzuim',   l:'Verzuim',              icon:'🤒' },
  ];

  var h = '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:16px;margin-bottom:8px">Goedkeuring instellen</div>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:20px">Stel per module in wie goedkeuring mag verlenen — via rol of per specifieke medewerker.</p>';
  h += '<div style="display:flex;flex-direction:column;gap:16px">';

  goedkeuringModules.forEach(function(mod){
    var huidig = inst[mod.k] || { rollen:['admin'], medewerkers:[] };
    if(Array.isArray(huidig)) huidig = { rollen: huidig, medewerkers: [] }; // backward compat
    var hRollen = huidig.rollen || ['admin'];
    var hMeds   = huidig.medewerkers || [];

    var alleRollen = Object.keys(APP.rollen||{});
    if(!alleRollen.length) alleRollen=['admin','planner','administratie'];

    h += '<div class="card" style="padding:14px">';
    h += '<div style="font-weight:700;font-size:14px;margin-bottom:14px">'+mod.icon+' '+mod.l+'</div>';

    // Rollen sectie
    h += '<div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Via rol</div>';
    h += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">';
    alleRollen.forEach(function(r){
      var rol = (APP.rollen||{})[r]||{};
      var kl  = rol.kleur||'#6b7694';
      var checked = hRollen.indexOf(r)>=0;
      h += '<label style="display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--surface2);border-radius:8px;cursor:pointer;border:1px solid '+(checked?kl:'var(--border)')+'">';
      h += '<input type="checkbox" class="gk-rol-cb" data-mod="'+mod.k+'" data-rol="'+r+'"'+(checked?' checked':'')+' style="width:13px;height:13px">';
      h += '<span style="font-size:12px;font-weight:600;color:'+kl+'">'+esc(r)+'</span></label>';
    });
    h += '</div>';

    // Medewerkers sectie
    h += '<div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Of specifieke medewerker(s)</div>';
    h += '<div style="display:flex;flex-wrap:wrap;gap:8px">';
    APP.medewerkers.filter(function(m){return m.status!=='inactief';}).forEach(function(m){
      var rol = (APP.rollen||{})[m.rol]||{};
      var kl  = rol.kleur||m.kleur||'#6b7694';
      var checked = hMeds.indexOf(String(m.id))>=0;
      h += '<label style="display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--surface2);border-radius:8px;cursor:pointer;border:1px solid '+(checked?kl:'var(--border)')+'">';
      h += '<input type="checkbox" class="gk-med-cb" data-mod="'+mod.k+'" data-med="'+m.id+'"'+(checked?' checked':'')+' style="width:13px;height:13px">';
      h += '<div class="avatar" style="width:20px;height:20px;font-size:8px;background:'+kl+';color:#fff">'+initials(m)+'</div>';
      h += '<span style="font-size:12px;font-weight:500">'+esc(m.voornaam+' '+m.achternaam)+'</span></label>';
    });
    h += '</div></div>';
  });

  h += '</div><div style="margin-top:16px"><button class="btn btn-primary" id="goedkeuring-save">Opslaan</button></div>';
  el.innerHTML = h;

  el.querySelector('#goedkeuring-save').addEventListener('click', function(){
    var nieuw = {};
    goedkeuringModules.forEach(function(mod){
      var rollen = Array.from(el.querySelectorAll('.gk-rol-cb[data-mod="'+mod.k+'"]:checked')).map(function(cb){return cb.dataset.rol;});
      var meds   = Array.from(el.querySelectorAll('.gk-med-cb[data-mod="'+mod.k+'"]:checked')).map(function(cb){return cb.dataset.med;});
      if(!rollen.length && !meds.length) rollen=['admin'];
      nieuw[mod.k] = { rollen:rollen, medewerkers:meds };
    });
    APP.goedkeuringInst = nieuw;
    FB.ref(dbPath('instellingen','goedkeuring')).set(nieuw);
    toast('Goedkeuringsinstellingen opgeslagen','success');
  });
}

// ═══════════════════════════════════════════════
// EVENT LISTENERS (op veilige manier, geen inline)
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', function() {
  // Login
  // Hamburger menu
  var hamburger = document.getElementById('hamburger');
  var sidebarOverlay = document.getElementById('sidebar-overlay');
  var sidebar = document.getElementById('sidebar');
  if (hamburger) {
    hamburger.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('open');
    });
  }
  if (sidebarOverlay) {
    sidebarOverlay.addEventListener('click', function() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    });
  }

  // Bottom nav
  document.querySelectorAll('#bottom-nav .bn-item').forEach(function(btn) {
    btn.addEventListener('click', function() {
      toonPagina(btn.dataset.page);
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    });
  });

  document.getElementById('login-btn').addEventListener('click', doLogin);
  document.getElementById('login-email').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('login-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('pw-vergeten-btn').addEventListener('click',function(){
    var email=document.getElementById('login-email').value.trim();
    if(!email){alert('Voer eerst je e-mailadres in.');return;}
    AUTH.sendPasswordResetEmail(email).then(function(){toast('Reset e-mail verstuurd','success');}).catch(function(e){toast('Mislukt: '+e.message,'error');});
  });

  // App
  document.getElementById('uitloggen-btn').addEventListener('click', doUitloggen);
  document.getElementById('theme-btn').addEventListener('click', function(){document.body.classList.toggle('light');});

  // Modal/Panel
  document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('panel-overlay').addEventListener('click', closePanel);
  document.getElementById('panel-close').addEventListener('click', closePanel);

  // Log panel
  var logPanel=document.getElementById('log-panel');
  function toggleLog(){logPanel.classList.toggle('hidden');if(!logPanel.classList.contains('hidden'))refreshLog();}
  document.getElementById('log-btn').addEventListener('click', toggleLog);
  document.getElementById('toggle-log-btn').addEventListener('click', toggleLog);
  document.getElementById('log-clear').addEventListener('click',function(){LOGS=[];refreshLog();});
  document.getElementById('log-close').addEventListener('click',function(){logPanel.classList.add('hidden');});
});
</script>
</body>
