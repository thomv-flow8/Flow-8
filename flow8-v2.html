// ── TAB: BEDRIJFSGEGEVENS ────────────────────────────────────────
function renderInstBedrijf(el) {
  var bg = APP.bedrijfGegevens || {};
  var h = '<div class="card" style="max-width:600px"><div style="font-family:Syne,sans-serif;font-weight:700;font-size:16px;margin-bottom:16px">Bedrijfsgegevens</div>';
  h += '<div class="form-grid">';
  h += fg('Bedrijfsnaam',    finp('bg-naam','text',    bg.naam||'Homa Pompen B.V.',''));
  h += fg('Adres',           finp('bg-adres','text',   bg.adres||'',''));
  h += fg('Postcode',        finp('bg-pc','text',      bg.postcode||'',''));
  h += fg('Plaats',          finp('bg-pl','text',      bg.plaats||'',''));
  h += fg('Telefoon',        finp('bg-tel','tel',      bg.telefoon||'',''));
  h += fg('E-mail service',  finp('bg-email','email',  bg.email||'',''));
  h += fg('Website',         finp('bg-web','url',      bg.website||'',''));
  h += fg('KvK-nummer',      finp('bg-kvk','text',     bg.kvk||'',''));
  h += fg('BTW-nummer',      finp('bg-btw','text',     bg.btw||'',''));
  h += '<div style="grid-column:1/-1"><label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:10px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)">'
    + '<input type="checkbox" id="bg-kaart"'+(bg.toonOpKaart?' checked':'')+' style="width:15px;height:15px;accent-color:var(--accent)">'
    + '<div><div style="font-size:13px;font-weight:600">Toon bedrijfslocatie op kaart</div>'
    + '<div style="font-size:11px;color:var(--muted)">Toont een marker op de Live Locatie kaart met het bedrijfsadres als vertrekpunt</div></div>'
    + '</label></div>';
  h += '</div>';
  h += '<div style="margin-top:8px;font-size:12px;color:var(--muted)">Deze gegevens worden gebruikt in mailtemplate-variabelen: {bedrijfNaam} {bedrijfTel} {bedrijfEmail}</div>';

  // Logo upload voor Live Locatie
  h += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">';
  h += '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;margin-bottom:12px">Bedrijfslogo</div>';
  h += '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Het logo wordt getoond op de Live Locatie kaart als marker voor de bedrijfslocatie.</div>';
  if(bg.logo) {
    h += '<div style="margin-bottom:12px;display:flex;align-items:center;gap:12px">';
    h += '<img src="'+bg.logo+'" style="height:52px;width:auto;border-radius:8px;border:1px solid var(--border);background:#fff;padding:4px;object-fit:contain" alt="Bedrijfslogo">';
    h += '<button class="btn btn-ghost btn-sm" id="bg-logo-verwijder" style="color:var(--red)">🗑 Verwijderen</button>';
    h += '</div>';
  }
  h += '<label class="btn btn-ghost btn-sm" style="cursor:pointer;display:inline-flex;align-items:center;gap:6px">';
  h += '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';
  h += bg.logo ? 'Ander logo uploaden' : 'Logo uploaden (PNG, SVG, JPG)';
  h += '<input type="file" id="bg-logo-input" accept="image/png,image/jpeg,image/svg+xml,image/webp" style="display:none"></label>';
  h += '</div>';

  h += '<div style="margin-top:16px"><button class="btn btn-primary" id="bg-save">Opslaan</button></div></div>';
  el.innerHTML = h;

  // Logo upload handler
  var logoInput = el.querySelector('#bg-logo-input');
  if(logoInput) logoInput.addEventListener('change', async function(){
    var file = logoInput.files[0]; if(!file) return;
    if(file.size > 2000000) { toast('Logo te groot — max 2MB','error'); return; }
    toast('Logo uploaden...','success');
    try {
      // Verwijder oud logo uit Storage als het een Storage URL is
      var oudLogo = (APP.bedrijfGegevens||{}).logo;
      if(oudLogo && oudLogo.startsWith('https://firebasestorage')) {
        await storageVerwijder(oudLogo);
      }
      var url = await storageUpload('instellingen/logo/bedrijf_logo.'+file.name.split('.').pop(), file);
      var data = Object.assign({}, APP.bedrijfGegevens || {}, { logo: url });
      APP.bedrijfGegevens = data;
      FB.ref(dbPath('instellingen','bedrijf')).set(data);
      toast('Logo opgeslagen','success');
      renderInstBedrijf(el);
    } catch(e) {
      toast('Fout bij uploaden: '+e.message,'error');
    }
  });

  // Logo verwijderen
  var logoVerw = el.querySelector('#bg-logo-verwijder');
  if(logoVerw) logoVerw.addEventListener('click', async function(){
    var data = Object.assign({}, APP.bedrijfGegevens || {});
    // Verwijder uit Storage als het een Storage URL is
    if(data.logo && data.logo.startsWith('https://firebasestorage')) {
      await storageVerwijder(data.logo);
    }
    delete data.logo;
    APP.bedrijfGegevens = data;
    FB.ref(dbPath('instellingen','bedrijf')).set(data);
    toast('Logo verwijderd','success');
    renderInstBedrijf(el);
  });
  el.querySelector('#bg-save').addEventListener('click', function(){
    var data = {
      naam:       document.getElementById('bg-naam').value.trim(),
      adres:      document.getElementById('bg-adres').value.trim(),
      postcode:   document.getElementById('bg-pc').value.trim(),
      plaats:     document.getElementById('bg-pl').value.trim(),
      telefoon:   document.getElementById('bg-tel').value.trim(),
      email:      document.getElementById('bg-email').value.trim(),
      website:    document.getElementById('bg-web').value.trim(),
      kvk:        document.getElementById('bg-kvk').value.trim(),
      btw:        document.getElementById('bg-btw').value.trim(),
      toonOpKaart: document.getElementById('bg-kaart') ? document.getElementById('bg-kaart').checked : !!(APP.bedrijfGegevens&&APP.bedrijfGegevens.toonOpKaart),
      // Bewaar het logo — anders wordt het overschreven door de save
      logo: (APP.bedrijfGegevens && APP.bedrijfGegevens.logo) || null,
    };
    // Verwijder null logo zodat Firebase het niet opslaat als null
    if(!data.logo) delete data.logo;
    APP.bedrijfGegevens = data;
    FB.ref(dbPath('instellingen','bedrijf')).set(data);
    toast('Bedrijfsgegevens opgeslagen','success');
  });
}

// ── TAB: NOTIFICATIES ───────────────────────────────────────────
function renderInstNotificaties(el) {
  var inst = APP.notifInstellingen || {};

  function toggleRow(key, label, uitleg) {
    var aan = inst[key] !== false;
    return '<label style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer">'
      + '<div style="flex:1"><div style="font-size:13px;font-weight:600">'+label+'</div>'

      + '</div>'
      + '<div style="position:relative;width:40px;height:22px;flex-shrink:0;margin-top:2px">'
      + '<input type="checkbox" class="notif-toggle" data-key="'+key+'" '+(aan?'checked':'')+' style="opacity:0;width:0;height:0;position:absolute">'
      + '<div class="notif-track" style="position:absolute;inset:0;border-radius:11px;background:'+(aan?'var(--accent)':'var(--border)')+';transition:background .2s;cursor:pointer">'
      + '<div style="position:absolute;top:3px;left:'+(aan?'21':'3')+'px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)"></div>'
      + '</div></div>'

  }

  function sectie(titel, rijen) {
    return '<div class="card" style="margin-bottom:16px;padding:16px 20px">'
      + '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;margin-bottom:4px">'+titel+'</div>'
      + rijen + '</div>';
  }

  var h = '<div style="max-width:640px">';
  h += '<div style="font-size:13px;color:var(--muted);margin-bottom:20px">Schakel in-app notificaties in of uit per module en gebeurtenis. Notificaties zijn zichtbaar via het belletje rechtsboven.</div>';

  h += sectie('Verlof',
    toggleRow('verlof_goedgekeurd', 'Verlof goedgekeurd', 'Medewerker ontvangt een notificatie als verlof wordt goedgekeurd') +
    toggleRow('verlof_afgewezen',   'Verlof afgewezen',   'Medewerker ontvangt een notificatie als verlof wordt afgewezen')
  );

  h += sectie('Overuren',
    toggleRow('overuren_gecompenseerd', 'Goedgekeurd & gecompenseerd', 'Medewerker ontvangt een notificatie als overuren worden goedgekeurd en gecompenseerd') +
    toggleRow('overuren_afgewezen',     'Afgewezen',                   'Medewerker ontvangt een notificatie als overuren worden afgewezen') +
    toggleRow('overuren_uitbetaald',    'Uitbetaald',                  'Medewerker ontvangt een notificatie als overuren worden uitbetaald')
  );

  h += sectie('Onkosten',
    toggleRow('onkosten_goedgekeurd', 'Goedgekeurd', 'Medewerker ontvangt een notificatie als declaratie wordt goedgekeurd') +
    toggleRow('onkosten_afgewezen',   'Afgewezen',   'Medewerker ontvangt een notificatie als declaratie wordt afgewezen') +
    toggleRow('onkosten_uitbetaald',  'Uitbetaald',  'Medewerker ontvangt een notificatie als declaratie wordt uitbetaald')
  );

  h += sectie('Verzuim',
    toggleRow('verzuim_ziekmelding', 'Ziekmelding geregistreerd', 'Medewerker ontvangt bevestiging + beheerders ontvangen een melding') +
    toggleRow('verzuim_hersteld',    'Hersteld gemeld',            'Medewerker ontvangt een notificatie als verzuim wordt afgesloten')
  );

  h += sectie('Overige',
    toggleRow('verjaardag_verjaardag', 'Verjaardag collega', 'Iedereen ontvangt een notificatie als een collega jarig is')
  );

  h += '</div>';
  el.innerHTML = h;

  // Toggle events
  el.querySelectorAll('.notif-toggle').forEach(function(cb){
    cb.addEventListener('change', function(){
      var key = cb.dataset.key;
      inst[key] = cb.checked;
      APP.notifInstellingen = inst;
      FB.ref(dbPath('instellingen','notificaties')).set(inst);
      // Update toggle visueel
      var track = cb.nextElementSibling;
      if(track) {
        track.style.background = cb.checked ? 'var(--accent)' : 'var(--border)';
        var knop = track.firstElementChild;
        if(knop) knop.style.left = cb.checked ? '21px' : '3px';
      }
      toast(cb.checked ? 'Notificatie ingeschakeld' : 'Notificatie uitgeschakeld', 'success');
    });
    // Klik op track triggert checkbox
    var track = cb.nextElementSibling;
    if(track) track.addEventListener('click', function(){ cb.click(); });
  });
}

    if(!geselecteerd.length){ toast('Selecteer minimaal één module','error'); return; }
    toast('Bezig met exporteren...','success');
    var exportData={
      meta:{ versie:APP_VERSION, exportDatum:new Date().toISOString(), bedrijfId:APP.bedrijfId, bedrijfNaam:(APP.bedrijfGegevens||{}).naam||APP.bedrijfId, modules:geselecteerd },
      data:{}
    };

      var mod=geselecteerd[i];
      try{ var snap=await FB.ref(dbPath(mod)).once('value'); exportData.data[mod]=snap.val()||null; }
      catch(e){ exportData.data[mod]=null; }
    }
    var json=JSON.stringify(exportData,null,2);
    var blob=new Blob([json],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download='flow8_export_'+(APP.bedrijfId||'demo')+'_'+new Date().toISOString().slice(0,10)+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);

    reader.onload=function(e){
      try{
        var data=JSON.parse(e.target.result);
        if(!data.meta||!data.data){ toast('Ongeldig exportbestand','error'); return; }
        var moduleList=Object.keys(data.data).filter(function(k){ return data.data[k]!==null; });
        var prev=el.querySelector('#imp-preview');

        prev.innerHTML='<div style="background:var(--surface2);border-radius:8px;padding:12px 16px;border:1px solid var(--border)">'
          +'<div style="font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Bestand geanalyseerd</div>'

          +'<div style="font-size:12px;color:var(--muted);margin-bottom:3px">Bron: <code>'+esc(data.meta.bedrijfId)+'</code> — '+esc(data.meta.bedrijfNaam||'')+'</div>'
          +'<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Modules: '+moduleList.map(function(m){return'<span class="tag">'+esc(m)+'</span>';}).join(' ')+'</div>'
          +'<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:12px">'
          +'⚠️ Bestaande data in <strong>'+esc(APP.bedrijfId)+'</strong> wordt overschreven.</div>'
          +'<button class="btn btn-primary" id="imp-bevestig" style="background:var(--red)">⚠️ Importeer naar '+esc(APP.bedrijfId)+'</button>'
          +'</div>';
        prev.querySelector('#imp-bevestig').addEventListener('click',function(){
          bevestigActie('⚠️ Import bevestigen','Weet je zeker dat je '+moduleList.length+' modules importeert naar "'+APP.bedrijfId+'"? Dit kan niet ongedaan worden gemaakt.',async function(){
            toast('Bezig met importeren...','success');
            var errors=[];
            for(var i=0;i<moduleList.length;i++){
              var mod=moduleList[i];
              try{ await FB.ref(dbPath(mod)).set(data.data[mod]); }
              catch(err){ errors.push(mod); }
            }
            if(errors.length){ toast('Deels geslaagd — fout bij: '+errors.join(', '),'error'); }
            else{ toast('✓ Import geslaagd — '+moduleList.length+' modules','success'); setTimeout(function(){location.reload();},1500); }
          });
        });
      }catch(err){ toast('Kan bestand niet lezen','error'); }
    };
    reader.readAsText(file);
  });

  // Nieuwe administratie
  el.querySelector('#nieuw-admin-btn').addEventListener('click',async function(){
    var adminId=document.getElementById('nieuw-admin-id').value.trim().toLowerCase().replace(/[^a-z0-9_]/g,'_');
    var adminNaam=document.getElementById('nieuw-admin-naam').value.trim();

    if(!adminNaam){ toast('Vul een bedrijfsnaam in','error'); return; }

        document.getElementById('nieuw-admin-id').value='';
        document.getElementById('nieuw-admin-naam').value='';
      }catch(err){ toast('Fout: '+err.message,'error'); }
    });
  });
}

function openContractModal(id) {
  var ct = id ? getContracten().find(function(c){return c.id===id;}) : {};
  ct = ct || {};
  var b = '<div class="form-grid">';
  b += fg('Code (bijv. A10)', finp('ct-code','text',ct.code||'',''));
  b += fg('Naam', finp('ct-naam','text',ct.naam||'',''));
  b += fg('Interval (maanden, 0=op aanvraag)', finp('ct-interval','number',ct.intervalMaanden||0,''));
  b += fg('Frequentie/jaar', finp('ct-freq','number',(ct.frequentie!==undefined&&ct.frequentie!==null?ct.frequentie:1),''));
  b += fg('Kleur', '<input type="color" id="ct-kleur" value="'+(ct.kleur||'#3b82f6')+'" style="width:60px;height:36px;border:none;border-radius:6px;cursor:pointer;background:none">');
  b += fgf('Standaard werkomschrijving', '<textarea class="input" id="ct-werk" rows="3">'+esc(ct.werkomschrijving||'')+'</textarea>');
  b += '</div>';
  var f = '<button class="btn btn-ghost" id="ct-cancel">Annuleren</button><button class="btn btn-primary" id="ct-save">Opslaan</button>';
  openModal(id?'Contracttype bewerken':'Nieuw contracttype', b, f);
  document.getElementById('ct-cancel').addEventListener('click', closeModal);
  document.getElementById('ct-save').addEventListener('click', function(){
    var code = document.getElementById('ct-code').value.trim();
    if(!code){toast('Code is verplicht','error');return;}
    var data = {
      id: id||code, code: code,
      naam:            document.getElementById('ct-naam').value.trim(),
      intervalMaanden: parseInt(document.getElementById('ct-interval').value)||0,
      frequentie:      (function(){ var v=parseFloat(document.getElementById('ct-freq').value); return isNaN(v)?1:v; })(),
      kleur:           document.getElementById('ct-kleur').value,
      werkomschrijving:document.getElementById('ct-werk').value.trim(),
    };
    if(!APP.contracten||!APP.contracten.length) APP.contracten = getContracten().slice();
    var idx = APP.contracten.findIndex(function(c){return c.id===id;});
    if(idx>-1) APP.contracten[idx]=data; else APP.contracten.push(data);
    FB.ref(dbPath('contracten')).set(APP.contracten);
    closeModal(); renderInstellingen(); toast('Contracttype opgeslagen','success');
  });
}

// ── TAB: TEAM & VERLOF ────────────────────────────────────────────
function renderInstTeam(el) {
  var ti = APP.teamInstellingen || {};
  var verlofBasis = ti.verlofBasis != null ? ti.verlofBasis : 25;
  var werkUrenPerDag = ti.werkUrenPerDag != null ? ti.werkUrenPerDag : 8;
  var pauzes = (ti.pauzes && ti.pauzes.length) ? ti.pauzes : [{van:'09:15',tot:'09:30'},{van:'12:00',tot:'12:30'},{van:'15:00',tot:'15:15'}];
  var DAGEN = [
    {id:'ma', naam:'Maandag'},    {id:'di', naam:'Dinsdag'},
    {id:'wo', naam:'Woensdag'},   {id:'do', naam:'Donderdag'},
    {id:'vr', naam:'Vrijdag'},    {id:'za', naam:'Zaterdag'},
    {id:'zo', naam:'Zondag'},
  ];
  var stdWerktijden = ti.werktijdenPerDag || {
    ma:{actief:true,van:'08:00',tot:'17:00'},
    di:{actief:true,van:'08:00',tot:'17:00'},
    wo:{actief:true,van:'08:00',tot:'17:00'},
    do:{actief:true,van:'08:00',tot:'17:00'},
    vr:{actief:true,van:'08:00',tot:'17:00'},
    za:{actief:false,van:'',tot:''},
    zo:{actief:false,van:'',tot:''},
  };

  function tijdNaarMin(t){ if(!t) return 0; var d=t.split(':'); return parseInt(d[0])*60+(parseInt(d[1])||0); }
  function nettoUrenDag(dag){
    var wt = stdWerktijden[dag]; if(!wt||!wt.actief||!wt.van||!wt.tot) return 0;
    var bruto = tijdNaarMin(wt.tot) - tijdNaarMin(wt.van);
    var pauzMin = pauzes.reduce(function(s,p){
      return s + Math.max(0, Math.min(tijdNaarMin(wt.tot),tijdNaarMin(p.tot)) - Math.max(tijdNaarMin(wt.van),tijdNaarMin(p.van)));
    }, 0);
    return Math.max(0, Math.round((bruto - pauzMin) / 60 * 10) / 10);
  }

  var h = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">';

  // Verlofbasis
  h += '<div class="card"><div style="font-family:Syne,sans-serif;font-weight:700;font-size:15px;margin-bottom:14px">Verlofbasis & werkuren</div>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:14px">Standaard vakantiedagen per jaar. De werkuren per dag worden gebruikt voor omrekening uren ↔ dagen.</p>';
  h += '<div class="form-grid" style="grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">';
  h += fg('Vakantiedagen/jaar', '<div style="display:flex;align-items:center;gap:8px"><input type="number" class="input" id="ti-verlofbasis" value="'+verlofBasis+'" min="15" max="40" step="1" style="width:80px"><span style="font-size:12px;color:var(--muted)">dagen</span></div>');
  h += fg('Werkuren per dag', '<div style="display:flex;align-items:center;gap:8px"><input type="number" class="input" id="ti-urenperdag" value="'+werkUrenPerDag+'" min="1" max="12" step="0.5" style="width:80px"><span style="font-size:12px;color:var(--muted)">uur = 1 dag</span></div>');
  h += '</div>';
  h += '<div style="padding:10px 12px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--muted);margin-bottom:14px">';
  h += '<div style="font-weight:600;margin-bottom:4px">Omrekening uren → dagen</div>';
  h += '<div>4u ÷ '+werkUrenPerDag+'u = '+Math.round(4/werkUrenPerDag*10)/10+' dag</div>';
  h += '<div>'+werkUrenPerDag+'u ÷ '+werkUrenPerDag+'u = 1 dag</div>';
  h += '</div>';
  h += '<button class="btn btn-primary btn-sm" id="ti-verlof-save">Opslaan</button></div>';

  // Werktijden per dag
  h += '<div class="card"><div style="font-family:Syne,sans-serif;font-weight:700;font-size:15px;margin-bottom:14px">Werktijden per dag</div>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:14px">Stel per weekdag de werktijden in. Netto uren worden berekend na aftrek van pauzes.</p>';
  h += '<div id="ti-werktijden-grid" style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">';
  DAGEN.forEach(function(dag){
    var wt = stdWerktijden[dag.id] || {actief:false,van:'',tot:''};
    h += '<div class="ti-dag-rij" data-dag="'+dag.id+'" style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--surface2);border-radius:8px">';
    h += '<input type="checkbox" class="ti-dag-actief" '+(wt.actief?'checked':'')+' style="accent-color:var(--accent);width:15px;height:15px;cursor:pointer">';
    h += '<span style="font-size:12px;font-weight:600;width:72px;flex-shrink:0">'+dag.naam+'</span>';
    h += '<input type="time" class="input ti-dag-van" value="'+(wt.van||'')  +'" style="flex:1;'+(wt.actief?'':'opacity:.3;pointer-events:none')+'">';
    h += '<span style="font-size:11px;color:var(--muted)">t/m</span>';
    h += '<input type="time" class="input ti-dag-tot" value="'+(wt.tot||'')+'" style="flex:1;'+(wt.actief?'':'opacity:.3;pointer-events:none')+'">';
    var uren = nettoUrenDag(dag.id);
    h += '<span class="ti-dag-uren" style="font-size:11px;color:var(--muted);width:28px;text-align:right;flex-shrink:0">'+(wt.actief&&uren?uren+'u':'—')+'</span>';
    h += '</div>';
  });
  h += '</div>';

  // Pauzes
  h += '<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Pauzes (gelden alle actieve dagen)</div>';
  h += '<div id="ti-pauze-lijst" style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px">';
  pauzes.forEach(function(p,i){
    h += '<div class="ti-pauze-rij" style="display:flex;align-items:center;gap:8px">';
    h += '<input type="time" class="input ti-pauze-van" value="'+p.van+'" style="flex:1">';
    h += '<span style="font-size:11px;color:var(--muted)">t/m</span>';
    h += '<input type="time" class="input ti-pauze-tot" value="'+p.tot+'" style="flex:1">';
    h += '<button class="btn btn-ghost btn-sm ti-pauze-del" data-idx="'+i+'" style="color:var(--red);flex-shrink:0">✕</button>';
    h += '</div>';
  });
  h += '</div>';
  h += '<button class="btn btn-ghost btn-sm" id="ti-pauze-add">+ Pauze toevoegen</button>';
  h += '<button class="btn btn-primary btn-sm" id="ti-werktijd-save" style="margin-top:14px;display:block">Opslaan</button></div>';
  h += '</div>';
  el.innerHTML = h;

  // Checkbox toggle per dag
  el.querySelectorAll('.ti-dag-rij').forEach(function(rij){
    var cb  = rij.querySelector('.ti-dag-actief');
    var van = rij.querySelector('.ti-dag-van');
    var tot = rij.querySelector('.ti-dag-tot');
    function toggleDag(){
      van.style.opacity = cb.checked ? '1' : '0.3';
      van.style.pointerEvents = cb.checked ? '' : 'none';
      tot.style.opacity = cb.checked ? '1' : '0.3';
      tot.style.pointerEvents = cb.checked ? '' : 'none';
    }
    cb.addEventListener('change', toggleDag);
  });

  // Verlofbasis opslaan
  el.querySelector('#ti-verlof-save').addEventListener('click', function(){
    var basis = parseFloat(document.getElementById('ti-verlofbasis').value) || 25;
    var urenPerDag = parseFloat(document.getElementById('ti-urenperdag').value) || 8;
    APP.teamInstellingen = Object.assign({}, APP.teamInstellingen, { verlofBasis:basis, werkUrenPerDag:urenPerDag });
    FB.ref(dbPath('instellingen','teamInstellingen')).set(APP.teamInstellingen);
    toast('Verlofbasis opgeslagen','success');
    renderInstTeam(el);
  });

  // Werktijden opslaan
  el.querySelector('#ti-werktijd-save').addEventListener('click', function(){
    var nieuweWerktijden = {};
    el.querySelectorAll('.ti-dag-rij').forEach(function(rij){
      var dag = rij.dataset.dag;
      nieuweWerktijden[dag] = {
        actief: rij.querySelector('.ti-dag-actief').checked,
        van:    rij.querySelector('.ti-dag-van').value,
        tot:    rij.querySelector('.ti-dag-tot').value,
      };
    });
    var rijen = el.querySelectorAll('.ti-pauze-rij');
    var nieuweP = [];
    rijen.forEach(function(rij){
      var pv = rij.querySelector('.ti-pauze-van').value;
      var pt = rij.querySelector('.ti-pauze-tot').value;
      if(pv && pt) nieuweP.push({van:pv, tot:pt});
    });
    APP.teamInstellingen = Object.assign({}, APP.teamInstellingen, { werktijdenPerDag:nieuweWerktijden, pauzes:nieuweP });
    FB.ref(dbPath('instellingen','teamInstellingen')).set(APP.teamInstellingen);
    toast('Werktijden opgeslagen','success');
    renderInstTeam(el);
  });

  // Pauze toevoegen
  el.querySelector('#ti-pauze-add').addEventListener('click', function(){
    var lijst = el.querySelector('#ti-pauze-lijst');
    var idx = lijst.querySelectorAll('.ti-pauze-rij').length;
    var rij = document.createElement('div');
    rij.className = 'ti-pauze-rij';
    rij.style.cssText = 'display:flex;align-items:center;gap:8px';
    rij.innerHTML = '<input type="time" class="input ti-pauze-van" style="flex:1"><span style="font-size:11px;color:var(--muted)">t/m</span><input type="time" class="input ti-pauze-tot" style="flex:1"><button class="btn btn-ghost btn-sm ti-pauze-del" data-idx="'+idx+'" style="color:var(--red);flex-shrink:0">✕</button>';
    lijst.appendChild(rij);
    rij.querySelector('.ti-pauze-del').addEventListener('click', function(){ rij.remove(); });
  });

  // Pauze verwijderen
  el.querySelectorAll('.ti-pauze-del').forEach(function(btn){
    btn.addEventListener('click', function(){ btn.closest('.ti-pauze-rij').remove(); });
  });
}

function renderInstGebruikers(el) {
  if(typeof _gbSortKey==='undefined'){ window._gbSortKey='achternaam'; window._gbSortDir=1; }
  var actieve = sorteerLijst(
    enrichSortVelden(APP.medewerkers.filter(function(m){return m.status!=='inactief';}), {
      achternaam: function(m){ return m.achternaam||''; },
      heeftEmail: function(m){ return m.email?'1':'0'; },
    }),
    _gbSortKey, _gbSortDir
  );

  var h = '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:16px;margin-bottom:8px">Gebruikersbeheer</div>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:16px">Maak loginaccounts aan voor medewerkers. Koppel een Firebase-account aan een medewerker via hun e-mailadres.</p>';

  // Nieuw account aanmaken
  h += '<div class="card" style="padding:16px;margin-bottom:16px">';
  h += '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;margin-bottom:12px">Nieuw account aanmaken</div>';
  h += '<div class="form-grid">';
  var medOpts = actieve.map(function(m){return '<option value="'+m.id+'">'+esc(m.voornaam+' '+m.achternaam)+'</option>';}).join('');
  h += '<div class="form-group"><label>Medewerker</label><select class="input" id="gb-med"><option value="">— Kies medewerker —</option>'+medOpts+'</select></div>';
  h += '<div class="form-group"><label>E-mailadres</label><input class="input" type="email" id="gb-email" placeholder="naam@homapompen.nl"></div>';
  h += '<div class="form-group"><label>Wachtwoord (tijdelijk)</label><input class="input" type="password" id="gb-pass" placeholder="Min. 6 tekens" autocomplete="new-password"></div>';
  h += '</div>';
  h += '<button class="btn btn-primary" id="gb-aanmaken">Account aanmaken</button>';
  h += '<div id="gb-msg" style="font-size:12px;margin-top:8px;min-height:18px"></div>';
  h += '</div>';

  // Wachtwoord reset
  h += '<div class="card" style="padding:16px;margin-bottom:16px">';
  h += '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;margin-bottom:12px">Wachtwoord reset versturen</div>';
  h += '<div style="display:flex;gap:8px">';
  h += '<input class="input" type="email" id="gb-reset-email" placeholder="E-mailadres medewerker" style="flex:1">';
  h += '<button class="btn btn-ghost" id="gb-reset">Reset e-mail sturen</button>';
  h += '</div>';
  h += '<div id="gb-reset-msg" style="font-size:12px;margin-top:8px;min-height:18px"></div>';
  h += '</div>';

  // Overzicht gekoppelde accounts
  h += '<div class="card" style="padding:0"><div class="table-wrap"><table style="width:100%"><thead><tr>';
  [['achternaam','Medewerker'],['email','E-mail'],['rol','Rol'],['heeftEmail','Status']].forEach(function(c){
    var ico = _gbSortKey===c[0]?(_gbSortDir===1?' ↑':' ↓'):'<span style="opacity:.4;font-size:9px"> ⇅</span>';
    h += '<th class="gb-sort-th" data-sort="'+c[0]+'" style="cursor:pointer;user-select:none;white-space:nowrap">'+c[1]+ico+'</th>';
  });
  h += '</tr></thead><tbody>';
  actieve.forEach(function(m){
    var kl = medKleur(m);
    h += '<tr>';
    h += '<td style="padding:10px 14px"><div style="display:flex;align-items:center;gap:8px">';
    h += '<div class="avatar" style="width:26px;height:26px;font-size:9px;background:'+kl+';color:#fff">'+initials(m)+'</div>';
    h += '<span style="font-weight:600">'+esc(m.voornaam+' '+m.achternaam)+'</span></div></td>';
    h += '<td style="padding:10px 14px;font-size:13px;color:var(--muted)">'+esc(m.email||'—')+'</td>';
    h += '<td style="padding:10px 14px"><span class="tag" style="background:'+kl+'22;color:'+kl+'">'+esc(m.rol||'')+'</span></td>';
    h += '<td style="padding:10px 14px">';
    h += m.email ? '<span class="tag tag-green" style="font-size:11px">Gekoppeld</span>' : '<span class="tag" style="font-size:11px;background:var(--surface2);color:var(--muted)">Geen account</span>';
    h += '</td></tr>';
  });
  h += '</tbody></table></div></div>';

  el.innerHTML = h;

  el.querySelectorAll('.gb-sort-th').forEach(function(th){
    th.addEventListener('click', function(){ if(_gbSortKey===th.dataset.sort)_gbSortDir*=-1;else{_gbSortKey=th.dataset.sort;_gbSortDir=1;} renderInstellingen(); });
  });

  // Account aanmaken handler
  // Alternatief: maak account via createUserWithEmailAndPassword in een secondary auth instance
  var gbAanmaken = el.querySelector('#gb-aanmaken');
  if(gbAanmaken) gbAanmaken.addEventListener('click', async function(){
    var medId = el.querySelector('#gb-med').value;
    var email = el.querySelector('#gb-email').value.trim();
    var pass  = el.querySelector('#gb-pass').value;
    var msgEl = el.querySelector('#gb-msg');
    if(!medId||!email||!pass){ msgEl.style.color='var(--red)'; msgEl.textContent='Vul alle velden in.'; return; }
    if(pass.length<6){ msgEl.style.color='var(--red)'; msgEl.textContent='Wachtwoord minimaal 6 tekens.'; return; }
    var m = getMed(medId);
    msgEl.style.color='var(--muted)'; msgEl.textContent='Bezig...';
    try {
      // Gebruik secondary app instance zodat admin niet uitlogt
      var secondApp;
      try {
        secondApp = firebase.app('secondary');
      } catch(e) {
        secondApp = firebase.initializeApp(firebase.app().options, 'secondary');
      }
      var secondAuth = secondApp.auth();
      var result = await secondAuth.createUserWithEmailAndPassword(email, pass);
      // Koppel e-mail aan medewerker
      m.email = email;
      await dbSaveItem('medewerkers', m.id, m);
      // Sla profiel op voor de nieuwe gebruiker
      await firebase.database(secondApp).ref('flow8/gebruikers/'+result.user.uid).set({
        naam: m.voornaam+' '+m.achternaam,
        email: email,
        rol: m.rol||'monteur',
        bedrijfId: APP.bedrijfId||'demo',
        medId: m.id,
      });
      await secondAuth.signOut();
      msgEl.style.color='var(--green)'; msgEl.textContent='Account aangemaakt voor '+m.voornaam+'!';
      el.querySelector('#gb-med').value='';
      el.querySelector('#gb-email').value='';
      el.querySelector('#gb-pass').value='';
      setTimeout(function(){ renderInstGebruikers(el); }, 1500);
    } catch(e) {
      msgEl.style.color='var(--red)';
      msgEl.textContent = e.code==='auth/email-already-in-use' ? 'Dit e-mailadres is al in gebruik.' : (e.message||'Fout bij aanmaken.');
    }
  });

  // Wachtwoord reset handler
  var gbReset = el.querySelector('#gb-reset');
  if(gbReset) gbReset.addEventListener('click', function(){
    var email = el.querySelector('#gb-reset-email').value.trim();
    var msgEl = el.querySelector('#gb-reset-msg');
    if(!email){ msgEl.style.color='var(--red)'; msgEl.textContent='Vul een e-mailadres in.'; return; }
    AUTH.sendPasswordResetEmail(email)
      .then(function(){ msgEl.style.color='var(--green)'; msgEl.textContent='Reset e-mail verzonden naar '+email; })
      .catch(function(e){ msgEl.style.color='var(--red)'; msgEl.textContent=e.message||'Fout'; });
  });
}


function renderInstGoedkeuring(el) {
  // inst structuur: { medId: { verlof:'medId'|null, overuren:'medId'|null, onkosten:'medId'|null, verzuim:'medId'|null } }
  // Per medewerker: wie keurt zijn/haar aanvragen goed?
  var inst = APP.goedkeuringInst || {};
  if(typeof _gkSortKey==='undefined'){ window._gkSortKey='achternaam'; window._gkSortDir=1; }

  var mods = [
    { k:'verlof',   l:'Verlof',   icon:'<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>' },
    { k:'overuren', l:'Overuren', icon:'<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>' },
    { k:'onkosten', l:'Onkosten', icon:'<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>' },
    { k:'verzuim',  l:'Verzuim',  icon:'<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>' },
  ];

  var actieveMeds = sorteerLijst(
    enrichSortVelden(APP.medewerkers.filter(function(m){ return m.status !== 'inactief'; }), {
      achternaam: function(m){ return m.achternaam||''; }
    }),
    _gkSortKey, _gkSortDir
  );

  var goedkeurders = APP.medewerkers.filter(function(m){
    return m.status !== 'inactief';
  });

  var h = '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:16px;margin-bottom:6px">Goedkeuring per medewerker</div>';
  h += '<p style="font-size:13px;color:var(--muted);margin-bottom:16px">Stel per medewerker in wie zijn/haar aanvragen goedkeurt. Laat leeg voor standaard (admin).</p>';

  h += '<div class="card" style="padding:0;overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:600px">';

  // Header: lege cel + module kolommen
  h += '<thead><tr style="background:var(--surface2)">';
  var gkIco = _gkSortKey==='achternaam'?(_gkSortDir===1?' ↑':' ↓'):'<span style="opacity:.4;font-size:9px"> ⇅</span>';
  h += '<th class="gk-sort-th" data-sort="achternaam" style="padding:10px 16px;text-align:left;min-width:180px;position:sticky;left:0;background:var(--surface2);z-index:2;cursor:pointer;user-select:none">Medewerker'+gkIco+'</th>';
  mods.forEach(function(mod){
    h += '<th style="padding:10px 14px;text-align:center;min-width:160px;font-size:12px;font-weight:700">'+mod.icon+' '+mod.l+'</th>';
  });
  h += '</tr></thead><tbody>';

  actieveMeds.forEach(function(m, mi){
    var medInst = inst[String(m.id)] || {};
    var kl = medKleur(m);
    var isEven = mi % 2 === 0;

    h += '<tr style="border-bottom:1px solid var(--border);background:'+(isEven?'var(--surface)':'rgba(42,47,61,.2)')+'">';

    // Medewerker kolom
    h += '<td style="padding:10px 16px;position:sticky;left:0;background:'+(isEven?'var(--surface)':'rgba(42,47,61,.2)')+';z-index:1">';
    h += '<div style="display:flex;align-items:center;gap:8px">';
    h += '<div class="avatar" style="width:28px;height:28px;font-size:10px;background:'+kl+';color:#fff;flex-shrink:0">'+initials(m)+'</div>';
    h += '<div><div style="font-size:13px;font-weight:600">'+esc(m.voornaam+' '+m.achternaam)+'</div>';
    h += '<div style="font-size:11px;color:var(--muted)">'+esc(m.rol||'')+'</div></div></div>';
    h += '</td>';

    // Per module: dropdown welke medewerker goedkeurt
    mods.forEach(function(mod){
      var huidigGoedkeurder = medInst[mod.k] || '';
      h += '<td style="padding:6px 10px;text-align:center">';
      h += '<select class="input gk-sel" data-med="'+m.id+'" data-mod="'+mod.k+'" style="font-size:12px;padding:4px 8px;width:100%;max-width:150px">';
      h += '<option value="">— Standaard (admin) —</option>';
      goedkeurders.forEach(function(gk){
        if(String(gk.id)===String(m.id)) return; // zichzelf niet
        var sel = String(huidigGoedkeurder) === String(gk.id) ? ' selected' : '';
        h += '<option value="'+gk.id+'"'+sel+'>'+esc(gk.voornaam+' '+gk.achternaam)+'</option>';
      });
      h += '</select></td>';
    });

    h += '</tr>';
  });

  h += '</tbody></table></div>';
  h += '<div style="margin-top:14px;display:flex;align-items:center;gap:12px">';
  h += '<button class="btn btn-primary" id="goedkeuring-save">Opslaan</button>';
  h += '<span style="font-size:12px;color:var(--muted)">Standaard = alleen admin kan goedkeuren</span>';
  h += '</div>';

  el.innerHTML = h;

  el.querySelectorAll('.gk-sort-th').forEach(function(th){
    th.addEventListener('click', function(){ if(_gkSortKey===th.dataset.sort)_gkSortDir*=-1;else{_gkSortKey=th.dataset.sort;_gkSortDir=1;} renderInstellingen(); });
  });

  el.querySelector('#goedkeuring-save').addEventListener('click', function(){
    var nieuw = {};
    el.querySelectorAll('.gk-sel').forEach(function(sel){
      var medId = sel.dataset.med;
      var mod   = sel.dataset.mod;
      if(!nieuw[medId]) nieuw[medId] = {};
      nieuw[medId][mod] = sel.value || null;
    });
    APP.goedkeuringInst = nieuw;
    FB.ref(dbPath('instellingen','goedkeuring')).set(nieuw);
    toast('Goedkeuringsinstellingen opgeslagen','success');
  });
}

document.addEventListener('DOMContentLoaded', function() {
  // Sidebar collapse — alleen desktop
  var _sidebar = document.getElementById('sidebar');
  var _sbCollapseBtn = document.getElementById('sb-collapse-btn');
  var _sbLogoKlik = document.getElementById('logo-home');
  var _isMobiel = window.innerWidth < 768;

  function _setSidebarCollapsed(collapsed) {
    if(_isMobiel) return; // nooit op mobiel
    if(collapsed) {
      _sidebar.classList.add('collapsed');
    } else {
      _sidebar.classList.remove('collapsed');
    }
    try { localStorage.setItem('flow8_sidebar_collapsed', collapsed ? '1' : '0'); } catch(e){}
  }

  if(_sbCollapseBtn) {
    _sbCollapseBtn.addEventListener('click', function(e){
      e.stopPropagation(); // voorkom navigatie via logo-home click
      var isCollapsed = _sidebar.classList.contains('collapsed');
      _setSidebarCollapsed(!isCollapsed);
    });
  }

  // Herstel staat uit localStorage
  try {
    if(!_isMobiel && localStorage.getItem('flow8_sidebar_collapsed') === '1') {
      _sidebar.classList.add('collapsed');
    }
  } catch(e){}

  // Op mobiel: collapse knop verbergen
  if(_isMobiel && _sbCollapseBtn) _sbCollapseBtn.style.display = 'none';

  // Globale zoekfunctie
  var gzBtn = document.getElementById('global-zoek-btn');
  if(gzBtn) gzBtn.addEventListener('click', openGlobaalZoek);
  var gzInput = document.getElementById('global-zoek-input');
  if(gzInput) {
    var _gzDebounce;
    gzInput.addEventListener('input', function(){ 
      clearTimeout(_gzDebounce);
      _gzDebounce = setTimeout(function(){ globaalZoeken(gzInput.value.trim()); }, 200);
    });
    gzInput.addEventListener('keydown', function(e){ if(e.key==='Escape') sluitGlobaalZoek(); });
  }
  // Ctrl+K shortcut
  document.addEventListener('keydown', function(e){
    if((e.ctrlKey||e.metaKey) && e.key==='k') { e.preventDefault(); openGlobaalZoek(); }
    if(e.key==='Escape') sluitGlobaalZoek();
  });
  // Versienummer alvast tonen als sidebar al in DOM staat
  var sbVersieEl = document.getElementById('sb-versie');
  if(sbVersieEl) sbVersieEl.textContent = 'v' + APP_VERSION;

  // Browser online/offline events als fallback
  function _updateOfflineBanner() {
    var banner = document.getElementById('offline-banner');
    if(!banner) return;
    if(navigator.onLine) {
      banner.style.display = 'none';
      _pendingWrites = 0;
    } else {
      banner.style.display = 'flex';
      var tekst = document.getElementById('offline-banner-tekst');
      if(tekst) {
        tekst.textContent = _pendingWrites > 0
          ? 'Geen verbinding · ' + _pendingWrites + ' wijziging' + (_pendingWrites === 1 ? '' : 'en') + ' wacht op synchronisatie'
          : 'Geen verbinding — bekijken werkt nog, opslaan is gepauzeerd';
      }
    }
  }
  window.addEventListener('online',  _updateOfflineBanner);
  window.addEventListener('offline', _updateOfflineBanner);
  _updateOfflineBanner();
  // ═══════════════════════════════════════════════════════════════
  // NOTIFICATIES
  // ═══════════════════════════════════════════════════════════════
  var _notifOpen = false;

  function notifIcoon(type) {
    var icons = {
      verlof:      {svg:'<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',  kl:'#3b82f6'},
      overuren:    {svg:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',                                    kl:'#f59e0b'},
      onkosten:    {svg:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>',       kl:'#10b981'},
      storingsdienst:{svg:'<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>', kl:'#8b5cf6'},
      verjaardag:  {svg:'<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>',                      kl:'#ef4444'},
    };
    return icons[type] || {svg:'<circle cx="12" cy="12" r="10"/>',kl:'#6b7694'};
  }

  // Controleer of notificatie is ingeschakeld voor dit event
  window.magNotificatie = function magNotificatie(module, event) {
    var inst = APP.notifInstellingen || {};
    var key = module + '_' + event;
    // Standaard aan als niet geconfigureerd
    return inst[key] !== false;
  };

  // Notificatie ontvanger ID: medId als beschikbaar, anders Firebase UID
  function getNotifId() {
    var medId = getMijnMedId();
    if(medId) return String(medId);
    return APP.profiel ? String(APP.profiel.uid||'') : '';
  }

  function laadNotificaties() {
    if(!APP.profiel||!APP.bedrijfId) return;
    var mijnId = getNotifId();
    if(!mijnId) return;
    var path = dbPath('notificaties', mijnId);
    FB.ref(path).on('value', function(snap){
      var data = snap.val()||{};
      APP._notificaties = data;
      renderNotifBadge();
      if(_notifOpen) renderNotifLijst();
    });
  }
  window.laadNotificaties = laadNotificaties;

  function renderNotifBadge() {
    var data = APP._notificaties||{};
    var ongelezen = Object.values(data).filter(function(n){return !n.gelezen;}).length;
    var badge = document.getElementById('notif-badge');
    if(!badge) return;
    if(ongelezen > 0) {
      badge.textContent = ongelezen > 9 ? '9+' : ongelezen;
      badge.classList.add('heeft-notifs');
    } else {
      badge.classList.remove('heeft-notifs');
    }
  }

  function renderNotifLijst() {
    var lijst = document.getElementById('notif-lijst');
    if(!lijst) return;
    var data = APP._notificaties||{};
    var items = Object.keys(data).map(function(k){return Object.assign({_key:k},data[k]);});
    items.sort(function(a,b){return (b.ts||0)-(a.ts||0);});
    if(!items.length) {
      lijst.innerHTML = '<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">Geen notificaties</div>';
      return;
    }
    var h = '';
    items.forEach(function(n){
      var ic = notifIcoon(n.type);
      var tijdStr = n.ts ? tijdGeleden(n.ts) : '';
      h += '<div class="notif-item'+(n.gelezen?' gelezen':'')+'" data-key="'+n._key+'">';
      h += '<div class="notif-icon" style="background:'+ic.kl+'22;color:'+ic.kl+'">';
      h += '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">'+ic.svg+'</svg></div>';
      h += '<div class="notif-tekst">';
      h += '<div class="notif-titel">'+esc(n.titel||'')+'</div>';
      h += '<div class="notif-sub">'+esc(n.tekst||'')+'</div></div>';
      h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">';
      h += '<span class="notif-tijd">'+tijdStr+'</span>';
      h += '<button class="notif-del" data-key="'+n._key+'" title="Verwijderen">'+
           '<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
      h += '</div></div>';
    });
    lijst.innerHTML = h;

    // Events: klik op item → markeer gelezen + navigeer
    lijst.querySelectorAll('.notif-item').forEach(function(el){
      el.addEventListener('click', function(e){
        if(e.target.closest('.notif-del')) return;
        var key = el.dataset.key;
        var n = (APP._notificaties||{})[key];
        if(!n) return;
        // Markeer gelezen
        markeerGelezen(key);
        // Navigeer
        if(n.nav) navigateTo(n.nav);
        sluitNotifPanel();
      });
    });

    // Events: verwijder knop
    lijst.querySelectorAll('.notif-del').forEach(function(btn){
      btn.addEventListener('click', function(e){
        e.stopPropagation();
        verwijderNotif(btn.dataset.key);
      });
    });
  }

  function tijdGeleden(ts) {
    var diff = Math.floor((Date.now()-ts)/1000);
    if(diff<60) return 'Nu';
    if(diff<3600) return Math.floor(diff/60)+'m';
    if(diff<86400) return Math.floor(diff/3600)+'u';
    return Math.floor(diff/86400)+'d';
  }

  function markeerGelezen(key) {
    var mijnId = getNotifId();
    if(!mijnId) return;
    FB.ref(dbPath('notificaties', mijnId, key, 'gelezen')).set(true);
    var data = APP._notificaties||{};
    if(data[key]) { data[key].gelezen = true; renderNotifBadge(); }
  }

  function verwijderNotif(key) {
    var mijnId = getNotifId();
    if(!mijnId) return;
    FB.ref(dbPath('notificaties', mijnId, key)).remove();
    var data = APP._notificaties||{};
    delete data[key];
    APP._notificaties = data;
    renderNotifLijst();
    renderNotifBadge();
  }

  function sluitNotifPanel() {
    document.getElementById('notif-panel').style.display = 'none';
    _notifOpen = false;
  }

  // Zet notificatie-ontvanger ID om: medId → notifId (medId of uid)
  function medIdNaarNotifId(medId) {
    if(!medId) return null;
    // Als de medewerker hetzelfde email heeft als de ingelogde user → gebruik getNotifId()
    var med = APP.medewerkers.find(function(m){ return String(m.id)===String(medId); });
    if(!med) return String(medId);
    // Zoek Firebase user voor deze medewerker
    // We kunnen alleen de eigen UID weten — voor anderen gebruiken we medId
    if(APP.profiel && med.email && APP.profiel.email &&
       med.email.toLowerCase()===APP.profiel.email.toLowerCase()) {
      return getNotifId();
    }
    return String(medId);
  }

  window.stuurNotificatie = function(medId, type, titel, tekst, nav) {
    if(!APP.bedrijfId||!medId) return;
    var notifId = medIdNaarNotifId(medId);
    if(!notifId) return;
    var key = 'n_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    var data = {type:type, titel:titel, tekst:tekst, nav:nav||null, ts:Date.now(), gelezen:false};
    FB.ref(dbPath('notificaties', notifId, key)).set(data);
  };

  // Notificatie bel events
  var notifBtn = document.getElementById('notif-btn');
  if(notifBtn) notifBtn.addEventListener('click', function(e){
    e.stopPropagation();
    var panel = document.getElementById('notif-panel');
    _notifOpen = !_notifOpen;
    panel.style.display = _notifOpen ? 'flex' : 'none';
    if(_notifOpen) {
      renderNotifLijst();
      // Markeer alle als gelezen na 2 sec
      setTimeout(function(){
        var data = APP._notificaties||{};
        Object.keys(data).forEach(function(k){
          if(!data[k].gelezen) markeerGelezen(k);
        });
      }, 2000);
    }
  });

  document.addEventListener('click', function(e){
    if(!e.target.closest('#notif-wrapper')) sluitNotifPanel();
  });

  var allesWeg = document.getElementById('notif-alles-weg');
  if(allesWeg) allesWeg.addEventListener('click', function(){
    var mijnId = getNotifId();
    if(mijnId) {
      FB.ref(dbPath('notificaties', mijnId)).remove();
      APP._notificaties = {};
      renderNotifLijst();
      renderNotifBadge();
    }
  });

  // ── Automatische notificaties bij triggers ────────────────────
  function checkVerjaardag() {
    if(!APP.dataLoaded) return;
    var vandaag = new Date();
    var mm = ('0'+(vandaag.getMonth()+1)).slice(-2);
    var dd = ('0'+vandaag.getDate()).slice(-2);
    var mijnId = getNotifId();
    APP.medewerkers.forEach(function(m){
      if(!m.geboortedatum||m.status==='inactief') return;
      var parts = m.geboortedatum.split('-');
      if(parts.length<3) return;
      var mMm = parts[1], mDd = parts[2];
      if(mMm===mm && mDd===dd) {
        var leeftijd = vandaag.getFullYear() - parseInt(parts[0]);
        if(magNotificatie('verjaardag','verjaardag')) {
          stuurNotificatie(mijnId, 'verjaardag',
            '🎂 Verjaardag!',
            m.voornaam+' '+m.achternaam+' is vandaag '+leeftijd+' jaar!',
            'medewerkers'
          );
        }
      }
    });
  }
  window.checkVerjaardag = checkVerjaardag;

  function checkStoringsdienst() {
    if(!APP.dataLoaded) return;
    var mijnId = getNotifId();
    if(!mijnId) return;
    var vandaag = new Date().toISOString().split('T')[0];
    var week = getISOWeek(vandaag);
    var jaar = getISOWeekJaar(vandaag);
    var sdKey = jaar+'-W'+('0'+week).slice(-2);
    var sd = (APP.storingsdienst||{})[sdKey];
    if(sd && String(sd.medId)===mijnId) {
      // Check of we al een notif hebben gestuurd deze week
      var notifKey = 'sd_herinnering_'+sdKey;
      var data = APP._notificaties||{};
      var alGestuurd = Object.values(data).some(function(n){return n._key===notifKey||n.titel==='Storingsdienst week '+week;});
      if(!alGestuurd) {
        stuurNotificatie(mijnId, 'storingsdienst',
          'Storingsdienst week '+week,
          'Jij hebt deze week storingsdienst. Zorg dat je bereikbaar bent.',
          'storingsdienst'
        );
      }
    }
  }
  window.checkStoringsdienst = checkStoringsdienst;

  // Meer menu
  window.sluitMeerMenu = function() {
    document.getElementById('meer-overlay').style.display = 'none';
    document.getElementById('meer-menu').style.display = 'none';
  };
  window.toggleMeerMenu = function() {
    var m = document.getElementById('meer-menu');
    var open = m.style.display === 'block';
    document.getElementById('meer-overlay').style.display = open ? 'none' : 'block';
    m.style.display = open ? 'none' : 'block';
  };
  // meer-item events worden gebonden in bouwMeerMenu()

  // Logo → dashboard
  var logoHome = document.getElementById('logo-home');
  if (logoHome) logoHome.addEventListener('click', function(){ navigateTo('dashboard'); });

  var hamburger = document.getElementById('hamburger');
  var sidebarOverlay = document.getElementById('sidebar-overlay');
  var sidebar = document.getElementById('sidebar');
  if (hamburger) {
    hamburger.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('open');
    });
  }
  if (sidebarOverlay) {
    sidebarOverlay.addEventListener('click', function() {
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    });
  }

  // Bottom nav
  document.querySelectorAll('#bottom-nav .bn-item').forEach(function(btn) {
    btn.addEventListener('click', function() {
      toonPagina(btn.dataset.page);
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('open');
    });
  });

  document.getElementById('login-btn').addEventListener('click', doLogin);

  // Wachtwoord toggle
  var pwToggle = document.getElementById('login-pw-toggle');
  var pwInput  = document.getElementById('login-pass');
  if(pwToggle && pwInput) {
    pwToggle.addEventListener('click', function(){
      var toon = pwInput.type === 'password';
      pwInput.type = toon ? 'text' : 'password';
      pwToggle.style.color = toon ? 'rgba(240,242,255,0.55)' : 'rgba(240,242,255,0.28)';
    });
  }

  var googleBtn = document.getElementById('google-btn');
  if(googleBtn) googleBtn.addEventListener('click', function(){
    var errEl = document.getElementById('login-err');
    errEl.textContent = ''; errEl.classList.remove('show');
    AUTH.signInWithPopup(GOOGLE_PROVIDER).catch(function(e){
      errEl.textContent = 'Google login mislukt: ' + (e.message||'onbekende fout');
      errEl.classList.add('show');
    });
  });
  document.getElementById('login-email').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('login-pass').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
  document.getElementById('pw-vergeten-btn').addEventListener('click',function(){
    var email=document.getElementById('login-email').value.trim();
    if(!email){alert('Voer eerst je e-mailadres in.');return;}
    AUTH.sendPasswordResetEmail(email).then(function(){toast('Reset e-mail verstuurd','success');}).catch(function(e){toast('Mislukt: '+e.message,'error');});
  });

  // App
  document.getElementById('uitloggen-btn').addEventListener('click', doUitloggen);
  // Theme toggle switch
  function updateThemeToggle(isLight) {
    var knob = document.getElementById('theme-knob');
    var track = document.getElementById('theme-track');
    var sun = document.getElementById('theme-sun');
    var moon = document.getElementById('theme-moon');
    var cb = document.getElementById('theme-cb');
    if(!knob) return;
    if(isLight) {
      knob.style.transform = 'translateX(24px)';
      knob.style.background = '#1e293b';
      track.style.background = '#f1f5f9';
      track.style.borderColor = '#cbd5e1';
      if(sun) sun.style.opacity = '0.4';
      if(moon) moon.style.opacity = '1';
      if(cb) cb.checked = true;
    } else {
      knob.style.transform = 'translateX(0)';
      knob.style.background = '#fff';
      track.style.background = '#1e293b';
      track.style.borderColor = 'var(--border)';
      if(sun) sun.style.opacity = '1';
      if(moon) moon.style.opacity = '0.4';
      if(cb) cb.checked = false;
    }
  }
  var themeCb = document.getElementById('theme-cb');
  if(themeCb) {
    themeCb.addEventListener('change', function() {
      document.body.classList.toggle('light', this.checked);
      updateThemeToggle(this.checked);
    });
    updateThemeToggle(document.body.classList.contains('light'));
  }

  // Modal/Panel
  document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('panel-overlay').addEventListener('click', closePanel);
  document.getElementById('panel-close').addEventListener('click', closePanel);

  // Log panel
  var logPanel=document.getElementById('log-panel');
  function toggleLog(){logPanel.classList.toggle('hidden');if(!logPanel.classList.contains('hidden'))refreshLog();}
  document.getElementById('log-btn').addEventListener('click', toggleLog);
  document.getElementById('toggle-log-btn').addEventListener('click', toggleLog);
  document.getElementById('log-clear').addEventListener('click',function(){LOGS=[];refreshLog();});
  document.getElementById('log-close').addEventListener('click',function(){logPanel.classList.add('hidden');});
});
</script>

<script>
// ── Login pagina animaties ──
(function(){
  // Aurora achtergrond
  var canvas = document.getElementById('login-bg-canvas');
  if(!canvas) return;
  var ctx = canvas.getContext('2d');
  var W, H, t = 0;
  function resize(){ W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  function draw(){
    ctx.clearRect(0,0,W,H);
    t += 0.004;
    ctx.fillStyle = '#070910'; ctx.fillRect(0,0,W,H);
    var bands = [
      {y:H*.22,amp:65,freq:.8, speed:1,   c1:'rgba(74,108,247,',  c2:'rgba(94,207,234,'},
      {y:H*.36,amp:85,freq:.6, speed:.7,  c1:'rgba(94,207,234,',  c2:'rgba(74,108,247,'},
      {y:H*.50,amp:55,freq:1,  speed:1.3, c1:'rgba(123,142,247,', c2:'rgba(94,207,234,'},
      {y:H*.63,amp:75,freq:.5, speed:.9,  c1:'rgba(74,108,247,',  c2:'rgba(160,100,255,'},
      {y:H*.74,amp:45,freq:1.2,speed:1.6, c1:'rgba(94,207,234,',  c2:'rgba(74,108,247,'},
    ];
    bands.forEach(function(b){
      var g = ctx.createLinearGradient(0,b.y-b.amp*1.5,0,b.y+b.amp*1.5);
      g.addColorStop(0,   b.c1+'0)');
      g.addColorStop(0.4, b.c1+'.18)');
      g.addColorStop(0.5, b.c2+'.22)');
      g.addColorStop(1,   b.c2+'0)');
      ctx.beginPath();
      for(var x=0;x<=W;x+=4){
        var w=Math.sin(x/W*Math.PI*2*b.freq+t*b.speed)*b.amp+Math.sin(x/W*Math.PI*3*b.freq+t*b.speed*1.3)*b.amp*.4;
        x===0?ctx.moveTo(x,b.y+w):ctx.lineTo(x,b.y+w);
      }
      for(var x2=W;x2>=0;x2-=4){
        var w2=Math.sin(x2/W*Math.PI*2*b.freq+t*b.speed)*b.amp+Math.sin(x2/W*Math.PI*3*b.freq+t*b.speed*1.3)*b.amp*.4+b.amp*.8;
        ctx.lineTo(x2,b.y+w2);
      }
      ctx.closePath(); ctx.fillStyle=g; ctx.fill();
    });
    // Sterren
    for(var i=0;i<90;i++){
      var sx=(i*137.5+50)%W, sy=(i*97.3)%(H*.6);
      var tw=0.3+Math.sin(t*2+i)*0.25;
      ctx.globalAlpha=tw*.55; ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(sx,sy,0.8,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();

  // Infinity dot animatie login
  var path = document.getElementById('login-inf-path');
  var dot  = document.getElementById('login-inf-dot');
  if(path && dot){
    var len = path.getTotalLength(), pt2 = 0;
    var svg2 = path.closest('svg');
    (function animDot(){
      var scaal = svg2 ? (svg2.getBoundingClientRect().width / 220) : 1;
      var stap = 0.0015 / Math.max(0.3, scaal);
      pt2 = (pt2 + stap) % 1;
      var p = path.getPointAtLength(pt2 * len);
      dot.setAttribute('cx', p.x);
      dot.setAttribute('cy', p.y);
      requestAnimationFrame(animDot);
    })();
  }
})();
</script>

<script>
// ── Sidebar infinity dot animatie (na inloggen) ──
(function(){
  function startSbAnim(){
    var path = document.getElementById('sb-inf-path');
    var dot  = document.getElementById('sb-inf-dot');
    if(!path || !dot) return;
    var len = path.getTotalLength(), p = 0;
    var svg = path.closest('svg');
    (function anim(){
      var scaal = svg ? (svg.getBoundingClientRect().width / 220) : 1;
      var stap = 0.0015 / Math.max(0.3, scaal);
      p = (p + stap) % 1;
      var pt = path.getPointAtLength(p * len);
      dot.setAttribute('cx', pt.x);
      dot.setAttribute('cy', pt.y);
      requestAnimationFrame(anim);
    })();
  }
  // Start zodra sidebar zichtbaar is
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(startSbAnim, 500); });
})();
</script>
