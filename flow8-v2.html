    h+='</tr></thead><tbody>';

    weken.forEach(function(w){
      var isHuidige=w.week===huidigWeek&&w.jaar===huidigWJaar;
      var weekDienst=sd[w.key];
      var maStr=fmtD(dateToStr(w.ma));
      var zoStr=fmtD(dateToStr(w.zo));
      h+='<tr style="background:'+(isHuidige?'rgba(59,130,246,.06)':'')+'">';
      h+='<td style="padding:8px 10px"><div style="font-weight:700;font-size:13px;color:'+(isHuidige?'var(--accent)':'var(--text)')+'">W'+w.week+'</div>'+(isHuidige?'<div style="font-size:9px;background:var(--accent);color:#fff;border-radius:3px;padding:1px 4px;display:inline-block">Nu</div>':'')+'</td>';
      h+='<td style="font-size:11px;color:var(--muted);padding:8px 10px">'+maStr+'<br>'+zoStr+'</td>';

      for(var di=0;di<7;di++){
        var dagKey=w.key+'-'+di;
        var dagDienst=sd[dagKey];
        var effectief=dagDienst||weekDienst;
        var med=effectief?getMed(effectief.medId):null;
        var isOverride=!!dagDienst;
        var dagDatum=new Date(w.ma); dagDatum.setDate(w.ma.getDate()+di);
        var dagStr=dateToStr(dagDatum);
        var isVandaag=dagStr===vandaag;
        var verleden=dagStr<vandaag;
        var kl=med?(medKleur(med)):null;
        h+='<td style="padding:3px;text-align:center;background:'+(isVandaag?'rgba(59,130,246,.1)':'')+(isOverride?';border:1px solid var(--orange)':'')+'">';
        h+='<div class="sd-dag-cel" data-datum="'+dagStr+'" data-weekkey="'+w.key+'" data-dagidx="'+di+'" title="'+(med?esc(med.voornaam+' '+med.achternaam):'—')+' · klik om te wijzigen" style="cursor:pointer;border-radius:4px;padding:3px 2px;min-height:28px;'+(verleden&&!med?'opacity:.35':'')+(isOverride?';background:rgba(245,158,11,.15)':'')+'">';
        if(med){
          h+='<div class="avatar" style="width:22px;height:22px;font-size:8px;background:'+kl+';color:#fff;margin:0 auto">'+initials(med)+'</div>';
          if(isOverride) h+='<div style="font-size:8px;color:var(--orange)">!</div>';
        } else {
          h+='<div style="font-size:11px;color:var(--muted)">—</div>';
        }
        h+='</div></td>';
      }
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';

    // Legenda
    h+='<div style="display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:10px;flex-wrap:wrap">';
    h+='<span>Avatars = weekrooster</span>';
    h+='<span style="color:var(--orange)">⚡ Oranje rand = dagwissel</span>';
    h+='<span>Klik op dag om te wijzigen</span>';
    h+='</div>';

  } else {
    // Kwartaalweergave: uitgebreide tabel met dag-knoppen per week
    h+='<div class="card" style="padding:0"><div class="table-wrap"><table style="width:100%"><thead><tr>';
    h+='<th style="width:70px">Week</th><th style="width:150px">Periode</th>';
    h+='<th>Weekdienst</th>';
    dagNamen.forEach(function(d){h+='<th style="text-align:center;width:70px">'+d+'</th>';});
    h+='<th style="width:80px"></th>';
    h+='</tr></thead><tbody>';

    weken.forEach(function(w){
      var isHuidige=w.week===huidigWeek&&w.jaar===huidigWJaar;
      var weekDienst=sd[w.key];
      var weekMed=weekDienst?getMed(weekDienst.medId):null;
      var kl=weekMed?medKleur(weekMed):'#6b7694';
      var maStr=fmtD(dateToStr(w.ma));
      var zoStr=fmtD(dateToStr(w.zo));
      var verleden=w.zo<new Date();

      h+='<tr style="background:'+(isHuidige?'rgba(59,130,246,.06)':'')+(verleden&&!weekMed?';opacity:.5':'')+'">';
      h+='<td style="padding:10px 12px"><div style="font-weight:700;color:'+(isHuidige?'var(--accent)':'var(--text)')+'">W'+w.week+'</div>'+(isHuidige?'<div style="font-size:9px;background:var(--accent);color:#fff;border-radius:3px;padding:1px 4px;display:inline-block">Nu</div>':'')+'</td>';
      h+='<td style="font-size:12px;color:var(--muted);padding:10px 12px">'+maStr+'<br>'+zoStr+'</td>';

      // Weekdienst kolom
      h+='<td style="padding:10px 12px">';
      if(weekMed){
        h+='<div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:26px;height:26px;font-size:9px;background:'+kl+';color:#fff">'+initials(weekMed)+'</div>';
        h+='<div><div style="font-size:13px;font-weight:600">'+esc(weekMed.voornaam+' '+weekMed.achternaam)+'</div>';
        h+='<div style="font-size:11px;color:var(--muted)">'+esc(weekMed.telefoon||'')+'</div></div></div>';
      } else {
        h+='<span style="color:var(--muted);font-size:13px">—</span>';
      }
      h+='</td>';

      // 7 dag-cellen
      for(var di=0;di<7;di++){
        var dagKey=w.key+'-'+di;
        var dagDienst=sd[dagKey];
        var dagMed=dagDienst?getMed(dagDienst.medId):null;
        var isOverride=!!dagDienst;
        var effectiefMed=dagMed||weekMed;
        var dagDatum=new Date(w.ma); dagDatum.setDate(w.ma.getDate()+di);
        var dagStr=dateToStr(dagDatum);
        var isVandaag=dagStr===vandaag;
        var dkl=dagMed?medKleur(dagMed):'#f59e0b';

        h+='<td style="padding:4px;text-align:center;background:'+(isVandaag?'rgba(59,130,246,.1)':'')+'">';
        h+='<div class="sd-dag-cel" data-datum="'+dagStr+'" data-weekkey="'+w.key+'" data-dagidx="'+di+'" title="Klik om dag te wijzigen" style="cursor:pointer;border-radius:6px;padding:4px 2px;border:1px solid '+(isOverride?'var(--orange)':'transparent')+';background:'+(isOverride?'rgba(245,158,11,.1)':'transparent')+'">';
        if(dagMed){
          h+='<div class="avatar" style="width:24px;height:24px;font-size:8px;background:'+dkl+';color:#fff;margin:0 auto" title="'+esc(dagMed.voornaam+' '+dagMed.achternaam)+'">'+initials(dagMed)+'</div>';
          h+='<div style="font-size:9px;color:var(--orange);margin-top:1px">wissel</div>';
        } else if(effectiefMed){
          h+='<div style="font-size:9px;color:var(--muted)">✓</div>';
        } else {
          h+='<div style="font-size:10px;color:var(--muted)">—</div>';
        }
        h+='</div></td>';
      }

      // Week wijzig knop
      h+='<td style="padding:6px 8px"><button class="btn btn-ghost btn-sm sd-week-btn" data-week="'+w.key+'" data-weeknr="'+w.week+'" style="font-size:11px">✏️ Week</button></td>';
      h+='</tr>';
    });
    h+='</tbody></table></div></div>';
    h+='<div style="font-size:12px;color:var(--muted);margin-top:8px">✓ = weekdienst · Oranje avatar = dagwissel · Klik op dag voor dagwissel</div>';
  }

  el.innerHTML=h;

  // Events
  el.querySelectorAll('.plan-view-btn').forEach(function(b){ b.addEventListener('click',function(){_sdView=b.dataset.sdview;renderStoringsdienst();}); });
  el.querySelector('#sd-prev').addEventListener('click',function(){ if(_sdView==='jaar'){_sdJaar--;} else{_sdKwart--;if(_sdKwart<1){_sdKwart=4;_sdJaar--;}} renderStoringsdienst(); });
  el.querySelector('#sd-next').addEventListener('click',function(){ if(_sdView==='jaar'){_sdJaar++;} else{_sdKwart++;if(_sdKwart>4){_sdKwart=1;_sdJaar++;}} renderStoringsdienst(); });
  el.querySelector('#sd-vandaag').addEventListener('click',function(){ _sdJaar=new Date().getFullYear();_sdKwart=Math.ceil((new Date().getMonth()+1)/3);renderStoringsdienst(); });
  el.querySelector('#sd-rouleer').addEventListener('click',function(){
    var wk=getWekenInPeriode(_sdJaar,_sdView==='jaar'?0:_sdKwart);
    openRoulatieModal(wk,monteurs);
  });
  el.querySelectorAll('.sd-dag-cel').forEach(function(cel){
    cel.addEventListener('click',function(){ openSdDagModal(cel.dataset.datum,cel.dataset.weekkey,parseInt(cel.dataset.dagidx),monteurs); });
  });
  el.querySelectorAll('.sd-week-btn').forEach(function(btn){
    btn.addEventListener('click',function(){ openSdWijzigModal(btn.dataset.week,btn.dataset.weeknr,monteurs); });
  });
}

function openSdDagModal(datum, weekKey, dagIdx, monteurs) {
  var dagNamen=['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag','Zondag'];
  var sd=APP.storingsdienst||{};
  var dagKey=weekKey+'-'+dagIdx;
  var weekDienst=sd[weekKey];
  var dagDienst=sd[dagKey];
  var weekMed=weekDienst?getMed(weekDienst.medId):null;

  var b='<div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-bottom:14px;font-size:13px">';
  b+='<div style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:2px">Weekdienst</div>';
  b+=(weekMed?'<strong>'+esc(weekMed.voornaam+' '+weekMed.achternaam)+'</strong>':'<span style="color:var(--muted)">Niet ingesteld</span>');
  b+='</div>';
  b+='<div class="form-group"><label>Dagwissel '+dagNamen[dagIdx]+' '+fmtD(datum)+'</label>';
  b+='<select class="input" id="sd-dag-sel">';
  b+='<option value="">— Geen dagwissel (gebruik weekdienst) —</option>';
  monteurs.forEach(function(m){
    var sel=dagDienst&&String(dagDienst.medId)===String(m.id)?' selected':'';
    b+='<option value="'+m.id+'"'+sel+'>'+esc(m.voornaam+' '+m.achternaam)+'</option>';
  });
  b+='</select></div>';

  var f='<button class="btn btn-ghost" id="sdd-cancel">Annuleren</button>';
  if(dagDienst) f+='<button class="btn btn-ghost" id="sdd-reset" style="color:var(--orange)">↩ Reset naar week</button>';
  f+='<button class="btn btn-primary" id="sdd-save">Opslaan</button>';

  openModal(dagNamen[dagIdx]+' '+fmtD(datum)+' — Dagwissel',b,f);
  document.getElementById('sdd-cancel').addEventListener('click',closeModal);

  var resetBtn=document.getElementById('sdd-reset');
  if(resetBtn) resetBtn.addEventListener('click',function(){
    if(!APP.storingsdienst) APP.storingsdienst={};
    delete APP.storingsdienst[dagKey];
    FB.ref(dbPath('storingsdienst',dagKey.replace(/-/g,'_'))).remove();
    closeModal(); renderStoringsdienst();
    toast('Dagwissel verwijderd — weekdienst actief','success');
  });

  document.getElementById('sdd-save').addEventListener('click',function(){
    var medId=document.getElementById('sd-dag-sel').value;
    if(!APP.storingsdienst) APP.storingsdienst={};
    if(medId){
      var m=getMed(medId);
      APP.storingsdienst[dagKey]={medId:medId,naam:m?m.voornaam+' '+m.achternaam:'',type:'dag'};
      dbSaveItem('storingsdienst', dagKey.replace(/-/g,'_'), APP.storingsdienst[dagKey]);
    } else {
      delete APP.storingsdienst[dagKey];
      FB.ref(dbPath('storingsdienst', dagKey.replace(/-/g,'_'))).remove();
    }
    closeModal(); renderStoringsdienst();
    toast('Dagwissel opgeslagen','success');
  });
}

function openSdWijzigModal(weekKey,weekNr,monteurs){
  var sd=APP.storingsdienst||{};
  var huidig=sd[weekKey];
  var b='<div class="form-group"><label>Monteur voor hele week '+weekNr+'</label>';
  b+='<select class="input" id="sd-med-sel"><option value="">— Geen —</option>';
  monteurs.forEach(function(m){
    b+='<option value="'+m.id+'"'+(huidig&&String(huidig.medId)===String(m.id)?' selected':'')+'>'+esc(m.voornaam+' '+m.achternaam)+'</option>';
  });
  b+='</select></div>';
  b+='<div style="font-size:12px;color:var(--muted);margin-top:8px">💡 Individuele dagwissels overschrijven het weekrooster.</div>';
  var f='<button class="btn btn-ghost" id="sd-wij-cancel">Annuleren</button><button class="btn btn-primary" id="sd-wij-save">Opslaan</button>';
  openModal('Storingsdienst week '+weekNr,b,f);
  document.getElementById('sd-wij-cancel').addEventListener('click',closeModal);
  document.getElementById('sd-wij-save').addEventListener('click',function(){
    var medId=document.getElementById('sd-med-sel').value;
    if(!APP.storingsdienst) APP.storingsdienst={};
    if(medId){
      var m=getMed(medId);
      APP.storingsdienst[weekKey]={medId:medId,naam:m?m.voornaam+' '+m.achternaam:''};
    } else { delete APP.storingsdienst[weekKey]; }
    var safeKey = weekKey.replace(/-/g,'_');
    if(medId) {
      dbSaveItem('storingsdienst', safeKey, APP.storingsdienst[weekKey]);
    } else {
      FB.ref(dbPath('storingsdienst', safeKey)).remove();
    }
    closeModal(); renderStoringsdienst();
    toast('Storingsdienst week '+weekNr+' opgeslagen','success');
  });
}

function openRoulatieModal(weken,monteurs){
  if(!monteurs.length){toast('Geen monteurs beschikbaar','error');return;}
  var sd=APP.storingsdienst||{};

  // Stap 0: Monteur selectie
  var b0='<p style="color:var(--muted);font-size:13px;margin-bottom:12px">Kies welke monteurs meedoen in de roulatie. De volgorde bepaalt wie wanneer dienst heeft.</p>';
  b0+='<div id="rou-mont-lijst" style="display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto">';
  monteurs.forEach(function(m,i){
    var kl=medKleur(m);
    b0+='<div class="rou-mont-item" draggable="true" data-id="'+m.id+'" style="display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--surface2);border-radius:8px;cursor:grab;border:1px solid var(--border)">';
    b0+='<span style="color:var(--muted);font-size:16px">⠿</span>';
    b0+='<input type="checkbox" class="rou-mont-cb" data-id="'+m.id+'" checked style="width:15px;height:15px;cursor:pointer">';
    b0+='<div class="avatar" style="width:28px;height:28px;font-size:10px;background:'+kl+';color:#fff">'+initials(m)+'</div>';
    b0+='<div style="flex:1"><div style="font-size:13px;font-weight:600">'+esc(m.voornaam+' '+m.achternaam)+'</div>';
    b0+='<div style="font-size:11px;color:var(--muted)">'+esc(m.functie||m.rol||'')+'</div></div>';
    b0+='<span style="font-size:11px;color:var(--muted)">#'+(i+1)+'</span>';
    b0+='</div>';
  });
  b0+='</div>';
  b0+='<div style="margin-top:8px;font-size:11px;color:var(--muted)">Sleep rijen om de volgorde te wijzigen · volgorde bepaalt de roulatie</div>';

  var f0='<button class="btn btn-ghost" id="rou0-cancel">Annuleren</button>';
  f0+='<button class="btn btn-primary" id="rou0-next">Weken kiezen →</button>';
  openModal('Stap 1 van 3 — Monteurs kiezen',b0,f0);
  document.getElementById('rou0-cancel').addEventListener('click',closeModal);

  // Drag & drop volgorde
  var lijst0=document.getElementById('rou-mont-lijst');
  var drag0=null;
  lijst0.querySelectorAll('.rou-mont-item').forEach(function(item){
    item.addEventListener('dragstart',function(){ drag0=item; setTimeout(function(){item.style.opacity='0.4';},0); });
    item.addEventListener('dragend',function(){ item.style.opacity='1'; drag0=null; lijst0.querySelectorAll('.rou-mont-item').forEach(function(i){i.style.background='var(--surface2)';}); });
    item.addEventListener('dragover',function(e){
      e.preventDefault(); if(!drag0||drag0===item) return;
      item.style.background='rgba(59,130,246,.15)';
      var na=e.clientY>item.getBoundingClientRect().top+item.getBoundingClientRect().height/2;
      if(na) lijst0.insertBefore(drag0,item.nextSibling); else lijst0.insertBefore(drag0,item);
    });
    item.addEventListener('dragleave',function(){ item.style.background='var(--surface2)'; });
    item.addEventListener('drop',function(e){ e.preventDefault(); item.style.background='var(--surface2)'; });
  });

  document.getElementById('rou0-next').addEventListener('click',function(){
    // Bouw geordende monteurlijst op basis van volgorde + aanvinken
    var geselecteerdeMonteurs=[];
    lijst0.querySelectorAll('.rou-mont-item').forEach(function(item){
      var cb=item.querySelector('.rou-mont-cb');
      if(cb&&cb.checked){
        var m=getMed(item.dataset.id); if(m) geselecteerdeMonteurs.push(m);
      }
    });
    if(!geselecteerdeMonteurs.length){toast('Selecteer minstens 1 monteur','error');return;}
    openRoulatieStap1(weken,geselecteerdeMonteurs,sd);
  });
}

function openRoulatieStap1(weken,monteurs,sd){
  // Stap 1: Weekselectie modal
  var b='<p style="color:var(--muted);font-size:13px;margin-bottom:12px">Vink de weken aan die meegenomen worden in het nieuwe voorstel. Bestaande toewijzingen worden <strong>overschreven</strong> voor aangevinkte weken.</p>';
  b+='<div style="display:flex;gap:8px;margin-bottom:10px">';
  b+='<button class="btn btn-ghost btn-sm" id="rou-sel-all">Alles selecteren</button>';
  b+='<button class="btn btn-ghost btn-sm" id="rou-sel-leeg">Alleen lege weken</button>';
  b+='<button class="btn btn-ghost btn-sm" id="rou-sel-none">Deselecteren</button>';
  b+='</div>';
  b+='<div style="max-height:380px;overflow-y:auto;display:flex;flex-direction:column;gap:5px" id="rou-week-lijst">';
  weken.forEach(function(w){
    var bestaand=sd[w.key];
    var med=bestaand?getMed(bestaand.medId):null;
    var isLeeg=!bestaand;
    b+='<label style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:7px;cursor:pointer;border-left:3px solid '+(isLeeg?'var(--border)':'var(--accent)')+'" data-leeg="'+isLeeg+'">';
    b+='<input type="checkbox" class="rou-week-cb" data-key="'+w.key+'"'+(isLeeg?' checked':'')+' style="width:15px;height:15px;cursor:pointer">';
    b+='<div style="flex:1"><div style="font-size:12px;font-weight:700">Week '+w.week+' <span style="font-weight:400;color:var(--muted)">'+fmtD(dateToStr(w.ma))+'</span></div>';
    if(med) b+='<div style="font-size:11px;color:var(--muted)">Huidig: '+esc(med.voornaam+' '+med.achternaam)+'</div>';
    else    b+='<div style="font-size:11px;color:var(--muted)">Leeg</div>';
    b+='</div>';
    if(med) b+='<span style="font-size:10px;color:var(--accent)">wordt overschreven</span>';
    b+='</label>';
  });
  b+='</div>';
  b+='<div style="margin-top:10px;font-size:12px;color:var(--muted)">Roulatie: '+monteurs.map(function(m){return esc(m.voornaam);}).join(' → ')+'</div>';

  var f='<button class="btn btn-ghost" id="rou-cancel">Annuleren</button>';
  f+='<button class="btn btn-primary" id="rou-preview">Voorstel bekijken →</button>';
  openModal('Stap 2 van 3 — Weken kiezen',b,f);

  // Selectie knoppen
  document.getElementById('rou-cancel').addEventListener('click',closeModal);
  document.getElementById('rou-sel-all').addEventListener('click',function(){
    document.querySelectorAll('.rou-week-cb').forEach(function(cb){cb.checked=true;});
  });
  document.getElementById('rou-sel-leeg').addEventListener('click',function(){
    document.querySelectorAll('.rou-week-cb').forEach(function(cb){
      var lbl=cb.closest('label'); cb.checked=lbl&&lbl.dataset.leeg==='true';
    });
  });
  document.getElementById('rou-sel-none').addEventListener('click',function(){
    document.querySelectorAll('.rou-week-cb').forEach(function(cb){cb.checked=false;});
  });

  // Stap 2: Preview
  document.getElementById('rou-preview').addEventListener('click',function(){
    var geselecteerd=Array.from(document.querySelectorAll('.rou-week-cb:checked')).map(function(cb){return cb.dataset.key;});
    openRoulatieStap2(weken,monteurs,geselecteerd,sd);
  });
}

function openRoulatieStap2(weken,monteurs,geselecteerd,sd){
  if(!geselecteerd){
    geselecteerd=Array.from(document.querySelectorAll('.rou-week-cb:checked')).map(function(cb){return cb.dataset.key;});
  }
    if(!geselecteerd.length){toast('Selecteer minstens 1 week','error');return;}

    // Genereer voorstel
    var voorstel={};
    var idx=0;
    geselecteerd.forEach(function(key){
      voorstel[key]=monteurs[idx++%monteurs.length];
    });

    // Bouw preview
    var b2='<p style="color:var(--muted);font-size:13px;margin-bottom:12px">'+geselecteerd.length+' weken worden bijgewerkt:</p>';
    b2+='<div style="max-height:380px;overflow-y:auto;display:flex;flex-direction:column;gap:5px">';
    weken.filter(function(w){return geselecteerd.indexOf(w.key)>=0;}).forEach(function(w){
      var oudMed=sd[w.key]?getMed(sd[w.key].medId):null;
      var nieuwMed=voorstel[w.key];
      var gewijzigd=!oudMed||(oudMed.id!==nieuwMed.id);
      b2+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--surface2);border-radius:7px;border-left:3px solid '+(gewijzigd?'var(--orange)':'var(--border)')+'">';
      b2+='<div><div style="font-size:12px;font-weight:700">Week '+w.week+'</div>';
      b2+='<div style="font-size:11px;color:var(--muted)">'+fmtD(dateToStr(w.ma))+'</div></div>';
      b2+='<div style="text-align:right">';
      if(oudMed&&gewijzigd) b2+='<div style="font-size:11px;color:var(--muted);text-decoration:line-through">'+esc(oudMed.voornaam+' '+oudMed.achternaam)+'</div>';

var _locMap = null, _locMarkers = {}, _locInfoWindows = {}, _locInterval = null, _locGPSWatch = null, _locFilter = 'alle';

function startLocatieTracking() {
  if (!navigator.geolocation) { toast('GPS niet beschikbaar op dit apparaat','error'); return; }
  if (_locGPSWatch) return;
  _locGPSWatch = navigator.geolocation.watchPosition(function(pos) {
    if (!APP.profiel) return;
    FB.ref(dbPath('locaties', APP.user.uid)).set({
      lat: pos.coords.latitude, lng: pos.coords.longitude,
      accuracy: Math.round(pos.coords.accuracy), timestamp: Date.now(),
      naam: APP.profiel.naam||'', medId: APP.profiel.medId||APP.user.uid,
    });
  }, function(err){ log('WARN','LOC','GPS fout: '+err.message); },
  { enableHighAccuracy:true, maximumAge:30000, timeout:15000 });
  toast('📍 Locatie wordt gedeeld','success');
}

function stopLocatieTracking() {
  if (_locGPSWatch) { navigator.geolocation.clearWatch(_locGPSWatch); _locGPSWatch = null; }
  if (APP.user) FB.ref(dbPath('locaties', APP.user.uid)).remove();
  toast('Locatie delen gestopt','success');
}

  var minGeleden = Math.round((Date.now() - loc.timestamp) / 60000);
  var tijdLabel  = minGeleden < 1 ? 'Nu actief' : minGeleden < 60 ? minGeleden+'m geleden' : Math.round(minGeleden/60)+'u geleden';
  var isOud = minGeleden > 60;
  // Ronde marker met initialen
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">' +
    '<circle cx="22" cy="22" r="20" fill="'+(isOud?'#9ca3af':kl)+'" stroke="white" stroke-width="3"/>' +
    '<text x="22" y="27" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="14" fill="white">'+init+'</text></svg>';
  var marker = new google.maps.Marker({
    position:{lat:loc.lat,lng:loc.lng}, map:map, title:naam,
    icon:{url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg), scaledSize:new google.maps.Size(44,44), anchor:new google.maps.Point(22,22)},
    zIndex:100,
  });

    '</div>',
  });

    if(status!=='OK'||!results[0]) return;
    // Marker met nummer erin
    var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 38 38">'

      + '</svg>';

      position: results[0].geometry.location, map: map, title: o.klantNaam||adres,
      icon: {url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg), scaledSize:new google.maps.Size(38,38), anchor:new google.maps.Point(19,19)},
      zIndex: spoed ? 90 : 50,
    });
    var _iwMonteurIds = Array.isArray(o.monteurIds) && o.monteurIds.length
      ? o.monteurIds
      : (o.monteurId ? [String(o.monteurId)] : []);
    var _iwMonteurNamen = _iwMonteurIds.map(function(mid){
      var mm = getMed(mid); return mm ? esc(mm.voornaam+' '+mm.achternaam) : null;

    var iw = new google.maps.InfoWindow({content:
      '<div style="font-family:Arial,sans-serif;min-width:210px;padding:8px 4px 4px">'
      + (spoed ? '<div style="background:#ef4444;color:white;font-weight:700;font-size:11px;padding:3px 8px;border-radius:4px;margin-bottom:6px;display:inline-block">⚡ SPOED</div><br>' : '')
      + (numLabel ? '<div style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:'+markerKleur+';color:white;font-weight:700;font-size:12px;margin-bottom:6px">'+numLabel+'</div> ' : '')
      + '<div style="font-weight:700;font-size:15px;color:#111;margin-bottom:4px;border-bottom:2px solid '+markerKleur+';padding-bottom:5px">'+esc(o.klantNaam||'—')+'</div>'
      + '<div style="font-size:12px;color:#333;margin-bottom:3px">'+esc(o.adres||'')+'</div>'
      + '<div style="font-size:12px;font-weight:600;color:'+markerKleur+';margin-bottom:3px">'+esc(ot.label)+(o.tijdVan?' · <span style="color:#1d4ed8">'+o.tijdVan+(o.tijdTot?' – '+o.tijdTot:'')+'</span>':'')+'</div>'
      + (_iwMonteurNamen ? '<div style="font-size:12px;color:#222;margin-top:4px">👤 '+_iwMonteurNamen+'</div>' : '')
      + '</div>',
    });
    marker.addListener('click',function(){Object.values(_locInfoWindows).forEach(function(w){w.close();}); iw.open(map,marker);});

function tekenMonteurRoute(map, monteurId) {
  var vandaag=new Date().toISOString().split('T')[0];
  var med = getMed(monteurId);
  var strokeKleur = medKleur(med);

  var bedrijfGeg = APP.bedrijfGegevens||{};
  var startPunt = (bedrijfGeg.adres && bedrijfGeg.postcode)
    ? { adres:bedrijfGeg.adres, postcode:bedrijfGeg.postcode, plaats:bedrijfGeg.plaats||'' }
    : { adres:'Nijverheidsweg 19', postcode:'4301 NS', plaats:'Zierikzee' };
  var ops=APP.opdrachten.filter(function(o){
    return o.datum===vandaag
      && (String(o.monteurId)===String(monteurId)||(o.monteurIds&&o.monteurIds.indexOf(monteurId)>-1))
      && o.adres;
  }).sort(function(a,b){return(a.tijdVan||'99:99')>(b.tijdVan||'99:99')?1:-1;});
  if(ops.length>0) ops = [startPunt].concat(ops);
  if(ops.length<2) return;
  var waypoints=ops.slice(1,ops.length-1).map(function(o){return{location:o.adres+' '+(o.postcode||'')+' Nederland',stopover:true};});
  var dr=new google.maps.DirectionsRenderer({
    map:map,
    suppressMarkers:true,
    polylineOptions:{
      strokeColor: strokeKleur,
      strokeWeight: 5,
      strokeOpacity: 0.85,
    }
  });
  new google.maps.DirectionsService().route({
    origin:ops[0].adres+' '+(ops[0].postcode||'')+' Nederland',
    destination:ops[ops.length-1].adres+' '+(ops[ops.length-1].postcode||'')+' Nederland',
    waypoints:waypoints, travelMode:google.maps.TravelMode.DRIVING,
  },function(result,status){ if(status==='OK'){dr.setDirections(result); _locMarkers['route_'+monteurId]=dr;} });
}

function laadKaartData() {
  if(!_locMap) return;
  var vandaag=new Date().toISOString().split('T')[0];
  Object.values(_locMarkers).forEach(function(m){ if(m&&m.setMap) m.setMap(null); });
  _locMarkers={}; _locInfoWindows={};

  // Bedrijfslocatie marker (als ingesteld en ingeschakeld)
  var bg = APP.bedrijfGegevens||{};
  if(bg.toonOpKaart && bg.adres && bg.postcode) {
    var bedrijfAdres = bg.adres+' '+bg.postcode+' Nederland';
    new google.maps.Geocoder().geocode({address:bedrijfAdres}, function(results,status){
      if(status!=='OK'||!results[0]) return;
      var markerIcon;
      if(bg.logo) {
        // Gebruik bedrijfslogo als ronde custom marker via SVG clip
        var roundSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48">'
          + '<defs><clipPath id="c"><circle cx="24" cy="24" r="21"/></clipPath></defs>'
          + '<circle cx="24" cy="24" r="23" fill="white" stroke="#e5e7eb" stroke-width="2"/>'
          + '<image href="'+bg.logo+'" x="3" y="3" width="42" height="42" clip-path="url(#c)" preserveAspectRatio="xMidYMid slice"/>'
          + '</svg>';
        markerIcon = {
          url: 'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(roundSvg),
          scaledSize: new google.maps.Size(48, 48),
          anchor: new google.maps.Point(24, 24)
        };
      } else {
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 44 44">'
          + '<circle cx="22" cy="22" r="20" fill="#1d4ed8" stroke="white" stroke-width="3"/>'
          + '<text x="22" y="27" text-anchor="middle" font-family="Arial" font-weight="bold" font-size="11" fill="white">HQ</text>'
          + '</svg>';
        markerIcon = {url:'data:image/svg+xml;charset=UTF-8,'+encodeURIComponent(svg), scaledSize:new google.maps.Size(44,44), anchor:new google.maps.Point(22,22)};
      }
      var marker = new google.maps.Marker({
        position: results[0].geometry.location, map: _locMap,
        title: bg.naam||'Bedrijf',
        icon: markerIcon,
        zIndex: 200,
      });
      var iw = new google.maps.InfoWindow({content:
        '<div style="font-family:Arial,sans-serif;min-width:160px;padding:4px">'
        +'<div style="font-weight:700;font-size:14px;color:#111;margin-bottom:4px">'+esc(bg.naam||'Bedrijf')+'</div>'
        +'<div style="font-size:12px;color:#333;margin-bottom:2px">'+esc(bg.adres||'')+'</div>'
        +'<div style="font-size:12px;color:#333">'+esc((bg.postcode||'')+' '+(bg.plaats||''))+'</div>'
        +(bg.telefoon?'<div style="font-size:12px;font-weight:600;color:#1d4ed8;margin-top:4px">'+esc(bg.telefoon)+'</div>':'')
        +'</div>'
      });
      marker.addListener('click',function(){ Object.values(_locInfoWindows).forEach(function(w){w.close();}); iw.open(_locMap,marker); });
      _locMarkers['bedrijf'] = marker;
    });
  }
  // Monteur locaties
  FB.ref(dbPath('locaties')).once('value').then(function(snap){
    if(!snap.exists()) return;
    var planRollen=APP.planningRollen||['monteur','extern'];
    snap.forEach(function(child){
      var loc=child.val(); if(!loc||!loc.lat||!loc.lng) return;
      var med=getMed(loc.medId)||APP.medewerkers.find(function(m){return m.id===child.key;});
      if(!med||planRollen.indexOf(med.rol)<0) return;
      if(_locFilter!=='alle'&&String(med.id)!==_locFilter) return;
      _locMarkers['mont_'+child.key]=maakMonteurMarker(_locMap,loc,med);
    });
  });
  // Opdrachten vandaag — per monteur groeperen, sorteren op tijd, nummeren
  var vandaagOps = APP.opdrachten.filter(function(o){return o.datum===vandaag&&o.status!=='afgehandeld'&&o.adres;});
  // Bouw een map: monteurId → [opdrachten gesorteerd op tijd]
  var perMonteur = {};
  vandaagOps.forEach(function(o){
    var ids = Array.isArray(o.monteurIds)&&o.monteurIds.length ? o.monteurIds : (o.monteurId ? [String(o.monteurId)] : ['_geen']);
    ids.forEach(function(mid){
      if(!perMonteur[mid]) perMonteur[mid] = [];
      perMonteur[mid].push(o);
    });
  });
  // Sorteer per monteur op tijdvolgorde en teken genummerde markers
  Object.keys(perMonteur).forEach(function(mid){
    if(_locFilter!=='alle'&&mid!==_locFilter&&mid!=='_geen') return;
    var med = getMed(mid);
    var strokeKl = medKleur(med);
    var gesorteerd = perMonteur[mid].slice().sort(function(a,b){
      return (a.tijdVan||'99:99') > (b.tijdVan||'99:99') ? 1 : -1;
    });
    gesorteerd.forEach(function(o, idx){
      var klant = null;
      if(o.skId) klant = APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);});
      if(!klant&&o.debId) klant = APP.debiteuren.find(function(d){return String(d.id)===String(o.debId);});
      maakOpdrachtMarker(_locMap, o, klant, strokeKl, idx+1);
    });
  });
  // Serviceklanten (max 50 om geocoding te beperken)
  APP.serviceklanten.slice(0,50).forEach(function(k){ maakSkMarker(_locMap,k); });
  // Routes
  var planRollen2=APP.planningRollen||['monteur','extern'];
  APP.medewerkers.filter(function(m){return m.status!=='inactief'&&planRollen2.indexOf(m.rol)>=0;}).forEach(function(m){
    if(_locFilter!=='alle'&&String(m.id)!==_locFilter) return;
    tekenMonteurRoute(_locMap,m.id);
  });
}

window.initialiseerKaart=function(){
  var mapEl=document.getElementById('loc-map'); if(!mapEl) return;
  _locMap=new google.maps.Map(mapEl,{
    center:{lat:51.8336,lng:4.9756}, zoom:10,
    mapTypeId:google.maps.MapTypeId.ROADMAP,
    styles:[{featureType:'poi',elementType:'labels',stylers:[{visibility:'off'}]}],
  });
  laadKaartData();
};

function renderLocatie() {
  var el=document.getElementById('content');
  // Storingsdienst: alle actieve medewerkers kunnen dienst draaien
  var monteurs=APP.medewerkers.filter(function(m){return m.status!=='inactief';});
  var isTracking=!!_locGPSWatch;
  var planRollen3=APP.planningRollen||['monteur','extern'];
  var actieveMonteurs=APP.medewerkers.filter(function(m){return m.status!=='inactief'&&planRollen3.indexOf(m.rol)>=0;});
  var h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">';
  if(APP.profiel&&(APP.profiel.rol==='monteur'||APP.profiel.rol==='extern')){
    if(isTracking) h+='<button class="btn btn-ghost btn-sm" id="loc-stop-gps" style="color:var(--red)">⏹ Stop locatie delen</button>';
    else h+='<button class="btn btn-primary btn-sm" id="loc-start-gps">📍 Deel mijn locatie</button>';
  }
  // Dynamische route-legende per monteur
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">';
  actieveMonteurs.forEach(function(m){
    if(_locFilter!=='alle'&&String(m.id)!==_locFilter) return;
    var strokeKl = medKleur(m);
    h+='<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)">';
    h+='<div style="width:24px;height:4px;border-radius:2px;background:'+strokeKl+';flex-shrink:0"></div>';
    h+=esc(m.voornaam+' '+m.achternaam[0]+'.')+'</div>';
  });
  h+='</div>';
  h+='<select class="input" id="loc-monteur-filter" style="width:180px;margin-left:auto">';
  h+='<option value="alle">Alle monteurs</option>';
  actieveMonteurs.forEach(function(m){h+='<option value="'+m.id+'"'+(_locFilter===String(m.id)?' selected':'')+'>'+esc(m.voornaam+' '+m.achternaam)+'</option>';});
  h+='</select>';
  h+='<button class="btn btn-ghost btn-sm" id="loc-refresh">↻</button>';
  h+='</div>';
  h+='<div id="loc-map" style="width:100%;height:calc(100vh - 210px);min-height:500px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)"></div>';
  el.innerHTML=h;
  var startBtn=el.querySelector('#loc-start-gps'); if(startBtn) startBtn.addEventListener('click',function(){startLocatieTracking();renderLocatie();});
  var stopBtn=el.querySelector('#loc-stop-gps');   if(stopBtn)  stopBtn.addEventListener('click',function(){stopLocatieTracking();renderLocatie();});
  var filtEl=el.querySelector('#loc-monteur-filter'); if(filtEl) filtEl.addEventListener('change',function(){_locFilter=filtEl.value;laadKaartData();});
  var refBtn=el.querySelector('#loc-refresh'); if(refBtn) refBtn.addEventListener('click',laadKaartData);
  // Laad Maps API
  if(typeof google!=='undefined'&&google.maps){ initialiseerKaart(); }
  else if(!document.getElementById('gmap-script')){
    var sc=document.createElement('script'); sc.id='gmap-script';
    sc.src='https://maps.googleapis.com/maps/api/js?key=AIzaSyCP3LqVySNrg3Pte80y2ZXLRrOmDxDGMGA&libraries=places&callback=initialiseerKaart';
    sc.async=true; document.head.appendChild(sc);
  } else { setTimeout(function(){if(typeof google!=='undefined'&&google.maps) initialiseerKaart();},500); }
  // Realtime interval
  if(_locInterval) clearInterval(_locInterval);
  _locInterval=setInterval(function(){if(APP.activePage==='locatie') laadKaartData(); else{clearInterval(_locInterval);_locInterval=null;}},30000);
}

function getMailTemplates() { return APP.mailTemplates || MAIL_TEMPLATES_DEFAULT; }

function vulMailIn(template, opdracht) {
  var klant = null;
  if (opdracht.skId) klant = APP.serviceklanten.find(function(k){return String(k.id)===String(opdracht.skId);});
  if (!klant && opdracht.debId) klant = APP.debiteuren.find(function(d){return String(d.id)===String(opdracht.debId);});
  var monteurIds = Array.isArray(opdracht.monteurIds) ? opdracht.monteurIds : (opdracht.monteurId ? [opdracht.monteurId] : []);
  var monteurNamen = monteurIds.map(function(id){var m=getMed(id);return m?m.voornaam+' '+m.achternaam:'';}).filter(Boolean).join(', ') || 'Wordt nog toegewezen';
  var vars = {
    bedrijfNaam:      (APP.bedrijfGegevens&&APP.bedrijfGegevens.naam)||'Homa Pompen B.V.',
    bedrijfTel:       (APP.bedrijfGegevens&&APP.bedrijfGegevens.telefoon)||'',
    bedrijfEmail:     (APP.bedrijfGegevens&&APP.bedrijfGegevens.email)||'',
    klantNaam:        opdracht.klantNaam||(klant?klant.naam:''),
    contactpersoon:   klant?(klant.contactpersoon||klant.naam||''):(opdracht.klantNaam||''),
    datum:            fmtD(opdracht.datum),
    tijdVan:          opdracht.tijdVan||'—',
    tijdTot:          opdracht.tijdTot||'—',
    adres:            opdracht.adres||(klant?klant.adres:''),
    postcode:         opdracht.postcode||(klant?klant.postcode:''),
    plaats:           opdracht.plaats||(klant?klant.plaats:''),
    monteur:          monteurNamen,
    type:             getOpdrachttype(opdracht.type).label,
    pomptype:         opdracht.pomptype||(klant?klant.pomptype:'')||'—',
    werkomschrijving: opdracht.werkomschrijving || '',
  };
  var tekst = template;
  Object.keys(vars).forEach(function(k){ tekst = tekst.split('{'+k+'}').join(vars[k]); });
  return tekst;
}

function stuurMail(opdrachtId, templateId) {
  var o = APP.opdrachten.find(function(x){return String(x.id)===String(opdrachtId);});
  if (!o) return;
  var klant = null;
  if (o.skId) klant = APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);});
  if (!klant && o.debId) klant = APP.debiteuren.find(function(d){return String(d.id)===String(o.debId);});
  var tpl = getMailTemplates()[templateId]; if (!tpl) return;
  var email = klant?(klant.email||''):'';
  var mailto = 'mailto:'+encodeURIComponent(email)+'?subject='+encodeURIComponent(vulMailIn(tpl.onderwerp,o))+'&body='+encodeURIComponent(vulMailIn(tpl.body,o));
  window.location.href = mailto;
  o.mailVerzonden = o.mailVerzonden||[];
  o.mailVerzonden.push({template:templateId, datum:new Date().toISOString().split('T')[0], door:APP.profiel?APP.profiel.naam:''});
  dbSaveItem('opdrachten',o.id,o);
  toast('Outlook geopend: '+tpl.naam,'success');
}

function openMailModal(opdrachtId) {
  var o = APP.opdrachten.find(function(x){return String(x.id)===String(opdrachtId);});
  if (!o) return;
  var klant = null;
  if (o.skId) klant = APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);});

    b += '<strong>'+esc(klant?(klant.contactpersoon||klant.naam):o.klantNaam)+'</strong> <span style="color:var(--accent)">'+esc(email)+'</span></div>';
  }

  b += '<div style="display:flex;flex-direction:column;gap:10px">';
  Object.values(templates).forEach(function(tpl){
    var alVerzonden = o.mailVerzonden&&o.mailVerzonden.find(function(m){return m.template===tpl.id;});
    b += '<div style="border:1px solid var(--border);border-radius:8px;padding:12px;background:var(--surface2)">';
    b += '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">';
    b += '<div><div style="font-weight:600;font-size:13px">'+esc(tpl.naam)+'</div>';
    b += '<div style="font-size:12px;color:var(--muted);margin-top:2px">'+esc(vulMailIn(tpl.onderwerp,o))+'</div>';
    if(alVerzonden) b += '<div style="font-size:11px;color:var(--green);margin-top:4px">✓ Verstuurd op '+fmtD(alVerzonden.datum)+'</div>';
    b += '</div>';
    b += '<button class="btn btn-primary btn-sm mail-send-btn" data-tpl="'+tpl.id+'" data-op="'+opdrachtId+'">📧 Openen</button>';
    b += '</div>';
    b += '<details style="margin-top:8px"><summary style="font-size:11px;color:var(--muted);cursor:pointer">Voorbeeld tonen</summary>';
    b += '<pre style="font-size:11px;white-space:pre-wrap;margin-top:8px;padding:8px;background:var(--surface);border-radius:6px;font-family:inherit">'+esc(vulMailIn(tpl.body,o))+'</pre>';
    b += '</details></div>';
  });
  b += '</div>';
  if(o.mailVerzonden&&o.mailVerzonden.length){
    b += '<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:12px">';
    b += '<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Verzendhistorie</div>';
    o.mailVerzonden.forEach(function(m){var t=templates[m.template];b+='<div style="font-size:12px;color:var(--muted);margin-bottom:3px">📧 '+esc(t?t.naam:m.template)+' · '+fmtD(m.datum)+' · door '+esc(m.door)+'</div>';});
    b += '</div>';
  }
  var f = '<button class="btn btn-ghost" id="mail-modal-close">Sluiten</button>';
  openModal('📧 Mail versturen — '+esc(o.klantNaam||'klant'), b, f);
  document.getElementById('mail-modal-close').addEventListener('click', closeModal);
  document.querySelectorAll('.mail-send-btn').forEach(function(btn){btn.addEventListener('click',function(){stuurMail(btn.dataset.op,btn.dataset.tpl);});});
}

function renderKlantmails() {
  var el = document.getElementById('content');
  var templates = getMailTemplates();

  // Periode selector state
  if (typeof _mailPeriode === 'undefined') window._mailPeriode = new Date().toISOString().slice(0,7); // YYYY-MM
  if (typeof _mailSortKey === 'undefined') window._mailSortKey = 'datum';
  if (typeof _mailSortDir === 'undefined') window._mailSortDir = 1;

  var mndNamen = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
  var pJaar    = parseInt(_mailPeriode.slice(0,4));
  var pMnd     = parseInt(_mailPeriode.slice(5,7)); // 1-12
  var periodeLabel = mndNamen[pMnd-1] + ' ' + pJaar;

  // Vorige maand
  var prevMnd  = pMnd === 1  ? 12 : pMnd - 1;
  var prevJaar = pMnd === 1  ? pJaar - 1 : pJaar;
  var nextMnd  = pMnd === 12 ? 1  : pMnd + 1;
  var nextJaar = pMnd === 12 ? pJaar + 1 : pJaar;
  var prevStr  = prevJaar + '-' + ('0'+prevMnd).slice(-2);
  var nextStr  = nextJaar + '-' + ('0'+nextMnd).slice(-2);

  // Filter op exact YYYY-MM prefix — geen timezone issues
  var vanDatum = _mailPeriode + '-01';
  // Laatste dag van de maand: gebruik pMnd direct
  var dagenInMaand = new Date(pJaar, pMnd, 0).getDate();
  var totDatum = _mailPeriode + '-' + ('0'+dagenInMaand).slice(-2);

  var opdrachtenMaand = APP.opdrachten.filter(function(o){
    if (!o.datum) return false;
    return o.datum.slice(0,7) === _mailPeriode && o.status !== 'afgehandeld';
  });
  opdrachtenMaand = enrichSortVelden(opdrachtenMaand, {
    monteurNaam: function(o){ return medNaamSort(o.monteurId); },
    klantEmail:  function(o){ return (o.email||o.klantEmail||'').toLowerCase(); },
  });
  opdrachtenMaand = sorteerLijst(opdrachtenMaand, _mailSortKey, _mailSortDir);

  // Bereken stats
  var totaal       = opdrachtenMaand.length;
  var metEmail     = 0;
  var alVerzonden  = 0;
  var nogTeDoen    = 0;

  opdrachtenMaand.forEach(function(o){
    var klant = null;
    if (o.skId)  klant = APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);});
    if (!klant && o.debId) klant = APP.debiteuren.find(function(d){return String(d.id)===String(o.debId);});
    var email = '';
    if (klant) {
      email = klant.email || '';
      // Als SK geen email heeft, probeer debiteur email
      if (!email && o.debId) {
        var deb = APP.debiteuren.find(function(d){return String(d.id)===String(o.debId);});
        if (deb) email = deb.email || '';
      }
      // Als we klant via skId hebben, probeer ook debiteur
      if (!email && klant.debId) {
        var deb2 = APP.debiteuren.find(function(d){return String(d.id)===String(klant.debId);});
        if (deb2) email = deb2.email || '';
      }
    }
    if (email) metEmail++;
    if (o.mailVerzonden && o.mailVerzonden.length) alVerzonden++;
    else if (email) nogTeDoen++;
  });

  var h = '';

  // ── Toolbar ──────────────────────────────────────────────────
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap">';
  h += '<div style="display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:4px">';
  h += '<button class="btn btn-ghost btn-sm" id="mail-prev">‹</button>';
  h += '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;min-width:160px;text-align:center">'+periodeLabel+'</div>';
  h += '<button class="btn btn-ghost btn-sm" id="mail-next">›</button>';
  h += '</div>';

  // Stats
  h += '<div style="display:flex;gap:8px;flex-wrap:wrap">';
  h += '<span style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:13px"><strong>'+totaal+'</strong> opdrachten</span>';
  if (nogTeDoen)  h += '<span class="tag tag-orange" style="padding:5px 12px"><strong>'+nogTeDoen+'</strong> te versturen</span>';
  if (alVerzonden)h += '<span class="tag tag-green"  style="padding:5px 12px"><strong>'+alVerzonden+'</strong> verstuurd</span>';
  if (metEmail < totaal) h += '<span class="tag tag-muted" style="padding:5px 12px">'+(totaal-metEmail)+' zonder e-mail</span>';
  h += '</div>';

  // Template keuze
  h += '<div style="margin-left:auto;display:flex;align-items:center;gap:8px">';
  h += '<label style="font-size:12px;color:var(--muted)">Template:</label>';
  h += '<select class="input" id="mail-tpl-keuze" style="width:200px">';
  var _tplLijst = Object.values(getMailTemplates());
  _tplLijst.forEach(function(tpl){
    h += '<option value="'+tpl.id+'">'+esc(tpl.naam)+'</option>';
  });
  h += '</select>';
  h += '</div>';
  h += '</div>';

  // ── Bulk overzicht ─────────────────────────────────────────────
  if (opdrachtenMaand.length === 0) {
    h += legeStaat(
      '<svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
      'Geen opdrachten in ' + periodeLabel,
      'Er zijn geen ingeplande opdrachten in deze maand. Voeg opdrachten toe via de Planning module.',
      '→ Naar Planning', 'mail-naar-planning'
    );
  } else {
    h += '<div class="card" style="padding:0"><div class="table-wrap"><table style="width:100%"><thead><tr>';
    h += '<th style="width:36px;padding:8px 10px"><input type="checkbox" id="mail-select-all" title="Alles selecteren"></th>';
    var mailSortCols = [['klantNaam','Klant'],['klantEmail','E-mail'],['datum','Datum'],['tijdVan','Tijd'],['monteurNaam','Monteur'],['status','Status']];
    mailSortCols.forEach(function(c){
      var ico = _mailSortKey===c[0]?(_mailSortDir===1?' ↑':' ↓'):'<span style="opacity:.4;font-size:9px"> ⇅</span>';
      h += '<th class="mail-sort-th" data-sort="'+c[0]+'" style="cursor:pointer;user-select:none;white-space:nowrap">'+c[1]+ico+'</th>';
    });
    h += '<th style="width:150px">Mail</th>';
    h += '</tr></thead><tbody>';

    opdrachtenMaand.forEach(function(o){
      var klant = null;
      if (o.skId)  klant = APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);});
      if (!klant && o.debId) klant = APP.debiteuren.find(function(d){return String(d.id)===String(o.debId);});
      var email      = klant ? (klant.email||'') : '';
      var monteur    = o.monteurId ? getMed(o.monteurId) : null;
      var verzonden   = o.mailVerzonden && o.mailVerzonden.length > 0;
      var laasteMail  = verzonden ? o.mailVerzonden[o.mailVerzonden.length-1] : null;

      h += '<tr class="mail-rij" data-id="'+o.id+'" style="'+(verzonden?'opacity:.65':'')+(email?'':'background:rgba(239,68,68,.04)')+'">';

      // Checkbox
      h += '<td style="padding:8px 10px"><input type="checkbox" class="mail-check" data-id="'+o.id+'"'+(email?'':' disabled')+' style="width:15px;height:15px"></td>';

      // Klant
      h += '<td style="padding:10px"><div style="font-weight:600;font-size:13px">'+esc(o.klantNaam||'—')+'</div>';
      if(klant && klant.contactpersoon) h += '<div style="font-size:11px;color:var(--muted)">'+esc(klant.contactpersoon)+'</div>';
      h += '</td>';

      // Email
      if (email) {
        h += '<td style="font-size:12px;color:var(--accent)">'+esc(email)+'</td>';
      } else {
        h += '<td style="font-size:12px;color:var(--red)">Geen e-mail</td>';
      }

      // Datum + tijd
      h += '<td style="font-size:12px;font-weight:600;white-space:nowrap">'+fmtD(o.datum)+'</td>';
      h += '<td style="font-size:12px;color:var(--accent);white-space:nowrap">'+esc(o.tijdVan||'—')+(o.tijdTot?' – '+esc(o.tijdTot):'')+'</td>';

      // Monteur
      h += '<td style="font-size:12px">'+(monteur?esc(monteur.voornaam+' '+monteur.achternaam):'<span style="color:var(--muted)">—</span>')+'</td>';

      // Status opdracht
      h += '<td>'+tagStatus(o.status)+'</td>';

      // Mail knop
      h += '<td style="padding:6px 10px">';
      if (!email) {
        h += '<span style="font-size:11px;color:var(--muted)">Geen e-mail</span>';
      } else if (verzonden) {
        h += '<div style="font-size:11px;color:var(--green);margin-bottom:3px">✓ '+fmtD(laasteMail.datum)+'</div>';
        h += '<button class="btn btn-ghost btn-sm mail-bulk-btn" data-id="'+o.id+'" style="font-size:11px;padding:3px 8px">↻ Opnieuw</button>';
      } else {
        h += '<button class="btn btn-primary btn-sm mail-bulk-btn" data-id="'+o.id+'">📧 Versturen</button>';
      }
      h += '</td>';
      h += '</tr>';
    });

    h += '</tbody></table></div>';

    // Bulk actie balk
    h += '<div style="padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px">';
    h += '<span id="mail-selected-count" style="font-size:12px;color:var(--muted)">0 geselecteerd</span>';
    h += '<button class="btn btn-primary btn-sm" id="mail-bulk-send" disabled>📧 Verstuur selectie</button>';
    h += '<span style="font-size:11px;color:var(--muted)">Elke mail opent apart in Outlook</span>';
    h += '</div>';
    h += '</div>';
  }

  // ── Template beheer ────────────────────────────────────────────
  h += '<div style="margin-top:24px;border-top:1px solid var(--border);padding-top:20px">';
  h += '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;margin-bottom:14px">E-mailtemplates</div>';
  h += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px">';
  Object.values(templates).forEach(function(tpl){
    h += '<div class="card" style="padding:12px">';
    h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
    h += '<div style="font-weight:600;font-size:13px">'+esc(tpl.naam)+'</div>';
    h += '<button class="btn btn-ghost btn-sm mail-tpl-edit" data-id="'+tpl.id+'">✏️</button></div>';
    h += '<div style="font-size:11px;color:var(--muted)">'+esc(tpl.onderwerp.slice(0,50))+'...</div>';
    h += '</div>';
  });
  h += '</div>';
  h += '<div style="margin-top:12px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:12px;font-size:13px;color:var(--muted)">';
  h += '💡 Beschikbare variabelen: {klantNaam} {contactpersoon} {datum} {tijdVan} {tijdTot} {adres} {postcode} {plaats} {monteur} {type} <strong style="color:var(--accent)">{werkomschrijving}</strong>';
  h += '</div></div>';

  el.innerHTML = h;

  // ── Events ─────────────────────────────────────────────────────
  var getTplId = function(){ return document.getElementById('mail-tpl-keuze').value; };

  // Periode navigatie - gebruik closure vars
  var _prevStr = prevStr, _nextStr = nextStr;
  el.querySelector('#mail-prev').addEventListener('click', function(){ _mailPeriode=_prevStr; renderKlantmails(); });
  el.querySelector('#mail-next').addEventListener('click', function(){ _mailPeriode=_nextStr; renderKlantmails(); });
  // Sortering
  el.querySelectorAll('.mail-sort-th').forEach(function(th){
    th.addEventListener('click', function(){
      if(_mailSortKey===th.dataset.sort) _mailSortDir*=-1; else{_mailSortKey=th.dataset.sort;_mailSortDir=1;}
      renderKlantmails();
    });
  });

  // Lege staat knop → naar planning
  var mailNaarPlan = el.querySelector('#mail-naar-planning');
  if(mailNaarPlan) mailNaarPlan.addEventListener('click', function(){ navigateTo('planning'); });

  // Selectie
  function updateBulkBtn(){
    var checked = el.querySelectorAll('.mail-check:checked').length;
    var cnt = el.querySelector('#mail-selected-count');
    var btn = el.querySelector('#mail-bulk-send');
    if(cnt) cnt.textContent = checked+' geselecteerd';
    if(btn) btn.disabled = checked === 0;
  }

  var selectAll = el.querySelector('#mail-select-all');
  if(selectAll) selectAll.addEventListener('change', function(){
    el.querySelectorAll('.mail-check:not(:disabled)').forEach(function(cb){ cb.checked = selectAll.checked; });
    updateBulkBtn();
  });
  el.querySelectorAll('.mail-check').forEach(function(cb){ cb.addEventListener('change', updateBulkBtn); });

  // Individueel versturen
  el.querySelectorAll('.mail-bulk-btn').forEach(function(btn){
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      stuurMail(btn.dataset.id, getTplId());
      // Update rij visueel na korte delay
      setTimeout(function(){ renderKlantmails(); }, 500);
    });
  });

  // Bulk versturen (met delay tussen mails zodat browser ze kan openen)
  var bulkSend = el.querySelector('#mail-bulk-send');
  if(bulkSend) bulkSend.addEventListener('click', function(){
    var checked = Array.from(el.querySelectorAll('.mail-check:checked')).map(function(cb){return cb.dataset.id;});
    if(!checked.length) return;
    var tplId = getTplId();
    var delay = 0;
    checked.forEach(function(opId){
      setTimeout(function(){
        stuurMail(opId, tplId);
      }, delay);
      delay += 800; // 800ms tussen elke mail
    });
    toast('📧 '+checked.length+' mails worden geopend in Outlook...', 'success');
    setTimeout(function(){ renderKlantmails(); }, delay + 500);

// ── SVG Donut helper ─────────────────────────────────────────────
// ── Grafiek tooltip systeem ──────────────────────────────────────
function _ensureTooltip() {
  var t = document.getElementById('grafiek-tooltip');
  if(!t) {
    t = document.createElement('div');
    t.id = 'grafiek-tooltip';
    t.style.cssText = 'position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--text);pointer-events:none;z-index:9999;display:none;box-shadow:0 4px 16px rgba(0,0,0,0.3);white-space:nowrap;transition:opacity .1s';
    document.body.appendChild(t);
  }
  return t;
}

function _showTooltip(e, tekst, kleur) {
  var t = _ensureTooltip();
  t.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:'+(kleur||'var(--accent)')+';margin-right:6px;vertical-align:middle"></span>'+tekst;
  t.style.display = 'block';
  _moveTooltip(e);
}

function _moveTooltip(e) {
  var t = _ensureTooltip();
  var x = e.clientX + 14, y = e.clientY - 36;
  if(x + 200 > window.innerWidth) x = e.clientX - 180;
  if(y < 8) y = e.clientY + 14;
  t.style.left = x + 'px';
  t.style.top  = y + 'px';
}

function _hideTooltip() {
  var t = document.getElementById('grafiek-tooltip');
  if(t) t.style.display = 'none';
}

function initGrafiekInteractie(el) {
  if(!el) return;
  // Per segment hover — elk segment licht individueel op
  el.querySelectorAll('.staaf-seg').forEach(function(seg){
    seg.addEventListener('mouseenter', function(){ seg.style.filter='brightness(1.45)'; });
    seg.addEventListener('mousemove',  function(e){ _showTooltip(e, seg.dataset.tip, seg.dataset.kl); });
    seg.addEventListener('mouseleave', function(){ seg.style.filter=''; _hideTooltip(); });
  });
  // Donut segment hover
  el.querySelectorAll('.donut-seg').forEach(function(seg){
    seg.addEventListener('mousemove',  function(e){ _showTooltip(e, seg.dataset.tip, seg.dataset.kl); });
    seg.addEventListener('mouseleave', _hideTooltip);
  });
}

function donutSVG(segmenten, midden) {
  var totaal=segmenten.reduce(function(s,x){return s+x.waarde;},0);
  if(!totaal) return '<svg width="160" height="160" viewBox="0 0 160 160"><circle cx="80" cy="80" r="55" fill="none" stroke="var(--border)" stroke-width="28"/><text x="80" y="86" text-anchor="middle" font-size="12" fill="var(--muted)">Geen data</text></svg>';
  var cx=80,cy=80,r=55,dik=28,hoek=-Math.PI/2,paden='';
  segmenten.forEach(function(seg){
    if(!seg.waarde) return;
    var sweep=(seg.waarde/totaal)*2*Math.PI;
    var groot=sweep>Math.PI?1:0;
    var x1=cx+r*Math.cos(hoek),y1=cy+r*Math.sin(hoek);
    var x2=cx+r*Math.cos(hoek+sweep-0.001),y2=cy+r*Math.sin(hoek+sweep-0.001);
    var pct=Math.round(seg.waarde/totaal*100);
    var tip=esc(seg.label)+': '+seg.waarde+' ('+pct+'%)';
    paden+='<path class="donut-seg" data-tip="'+tip+'" data-kl="'+seg.kleur+'" d="M'+x1.toFixed(2)+','+y1.toFixed(2)+' A'+r+','+r+' 0 '+groot+',1 '+x2.toFixed(2)+','+y2.toFixed(2)+'" fill="none" stroke="'+seg.kleur+'" stroke-width="'+dik+'" stroke-linecap="butt" style="cursor:pointer;transition:stroke-width .15s,opacity .15s" onmouseover="this.setAttribute(\'stroke-width\',\'34\');this.style.opacity=\'.85\'" onmouseout="this.setAttribute(\'stroke-width\',\''+dik+'\');this.style.opacity=\'1\'"/>';
    hoek+=sweep;
  });
  var parts=midden?midden.split('|'):['',''];
  return '<svg width="160" height="160" viewBox="0 0 160 160" style="overflow:visible">'+paden
    +'<text x="80" y="'+(parts[1]?'75':'86')+'" text-anchor="middle" font-family="\'DM Sans\',sans-serif" font-size="22" font-weight="700" fill="var(--text)">'+parts[0]+'</text>'
    +(parts[1]?'<text x="80" y="95" text-anchor="middle" font-family="\'DM Sans\',sans-serif" font-size="11" fill="var(--muted)">'+parts[1]+'</text>':'')
    +'</svg>';
}

function legendaHTML(segmenten,totaal) {
  var h='<div style="display:flex;flex-direction:column;gap:5px">';
  segmenten.forEach(function(s){
    var pct=totaal?Math.round(s.waarde/totaal*100):0;
    h+='<div style="display:flex;align-items:center;gap:7px">';

}

function staafDiagram(titel, mndData, maxVal, labelFn, kleurFn, legendaItems) {
  var BAR_H = 120;
  var LABEL_H = 20;
  var MND_H = 16;
  var h = '<div class="card" style="padding:16px">';
  h += '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:13px;margin-bottom:12px">'+titel+'</div>';
  // Wrapper met ruimte voor labels bovenaan
  h += '<div style="padding-top:'+LABEL_H+'px;position:relative">';
  h += '<div style="display:grid;grid-template-columns:repeat(12,1fr);gap:4px">';
  mndData.forEach(function(d,idx){
    var label = labelFn(d);
    var segmenten = kleurFn(d);
    var tip = segmenten.length ? (segmenten[0].tip||label||'') : label||'';
    h += '<div class="staaf-col" data-tip="'+esc(tip)+'" data-idx="'+idx+'" style="display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;pointer-events:none">';
    // Balk container
    h += '<div style="width:100%;height:'+BAR_H+'px;display:flex;flex-direction:column;justify-content:flex-end;border-radius:3px;overflow:hidden">';
    segmenten.forEach(function(s){
      if(s.h > 0) h += '<div class="staaf-seg" data-kl="'+s.kl+'" data-tip="'+esc(s.tip||label||'')+'" style="width:100%;height:'+s.h+'px;background:'+s.kl+';transition:filter .15s;pointer-events:all;cursor:pointer"></div>';
    });
    h += '</div>';
    // Maandlabel onder balk
    h += '<div style="font-size:9px;color:var(--muted);text-align:center;margin-top:3px;height:'+MND_H+'px;line-height:'+MND_H+'px">'+d.mn+'</div>';
    // Label boven balk — als absolute positioned overlay op de wrapper
    if(label) {
      var segH = segmenten.reduce(function(s,x){return s+x.h;},0);
      var bottomOffset = MND_H + (BAR_H - segH);
      h += '<div class="staaf-label" data-label="'+esc(label)+'" data-bottom="'+(bottomOffset + segH + 4)+'" style="position:absolute;bottom:'+(bottomOffset + segH + 4)+'px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--muted);font-weight:700;white-space:nowrap;pointer-events:none;z-index:10;background:var(--surface);padding:0 2px;border-radius:2px">'+label+'</div>';
    }
    h += '</div>';
  });
  h += '</div></div>';
  if(legendaItems && legendaItems.length) {
    h += '<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:12px">';
    legendaItems.forEach(function(l){
      h += '<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:2px;background:'+l.kl+'"></div><span style="font-size:11px;color:var(--muted)">'+l.l+'</span></div>';
    });
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function csvExport(headers,rows,naam) {
  var csv=[headers].concat(rows).map(function(r){return r.map(function(c){var s=(c==null?'':String(c));return '"'+s.replace(/"/g,'""')+'"';}).join(';');}).join('\r\n');
  var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  var url=URL.createObjectURL(blob); var a=document.createElement('a');
  a.href=url; a.download=naam+'.csv'; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('CSV geëxporteerd: '+naam+'.csv','success');
}

      h += '<div style="text-align:right"><div style="font-family:Syne,sans-serif;font-weight:800;color:var(--accent)">'+(parseFloat(v.dagen)||0).toFixed(1)+'d</div>';
      h += '<div style="font-size:11px;color:'+stKleur+'">'+esc(v.status)+'</div></div></div></div>';
    });
    if(!data3.length) h += '<div style="color:var(--muted);font-size:13px">Geen verlofaanvragen in '+jaarStr+'</div>';
    h += '</div>';

  } else if(tabNaam==='verzuim') {
    var data4 = APP.verzuim.filter(function(v){return String(v.medId)===String(medId)&&(v.van||'').startsWith(jaarStr);}).sort(function(a,b){return(b.van||'')>(a.van||'')?1:-1;});
    var totVzDagen = data4.reduce(function(s,v){var tot=v.tot&&v.tot<vandaag?v.tot:vandaag;return s+Math.max(0,Math.ceil((new Date(tot)-new Date(v.van))/86400000)+1);},0);
    h += '<div style="font-size:12px;color:var(--muted);margin-bottom:10px">'+data4.length+' meldingen · '+totVzDagen+' dagen totaal in '+jaarStr+'</div>';
    h += '<div style="display:flex;flex-direction:column;gap:6px">';
    data4.forEach(function(v){
      var stKleur={actief:'var(--red)',langdurig:'var(--orange)',hersteld:'var(--green)'}[v.status]||'var(--muted)';
      var duur=v.van?Math.max(0,Math.ceil((new Date(v.tot&&v.tot<vandaag?v.tot:vandaag)-new Date(v.van))/86400000)+1):0;
      var typeLabel={ziek:'Ziek',geoorloofd:'Geoorloofd',ongeoorloofd:'Ongeoorloofd',gedeeltelijk:'Gedeeltelijk'}[v.type]||esc(v.type||'');
      h += '<div style="padding:8px 12px;background:var(--surface2);border-radius:8px;border-left:3px solid '+stKleur+'">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center">';
      h += '<div><div style="font-size:13px;font-weight:600">'+fmtD(v.van)+(v.tot?' → '+fmtD(v.tot):'  → nog ziek')+'</div>';
      h += '<div style="font-size:11px;color:var(--muted)">'+typeLabel+'</div></div>';
      h += '<div style="text-align:right"><div style="font-family:Syne,sans-serif;font-weight:800;color:'+stKleur+'">'+duur+'d</div>';
      h += '<div style="font-size:11px;color:'+stKleur+'">'+esc(v.status)+'</div></div></div></div>';
    });
    if(!data4.length) h += '<div style="color:var(--muted);font-size:13px">Geen verzuim in '+jaarStr+'</div>';
    h += '</div>';

  } else if(tabNaam==='storingsdienst') {
    var sd=APP.storingsdienst||{};
    var weken=[],dagwissels=[];
    Object.keys(sd).filter(function(k){return k.startsWith(jaarStr)&&sd[k]&&String(sd[k].medId)===String(medId);}).forEach(function(k){
      if(k.match(/W\d\d$/)) weken.push(k); else dagwissels.push(k);
    });
    h += '<div style="font-size:12px;color:var(--muted);margin-bottom:10px">'+weken.length+' weekdiensten · '+dagwissels.length+' dagwissels in '+jaarStr+'</div>';
    if(weken.length) {
      h += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Weekdiensten</div>';
      h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">';
      weken.sort().forEach(function(k){
        var week=k.slice(-2);
        var ma=getMaandagVanWeek(parseInt(jaarStr),parseInt(week));
        h += '<div style="padding:5px 10px;background:var(--surface2);border-radius:6px;font-size:12px;font-weight:600"><div>W'+week+'</div><div style="font-size:10px;color:var(--muted)">'+(ma?fmtD(dateToStr(ma)):'')+'</div></div>';
      });
      h += '</div>';
    }
    if(dagwissels.length) {
      h += '<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Dagwissels</div>';
      h += '<div style="display:flex;flex-wrap:wrap;gap:6px">';
      dagwissels.sort().forEach(function(k){
        var dagNamen2=['ma','di','wo','do','vr','za','zo'];
        var dagIdx=parseInt(k.slice(-1));
        var week=parseInt(k.slice(k.indexOf('W')+1,k.lastIndexOf('-')));
        var ma2=getMaandagVanWeek(parseInt(jaarStr),week);
        h += '<div style="padding:5px 10px;background:rgba(245,158,11,.1);border-radius:6px;font-size:12px;font-weight:600;color:var(--orange)">'+dagNamen2[dagIdx]+' W'+('0'+week).slice(-2)+'</div>';
      });
      h += '</div>';
    }
    if(!weken.length&&!dagwissels.length) h += '<div style="color:var(--muted);font-size:13px">Geen diensten in '+jaarStr+'</div>';
  }

  h += '<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">';
  h += '<button class="btn btn-ghost btn-sm" id="rap-panel-close">Sluiten</button>';
  h += '</div>';
  openPanel(esc(m.voornaam+' '+m.achternaam)+' — '+jaarStr, h);
  var pb=document.getElementById('panel-body');
  pb.querySelector('#rap-panel-close').addEventListener('click',closePanel);
}

// ── TAB: PERSOONLIJK ─────────────────────────────────────────────
// ── RAPPORT: OPDRACHTEN ──────────────────────────────────────────
function renderRapOpdrachten(el) {
  var jaarStr = String(_rapJaar);
  var vandaag = new Date().toISOString().split('T')[0];
  var planRollen = APP.planningRollen || ['monteur','extern'];
  var monteurs = APP.medewerkers.filter(function(m){ return m.status!=='inactief' && planRollen.indexOf(m.rol)>=0; });

  // Filter opdrachten op jaar
  var opJaar = APP.opdrachten.filter(function(o){ return (o.datum||'').startsWith(jaarStr); });

  // Stats
  var totaal     = opJaar.length;
  var afgehandeld= opJaar.filter(function(o){ return o.status==='gereed'||o.status==='afgehandeld'; }).length;
  var gepland    = opJaar.filter(function(o){ return o.status==='ingepland'||o.status==='klaargezet'; }).length;
  var spoed      = opJaar.filter(function(o){ return o.status==='spoed'; }).length;

  var h = '<div class="stats-grid" style="margin-bottom:20px">';
  h += statCard('Totaal opdrachten', totaal, '#3b82f6', SVGS.file);
  h += statCard('Afgehandeld', afgehandeld, '#10b981', SVGS.file);
  h += statCard('Gepland/open', gepland, '#f59e0b', SVGS.alert);
  h += statCard('Spoed', spoed, '#ef4444', SVGS.alert);
  h += '</div>';

  // ── Grafieken rij 1: Monteurs + Type opdrachten ──
  // Monteur data
  var segMonteurs = [];
  monteurs.forEach(function(m){
    var n = opJaar.filter(function(o){
      return String(o.monteurId)===String(m.id) ||
        (Array.isArray(o.monteurIds) && o.monteurIds.indexOf(String(m.id))>=0);
    }).length;
    if(n>0) segMonteurs.push({label: m.voornaam+' '+m.achternaam, waarde: n, kleur: medKleur(m)});
  });
  segMonteurs.sort(function(a,b){return b.waarde-a.waarde;});

  // Type opdrachten data — gebruik labels en kleuren uit Instellingen
  var typeMap = {};
  opJaar.forEach(function(o){
    var type = o.type || 'Onbekend';
    if(!typeMap[type]) typeMap[type] = 0;
    typeMap[type]++;
  });
  var segTypes = Object.keys(typeMap).map(function(k){
    var ot = getOpdrachttype(k);
    return {label: ot.label || k, waarde: typeMap[k], kleur: ot.kleur || '#6b7694'};
  }).sort(function(a,b){return b.waarde-a.waarde;});

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">';
  h += grafiekKaart('Opdrachten per monteur — '+_rapJaar, donutSVG(segMonteurs, totaal+'|totaal'), legendaHTML(segMonteurs, totaal));
  h += grafiekKaart('Verdeling per opdrachttype — '+_rapJaar, donutSVG(segTypes, totaal+'|totaal'), legendaHTML(segTypes, totaal));
  h += '</div>';

  // ── Staafdiagram per maand ──
  var mndNamen = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
  var mndData = mndNamen.map(function(mn, idx){
    var mndStr = jaarStr+'-'+('0'+(idx+1)).slice(-2);
    var opMnd = opJaar.filter(function(o){ return (o.datum||'').startsWith(mndStr); });
    return { mn: mn, totaal: opMnd.length, afg: opMnd.filter(function(o){return o.status==='afgehandeld'||o.status==='gereed';}).length };
  });
  var maxMnd = Math.max.apply(null, mndData.map(function(d){return d.totaal;})) || 1;

  // Staafdiagram type per maand (gestapeld)
  var typeKleuren = {};
  Object.keys(typeMap).forEach(function(k){
    var ot = getOpdrachttype(k);
    typeKleuren[k] = ot.kleur || '#6b7694';
  });
  var mndTypeData = mndNamen.map(function(mn, idx){
    var mndStr = jaarStr+'-'+('0'+(idx+1)).slice(-2);
    var opMnd = opJaar.filter(function(o){ return (o.datum||'').startsWith(mndStr); });
    var perType = {};
    opMnd.forEach(function(o){ var t=o.type||'Onbekend'; perType[t]=(perType[t]||0)+1; });
    return { mn: mn, totaal: opMnd.length, perType: perType };
  });

  // Staafdiagrammen onder elkaar — volle breedte
  var maxMnd = Math.max.apply(null, mndData.map(function(d){return d.totaal;})) || 1;
  h += staafDiagram('Aantal opdrachten per maand — '+_rapJaar, mndData, maxMnd,
    function(d){ return d.totaal ? String(d.totaal) : ''; },
    function(d){
      if(!d.totaal) return [];
      var barH = Math.max(4, Math.round(d.totaal/maxMnd*120));
      var afgH = d.afg ? Math.round(d.afg/d.totaal*barH) : 0;
      var totH = barH - afgH;
      var r = [];
      if(totH > 0) r.push({h:totH, kl:'rgba(74,108,247,0.35)', tip:d.mn+' — Open: '+(d.totaal-d.afg)});
      if(afgH > 0) r.push({h:afgH, kl:'#10b981', tip:d.mn+' — Afgehandeld: '+d.afg});
      return r;
    },
    [{kl:'rgba(74,108,247,0.35)',l:'Open/gepland'},{kl:'#10b981',l:'Afgehandeld'}]);

  // Staafdiagram per type per maand
  var maxTypeMnd = Math.max.apply(null, mndTypeData.map(function(d){return d.totaal;})) || 1;
  var typeKleurenLijst = Object.keys(typeMap).map(function(k){
    var ot = getOpdrachttype(k);
    return {k:k, kl:ot.kleur||'#6b7694', l:ot.label||k};
  });
  h += staafDiagram('Opdrachten per type per maand — '+_rapJaar, mndTypeData, maxTypeMnd,
    function(d){ return d.totaal ? String(d.totaal) : ''; },
    function(d){
      if(!d.totaal) return [];
      var barH = Math.max(4, Math.round(d.totaal/maxTypeMnd*120));
      var segs = [], used = 0;
      typeKleurenLijst.forEach(function(tk, i){
        var n = d.perType[tk.k] || 0;
        if(!n) return;
        var h2 = (i === typeKleurenLijst.length-1) ? (barH-used) : Math.round(n/d.totaal*barH);
        if(h2 > 0){ segs.push({h:h2, kl:tk.kl, tip:d.mn+' — '+tk.l+': '+n}); used+=h2; }
      });
      return segs;
    },
    typeKleurenLijst.map(function(tk){ return {kl:tk.kl, l:tk.l}; }));

  // Per monteur tabel
  h += '<div class="card" style="margin-bottom:16px"><div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;margin-bottom:14px">Opdrachten per monteur — '+_rapJaar+'</div>';
  h += '<div class="table-wrap"><table style="width:100%"><thead><tr><th>Monteur</th><th>Totaal</th><th>Afgehandeld</th><th>Open</th><th>Spoed</th><th>% Afgehandeld</th></tr></thead><tbody>';
  monteurs.forEach(function(m){
    var opMont = opJaar.filter(function(o){
      return String(o.monteurId)===String(m.id) ||
        (Array.isArray(o.monteurIds) && o.monteurIds.indexOf(String(m.id))>=0);
    });
    if(!opMont.length) return;
    var afg = opMont.filter(function(o){ return o.status==='gereed'||o.status==='afgehandeld'; }).length;
    var open = opMont.filter(function(o){ return o.status==='ingepland'||o.status==='klaargezet'; }).length;
    var spo = opMont.filter(function(o){ return o.status==='spoed'; }).length;
    var pct = opMont.length ? Math.round(afg/opMont.length*100) : 0;
    var kl = medKleur(m);
    h += '<tr>';
    h += '<td><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:28px;height:28px;font-size:10px;background:'+kl+';color:#fff;flex-shrink:0">'+initials(m)+'</div><span style="font-weight:600">'+esc(m.voornaam+' '+m.achternaam)+'</span></div></td>';
    h += '<td style="font-weight:700">'+opMont.length+'</td>';
    h += '<td style="color:var(--green);font-weight:600">'+afg+'</td>';
    h += '<td style="color:var(--orange)">'+open+'</td>';
    h += '<td style="color:var(--red)">'+spo+'</td>';
    h += '<td><div style="display:flex;align-items:center;gap:8px"><div class="progress" style="width:80px"><div class="progress-fill" style="width:'+pct+'%;background:'+(pct>=80?'var(--green)':pct>=50?'var(--orange)':'var(--red)')+'"></div></div><span style="font-size:12px">'+pct+'%</span></div></td>';
    h += '</tr>';
  });
  h += '</tbody></table></div></div>';

  // Per maand tabel
  h += '<div class="card"><div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;margin-bottom:14px">Per maand — '+_rapJaar+'</div>';
  h += '<div class="table-wrap"><table style="width:100%"><thead><tr><th>Maand</th><th>Totaal</th><th>Afgehandeld</th><th>Open</th></tr></thead><tbody>';
  mndNamen.forEach(function(mn, idx) {
    var mndStr = jaarStr + '-' + ('0'+(idx+1)).slice(-2);
    var opMnd = opJaar.filter(function(o){ return (o.datum||'').startsWith(mndStr); });
    if(!opMnd.length) return;
    var afg = opMnd.filter(function(o){ return o.status==='gereed'||o.status==='afgehandeld'; }).length;
    var open = opMnd.length - afg;
    h += '<tr><td style="font-weight:600">'+mn+'</td><td>'+opMnd.length+'</td><td style="color:var(--green)">'+afg+'</td><td style="color:var(--muted)">'+open+'</td></tr>';
  });
  h += '</tbody></table></div>';
  h += '<button class="btn btn-ghost btn-sm" id="rap-op-export" style="margin-top:12px">⬇ Export CSV</button>';
  h += '</div>';

  el.innerHTML = h;
  initGrafiekInteractie(el); triggerCountUp(el);

  var expBtn = el.querySelector('#rap-op-export');
  if(expBtn) expBtn.addEventListener('click', function(){
    var rows = opJaar.map(function(o){
      var mont = o.monteurId ? getMed(o.monteurId) : null;
      return [o.datum, o.klantNaam||'', o.adres||'', o.type||'', mont?(mont.voornaam+' '+mont.achternaam):'', o.status||'', o.tijdVan||'', o.tijdTot||''];
    });
    csvExport(['Datum','Klant','Adres','Type','Monteur','Status','Van','Tot'], rows, 'opdrachten_'+_rapJaar);
  });
}

// ── RAPPORT: SERVICEKLANTEN ──────────────────────────────────────
function renderRapServiceklanten(el) {
  var vandaag = new Date().toISOString().split('T')[0];
  var actief    = APP.serviceklanten.filter(function(k){ return k.status!=='passief'; });
  var passief   = APP.serviceklanten.filter(function(k){ return k.status==='passief'; });
  var vervallen = actief.filter(function(k){ return isSkVervallen(k); });
  var bcontract = actief.filter(function(k){ return k.heeftBContract; });

  var h = '<div class="stats-grid" style="margin-bottom:20px">';
  h += statCard('Actief', actief.length, '#10b981', SVGS.file);
  h += statCard('Passief', passief.length, '#6b7694', SVGS.alert);
  h += statCard('Vervallen', vervallen.length, '#ef4444', SVGS.alert);
  h += statCard('Contract B', bcontract.length, '#f59e0b', SVGS.bell);
  h += '</div>';

  // ── Grafieken: cirkel contracttypes + staaf contracten per maand ──
  var ctKleuren = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#84cc16'];
  var ctSegmenten = [];
  var contracten = getContracten();
  contracten.forEach(function(ct, i){
    var n = APP.serviceklanten.filter(function(k){ return (k.contractType===ct.id||k.contractId===ct.id) && k.status!=='passief'; }).length;
    if(n>0) ctSegmenten.push({ label: ct.code+' — '+ct.naam, waarde: n, kleur: ct.kleur || ctKleuren[i%ctKleuren.length] });
  });
  ctSegmenten.sort(function(a,b){return b.waarde-a.waarde;});
  var totActief = actief.length || 1;

  // Staaf: servicebeurten per maand (alle servicebeurten opdrachten)
  var mndNamenSK = ['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
  var rapJaarSK = String(_rapJaar);

  // Bouw een mapping van alle mogelijke type-waarden → 'servicebeurt'
  // Opdrachten kunnen opgeslagen zijn als ID ('servicebeurt'), label ('Servicebeurt') of index ('1')
  var _sbTypeWaarden = new Set(['servicebeurt','Servicebeurt']);
  getOpdrachttypes().forEach(function(t, idx){
    if((t.id||'').toLowerCase()==='servicebeurt' || (t.label||'').toLowerCase()==='servicebeurt') {
      _sbTypeWaarden.add(String(t.id));
      _sbTypeWaarden.add(String(t.label));
      _sbTypeWaarden.add(String(idx+1)); // 1-based index als fallback
      _sbTypeWaarden.add(String(idx));   // 0-based index als fallback
    }
  });

  var mndSkData = mndNamenSK.map(function(mn, idx){
    var mndStr = rapJaarSK+'-'+('0'+(idx+1)).slice(-2);
    var sbMnd = APP.opdrachten.filter(function(o){
      if(!(o.datum||'').startsWith(mndStr)) return false;
      return _sbTypeWaarden.has(String(o.type||'').trim());
    });
    var afg  = sbMnd.filter(function(o){return o.status==='afgehandeld';}).length;
    var open = sbMnd.length - afg;
    return { mn: mn, totaal: sbMnd.length, afg: afg, open: open };
  });
  var maxSkMnd = Math.max.apply(null, mndSkData.map(function(d){return d.totaal;})) || 1;

  var statusSegs = [
    {label:'Actief',    waarde:actief.length - vervallen.length, kleur:'#10b981'},
    {label:'Passief',   waarde:passief.length,   kleur:'#6b7694'},
    {label:'Vervallen', waarde:vervallen.length,  kleur:'#ef4444'},
    {label:'Contract B',waarde:bcontract.length,  kleur:'#f59e0b'},
  ].filter(function(s){return s.waarde>0;});
  var totStatus = APP.serviceklanten.length || 1;

  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">';
  h += grafiekKaart('Verdeling contracttypes (actief)', donutSVG(ctSegmenten, totActief+'|actief'), legendaHTML(ctSegmenten, totActief));
  h += grafiekKaart('Status verdeling', donutSVG(statusSegs, totStatus+'|klanten'), legendaHTML(statusSegs, totStatus));
  h += '</div>';

  // Staafdiagram servicebeurten per maand — volle breedte
  h += staafDiagram('Servicebeurten per maand — '+rapJaarSK, mndSkData, maxSkMnd,
    function(d){ return d.totaal ? String(d.totaal) : ''; },
    function(d){
      if(!d.totaal) return [];
      var barH = Math.max(4, Math.round(d.totaal/maxSkMnd*120));
      var afgH = d.afg ? Math.round(d.afg/d.totaal*barH) : 0;
      var openH = barH - afgH;
      var r = [];
      if(openH > 0) r.push({h:openH, kl:'rgba(74,108,247,0.35)', tip:d.mn+' — Open: '+d.open});
      if(afgH  > 0) r.push({h:afgH,  kl:'#10b981', tip:d.mn+' — Afgehandeld: '+d.afg});
      return r;
    },
    [{kl:'rgba(74,108,247,0.35)',l:'Open/gepland'},{kl:'#10b981',l:'Afgehandeld'}]);

  // Per contracttype tabel
  h += '<div class="card" style="margin-bottom:16px"><div style="font-family:Syne,sans-serif;font-weight:700;font-size:14px;margin-bottom:14px">Per contracttype</div>';
  h += '<div class="table-wrap"><table style="width:100%"><thead><tr><th>Contract</th><th>Actief</th><th>Vervallen</th><th>Contract B</th><th>Passief</th></tr></thead><tbody>';
  var contracten = getContracten();
  contracten.forEach(function(ct){
    var skCt = APP.serviceklanten.filter(function(k){ return k.contractType===ct.id || k.contractId===ct.id; });
    if(!skCt.length) return;
    var actCt  = skCt.filter(function(k){ return k.status!=='passief'; }).length;
    var vervCt = skCt.filter(function(k){ return k.status!=='passief' && isSkVervallen(k); }).length;
    var bCt    = skCt.filter(function(k){ return k.status!=='passief' && k.heeftBContract; }).length;
    var pasCt  = skCt.filter(function(k){ return k.status==='passief'; }).length;
    h += '<tr>';
    h += '<td><span class="tag" style="background:'+ct.kleur+'22;color:'+ct.kleur+'">'+esc(ct.code)+'</span></td>';
    h += '<td style="font-weight:600">'+actCt+'</td>';
    h += '<td style="color:'+(vervCt?'var(--red)':'var(--muted)')+'">'+vervCt+'</td>';
    h += '<td style="color:var(--orange)">'+bCt+'</td>';
    h += '<td style="color:var(--muted)">'+pasCt+'</td>';
    h += '</tr>';
  });
  h += '</tbody></table></div></div>';

  // Vervallen lijst
  if(vervallen.length) {

  });
  if(!gesorteerd.length)h+='<tr><td colspan="4" style="padding:30px;text-align:center;color:var(--muted)">Geen data</td></tr>';
  h+='</tbody></table></div></div>';
