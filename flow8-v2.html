function weekLabel(d) {
  var ma = maandagVan(d);
  var vr = new Date(ma); vr.setDate(vr.getDate() + 4);
  return ma.toLocaleDateString('nl-NL',{day:'numeric',month:'short'}) + ' – ' + vr.toLocaleDateString('nl-NL',{day:'numeric',month:'short',year:'numeric'});
}

function maandagVan(d) {
  var c = new Date(d);
  var dag = c.getDay() || 7;
  c.setDate(c.getDate() - dag + 1);
  c.setHours(0,0,0,0);
  return c;
}

function planNav(richting) {
  if (_planView === 'dag') _planCursor.setDate(_planCursor.getDate() + richting);
  else _planCursor.setDate(_planCursor.getDate() + richting * 7);
  renderPlanning();
}

function opVanDag(datum) {
  // datum = Date object
  var ds = datum.toISOString().split('T')[0];
  var ops = APP.opdrachten.filter(function(o){ return o.datum === ds; });
  if (_planFilter) ops = ops.filter(function(o){ return String(o.monteurId) === _planFilter; });
  return ops.sort(function(a,b){ return (a.tijdVan||'00:00').localeCompare(b.tijdVan||'00:00'); });
}

function planWeek() {
  var ma = maandagVan(_planCursor);
  var dagen = [];
  for (var i=0; i<5; i++) { var d = new Date(ma); d.setDate(d.getDate()+i); dagen.push(d); }

  // Bepaal monteurs voor header
  var monteurs = APP.medewerkers.filter(function(m){ return m.rol==='monteur'||m.rol==='extern'; });
  if (_planFilter) monteurs = monteurs.filter(function(m){ return String(m.id)===_planFilter; });

  var html = '<div style="overflow-x:auto">';
  html += '<div style="min-width:700px">';

  // Header rij
  html += '<div style="display:grid;grid-template-columns:80px repeat(' + dagen.length + ',1fr);gap:1px;background:var(--border);border-radius:10px 10px 0 0;overflow:hidden;margin-bottom:1px">';
  html += '<div style="background:var(--surface2);padding:8px"></div>';
  var vandaagStr = new Date().toISOString().split('T')[0];
  dagen.forEach(function(d) {
    var ds = d.toISOString().split('T')[0];
    var isVandaag = ds === vandaagStr;
    html += '<div style="background:' + (isVandaag?'rgba(59,130,246,0.15)':'var(--surface2)') + ';padding:8px 12px;text-align:center">';
    html += '<div style="font-size:11px;color:var(--muted);font-weight:600">' + d.toLocaleDateString('nl-NL',{weekday:'short'}).toUpperCase() + '</div>';
    html += '<div style="font-family:Syne,sans-serif;font-weight:800;font-size:16px;color:' + (isVandaag?'var(--accent)':'var(--text)') + '">' + d.getDate() + '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Grid body
  html += '<div style="display:grid;grid-template-columns:80px repeat(' + dagen.length + ',1fr);gap:1px;background:var(--border);border-radius:0 0 10px 10px;overflow:hidden">';

  // Tijdslots 08:00–18:00
  var uren = [];
  for (var u=8; u<=18; u++) uren.push(u);

  uren.forEach(function(uur) {
    html += '<div style="background:var(--surface2);padding:6px 8px;font-size:10px;color:var(--muted);font-weight:600;display:flex;align-items:flex-start">' + String(uur).padStart(2,'0') + ':00</div>';
    dagen.forEach(function(d) {
      var ds = d.toISOString().split('T')[0];
      var uurOps = APP.opdrachten.filter(function(o){
        if (o.datum !== ds) return false;
        if (_planFilter && String(o.monteurId)!==_planFilter) return false;
        var h = parseInt((o.tijdVan||'00:00').split(':')[0]);
        return h === uur;
      });
      html += '<div class="plan-drop-cell" data-datum="'+ds+'" data-uur="'+uur+'" style="background:var(--surface);min-height:60px;padding:4px" ondragover="event.preventDefault()" ondrop="planDrop(event,this.dataset.datum,parseInt(this.dataset.uur))">';;
      uurOps.forEach(function(o) {
        html += opdrachtBlok(o);
      });
      html += '</div>';
    });
  });
  html += '</div></div></div>';
  return html;
}

function planDag() {
  var ds = _planCursor.toISOString().split('T')[0];
  var dagOps = opVanDag(_planCursor);
  var monteurs = APP.medewerkers.filter(function(m){ return m.rol==='monteur'||m.rol==='extern'; });
  if (_planFilter) monteurs = monteurs.filter(function(m){ return String(m.id)===_planFilter; });

  var html = '<div style="overflow-x:auto"><div style="min-width:' + (80 + monteurs.length*160) + 'px">';

  // Header
  html += '<div style="display:grid;grid-template-columns:80px repeat(' + monteurs.length + ',1fr);gap:1px;background:var(--border);border-radius:10px 10px 0 0;overflow:hidden;margin-bottom:1px">';
  html += '<div style="background:var(--surface2);padding:8px"></div>';
  monteurs.forEach(function(m) {
    html += '<div style="background:var(--surface2);padding:10px;text-align:center">';
    html += '<div class="avatar" style="width:32px;height:32px;font-size:11px;background:' + (m.kleur||'#3b82f6') + ';margin:0 auto 6px">' + initials(m) + '</div>';
    html += '<div style="font-size:12px;font-weight:600">' + esc(m.voornaam) + '</div></div>';
  });
  html += '</div>';

  // Grid
  html += '<div style="display:grid;grid-template-columns:80px repeat(' + monteurs.length + ',1fr);gap:1px;background:var(--border);border-radius:0 0 10px 10px;overflow:hidden">';
  for (var uur=7; uur<=19; uur++) {
    html += '<div style="background:var(--surface2);padding:6px 8px;font-size:10px;color:var(--muted);font-weight:600">' + String(uur).padStart(2,'0') + ':00</div>';
    monteurs.forEach(function(m) {
      var ops = dagOps.filter(function(o){
        if (String(o.monteurId)!==String(m.id)) return false;
        var h = parseInt((o.tijdVan||'00:00').split(':')[0]);
        return h === uur;
      });
      html += '<div class="plan-drop-cell" data-datum="'+ds+'" data-uur="'+uur+'" data-med="'+m.id+'" style="background:var(--surface);min-height:56px;padding:3px" ondragover="event.preventDefault()" ondrop="planDrop(event,this.dataset.datum,parseInt(this.dataset.uur),this.dataset.med)">';;
      ops.forEach(function(o){ html += opdrachtBlok(o); });
      html += '</div>';
    });
  }
  html += '</div></div></div>';
  return html;
}



function opEditBtn(id) {
  return '<button class="btn btn-ghost btn-sm btn-icon" onclick="event.stopPropagation();openOpdrachtModal(\'' + id + '\')" title="Bewerken">✏️</button>';
}
function opLijstRij(o, sk, kleur) {
  var m  = o.monteurId ? getMedewerker(o.monteurId) : null;
  var r  = '<div style="display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-left:4px solid ' + kleur + ';border-radius:8px;padding:10px 14px;cursor:pointer" onclick="openOpdrachtPanel(\'' + o.id + '\')" draggable="true" data-opid="' + o.id + '" ondragstart="planDragStart(event,\'' + o.id + '\')">';
  r += '<div style="font-weight:700;font-size:13px;color:' + kleur + ';width:44px;flex-shrink:0">' + esc(o.tijdVan||'—') + '</div>';
  r += '<div style="flex:1;min-width:0">';
  r += '<div style="font-weight:700;font-size:13px">' + esc(o.klantNaam||'') + '</div>';
  r += '<div style="font-size:11px;color:var(--muted)">' + esc((o.adres||'') + (o.plaats?', '+o.plaats:'')) + '</div>';
  if (sk && sk.pomptype) r += '<div style="font-size:11px;color:var(--muted)">Pomptype: ' + esc(sk.pomptype) + '</div>';
  r += '</div>';
  if (m) r += '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0"><div class="avatar" style="width:26px;height:26px;font-size:10px;background:' + (m.kleur||'#3b82f6') + '">' + initials(m) + '</div><span style="font-size:12px">' + esc(m.voornaam) + '</span></div>';
  r += '<div>' + statusTag(o.status) + '</div>';
  r += '</div>';
  return r;
}
function planLijst() {
  var ma = maandagVan(_planCursor);
  var html = '';
  for (var i=0; i<5; i++) {
    var d = new Date(ma); d.setDate(d.getDate()+i);
    var ds = d.toISOString().split('T')[0];
    var dagOps = opVanDag(d);
    var isVandaag = ds === new Date().toISOString().split('T')[0];

    html += '<div style="margin-bottom:20px">';
    html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:2px solid var(--border);margin-bottom:10px">';
    html += '<span style="font-family:Syne,sans-serif;font-weight:800;font-size:14px">' + d.toLocaleDateString('nl-NL',{weekday:'long',day:'numeric',month:'long'}) + '</span>';
    if (isVandaag) html += '<span class="tag tag-blue">Vandaag</span>';
    html += '<span style="font-size:12px;color:var(--muted)">' + dagOps.length + ' opdracht' + (dagOps.length!==1?'en':'') + '</span>';
    html += '</div>';

    if (dagOps.length === 0) {
      html += '<div style="padding:16px;color:var(--muted);font-size:13px;text-align:center">Geen opdrachten</div>';
    } else {
      html += '<div style="display:flex;flex-direction:column;gap:6px">';
      dagOps.forEach(function(o) {
        var m  = o.monteurId ? getMedewerker(o.monteurId) : null;
        var sk = o.skId ? APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);}) : null;
        var kleur = opKleur(o.status);
        html += opLijstRij(o, sk, kleur);
        html += '<div style="font-weight:700;font-size:13px;color:' + kleur + ';width:44px;flex-shrink:0">' + esc(o.tijdVan||'—') + '</div>';
        html += '<div style="flex:1;min-width:0">';
        html += '<div style="font-weight:700;font-size:13px">' + esc(o.klantNaam||'') + '</div>';
        html += '<div style="font-size:11px;color:var(--muted)">' + esc((o.adres||'') + (o.plaats?', '+o.plaats:'')) + '</div>';
        if (sk && sk.pomptype) html += '<div style="font-size:11px;color:var(--muted)">Pomptype: ' + esc(sk.pomptype) + '</div>';
        html += '</div>';
        if (m) {
          html += '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">';
          html += '<div class="avatar" style="width:26px;height:26px;font-size:10px;background:' + (m.kleur||'#3b82f6') + '">' + initials(m) + '</div>';
          html += '<span style="font-size:12px">' + esc(m.voornaam) + '</span></div>';
        }
        html += '<div>' + statusTag(o.status) + '</div>';
        if (magSchrijven('planning')) {
          html += '<button class="btn btn-ghost btn-sm btn-icon" onclick="event.stopPropagation();openOpdrachtModal('' + o.id + '')" title="Bewerken">✏️</button>';
        }
        html += '</div>';
      });
      html += '</div>';
    }
    html += '</div>';
  }
  return html;
}

function opdrachtBlok(o) {
  var kleur = opKleur(o.status);
  var m = o.monteurId ? getMedewerker(o.monteurId) : null;
  return '<div class="plan-opdracht" style="background:' + kleur + '22;color:' + kleur + ';border-left-color:' + kleur + ';font-size:11px" '
    + 'draggable="true" data-opid="' + o.id + '" ondragstart="planDragStart(event,'' + o.id + '')" '
    + 'onclick="openOpdrachtPanel('' + o.id + '')">'
    + '<div style="font-weight:700">' + esc(o.tijdVan||'') + ' ' + esc(o.klantNaam||'') + '</div>'
    + (m ? '<div style="opacity:0.8">' + esc(m.voornaam) + '</div>' : '')
    + '</div>';
}

function opKleur(status) {
  return {ingepland:'#3b82f6',onderweg:'#f59e0b',bezig:'#8b5cf6',gereed:'#10b981',storing:'#ef4444',geannuleerd:'#6b7694'}[status] || '#3b82f6';
}

function planDragStart(e, opId) {
  _dragOp = opId;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.style.opacity = '0.5';
}

function planDrop(e, datum, uur, monteurId) {
  e.preventDefault();
  if (!_dragOp) return;
  var o = APP.opdrachten.find(function(x){return String(x.id)===String(_dragOp);});
  if (!o) { _dragOp = null; return; }
  o.datum   = datum;
  o.tijdVan = String(uur).padStart(2,'0') + ':00';
  if (monteurId) o.monteurId = monteurId;
  dbSaveItem('opdrachten', o.id, o);
  _dragOp = null;
  renderPlanning();
  toast('Opdracht verplaatst', 'success');
}

function planInitDrag() {
  document.querySelectorAll('[data-opid]').forEach(function(el) {
    el.addEventListener('dragend', function(){ el.style.opacity = '1'; _dragOp = null; });
  });
}

function openOpdrachtPanel(id) {
  var o = APP.opdrachten.find(function(x){return String(x.id)===String(id);});
  if (!o) return;
  var m  = o.monteurId ? getMedewerker(o.monteurId) : null;
  var sk = o.skId ? APP.serviceklanten.find(function(k){return String(k.id)===String(o.skId);}) : null;
  var kleur = opKleur(o.status);

  var html = '';
  // Status balk
  html += '<div style="background:' + kleur + '22;border-radius:8px;padding:12px 16px;margin-bottom:16px;border-left:4px solid ' + kleur + '">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between">';
  html += '<div>' + statusTag(o.status) + '</div>';
  html += '<div style="font-size:12px;color:var(--muted)">' + fmtDatum(o.datum) + ' · ' + esc(o.tijdVan||'') + (o.tijdTot?' – '+esc(o.tijdTot):'') + '</div>';
  html += '</div></div>';

  // Info
  function v(l,w){ return w ? '<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:2px">' + l + '</div><div style="font-size:13px;font-weight:600">' + esc(w) + '</div></div>' : ''; }
  html += v('Klant', o.klantNaam);
  html += v('Adres', (o.adres||'') + (o.plaats?', '+o.plaats:''));
  html += v('Type werk', o.type);
  if (sk) html += v('Pomptype', sk.pomptype);
  html += v('Monteur', m ? m.voornaam + ' ' + m.achternaam : '');
  html += v('Outsmart ID', o.outsmartId);
  if (o.notitie) {
    html += '<div style="background:var(--surface2);border-radius:8px;padding:10px 12px;font-size:13px;margin-top:8px">' + esc(o.notitie) + '</div>';
  }

  // Status wijzigen
  html += '<div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px">';
  html += '<div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">STATUS WIJZIGEN</div>';
  html += '<div style="display:flex;gap:6px;flex-wrap:wrap">';
  ['ingepland','onderweg','bezig','gereed','geannuleerd'].forEach(function(s) {
    if (s === o.status) return;
    html += '<button class="btn btn-ghost btn-sm" onclick="wijzigOpStatus('' + id + '','' + s + '')" style="color:' + opKleur(s) + ';border-color:' + opKleur(s) + '22">' + s + '</button>';
  });
  html += '</div></div>';

  // Acties
  html += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:16px">';
  if (magSchrijven('planning')) {
    html += '<button class="btn btn-ghost" style="justify-content:center" onclick="openOpdrachtModal('' + id + '');closePanel()">✏️ Bewerken</button>';
    if (sk && sk.email) html += '<button class="btn btn-ghost" style="justify-content:center" onclick="stuurBevestiging('' + id + '')">📧 Bevestiging sturen</button>';
    html += '<button class="btn btn-ghost" style="justify-content:center;color:var(--red)" onclick="verwijderOpdracht('' + id + '');closePanel()">🗑 Verwijderen</button>';
  }
  html += '</div>';

  openPanel(o.klantNaam || 'Opdracht', html);
}

function wijzigOpStatus(id, status) {
  var o = APP.opdrachten.find(function(x){return String(x.id)===String(id);});
  if (!o) return;
  o.status = status;
  dbSaveItem('opdrachten', id, o);
  renderPlanning();
  closePanel();
  toast('Status bijgewerkt naar ' + status, 'success');
}

function openOpdrachtModal(id) {
  var isNew = !id;
  var o = id ? (APP.opdrachten.find(function(x){return String(x.id)===String(id);}) || {}) : {
    datum: new Date().toISOString().split('T')[0],

  };

  }).join('');

  var monteurOpties = '<option value="">— Geen monteur —</option>' + APP.medewerkers.filter(function(m){return m.rol==='monteur'||m.rol==='extern'||m.rol==='admin';}).map(function(m) {
    return '<option value="' + m.id + '"' + (String(o.monteurId)===String(m.id)?' selected':'') + '>' + esc(m.voornaam + ' ' + m.achternaam) + '</option>';

  body += fg('Postcode', '<input class="input" id="op-pc" value="' + esc(o.postcode||'') + '">');
  body += fg('Plaats', '<input class="input" id="op-plaats" value="' + esc(o.plaats||'') + '">');
  body += fg('Datum', '<input class="input" type="date" id="op-datum" value="' + esc(o.datum||'') + '">');
  body += fg('Tijd van', '<input class="input" type="time" id="op-van" value="' + esc(o.tijdVan||'09:00') + '">');
  body += fg('Tijd tot', '<input class="input" type="time" id="op-tot" value="' + esc(o.tijdTot||'11:00') + '">');
  body += fg('Type werk', '<select class="input" id="op-type"><option' + (o.type==='Servicebeurt'?' selected':'') + '>Servicebeurt</option><option' + (o.type==='Installatie'?' selected':'') + '>Installatie</option><option' + (o.type==='Storing'?' selected':'') + '>Storing</option><option' + (o.type==='Inspectie'?' selected':'') + '>Inspectie</option><option' + (o.type==='Overig'?' selected':'') + '>Overig</option></select>');
  body += fg('Monteur', '<select class="input" id="op-monteur">' + monteurOpties + '</select>');
  body += fg('Status', '<select class="input" id="op-status"><option value="ingepland"' + (o.status==='ingepland'?' selected':'') + '>Ingepland</option><option value="onderweg"' + (o.status==='onderweg'?' selected':'') + '>Onderweg</option><option value="bezig"' + (o.status==='bezig'?' selected':'') + '>Bezig</option><option value="gereed"' + (o.status==='gereed'?' selected':'') + '>Gereed</option><option value="geannuleerd"' + (o.status==='geannuleerd'?' selected':'') + '>Geannuleerd</option></select>');

function opSkGekozen(skId) {
  if (!skId) return;
  var sk = APP.serviceklanten.find(function(k){return String(k.id)===String(skId);});
  if (!sk) return;
  var klant = document.getElementById('op-klant'); if(klant) klant.value = sk.naam;
  var adres  = document.getElementById('op-adres');  if(adres)  adres.value  = sk.adres||'';
  var pc     = document.getElementById('op-pc');     if(pc)     pc.value     = sk.postcode||'';
  var plaats = document.getElementById('op-plaats'); if(plaats) plaats.value = sk.plaats||'';
}

function saveOpdracht(id) {
  var datum = document.getElementById('op-datum').value;
  var klant = document.getElementById('op-klant').value.trim();
  if (!datum || !klant) { toast('Datum en klantnaam zijn verplicht', 'error'); return; }

  var isNew = !id;
  var bestaand = id ? (APP.opdrachten.find(function(x){return String(x.id)===String(id);}) || {}) : {};
  var skSel = document.getElementById('op-sk').value;

  var data = Object.assign({}, bestaand, {
    id:         id || maakId(),
    skId:       skSel || null,
    klantNaam:  klant,
    adres:      document.getElementById('op-adres').value.trim(),
    postcode:   document.getElementById('op-pc').value.trim(),
    plaats:     document.getElementById('op-plaats').value.trim(),
    datum:      datum,
    tijdVan:    document.getElementById('op-van').value,
    tijdTot:    document.getElementById('op-tot').value,
    type:       document.getElementById('op-type').value,
    monteurId:  document.getElementById('op-monteur').value || null,
    status:     document.getElementById('op-status').value,
    outsmartId: document.getElementById('op-outsmart').value.trim(),
    notitie:    document.getElementById('op-notitie').value.trim(),
  });

  // Update volgendeDatum serviceklant na servicebeurt
  if (data.skId && (data.type==='Servicebeurt') && data.status==='gereed') {
    var sk = APP.serviceklanten.find(function(k){return String(k.id)===String(data.skId);});
    if (sk) {
      sk.laatsteDatum   = data.datum;
      sk.volgendeDatum  = berekenVolgendeBeurt(data.datum, sk.contractType);
      dbSaveItem('serviceklanten', sk.id, sk);
    }
  }

  if (isNew) APP.opdrachten.push(data);
  else {
    var idx = APP.opdrachten.findIndex(function(x){return String(x.id)===String(id);});
    if (idx>-1) APP.opdrachten[idx] = data;
  }
  dbSaveItem('opdrachten', data.id, data);
  closeModal();
  renderPlanning();
  toast(isNew ? 'Opdracht aangemaakt' : 'Opdracht bijgewerkt', 'success');
}

function verwijderOpdracht(id) {
  if (!confirm('Opdracht verwijderen?')) return;
  APP.opdrachten = APP.opdrachten.filter(function(x){return String(x.id)!==String(id);});
  dbRemoveItem('opdrachten', id);
  renderPlanning();
  toast('Opdracht verwijderd', 'success');
}

function stuurBevestiging(opId) {
  toast('Bevestiging functie komt in Fase 3 (Klantmails)', 'success');
}

var _ouFilter = 'alle';

function renderOveruren() {
  var mijnId = getMijnMedId();

    ? APP.overuren
    : APP.overuren.filter(function(o){return String(o.medId)===String(mijnId);});
  if (_ouFilter !== 'alle') lijst = lijst.filter(function(o){return o.status===_ouFilter;});

  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  html += '<div class="filter-row" style="margin:0">';
  [['alle','Alle'],['aangevraagd','Aangevraagd'],['goedgekeurd','Goedgekeurd'],['afgewezen','Afgewezen']].forEach(function(f){
    html += '<button class="chip' + (_ouFilter===f[0]?' active':'') + '" onclick="_ouFilter='' + f[0] + '';renderOveruren()">' + f[1] + '</button>';
  });

    html += '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--muted)">Geen declaraties</td></tr>';
  } else {
    lijst.forEach(function(o) {
      var m = getMedewerker(o.medId);
      html += '<tr><td>' + (m?'<div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:26px;height:26px;font-size:10px;background:'+(m.kleur||'#3b82f6')+'">'+initials(m)+'</div>'+esc(m.voornaam+' '+m.achternaam)+'</div>':'—') + '</td>';
      html += '<td>' + fmtDatumKort(o.datum) + '</td>';
      html += '<td style="font-weight:700">' + (o.uren||0) + ' uur</td>';
      html += '<td style="font-size:12px;color:var(--muted)">' + esc(o.omschrijving||'') + '</td>';
      html += '<td>' + verlofStatusTag(o.status) + '</td>';

// MODULE: STORINGSDIENST
// ════════════════════════════════════════════════════════
var _sdJaar = new Date().getFullYear();
var _sdWeek = huidigWeekNr();

function huidigWeekNr() {
  var d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay()||7));
  var jaar = new Date(d.getFullYear(),0,1);
  return Math.ceil((((d-jaar)/86400000)+1)/7);
}

function renderStoringsdienst() {
  var poule = APP.medewerkers.filter(function(m){return m.inStoringsPoule;});
  var html = '';

  // Header
  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">';
  html += '<div style="font-family:Syne,sans-serif;font-size:18px;font-weight:800">Storingsdienst ' + _sdJaar + '</div>';
  html += '<div style="display:flex;gap:8px;align-items:center">';
  html += '<button class="btn btn-ghost btn-sm" onclick="_sdJaar--;renderStoringsdienst()">‹</button>';
  html += '<button class="btn btn-ghost btn-sm" onclick="_sdJaar++;renderStoringsdienst()">›</button>';
  html += '</div>';
  if (magSchrijven('storingsdienst') || isAdmin()) {
    html += '<button class="btn btn-ghost btn-sm" onclick="beheerPoule()">👥 Poule beheren</button>';
    html += '<button class="btn btn-primary btn-sm" onclick="openSdModal(null)">+ Dienst toewijzen</button>';
  }
  html += '</div>';

  // Statistieken
  var diensten = APP.storingsDienst.filter(function(d){return d.jaar===_sdJaar;});
  var stats = {};
  APP.medewerkers.forEach(function(m){ stats[m.id] = 0; });
  diensten.forEach(function(d){ if (d.medId) stats[d.medId] = (stats[d.medId]||0)+1; });

  if (poule.length > 0) {
    html += '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px">';
    poule.forEach(function(m) {
      var n = stats[m.id] || 0;
      html += '<div class="card" style="padding:12px 16px;display:flex;align-items:center;gap:10px">';
      html += '<div class="avatar" style="width:32px;height:32px;font-size:11px;background:' + (m.kleur||'#3b82f6') + '">' + initials(m) + '</div>';
      html += '<div><div style="font-weight:600;font-size:13px">' + esc(m.voornaam+' '+m.achternaam) + '</div>';
      html += '<div style="font-size:11px;color:var(--muted)">' + n + ' diensten in ' + _sdJaar + '</div></div></div>';
    });
    html += '</div>';
  }

  // Rooster per week
  html += '<div class="card" style="padding:0"><div class="table-wrap"><table>';
  html += '<thead><tr><th>Week</th><th>Periode</th><th>Monteur</th><th>Telefoon</th>';
  if (magSchrijven('storingsdienst')||isAdmin()) html += '<th style="width:80px"></th>';
  html += '</tr></thead><tbody>';

  for (var w=1; w<=52; w++) {
    var d = weekNrNaarDatum(w, _sdJaar);
    var einde = new Date(d); einde.setDate(einde.getDate()+6);
    var dienst = diensten.find(function(x){return x.week===w;});
    var med = dienst && dienst.medId ? getMedewerker(dienst.medId) : null;
    var isHuidig = w === huidigWeekNr() && _sdJaar === new Date().getFullYear();

    html += '<tr' + (isHuidig?' style="background:rgba(59,130,246,0.08)"':'') + '>';
    html += '<td style="font-weight:700' + (isHuidig?';color:var(--accent)':'') + '">Wk ' + w + (isHuidig?' ←':'') + '</td>';
    html += '<td style="font-size:12px;color:var(--muted)">' + fmtDatumKort(d.toISOString().split('T')[0]) + ' – ' + fmtDatumKort(einde.toISOString().split('T')[0]) + '</td>';
    html += '<td>';
    if (med) {
      html += '<div style="display:flex;align-items:center;gap:8px">';
      html += '<div class="avatar" style="width:26px;height:26px;font-size:10px;background:' + (med.kleur||'#3b82f6') + '">' + initials(med) + '</div>';
      html += esc(med.voornaam+' '+med.achternaam) + '</div>';
    } else {
      html += '<span style="color:var(--red);font-size:12px">— Niet toegewezen —</span>';
    }
    html += '</td>';
    html += '<td style="font-size:12px">' + (med&&med.telefoon?esc(med.telefoon):'—') + '</td>';
    if (magSchrijven('storingsdienst')||isAdmin()) {
      html += '<td><button class="btn btn-ghost btn-sm btn-icon" onclick="openSdModal(' + w + ')" title="Toewijzen">✏️</button></td>';
    }
    html += '</tr>';
  }
  html += '</tbody></table></div></div>';
  document.getElementById('content').innerHTML = html;
}

function weekNrNaarDatum(week, jaar) {
  var d = new Date(jaar, 0, 1 + (week-1)*7);
  var dag = d.getDay() || 7;
  if (dag !== 1) d.setDate(d.getDate() + 1 - dag);
  return d;
}

function openSdModal(week) {
  var isNew = !week;
  var dienst = week ? (APP.storingsDienst.find(function(d){return d.week===week&&d.jaar===_sdJaar;})||{}) : {};
  var d = week ? weekNrNaarDatum(week, _sdJaar) : new Date();
  var einde = new Date(d); einde.setDate(einde.getDate()+6);

  var medOpties = '<option value="">— Geen dienst —</option>' + APP.medewerkers.filter(function(m){return m.rol==='monteur'||m.inStoringsPoule;}).map(function(m){
    return '<option value="'+m.id+'"'+(dienst.medId===m.id?' selected':'')+'>'+esc(m.voornaam+' '+m.achternaam)+'</option>';
  }).join('');

  var weekOpties = '';
  for (var w=1; w<=52; w++) {
    var wd = weekNrNaarDatum(w, _sdJaar);
    weekOpties += '<option value="'+w+'"'+(w===week?' selected':'')+'>Week '+w+' ('+fmtDatumKort(wd.toISOString().split('T')[0])+')</option>';
  }

  var body = '<div class="form-grid">';
  body += fg('Jaar','<input class="input" type="number" id="sd-jaar" value="'+_sdJaar+'">');
  body += fg('Week','<select class="input" id="sd-week">'+weekOpties+'</select>');
  body += fgFull('Monteur met dienst','<select class="input" id="sd-med">'+medOpties+'</select>');
  body += fgFull('Opmerking','<input class="input" id="sd-opmerking" value="'+esc(dienst.opmerking||'')+'">');
  body += '</div>';
  var footer = '<button class="btn btn-ghost" onclick="closeModal()">Annuleren</button><button class="btn btn-primary" onclick="saveSd()">Opslaan</button>';
  openModal('Storingsdienst toewijzen', body, footer);
}

function saveSd() {
  var jaar  = parseInt(document.getElementById('sd-jaar').value);
  var week  = parseInt(document.getElementById('sd-week').value);
  var medId = document.getElementById('sd-med').value;
  var bestaand = APP.storingsDienst.find(function(d){return d.week===week&&d.jaar===jaar;});
  var data = Object.assign(bestaand||{}, { id:bestaand?bestaand.id:maakId(), jaar:jaar, week:week, medId:medId||null, opmerking:document.getElementById('sd-opmerking').value.trim() });
  if (!bestaand) APP.storingsDienst.push(data);
  dbSaveItem('storingsDienst', data.id, data);
  closeModal(); renderStoringsdienst();
  toast('Storingsdienst opgeslagen', 'success');
}

function beheerPoule() {
  var body = '<div style="font-size:13px;color:var(--muted);margin-bottom:12px">Selecteer wie er in de storingsdienst poule zitten:</div>';
  APP.medewerkers.forEach(function(m) {
    body += '<label style="display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;border-bottom:1px solid var(--border)">';
    body += '<input type="checkbox" id="poule-'+m.id+'" '+(m.inStoringsPoule?'checked':'')+' style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer">';
    body += '<div class="avatar" style="width:28px;height:28px;font-size:11px;background:'+(m.kleur||'#3b82f6')+'">'+initials(m)+'</div>';
    body += '<span>'+esc(m.voornaam+' '+m.achternaam)+'</span>';
    body += '</label>';
  });
  var footer = '<button class="btn btn-ghost" onclick="closeModal()">Annuleren</button><button class="btn btn-primary" onclick="slaPouleOp()">Opslaan</button>';
  openModal('Storingsdienst poule', body, footer);
}

function slaPouleOp() {
  APP.medewerkers.forEach(function(m) {
    var cb = document.getElementById('poule-'+m.id);
    if (cb) {
      var was = !!m.inStoringsPoule;
      m.inStoringsPoule = cb.checked;
      if (was !== cb.checked) dbSaveItem('medewerkers', m.id, m);
    }
  });
  closeModal(); renderStoringsdienst();
  toast('Poule opgeslagen', 'success');
}

  html += '<button onclick="locFullscreen()" style="position:absolute;top:10px;right:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:600">⛶ Volledig scherm</button>';

  }
}

function initGmap() {
  var el = document.getElementById('gmap');
  if (!el || _gmap) return;
  _gmap = new google.maps.Map(el, {
    center: { lat: 52.0, lng: 5.1 },
    zoom: 8,
    styles: mapDarkStyle(),
    disableDefaultUI: false,
    mapTypeControl: false,
    streetViewControl: false,
  });
  locLaadMonteurLocaties();
}

function locLaadMonteurLocaties() {
  if (!APP.bedrijfId || !_gmap) return;
  var ref = FB.ref('flow8/bedrijven/' + APP.bedrijfId + '/locaties');
  ref.on('value', function(snap) {
    if (!snap.exists() || !_gmap) return;
    var data = snap.val();
    Object.keys(data).forEach(function(medId) {
      var loc = data[medId];
      var m = getMedewerker(medId);
      if (!m || !loc.lat || !loc.lng) return;
      if (_locMarkers[medId]) {
        _locMarkers[medId].setPosition({ lat: loc.lat, lng: loc.lng });
      } else {
        _locMarkers[medId] = new google.maps.Marker({
          position: { lat: loc.lat, lng: loc.lng },
          map: _gmap,
          title: m.voornaam + ' ' + m.achternaam,
          icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: m.kleur||'#3b82f6', fillOpacity:1, strokeColor:'#fff', strokeWeight:2, scale:10 },
          label: { text: initials(m), color:'#fff', fontSize:'10px', fontWeight:'700' }
        });
        var iw = new google.maps.InfoWindow({ content: '<div style="font-family:DM Sans,sans-serif;padding:4px"><strong>' + esc(m.voornaam+' '+m.achternaam) + '</strong><br><span style="font-size:11px;color:#666">' + (loc.tijd?new Date(loc.tijd).toLocaleTimeString('nl-NL',{hour:'2-digit',minute:'2-digit'}):'') + '</span></div>' });
        _locMarkers[medId].addListener('click', function(){ iw.open(_gmap, _locMarkers[medId]); });
      }
    });
  });
}

function locDeelGPS() {
  if (!navigator.geolocation) { toast('GPS niet beschikbaar', 'error'); return; }
  var mijnId = getMijnMedId();
  if (!mijnId) { toast('Geen medewerker profiel gevonden', 'error'); return; }
  if (_locWatcher) { navigator.geolocation.clearWatch(_locWatcher); _locWatcher = null; toast('Locatie delen gestopt', 'success'); return; }
  _locWatcher = navigator.geolocation.watchPosition(function(pos) {
    var data = { lat: pos.coords.latitude, lng: pos.coords.longitude, tijd: new Date().toISOString(), medId: mijnId };
    FB.ref('flow8/bedrijven/' + APP.bedrijfId + '/locaties/' + mijnId).set(data);
    if (_gmap) _gmap.panTo({ lat: data.lat, lng: data.lng });
  }, function(e){ console.warn('GPS fout:', e); }, { enableHighAccuracy: true, maximumAge: 10000 });
  toast('Locatie wordt gedeeld', 'success');
}

function locOverzicht() {
  if (!_gmap) return;
  var bounds = new google.maps.LatLngBounds();
  var hasBounds = false;
  Object.values(_locMarkers).forEach(function(m) { bounds.extend(m.getPosition()); hasBounds = true; });
  if (hasBounds) _gmap.fitBounds(bounds);
}

function locToggleMonteurs() { toast('Monteurs al zichtbaar via GPS tracking', 'success'); }

var _klantMarkers = [], _toonKlanten = false;
function locToggleKlanten() {
  _toonKlanten = !_toonKlanten;
  _klantMarkers.forEach(function(m){ m.setMap(null); }); _klantMarkers = [];
  if (!_toonKlanten || !_gmap || typeof google==='undefined') return;
  var geocoder = new google.maps.Geocoder();
  APP.serviceklanten.forEach(function(k) {
    if (!k.adres && !k.plaats) return;
    var adres = (k.adres||'') + ' ' + (k.postcode||'') + ' ' + (k.plaats||'') + ', Nederland';
    geocoder.geocode({ address: adres }, function(res, status) {
      if (status !== 'OK' || !res.length) return;
      var pos = res[0].geometry.location;
      var marker = new google.maps.Marker({ position: pos, map: _gmap, title: k.naam, icon: { path: google.maps.SymbolPath.CIRCLE, fillColor:'#3b82f6', fillOpacity:0.8, strokeColor:'#fff', strokeWeight:1.5, scale:7 } });
      var iw = new google.maps.InfoWindow({ content: '<div style="font-family:DM Sans,sans-serif;padding:4px"><strong>' + esc(k.naam) + '</strong><br><span style="font-size:11px;color:#666">' + esc(k.adres||'') + '</span></div>' });
      marker.addListener('click', function(){ iw.open(_gmap, marker); });
      _klantMarkers.push(marker);
    });
  });
}

var _opMarkers = [], _opRoutes = [], _toonOpdrachten = false;
function locToggleOpdrachten() {
  _toonOpdrachten = !_toonOpdrachten;
  _opMarkers.forEach(function(m){ m.setMap(null); }); _opMarkers = [];
  _opRoutes.forEach(function(l){ l.setMap(null); }); _opRoutes = [];
  if (!_toonOpdrachten || !_gmap || typeof google==='undefined') return;
  var vandaag = new Date().toISOString().split('T')[0];

  var geocoder = new google.maps.Geocoder();
  dagOps.forEach(function(o) {
    if (!o.adres && !o.plaats) return;
    var adres = (o.adres||'') + ' ' + (o.postcode||'') + ' ' + (o.plaats||'') + ', Nederland';
    geocoder.geocode({ address: adres }, function(res, status) {
      if (status !== 'OK' || !res.length) return;
      var pos = res[0].geometry.location;
      var kleur = opKleur(o.status);
      var marker = new google.maps.Marker({ position: pos, map: _gmap, title: o.klantNaam, icon: { path: google.maps.SymbolPath.CIRCLE, fillColor: kleur, fillOpacity:1, strokeColor:'#fff', strokeWeight:2, scale:8 } });
      _opMarkers.push(marker);
    });
  });
}

function locFullscreen() {
  var wrap = document.getElementById('map-wrap');
  var mapEl = document.getElementById('gmap');
  if (!document.fullscreenElement) {
    wrap.requestFullscreen().then(function() {
      mapEl.style.height = '100vh';
      if (_gmap) google.maps.event.trigger(_gmap, 'resize');
    });
  } else {
    document.exitFullscreen().then(function() {
      mapEl.style.height = '520px';
      if (_gmap) google.maps.event.trigger(_gmap, 'resize');
    });
  }
}

var _rapPeriode = 'maand';
var _rapMaand   = new Date().getMonth();
var _rapJaar    = new Date().getFullYear();

function renderRapportage() {
  var html = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">';
  html += '<div style="display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:3px;gap:2px">';
  [['maand','Maand'],['kwartaal','Kwartaal'],['jaar','Jaar']].forEach(function(p) {
    html += '<button class="btn btn-sm' + (_rapPeriode===p[0]?' btn-primary':' btn-ghost') + '" style="border:none" onclick="_rapPeriode='' + p[0] + '';renderRapportage()">' + p[1] + '</button>';
  });
  html += '</div>';
  if (_rapPeriode === 'maand') {
    html += '<select class="input" style="width:120px;padding:6px 10px;font-size:12px" onchange="_rapMaand=parseInt(this.value);renderRapportage()">';
    ['Januari','Februari','Maart','April','Mei','Juni','Juli','Augustus','September','Oktober','November','December'].forEach(function(m,i){
      html += '<option value="'+i+'"'+(_rapMaand===i?' selected':'')+'>' + m + '</option>';
    });
    html += '</select>';
  }
  html += '<select class="input" style="width:90px;padding:6px 10px;font-size:12px" onchange="_rapJaar=parseInt(this.value);renderRapportage()">';
  for (var y=_rapJaar-2; y<=_rapJaar+1; y++) html += '<option value="'+y+'"'+(_rapJaar===y?' selected':'')+'>' + y + '</option>';
  html += '</select>';
  html += '</div>';

  // Filter op periode
  function inPeriode(datum) {
    if (!datum) return false;
    var d = new Date(datum);
    if (_rapPeriode==='jaar') return d.getFullYear()===_rapJaar;
    if (_rapPeriode==='kwartaal') return d.getFullYear()===_rapJaar && Math.floor(d.getMonth()/3)===Math.floor(_rapMaand/3);
    return d.getFullYear()===_rapJaar && d.getMonth()===_rapMaand;
  }

  var ops = APP.opdrachten.filter(function(o){return inPeriode(o.datum);});
  var ver = APP.verlof.filter(function(v){return inPeriode(v.van)&&v.status==='goedgekeurd';});
  var ou  = APP.overuren.filter(function(o){return inPeriode(o.datum)&&o.status==='goedgekeurd';});
  var ok  = APP.onkosten.filter(function(o){return inPeriode(o.datum)&&o.status==='goedgekeurd';});
  var vz  = APP.verzuim.filter(function(v){return inPeriode(v.van);});

  // Stats
  html += '<div class="stats-grid" style="margin-bottom:20px">';
  html += statCard('Opdrachten', ops.length, '#3b82f6', ICONS.calendar);
  html += statCard('Verlof dagen', ver.reduce(function(s,v){return s+(v.dagen||0);},0), '#10b981', ICONS.heart);
  html += statCard('Overuren', ou.reduce(function(s,o){return s+(o.uren||0);},0) + ' uur', '#f59e0b', ICONS.clock);
  html += statCard('Onkosten', '€ ' + ok.reduce(function(s,o){return s+(o.bedrag||0);},0).toFixed(0), '#8b5cf6', ICONS.dollar);
  html += '</div>';

  // Per medewerker
  html += '<div class="card">';
  html += '<div class="card-header"><div class="card-title">Overzicht per medewerker</div></div>';
  html += '<div class="table-wrap"><table>';
  html += '<thead><tr><th>Medewerker</th><th>Opdrachten</th><th>Verlof</th><th>Overuren</th><th>Onkosten</th><th>Verzuim</th></tr></thead><tbody>';

  APP.medewerkers.forEach(function(m) {
    var mid = String(m.id);
    var mOps = ops.filter(function(o){return String(o.monteurId)===mid;}).length;
    var mVer = ver.filter(function(v){return String(v.medId)===mid;}).reduce(function(s,v){return s+(v.dagen||0);},0);
    var mOu  = ou.filter(function(o){return String(o.medId)===mid;}).reduce(function(s,o){return s+(o.uren||0);},0);
    var mOk  = ok.filter(function(o){return String(o.medId)===mid;}).reduce(function(s,o){return s+(o.bedrag||0);},0);
    var mVz  = vz.filter(function(v){return String(v.medId)===mid;}).length;

    html += '<tr>';
    html += '<td><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="width:26px;height:26px;font-size:10px;background:'+(m.kleur||'#3b82f6')+'">'+initials(m)+'</div>'+esc(m.voornaam+' '+m.achternaam)+'</div></td>';
    html += '<td style="font-weight:700">' + mOps + '</td>';
    html += '<td>' + mVer + ' dagen</td>';
    html += '<td>' + mOu + ' uur</td>';
    html += '<td>€ ' + mOk.toFixed(0) + '</td>';
    html += '<td>' + (mVz > 0 ? '<span class="tag tag-red">'+mVz+'</span>' : '—') + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table></div></div>';
  document.getElementById('content').innerHTML = html;
}

function saveRol(rolId) {
  var MODS = ['dashboard','planning','medewerkers','serviceklanten','debiteuren','verlof','overuren','onkosten','verzuim','storingsdienst','locatie','klantmails','rapportage','instellingen'];
  var naam = document.getElementById('rol-naam').value.trim();
  if (!naam) { toast('Rolnaam is verplicht', 'error'); return; }
  var nieuweId = rolId || naam.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'');
  var rechten = {};
  MODS.forEach(function(mod) {
    rechten[mod] = {
      lezen:    !!(document.getElementById('rol-lees-'+mod) && document.getElementById('rol-lees-'+mod).checked),
      schrijven:!!(document.getElementById('rol-schrijf-'+mod) && document.getElementById('rol-schrijf-'+mod).checked),
    };
  });
  APP.rollen[nieuweId] = { naam: naam, kleur: document.getElementById('rol-kleur').value, rechten: rechten };
  FB.ref(dbPath('rollen/'+nieuweId)).set(APP.rollen[nieuweId])
    .then(function(){ toast('Rol opgeslagen', 'success'); closeModal(); renderInstellingen(); })
    .catch(function(e){ toast('Fout: '+e.message, 'error'); });
}

function verwijderRol(rolId) {

  delete APP.rollen[rolId];
  FB.ref(dbPath('rollen/'+rolId)).remove()

}

function uitnodigingSturen() {
  var body = fg('E-mailadres', '<input class="input" id="inv-email" type="email" placeholder="naam@bedrijf.nl">');
  body += fg('Naam', '<input class="input" id="inv-naam" placeholder="Voornaam Achternaam">');
  body += fg('Rol', '<select class="input" id="inv-rol">' + Object.keys(APP.rollen).map(function(r){return '<option value="'+r+'">'+APP.rollen[r].naam+'</option>';}).join('') + '</select>');
  var footer = '<button class="btn btn-ghost" onclick="closeModal()">Annuleren</button><button class="btn btn-primary" onclick="verstuurUitnodiging()">Uitnodiging sturen</button>';
  openModal('Nieuwe gebruiker uitnodigen', body, footer);
}

function verstuurUitnodiging() {
  var email = document.getElementById('inv-email').value.trim();
  var naam  = document.getElementById('inv-naam').value.trim();
  var rol   = document.getElementById('inv-rol').value;
  if (!email || !naam) { toast('Vul alle velden in', 'error'); return; }
  var tmpPass = Math.random().toString(36).slice(-8)+'A1!';
  AUTH.createUserWithEmailAndPassword(email, tmpPass)
    .then(function(cred) {
      var profiel = { uid:cred.user.uid, naam:naam, email:email, rol:rol, bedrijfId:APP.bedrijfId, actief:true };
      FB.ref('flow8/gebruikers/' + cred.user.uid).set(profiel);
      return AUTH.sendPasswordResetEmail(email);
    })
    .catch(function(e) {
      if (e.code === 'auth/email-already-in-use') return AUTH.sendPasswordResetEmail(email);
      throw e;
    })
    .then(function() { toast('Uitnodiging verstuurd naar ' + email, 'success'); closeModal(); })
    .catch(function(e) { toast('Fout: ' + e.message, 'error'); });
}

    + '</div>'

// Laad bedrijfsgegevens ook bij startup
var _origLaadData = laadData;
laadData = async function() {
  await _origLaadData();
  var bgSnap = await FB.ref(dbPath('bedrijfsGegevens')).once('value');
  if (bgSnap.exists()) APP.bedrijfsGegevens = bgSnap.val();
};
