<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Flow8 — Field Service Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCP3LqVySNrg3Pte80y2ZXLRrOmDxDGMGA&libraries=geometry&callback=_mapsReady" async defer></script>

<style>
/* ── RESET & TOKENS ─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:       #0d0f14;
  --surface:  #161920;
  --surface2: #1e2230;
  --border:   #2a2f3d;
  --accent:   #3b82f6;
  --accent2:  #06b6d4;
  --green:    #10b981;
  --orange:   #f59e0b;
  --red:      #ef4444;
  --purple:   #8b5cf6;
  --text:     #e8ecf4;
  --muted:    #6b7694;
  --radius:   12px;
  --sidebar-w: 220px;
}
body.light {
  --bg: #f0f2f7; --surface: #fff; --surface2: #e8ecf4;
  --border: #d1d8e8; --text: #1a1f2e; --muted: #7a8299;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
body.app-active { display: flex; height: 100vh; }

/* ── UTILITY ──────────────────────────────────────── */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-4 { gap: 4px; } .gap-8 { gap: 8px; } .gap-12 { gap: 12px; } .gap-16 { gap: 16px; }
.mt-8 { margin-top: 8px; } .mt-16 { margin-top: 16px; }
.fw-600 { font-weight: 600; } .fw-700 { font-weight: 700; }
.fs-11 { font-size: 11px; } .fs-12 { font-size: 12px; } .fs-13 { font-size: 13px; }
.c-muted { color: var(--muted); }
.truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── COMPONENTS ───────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 8px; font-size: 13px;
  font-weight: 600; cursor: pointer; border: none;
  font-family: inherit; transition: all 0.15s; white-space: nowrap;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }
.btn-danger { background: var(--red); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 7px; border-radius: 8px; }

.input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); padding: 10px 12px;
  font-size: 13px; font-family: inherit; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }

.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;
}
.tag-blue   { background: rgba(59,130,246,0.15);  color: var(--accent); }
.tag-green  { background: rgba(16,185,129,0.15);  color: var(--green); }
.tag-orange { background: rgba(245,158,11,0.15);  color: var(--orange); }
.tag-red    { background: rgba(239,68,68,0.15);   color: var(--red); }
.tag-purple { background: rgba(139,92,246,0.15);  color: var(--purple); }
.tag-muted  { background: rgba(107,118,148,0.15); color: var(--muted); }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.card-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }

.form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--muted); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-full { grid-column: 1 / -1; }

.avatar {
  border-radius: 50%; display: flex; align-items: center;
  justify-content: center; font-weight: 800; flex-shrink: 0;
}

/* ── MODALS ───────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 200; backdrop-filter: blur(4px);
  display: none; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; width: min(640px, 95vw); max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes modalIn { from { opacity:0; transform:scale(0.92); } to { opacity:1; transform:scale(1); } }
.modal-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
.modal-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; }
.modal-body { padding: 16px 24px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
.modal-close { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); font-size: 16px; }
.modal-close:hover { background: var(--red); color: #fff; border-color: var(--red); }

/* ── TOAST ────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); padding: 10px 20px; border-radius: 10px;
  font-size: 13px; z-index: 9999; opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.success { border-color: rgba(16,185,129,0.4); }
#toast.error   { border-color: rgba(239,68,68,0.4); }

/* ── TABLE ────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 14px; color: var(--muted); font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; border-bottom: 2px solid var(--border); }
td { padding: 12px 14px; border-bottom: 1px solid rgba(42,47,61,0.4); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(59,130,246,0.04); }

/* ── LOGIN ────────────────────────────────────────── */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; z-index: 1000;
}
.login-box { width: 100%; max-width: 400px; }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo-text { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 800; }
.login-logo-sub { font-size: 13px; color: var(--muted); margin-top: 4px; }

/* ── SIDEBAR ──────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w); height: 100vh; background: var(--surface);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  flex-shrink: 0; overflow-y: auto;
}
.sidebar-logo { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
.sidebar-logo-text { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
.sidebar-logo-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

.nav-section { padding: 12px 16px 4px; font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; color: var(--muted); cursor: pointer;
  font-size: 13px; font-weight: 500; border-radius: 8px;
  margin: 1px 8px; transition: all 0.15s; position: relative;
}
.nav-item:hover { color: var(--text); background: var(--surface2); }
.nav-item.active { color: var(--text); background: rgba(59,130,246,0.1); font-weight: 600; }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 50%;
  transform: translateY(-50%); width: 3px; height: 60%;
  background: var(--accent); border-radius: 0 3px 3px 0;
}
.nav-item svg { opacity: 0.6; flex-shrink: 0; }
.nav-item.active svg { opacity: 1; color: var(--accent); }
.nav-badge { margin-left: auto; background: var(--accent); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 20px; }

.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); margin-top: auto; }
.sidebar-user { display: flex; align-items: center; gap: 10px; }
.sidebar-user-info { flex: 1; min-width: 0; }
.sidebar-user-name { font-size: 13px; font-weight: 600; }
.sidebar-user-role { font-size: 11px; color: var(--muted); }

/* ── MAIN CONTENT ─────────────────────────────────── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
.topbar {
  height: 56px; background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 12px; flex-shrink: 0;
}
.topbar-title { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; flex: 1; }
.content { flex: 1; overflow-y: auto; padding: 24px; }

.page { display: none; }
.page.active { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── FILTER ROW ───────────────────────────────────── */
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.chip {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-family: inherit; transition: all 0.15s;
}
.chip:hover { color: var(--text); border-color: var(--muted); }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ── SEARCH ───────────────────────────────────────── */
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 12px 9px 34px; font-size: 13px; font-family: inherit; outline: none; width: 100%; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--accent); }

/* ── PANEL (slide-in) ─────────────────────────────── */
.panel {
  position: fixed; top: 0; right: 0; width: 460px; height: 100vh;
  background: var(--surface); border-left: 1px solid var(--border);
  z-index: 100; transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto; padding: 24px;
  box-shadow: -10px 0 40px rgba(0,0,0,0.3);
}
.panel.open { transform: translateX(0); }
.panel-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99; }
.panel-overlay.open { display: block; }
.panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
.panel-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }

/* ── TABS ─────────────────────────────────────────── */
.tabs { display: flex; gap: 2px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
.tab { padding: 9px 16px; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── STAT CARDS ───────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.stat-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
.stat-value { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; margin-bottom: 2px; }
.stat-label { font-size: 12px; color: var(--muted); }

/* ── PROGRESS ─────────────────────────────────────── */
.progress { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }

/* ── PAGINATION ───────────────────────────────────── */
.pagination { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-top: 1px solid var(--border); margin-top: 4px; font-size: 12px; color: var(--muted); }
.pg-controls { display: flex; gap: 4px; }
.pg-btn { min-width: 30px; height: 28px; padding: 0 8px; border-radius: 6px; font-size: 12px; font-weight: 600; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.pg-btn:hover:not(:disabled) { color: var(--text); background: var(--surface2); }
.pg-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── PLANNING SPECIFIEK ───────────────────────────── */
.plan-grid { display: grid; gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; }
.plan-cell { background: var(--surface); min-height: 80px; padding: 4px; position: relative; }
.plan-header-cell { background: var(--surface2); padding: 8px 12px; font-size: 11px; font-weight: 600; color: var(--muted); }
.plan-opdracht { border-radius: 6px; padding: 5px 8px; font-size: 11px; font-weight: 600; cursor: pointer; margin-bottom: 3px; border-left: 3px solid; transition: opacity 0.15s; }
.plan-opdracht:hover { opacity: 0.8; }
.plan-opdracht.blauw  { background: rgba(59,130,246,0.2); color: #93c5fd; border-color: var(--accent); }
.plan-opdracht.groen  { background: rgba(16,185,129,0.2); color: #6ee7b7; border-color: var(--green); }
.plan-opdracht.oranje { background: rgba(245,158,11,0.2); color: #fcd34d; border-color: var(--orange); }
.plan-opdracht.rood   { background: rgba(239,68,68,0.2);  color: #fca5a5; border-color: var(--red); }

/* ── RESPONSIVE ───────────────────────────────────── */
@media (max-width: 768px) {
  :root { --sidebar-w: 0px; }
  #sidebar { position: fixed; left: -240px; width: 240px; z-index: 50; transition: left 0.25s; }
  #sidebar.open { left: 0; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ── TOAST ──────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── LOGIN ──────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-text">Flow<span style="color:var(--accent)">8</span></div>
      <div class="login-logo-sub">Field Service Management</div>
    </div>
    <div class="card" style="padding:28px">
      <div class="form-group">
        <label>E-mailadres</label>
        <input type="email" id="login-email" class="input" placeholder="naam@bedrijf.nl" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>Wachtwoord</label>
        <input type="password" id="login-pass" class="input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div id="login-error" style="font-size:12px;color:var(--red);margin-bottom:12px;display:none"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">Inloggen</button>
      <div style="text-align:center;margin-top:12px">
        <button onclick="doWachtwoordVergeten()" style="background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer">Wachtwoord vergeten?</button>
      </div>
    </div>
  </div>
</div>

<!-- ── APP ────────────────────────────────────────── -->
<div id="app" class="hidden">

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">Flow<span style="color:var(--accent)">8</span></div>
      <div class="sidebar-logo-sub">Field Service Management</div>
    </div>
    <div class="nav" id="sidebar-nav"><!-- dynamisch gegenereerd op basis van rechten --></div>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="avatar" id="sb-avatar" style="width:34px;height:34px;font-size:12px;background:linear-gradient(135deg,var(--accent),var(--accent2))"></div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sb-naam">—</div>
          <div class="sidebar-user-role" id="sb-rol">—</div>
        </div>
        <button class="btn btn-icon btn-ghost btn-sm" onclick="doUitloggen()" title="Uitloggen">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div id="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div id="topbar-actions"></div>
    </div>
    <div class="content" id="content">
      <!-- Pagina's worden hier geladen -->
    </div>
  </div>
</div>

<!-- Panel overlay -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="panel-title" id="panel-title">Detail</div>
    <button class="modal-close" onclick="closePanel()">✕</button>
  </div>
  <div id="panel-body"></div>
</div>

<!-- Modal overlay -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">—</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════
// FIREBASE INITIALISATIE
// ════════════════════════════════════════════════════════
const FB_CONFIG = {
  apiKey:            "AIzaSyD3elIadcFK3ycaMc2deauZ5PNF0Ap-_Xo",
  authDomain:        "flow8-715de.firebaseapp.com",
  databaseURL:       "https://flow8-715de-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:         "flow8-715de",
  storageBucket:     "flow8-715de.appspot.com",
  messagingSenderId: "1234567890",
  appId:             "1:flow8-715de:web:abc123"
};

firebase.initializeApp(FB_CONFIG);
var FB   = firebase.database();
var AUTH = firebase.auth();

// ════════════════════════════════════════════════════════
// STATE — enkel globaal object, nooit losse globals
// ════════════════════════════════════════════════════════
var APP = {
  user:          null,   // ingelogde Firebase user
  profiel:       null,   // profiel uit DB (naam, rol, bedrijfId, rechten)
  bedrijfId:     null,
  medewerkers:   [],
  rollen:        {},     // { rolId: { naam, kleur, rechten: {module: {lezen,schrijven}} } }
  serviceklanten:[],
  debiteuren:    [],
  opdrachten:    [],
  verlof:        [],
  overuren:      [],
  onkosten:      [],
  verzuim:       [],
  agenda:        [],
  storingsDienst:[],
  blokkadeDagen: [],
  activePage:    null,
  listeners:     {},     // Firebase listeners bijhouden voor cleanup
  dataLoaded:    false,
};

// ════════════════════════════════════════════════════════
// FIREBASE HELPERS
// ════════════════════════════════════════════════════════
function dbRef(path)   { return FB.ref(path); }
function dbPath(...parts){ return ['flow8', 'bedrijven', APP.bedrijfId, ...parts].join('/'); }

function dbSave(key, data) {
  if (!APP.bedrijfId) return Promise.reject('Geen bedrijfId');
  var fbVal = Array.isArray(data) ? arrToObj(data) : data;
  return dbRef(dbPath(key)).set(fbVal)
    .then(function(){ console.log('[DB] Saved:', key); })
    .catch(function(e){ console.error('[DB] Save failed:', key, e.message); toast('Opslaan mislukt', 'error'); });
}

function dbSaveItem(key, id, data) {
  if (!APP.bedrijfId) return Promise.reject('Geen bedrijfId');
  return dbRef(dbPath(key, String(id))).set(data)
    .then(function(){ console.log('[DB] Saved item:', key, id); })
    .catch(function(e){ console.error('[DB] Save item failed:', key, id, e.message); toast('Opslaan mislukt', 'error'); });
}

function dbRemoveItem(key, id) {
  if (!APP.bedrijfId) return Promise.reject('Geen bedrijfId');
  return dbRef(dbPath(key, String(id))).remove()
    .then(function(){ console.log('[DB] Removed:', key, id); })
    .catch(function(e){ console.error('[DB] Remove failed:', key, id, e.message); });
}

function arrToObj(arr) {
  if (!Array.isArray(arr)) return arr;
  var obj = {};
  arr.forEach(function(item) {
    if (!item) return;
    var key = item.id != null ? String(item.id) : ('i' + Math.random().toString(36).slice(2));
    obj[key] = item;
  });
  return obj;
}

function objToArr(obj) {
  if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return obj || [];
  return Object.keys(obj).map(function(k) {
    var item = obj[k];
    if (item && typeof item === 'object' && item.id == null) {
      item = Object.assign({}, item, { id: k });
    }
    return item;
  }).filter(Boolean);
}

// Laad een collectie uit Firebase en sla op in APP
function dbLoad(key, appKey) {
  return new Promise(function(resolve) {
    dbRef(dbPath(key)).once('value')
      .then(function(snap) {
        var val = snap.val();
        if (val === null) { APP[appKey] = []; resolve([]); return; }
        var arr = (typeof val === 'object' && !Array.isArray(val)) ? objToArr(val) : val;
        APP[appKey] = arr;
        resolve(arr);
      })
      .catch(function(e) {
        console.warn('[DB] Load failed:', key, e.message);
        APP[appKey] = [];
        resolve([]);
      });
  });
}

// Realtime listener op een collectie
function dbListen(key, appKey, callback) {
  var ref = dbRef(dbPath(key));
  var handler = ref.on('value', function(snap) {
    var val = snap.val();
    if (val === null) { APP[appKey] = []; }
    else {
      APP[appKey] = (typeof val === 'object' && !Array.isArray(val)) ? objToArr(val) : val;
    }
    if (callback) callback(APP[appKey]);
  });
  APP.listeners[key] = { ref: ref, handler: handler };
}

function dbUnlistenAll() {
  Object.keys(APP.listeners).forEach(function(k) {
    try { APP.listeners[k].ref.off('value', APP.listeners[k].handler); } catch(e) {}
  });
  APP.listeners = {};
}

async function doLogin() {
  var email = document.getElementById('login-email').value.trim();
  var pass  = document.getElementById('login-pass').value;
  var errEl = document.getElementById('login-error');
  errEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent = 'Vul e-mail en wachtwoord in.'; errEl.style.display = 'block'; return; }
  try {
    await AUTH.signInWithEmailAndPassword(email, pass);
    // onAuthStateChanged handelt de rest
  } catch(e) {
    var msgs = {
      'auth/user-not-found':  'E-mailadres niet gevonden.',
      'auth/wrong-password':  'Onjuist wachtwoord.',
      'auth/too-many-requests': 'Te veel pogingen. Probeer later opnieuw.',
      'auth/invalid-email':   'Ongeldig e-mailadres.',
    };
    errEl.textContent = msgs[e.code] || 'Inloggen mislukt: ' + e.message;
    errEl.style.display = 'block';
  }
}

async function doWachtwoordVergeten() {
  var email = document.getElementById('login-email').value.trim();
  if (!email) { alert('Voer eerst je e-mailadres in.'); return; }
  try {

  } catch(e) {

   'verlof','overuren','onkosten','verzuim','agenda','storingsDienst','blokkadeDagen']

async function laadProfiel(uid) {
  try {
    var snap = await FB.ref('flow8/gebruikers/' + uid).once('value');
    if (snap.exists()) {
      APP.profiel   = snap.val();
      APP.bedrijfId = APP.profiel.bedrijfId || 'demo';
    } else {
      // Eerste login — maak admin profiel
      var email = APP.user.email;
      var naam  = email.split('@')[0].replace(/[._-]/g,' ')
                  .split(' ').map(function(w){ return w.charAt(0).toUpperCase()+w.slice(1); }).join(' ');
      APP.profiel = { uid: uid, naam: naam, email: email, rol: 'admin', bedrijfId: 'demo', actief: true };
      APP.bedrijfId = 'demo';
      await FB.ref('flow8/gebruikers/' + uid).set(APP.profiel);
    }
    await laadData();
    toonApp();
  } catch(e) {
    console.error('Profiel laden mislukt:', e);
    toast('Fout bij inloggen: ' + e.message, 'error');
    AUTH.signOut();
  }
}

async function laadData() {
  // Laad rollen eerst (nodig voor rechten check)
  var rolSnap = await dbRef(dbPath('rollen')).once('value');
  if (rolSnap.exists()) {
    APP.rollen = rolSnap.val();
  } else {
    // Initialiseer standaard rollen
    APP.rollen = maakStandaardRollen();
    await dbRef(dbPath('rollen')).set(APP.rollen);
  }

  // Laad alle data parallel
  await Promise.all([
    dbLoad('medewerkers',    'medewerkers'),
    dbLoad('serviceklanten', 'serviceklanten'),
    dbLoad('debiteuren',     'debiteuren'),
    dbLoad('opdrachten',     'opdrachten'),
    dbLoad('verlof',         'verlof'),
    dbLoad('overuren',       'overuren'),
    dbLoad('onkosten',       'onkosten'),
    dbLoad('verzuim',        'verzuim'),
    dbLoad('agenda',         'agenda'),
    dbLoad('storingsDienst', 'storingsDienst'),
    dbLoad('blokkadeDagen',  'blokkadeDagen'),
  ]);

  APP.dataLoaded = true;

  // Zorg dat admin altijd een medewerker profiel heeft
  ensureMedewerkerProfiel();

  // Start realtime listeners voor kritieke modules
  dbListen('opdrachten',    'opdrachten',    function() { if(APP.activePage==='planning') renderPlanning(); });
  dbListen('medewerkers',   'medewerkers',   function() { if(APP.activePage==='medewerkers') renderMedewerkers(); });
  dbListen('storingsDienst','storingsDienst',function() { if(APP.activePage==='storingsdienst') renderStoringsdienst(); });
}

function maakStandaardRollen() {
  var modules = ['dashboard','planning','medewerkers','serviceklanten','debiteuren',
                 'verlof','overuren','onkosten','verzuim','storingsdienst',
                 'locatie','klantmails','rapportage','instellingen'];

  function rechten(lees, schrijf) {
    var r = {};
    modules.forEach(function(m) {
      r[m] = { lezen: lees.includes(m) || lees.includes('*'), schrijven: schrijf.includes(m) || schrijf.includes('*') };
    });
    return r;
  }

  return {
    admin: {
      naam: 'Beheerder', kleur: '#3b82f6',
      rechten: rechten(['*'], ['*'])
    },
    planner: {
      naam: 'Planner', kleur: '#8b5cf6',
      rechten: rechten(
        ['dashboard','planning','medewerkers','serviceklanten','debiteuren','locatie','klantmails','rapportage','storingsdienst','verlof'],
        ['planning','serviceklanten','debiteuren','klantmails','storingsdienst']
      )
    },
    monteur: {
      naam: 'Monteur', kleur: '#f59e0b',
      rechten: rechten(
        ['dashboard','planning','locatie','verlof','overuren','onkosten','verzuim','storingsdienst'],
        ['verlof','overuren','onkosten','verzuim']
      )
    },
    verkoop: {
      naam: 'Verkoop', kleur: '#10b981',
      rechten: rechten(
        ['dashboard','serviceklanten','debiteuren','klantmails','rapportage','verlof','overuren','onkosten'],
        ['serviceklanten','debiteuren','klantmails','verlof','overuren','onkosten']
      )
    },
    administratie: {
      naam: 'Administratie', kleur: '#06b6d4',
      rechten: rechten(
        ['dashboard','debiteuren','rapportage','verlof','overuren','onkosten','verzuim'],
        ['debiteuren','verlof','overuren','onkosten','verzuim']
      )
    },
    magazijn: {
      naam: 'Magazijn', kleur: '#6b7694',
      rechten: rechten(
        ['dashboard','verlof','overuren','onkosten'],
        ['verlof','overuren','onkosten']
      )
    },
  };
}

function getRol() {
  if (!APP.profiel) return null;
  return APP.rollen[APP.profiel.rol] || null;
}

function magLezen(module) {
  var rol = getRol();
  if (!rol) return false;
  return !!(rol.rechten && rol.rechten[module] && rol.rechten[module].lezen);
}

function magSchrijven(module) {
  var rol = getRol();
  if (!rol) return false;
  return !!(rol.rechten && rol.rechten[module] && rol.rechten[module].schrijven);
}

function isAdmin() {
  return APP.profiel && APP.profiel.rol === 'admin';
}

function bouwNav() {
  var nav = document.getElementById('sidebar-nav');
  var html = '';
  var huidigeSectie = '';
  MODULES.forEach(function(m) {
    if (!magLezen(m.id) && !isAdmin()) return;
    if (m.sectie !== huidigeSectie) {
      html += '<div class="nav-section">' + m.sectie + '</div>';
      huidigeSectie = m.sectie;
    }
    html += '<div class="nav-item" id="nav-' + m.id + '" onclick="toonPagina(\'' + m.id + '\')">';
    html += (ICONS[m.icon] || '') + '<span>' + m.label + '</span>';
    html += '</div>';
  });
  nav.innerHTML = html;
}

function toonPagina(id) {
  APP.activePage = id;
  // Update nav
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  var navEl = document.getElementById('nav-' + id);
  if (navEl) navEl.classList.add('active');
  // Update topbar
  var mod = MODULES.find(function(m) { return m.id === id; });
  document.getElementById('topbar-title').textContent = mod ? mod.label : id;
  // Laad pagina content
  var renderers = {
    dashboard:      renderDashboard,
    medewerkers:    renderMedewerkers,
    serviceklanten: renderServiceklanten,
    debiteuren:     renderDebiteuren,
    planning:       renderPlanning,
    verlof:         renderVerlof,
    overuren:       renderOveruren,
    onkosten:       renderOnkosten,
    verzuim:        renderVerzuim,
    storingsdienst: renderStoringsdienst,
    locatie:        renderLocatie,
    klantmails:     renderKlantmails,
    rapportage:     renderRapportage,
    instellingen:   renderInstellingen,
  };
  if (renderers[id]) renderers[id]();
}

function toonApp() {
  document.getElementById('login-screen').style.display = 'none';

  // Sidebar user info
  var naam = APP.profiel.naam || APP.profiel.email;

function ensureMedewerkerProfiel() {
  if (!APP.profiel || !APP.profiel.email) return;
  var bestaand = APP.medewerkers.find(function(m) {
    return m.email && m.email.toLowerCase() === APP.profiel.email.toLowerCase();
  });
  if (bestaand) return;
  var namen   = (APP.profiel.naam || '').split(' ');
  var profiel = {
    id:           'med_' + Date.now(),
    voornaam:     namen[0] || '',
    achternaam:   namen.slice(1).join(' ') || '',
    email:        APP.profiel.email,
    rol:          APP.profiel.rol || 'admin',
    functie:      'Beheerder',
    status:       'actief',
    contractUren: 40,
    verlofTegoed: 25,
    verlofSaldo:  25,
    datumInDienst: new Date().toISOString().split('T')[0],
    kleur:        '#3b82f6',
  };
  APP.medewerkers.push(profiel);
  dbSaveItem('medewerkers', profiel.id, profiel);
}

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDatum(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('nl-NL', {day:'numeric',month:'short',year:'numeric'}); }
  catch(e) { return d; }
}

function fmtDatumKort(d) {
  if (!d) return '—';
  try { return new Date(d).toLocaleDateString('nl-NL', {day:'numeric',month:'short'}); }
  catch(e) { return d; }
}

function initials(m) {
  var v = (m.voornaam || '')[0] || '';
  var a = (m.achternaam || '').replace(/^(de |van |van de )/i,'')[0] || '';
  return (v + a).toUpperCase() || '?';
}

// MODULE: DASHBOARD
// ════════════════════════════════════════════════════════
function renderDashboard() {
  var vandaag = new Date();
  var greeting = vandaag.getHours() < 12 ? 'Goedemorgen' : vandaag.getHours() < 18 ? 'Goedemiddag' : 'Goedenavond';
  var naam = APP.profiel ? (APP.profiel.naam || '').split(' ')[0] : '';

  // Statistieken
  var opVandaag = APP.opdrachten.filter(function(o) {
    return o.datum === vandaag.toISOString().split('T')[0];
  });
  var openVerlof = APP.verlof.filter(function(v) { return v.status === 'aangevraagd'; });
  var actieveMed = APP.medewerkers.filter(function(m) { return m.status !== 'inactief'; });

  var html = '<div style="margin-bottom:20px">';
  html += '<h2 style="font-family:Syne,sans-serif;font-size:22px;font-weight:800">' + greeting + ', ' + esc(naam) + ' 👋</h2>';
  html += '<div style="font-size:13px;color:var(--muted);margin-top:4px">' + vandaag.toLocaleDateString('nl-NL', {weekday:'long',day:'numeric',month:'long',year:'numeric'}) + '</div>';
  html += '</div>';

  html += '<div class="stats-grid">';
  html += statCard('Opdrachten vandaag', opVandaag.length, '#3b82f6', ICONS.calendar);
  html += statCard('Medewerkers actief', actieveMed.length, '#10b981', ICONS.users);
  html += statCard('Open verlofaanvragen', openVerlof.length, '#f59e0b', ICONS.heart);
  html += statCard('Serviceklanten', APP.serviceklanten.length, '#8b5cf6', ICONS.file);
  html += '</div>';

  // Opdrachten vandaag
  html += '<div class="card" style="margin-bottom:16px">';
  html += '<div class="card-header"><div class="card-title">Opdrachten vandaag</div>';
  if (magSchrijven('planning')) html += '<button class="btn btn-primary btn-sm" onclick="toonPagina(\'planning\')">Naar planning</button>';
  html += '</div>';

  if (opVandaag.length === 0) {
    html += '<div style="text-align:center;padding:32px;color:var(--muted);font-size:13px">Geen opdrachten voor vandaag</div>';
  } else {
    html += '<div class="table-wrap"><table><thead><tr><th>Klant</th><th>Monteur</th><th>Type</th><th>Tijd</th><th>Status</th></tr></thead><tbody>';
    opVandaag.forEach(function(o) {
      var med = o.monteurId ? getMedewerker(o.monteurId) : null;
      html += '<tr onclick="toonPagina(\'planning\')" style="cursor:pointer">';
      html += '<td><strong>' + esc(o.klantNaam) + '</strong><br><span style="font-size:11px;color:var(--muted)">' + esc(o.adres||'') + '</span></td>';
      html += '<td>' + (med ? esc(med.voornaam + ' ' + med.achternaam) : '—') + '</td>';
      html += '<td><span class="tag tag-blue">' + esc(o.type||'') + '</span></td>';
      html += '<td>' + esc(o.tijdVan||'') + '</td>';
      html += '<td>' + statusTag(o.status) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

function statCard(label, value, kleur, icon) {
  return '<div class="stat-card">'
    + '<div class="stat-icon" style="background:' + kleur + '22;color:' + kleur + '">' + icon + '</div>'
    + '<div class="stat-value" style="color:' + kleur + '">' + value + '</div>'
    + '<div class="stat-label">' + label + '</div>'
    + '</div>';
}

function statusTag(status) {
  var cfg = {
    ingepland:  { cls:'tag-blue',   label:'Ingepland' },
    onderweg:   { cls:'tag-orange', label:'Onderweg' },
    bezig:      { cls:'tag-purple', label:'Bezig' },
    gereed:     { cls:'tag-green',  label:'Gereed' },
    geannuleerd:{ cls:'tag-muted',  label:'Geannuleerd' },
    storing:    { cls:'tag-red',    label:'Storing' },
  };
  var c = cfg[status] || { cls:'tag-muted', label: status || '—' };
  return '<span class="tag ' + c.cls + '">' + c.label + '</span>';
}

// ════════════════════════════════════════════════════════
// MODULE: MEDEWERKERS
// ════════════════════════════════════════════════════════
var _medFilter  = 'alle';
var _medZoek    = '';
var _medSortKey = 'achternaam';
var _medSortDir = 1;
var _medPage    = 1;
var _medPageSize = 25;

function renderMedewerkers() {
  var html = '';

  // Toolbar
  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">';
  html += '<div class="search-wrap" style="flex:1;min-width:200px">';
  html += ICONS.grid.replace('16','14') + '<input class="search-input" placeholder="Zoek medewerker..." value="' + esc(_medZoek) + '" oninput="_medZoek=this.value;_medPage=1;renderMedewerkers()">';
  html += '</div>';
  if (magSchrijven('medewerkers')) {
    html += '<button class="btn btn-primary btn-sm" onclick="openMedModal(null)">+ Toevoegen</button>';
  }
  html += '</div>';

  // Filter chips
  var rollen = ['alle'].concat(Object.keys(APP.rollen));
  html += '<div class="filter-row">';
  rollen.forEach(function(r) {
    var label = r === 'alle' ? 'Alle' : (APP.rollen[r] ? APP.rollen[r].naam : r);
    var count = r === 'alle' ? APP.medewerkers.length : APP.medewerkers.filter(function(m) { return m.rol === r; }).length;
    html += '<button class="chip' + (_medFilter===r?' active':'') + '" onclick="_medFilter=\'' + r + '\';_medPage=1;renderMedewerkers()">';
    html += label + ' <span style="opacity:0.7">(' + count + ')</span></button>';
  });
  html += '</div>';

  // Gefilterde + gesorteerde lijst
  var lijst = APP.medewerkers.filter(function(m) {
    if (_medFilter !== 'alle' && m.rol !== _medFilter) return false;
    if (_medZoek) {
      var q = _medZoek.toLowerCase();
      return (m.voornaam||'').toLowerCase().includes(q)
          || (m.achternaam||'').toLowerCase().includes(q)
          || (m.email||'').toLowerCase().includes(q)
          || (m.functie||'').toLowerCase().includes(q);
    }
    return true;
  });

  lijst.sort(function(a, b) {
    var va = (a[_medSortKey]||'').toLowerCase();
    var vb = (b[_medSortKey]||'').toLowerCase();
    return va < vb ? -_medSortDir : va > vb ? _medSortDir : 0;
  });

  var totaal = lijst.length;
  var start  = (_medPage-1) * _medPageSize;
  var slice  = lijst.slice(start, start + _medPageSize);

  html += '<div class="card" style="padding:0">';
  html += '<div class="table-wrap"><table>';
  html += '<thead><tr>';
  [['naam','Naam'],['functie','Functie'],['rol','Rol'],['email','E-mail'],['status','Status']].forEach(function(col) {
    var active = _medSortKey === col[0];
    html += '<th style="cursor:pointer" onclick="_medSortKey=\'' + col[0] + '\';_medSortDir*=-1;renderMedewerkers()">';
    html += col[1] + (active ? (_medSortDir===1?' ↑':' ↓') : ' ⇅') + '</th>';
  });
  if (magSchrijven('medewerkers')) html += '<th style="width:80px"></th>';
  html += '</tr></thead><tbody>';

  if (slice.length === 0) {
    html += '<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--muted)">Geen medewerkers gevonden</td></tr>';
  } else {
    slice.forEach(function(m) {
      var rol = APP.rollen[m.rol];
      var rolKleur = rol ? rol.kleur : '#6b7694';
      html += '<tr style="cursor:pointer" onclick="openMedPanel(\'' + m.id + '\')">';
      html += '<td><div style="display:flex;align-items:center;gap:10px">';
      html += '<div class="avatar" style="width:34px;height:34px;font-size:12px;background:' + (m.kleur||rolKleur) + ';flex-shrink:0">' + initials(m) + '</div>';
      html += '<div><div style="font-weight:600">' + esc(m.voornaam) + ' ' + esc(m.achternaam) + '</div>';
      html += '<div style="font-size:11px;color:var(--muted)">' + esc(m.email||'') + '</div></div></div></td>';
      html += '<td style="font-size:13px">' + esc(m.functie||'—') + '</td>';
      html += '<td><span class="tag" style="background:' + rolKleur + '22;color:' + rolKleur + '">' + (rol ? rol.naam : m.rol||'—') + '</span></td>';
      html += '<td style="font-size:12px;color:var(--muted)">' + esc(m.email||'—') + '</td>';
      html += '<td>' + medStatusTag(m.status) + '</td>';
      if (magSchrijven('medewerkers')) {
        html += '<td onclick="event.stopPropagation()" style="white-space:nowrap">';
        html += '<button class="btn btn-ghost btn-sm btn-icon" onclick="openMedModal(\'' + m.id + '\')" title="Bewerken">✏️</button> ';
        html += '<button class="btn btn-ghost btn-sm btn-icon" style="color:var(--red)" onclick="verwijderMedewerker(\'' + m.id + '\')" title="Verwijderen">🗑</button>';
        html += '</td>';
      }
      html += '</tr>';
    });
  }

  html += '</tbody></table></div>';

  // Paginering
  html += '<div class="pagination"><div>' + start+1 + '–' + Math.min(start+_medPageSize, totaal) + ' van ' + totaal + '</div>';
  html += '<div class="pg-controls">';
  for (var p = 1; p <= Math.ceil(totaal/_medPageSize); p++) {
    html += '<button class="pg-btn' + (p===_medPage?' active':'') + '" onclick="_medPage=' + p + ';renderMedewerkers()">' + p + '</button>';
  }
  html += '</div></div>';
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

function medStatusTag(status) {
  var cfg = { actief:{cls:'tag-green',l:'Actief'}, ziek:{cls:'tag-red',l:'Ziek'}, verlof:{cls:'tag-orange',l:'Verlof'}, inactief:{cls:'tag-muted',l:'Inactief'} };
  var c = cfg[status] || {cls:'tag-muted',l:status||'—'};
  return '<span class="tag ' + c.cls + '">' + c.l + '</span>';
}

function openMedPanel(id) {
  var m = getMedewerker(id);
  if (!m) return;
  var rol = APP.rollen[m.rol];
  var rolKleur = rol ? rol.kleur : '#6b7694';
  var naam = m.voornaam + ' ' + m.achternaam;

  var html = '';
  // Header kaart
  html += '<div style="display:flex;align-items:center;gap:14px;background:var(--surface2);border-radius:10px;padding:16px;margin-bottom:20px">';
  html += '<div class="avatar" style="width:56px;height:56px;font-size:20px;background:' + (m.kleur||rolKleur) + '">' + initials(m) + '</div>';
  html += '<div><div style="font-family:Syne,sans-serif;font-size:17px;font-weight:800">' + esc(naam) + '</div>';
  html += '<div style="font-size:13px;color:var(--muted);margin-top:2px">' + esc(m.functie||'') + '</div>';
  html += '<span class="tag" style="background:' + rolKleur + '22;color:' + rolKleur + ';margin-top:6px">' + (rol?rol.naam:m.rol||'—') + '</span></div>';
  html += '</div>';

  // Tabs
  html += '<div class="tabs">';
  html += '<div class="tab active" onclick="medPanelTab(this,\'info\',\'' + id + '\')">Gegevens</div>';
  html += '<div class="tab" onclick="medPanelTab(this,\'verlof\',\'' + id + '\')">Verlof</div>';
  html += '<div class="tab" onclick="medPanelTab(this,\'opdrachten\',\'' + id + '\')">Opdrachten</div>';
  html += '</div>';
  html += '<div id="med-panel-content">' + medPanelInfo(m) + '</div>';

  // Acties
  html += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:20px;border-top:1px solid var(--border);padding-top:16px">';
  if (magSchrijven('medewerkers')) {
    html += '<button class="btn btn-ghost" style="justify-content:center" onclick="openMedModal(\'' + id + '\');closePanel()">✏️ Bewerken</button>';
    html += '<button class="btn btn-ghost" style="justify-content:center;color:var(--red)" onclick="verwijderMedewerker(\'' + id + '\');closePanel()">🗑 Verwijderen</button>';
  }
  html += '</div>';

  openPanel(naam, html);
}

function medPanelTab(el, tab, id) {
  el.closest('.tabs').querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  var m = getMedewerker(id);
  var content = { info: medPanelInfo, verlof: medPanelVerlof, opdrachten: medPanelOpdrachten };
  document.getElementById('med-panel-content').innerHTML = (content[tab] || medPanelInfo)(m);
}

function medPanelInfo(m) {
  function veld(label, waarde) {
    return '<div style="background:var(--surface2);border-radius:8px;padding:10px 12px">'
      + '<div style="font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px">' + label + '</div>'
      + '<div style="font-size:13px;font-weight:600;margin-top:3px">' + esc(waarde||'—') + '</div>'
      + '</div>';
  }
  var html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  html += veld('E-mail zakelijk', m.email);
  html += veld('Telefoon zakelijk', m.telefoon);
  html += veld('E-mail privé', m.emailPrive);
  html += veld('Telefoon privé', m.telefoonPrive);
  html += veld('Geboortedatum', fmtDatum(m.geboortedatum));
  html += veld('In dienst', fmtDatum(m.datumInDienst));
  html += veld('Contract', m.contractType);
  html += veld('Uren/week', m.contractUren ? m.contractUren + ' uur' : '—');
  html += veld('Thuisadres', m.straat ? m.straat + ', ' + (m.postcode||'') + ' ' + (m.plaats||'') : '');
  html += '</div>';
  return html;
}

function medPanelVerlof(m) {
  var saldo = m.verlofSaldo || 0;
  var tegoed = m.verlofTegoed || 0;
  var opgenomen = tegoed - saldo;
  var pct = tegoed > 0 ? Math.round(opgenomen/tegoed*100) : 0;

  var html = '<div style="background:var(--surface2);border-radius:10px;padding:16px;margin-bottom:12px">';
  html += '<div style="display:flex;justify-content:space-between;margin-bottom:8px">';
  html += '<span style="font-size:13px;font-weight:600">Verlof saldo</span>';
  html += '<span style="font-family:Syne,sans-serif;font-size:18px;font-weight:800;color:var(--green)">' + saldo + ' dagen</span>';
  html += '</div>';
  html += '<div class="progress"><div class="progress-fill" style="width:' + pct + '%;background:var(--orange)"></div></div>';
  html += '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px">';
  html += '<span>' + opgenomen + ' opgenomen</span><span>' + tegoed + ' totaal</span></div>';
  html += '</div>';

  var medVerlof = APP.verlof.filter(function(v) { return String(v.medId) === String(m.id); });
  if (medVerlof.length > 0) {
    html += '<div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">Aanvragen</div>';
    medVerlof.forEach(function(v) {
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">';
      html += '<span style="font-size:13px">' + fmtDatumKort(v.van) + ' – ' + fmtDatumKort(v.tot) + '</span>';
      html += verlofStatusTag(v.status);
      html += '</div>';
    });
  }
  return html;
}

function medPanelOpdrachten(m) {
  var medOps = APP.opdrachten.filter(function(o) { return String(o.monteurId) === String(m.id); });
  if (medOps.length === 0) return '<div style="text-align:center;padding:24px;color:var(--muted)">Geen opdrachten gevonden</div>';
  var html = '';
  medOps.slice(0,10).forEach(function(o) {
    html += '<div style="padding:10px 0;border-bottom:1px solid var(--border)">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center">';
    html += '<div><div style="font-weight:600;font-size:13px">' + esc(o.klantNaam||'') + '</div>';
    html += '<div style="font-size:11px;color:var(--muted)">' + fmtDatum(o.datum) + ' · ' + esc(o.type||'') + '</div></div>';
    html += statusTag(o.status) + '</div></div>';
  });
  return html;
}

function verlofStatusTag(status) {
  var cfg = { aangevraagd:{cls:'tag-orange',l:'Aangevraagd'}, goedgekeurd:{cls:'tag-green',l:'Goedgekeurd'}, afgewezen:{cls:'tag-red',l:'Afgewezen'} };
  var c = cfg[status] || {cls:'tag-muted',l:status||'—'};
  return '<span class="tag ' + c.cls + '">' + c.l + '</span>';
}

function openMedModal(id) {
  var isNew = !id;
  var m = id ? getMedewerker(id) : {};
  if (!m) { toast('Medewerker niet gevonden', 'error'); return; }

  var rolOpties = Object.keys(APP.rollen).map(function(k) {
    return '<option value="' + k + '"' + (m.rol===k?' selected':'') + '>' + APP.rollen[k].naam + '</option>';
  }).join('');

  var body = '<div class="form-grid">';
  body += fg('Voornaam', '<input class="input" id="mf-voornaam" value="' + esc(m.voornaam||'') + '" placeholder="Jan">');
  body += fg('Achternaam', '<input class="input" id="mf-achternaam" value="' + esc(m.achternaam||'') + '" placeholder="de Vries">');
  body += fg('Functietitel', '<input class="input" id="mf-functie" value="' + esc(m.functie||'') + '" placeholder="Servicemonteur">');
  body += fg('Rol', '<select class="input" id="mf-rol">' + rolOpties + '</select>');
  body += fg('E-mail zakelijk', '<input class="input" type="email" id="mf-email" value="' + esc(m.email||'') + '" placeholder="jan@bedrijf.nl">');
  body += fg('Telefoon zakelijk', '<input class="input" id="mf-telefoon" value="' + esc(m.telefoon||'') + '" placeholder="06-12345678">');
  body += fg('E-mail privé', '<input class="input" type="email" id="mf-email-prive" value="' + esc(m.emailPrive||'') + '">');
  body += fg('Telefoon privé', '<input class="input" id="mf-telefoon-prive" value="' + esc(m.telefoonPrive||'') + '">');
  body += fg('Geboortedatum', '<input class="input" type="date" id="mf-geboortedatum" value="' + esc(m.geboortedatum||'') + '">');
  body += fg('Geslacht', '<select class="input" id="mf-geslacht"><option value="man"' + (m.geslacht==='man'?' selected':'') + '>Man</option><option value="vrouw"' + (m.geslacht==='vrouw'?' selected':'') + '>Vrouw</option><option value="overig"' + (m.geslacht==='overig'?' selected':'') + '>Overig</option></select>');
  body += fg('Datum in dienst', '<input class="input" type="date" id="mf-indienst" value="' + esc(m.datumInDienst||'') + '">');
  body += fg('Contracttype', '<select class="input" id="mf-contract"><option value="vast"' + (m.contractType==='vast'?' selected':'') + '>Vast</option><option value="tijdelijk"' + (m.contractType==='tijdelijk'?' selected':'') + '>Tijdelijk</option><option value="zzp"' + (m.contractType==='zzp'?' selected':'') + '>ZZP/Extern</option></select>');
  body += fg('Uren/week', '<input class="input" type="number" id="mf-uren" value="' + (m.contractUren||40) + '" min="0" max="60">');
  body += fg('Verloftegoed (dagen/jaar)', '<input class="input" type="number" id="mf-verlof" value="' + (m.verlofTegoed||25) + '" min="0">');
  body += '</div>';

  body += '<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">';
  body += '<div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:10px">THUISADRES</div>';
  body += '<div class="form-grid">';
  body += fgFull('Straat + huisnummer', '<input class="input" id="mf-straat" value="' + esc(m.straat||'') + '" placeholder="Voorbeeldstraat 1">');
  body += fg('Postcode', '<input class="input" id="mf-postcode" value="' + esc(m.postcode||'') + '" placeholder="1234 AB">');
  body += fg('Plaats', '<input class="input" id="mf-plaats" value="' + esc(m.plaats||'') + '" placeholder="Amsterdam">');
  body += '</div></div>';

  var footer = '<button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>';
  footer += '<button class="btn btn-primary" onclick="saveMed(\'' + (id||'') + '\')">Opslaan</button>';

  openModal((isNew ? 'Medewerker toevoegen' : 'Medewerker bewerken'), body, footer);
}

function fg(label, input) {
  return '<div class="form-group" style="margin-bottom:0"><label>' + label + '</label>' + input + '</div>';
}
function fgFull(label, input) {
  return '<div class="form-group form-full" style="margin-bottom:0"><label>' + label + '</label>' + input + '</div>';
}

function saveMed(id) {
  var voornaam   = document.getElementById('mf-voornaam').value.trim();
  var achternaam = document.getElementById('mf-achternaam').value.trim();
  if (!voornaam || !achternaam) { toast('Naam is verplicht', 'error'); return; }

  var isNew = !id;
  var bestaand = id ? getMedewerker(id) : {};
  var verlofTegoed = parseInt(document.getElementById('mf-verlof').value) || 25;

  var data = Object.assign({}, bestaand, {
    id:           id || maakId(),
    voornaam:     voornaam,
    achternaam:   achternaam,
    functie:      document.getElementById('mf-functie').value.trim(),
    rol:          document.getElementById('mf-rol').value,
    email:        document.getElementById('mf-email').value.trim(),
    telefoon:     document.getElementById('mf-telefoon').value.trim(),
    emailPrive:   document.getElementById('mf-email-prive').value.trim(),
    telefoonPrive:document.getElementById('mf-telefoon-prive').value.trim(),
    geboortedatum:document.getElementById('mf-geboortedatum').value,
    geslacht:     document.getElementById('mf-geslacht').value,
    datumInDienst:document.getElementById('mf-indienst').value,
    contractType: document.getElementById('mf-contract').value,
    contractUren: parseInt(document.getElementById('mf-uren').value) || 40,
    verlofTegoed: verlofTegoed,
    verlofSaldo:  isNew ? verlofTegoed : (bestaand.verlofSaldo != null ? bestaand.verlofSaldo : verlofTegoed),
    straat:       document.getElementById('mf-straat').value.trim(),
    postcode:     document.getElementById('mf-postcode').value.trim(),
    plaats:       document.getElementById('mf-plaats').value.trim(),
    status:       bestaand.status || 'actief',
    kleur:        bestaand.kleur || rolKleur(document.getElementById('mf-rol').value),
  });

  if (isNew) {
    APP.medewerkers.push(data);
  } else {
    var idx = APP.medewerkers.findIndex(function(m) { return String(m.id) === String(id); });
    if (idx > -1) APP.medewerkers[idx] = data;
  }

  dbSaveItem('medewerkers', data.id, data);
  closeModal();
  renderMedewerkers();
  toast((isNew ? 'Medewerker toegevoegd' : 'Medewerker bijgewerkt'), 'success');
}

function rolKleur(rolId) {
  var rol = APP.rollen[rolId];
  return rol ? rol.kleur : '#6b7694';
}

function verwijderMedewerker(id) {
  var m = getMedewerker(id);
  if (!m) return;
  if (!confirm('Medewerker ' + m.voornaam + ' ' + m.achternaam + ' verwijderen?')) return;
  APP.medewerkers = APP.medewerkers.filter(function(x) { return String(x.id) !== String(id); });
  dbRemoveItem('medewerkers', id);
  renderMedewerkers();
  toast('Medewerker verwijderd', 'success');
}

var _skZoek   = '';
var _skFilter = 'alle';
var _skPage   = 1;
var _skPageSize = 25;

function renderServiceklanten() {
  var html = '';
  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">';
  html += '<div class="search-wrap" style="flex:1;min-width:200px"><input class="search-input" placeholder="Zoek serviceklant..." value="' + esc(_skZoek) + '" oninput="_skZoek=this.value;_skPage=1;renderServiceklanten()"></div>';
  html += '<button class="btn btn-ghost btn-sm" onclick="importSkCsv()">📥 CSV Import</button>';
  if (magSchrijven('serviceklanten')) html += '<button class="btn btn-primary btn-sm" onclick="openSkModal(null)">+ Toevoegen</button>';
  html += '</div>';

  html += '<div class="filter-row">';
  [['alle','Alle'],['A','Contract A (1×/jaar)'],['C','Contract C (2×/jaar)'],['vervallen','Vervallen']].forEach(function(f) {
    html += '<button class="chip' + (_skFilter===f[0]?' active':'') + '" onclick="_skFilter=\'' + f[0] + '\';_skPage=1;renderServiceklanten()">' + f[1] + '</button>';
  });
  html += '</div>';

  var vandaag = new Date();
  var lijst = APP.serviceklanten.filter(function(k) {
    if (_skFilter === 'vervallen') {
      var vd = k.volgendeDatum ? new Date(k.volgendeDatum) : null;
      if (!vd || vd >= vandaag) return false;
    } else if (_skFilter !== 'alle') {
      if (k.contractType !== _skFilter) return false;
    }
    if (_skZoek) {
      var q = _skZoek.toLowerCase();
      return (k.naam||'').toLowerCase().includes(q)
          || (k.debNr||'').toLowerCase().includes(q)
          || (k.postcode||'').toLowerCase().includes(q)
          || (k.plaats||'').toLowerCase().includes(q);
    }
    return true;
  });

  var totaal = lijst.length;
  var slice  = lijst.slice((_skPage-1)*_skPageSize, _skPage*_skPageSize);

  // Stat cards
  var alles = APP.serviceklanten.length;
  var contA  = APP.serviceklanten.filter(function(k){return k.contractType==='A';}).length;
  var contC  = APP.serviceklanten.filter(function(k){return k.contractType==='C';}).length;
  var verv   = APP.serviceklanten.filter(function(k){
    var d = k.volgendeDatum ? new Date(k.volgendeDatum) : null;
    return d && d < vandaag;
  }).length;

  html += '<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">';
  html += statCard('Totaal', alles, '#3b82f6', ICONS.file);
  html += statCard('Contract A', contA, '#10b981', ICONS.file);
  html += statCard('Contract C', contC, '#8b5cf6', ICONS.file);
  html += statCard('Vervallen', verv, '#ef4444', ICONS.alert);
  html += '</div>';

  html += '<div class="card" style="padding:0">';
  html += '<div class="table-wrap"><table>';
  html += '<thead><tr><th>Naam</th><th>Debiteurnr.</th><th>Adres</th><th>Contract</th><th>Pomptype</th><th>Volgende beurt</th><th>Status</th>';
  if (magSchrijven('serviceklanten')) html += '<th style="width:80px"></th>';
  html += '</tr></thead><tbody>';

  if (slice.length === 0) {
    html += '<tr><td colspan="8" style="text-align:center;padding:32px;color:var(--muted)">Geen serviceklanten gevonden</td></tr>';
  } else {
    slice.forEach(function(k) {
      var volgend = k.volgendeDatum ? new Date(k.volgendeDatum) : null;
      var verlopen = volgend && volgend < vandaag;
      var binnenkorte = volgend && !verlopen && (volgend - vandaag) < 60*24*60*60*1000;

      html += '<tr style="cursor:pointer" onclick="openSkPanel(\'' + k.id + '\')">';
      html += '<td><strong>' + esc(k.naam) + '</strong><br><span style="font-size:11px;color:var(--muted)">' + esc(k.contactpersoon||'') + '</span></td>';
      html += '<td style="font-size:12px;color:var(--muted)">' + esc(k.debNr||'—') + '</td>';
      html += '<td style="font-size:12px">' + esc(k.adres||'') + (k.plaats?', '+esc(k.plaats):'') + '</td>';
      html += '<td><span class="tag tag-blue">' + esc(k.contractType||'—') + '</span></td>';
      html += '<td style="font-size:12px;color:var(--muted)">' + esc(k.pomptype||'—') + '</td>';
      html += '<td style="font-size:12px;font-weight:600;color:' + (verlopen?'var(--red)':binnenkorte?'var(--orange)':'var(--text)') + '">' + (volgend?fmtDatumKort(k.volgendeDatum):'—') + '</td>';
      html += '<td>' + (verlopen ? '<span class="tag tag-red">Vervallen</span>' : binnenkorte ? '<span class="tag tag-orange">Binnenkort</span>' : '<span class="tag tag-green">OK</span>') + '</td>';
      if (magSchrijven('serviceklanten')) {
        html += '<td onclick="event.stopPropagation()" style="white-space:nowrap">';
        html += '<button class="btn btn-ghost btn-sm btn-icon" onclick="openSkModal(\'' + k.id + '\')" title="Bewerken">✏️</button> ';
        html += '<button class="btn btn-ghost btn-sm btn-icon" style="color:var(--red)" onclick="verwijderSk(\'' + k.id + '\')" title="Verwijderen">🗑</button>';
        html += '</td>';
      }
      html += '</tr>';
    });
  }

  html += '</tbody></table></div>';
  html += '<div class="pagination"><div>' + (totaal===0?0:(_skPage-1)*_skPageSize+1) + '–' + Math.min(_skPage*_skPageSize,totaal) + ' van ' + totaal + '</div>';
  html += '<div class="pg-controls">';
  for (var p=1; p<=Math.ceil(totaal/_skPageSize); p++) {
    html += '<button class="pg-btn' + (p===_skPage?' active':'') + '" onclick="_skPage=' + p + ';renderServiceklanten()">' + p + '</button>';
  }
  html += '</div></div>';
  html += '</div>';

  document.getElementById('content').innerHTML = html;
}

  html += veld('Telefoon', k.telefoon);

  html += veld('Pomptype', k.pomptype);

function openSkModal(id) {

function saveSk(id) {
  var naam = document.getElementById('sk-naam').value.trim();
  if (!naam) { toast('Naam is verplicht', 'error'); return; }

  var isNew = !id;
  var bestaand = id ? (APP.serviceklanten.find(function(x){return String(x.id)===String(id);}) || {}) : {};
  var laatste = document.getElementById('sk-laatste').value;
  var contract = document.getElementById('sk-contract').value;
  var volgende = berekenVolgendeBeurt(laatste, contract);

  var debSel = document.getElementById('sk-deb').value;
  var debId  = debSel || null;
  var debNr  = '';
  if (debId) {
    var deb = APP.debiteuren.find(function(d){return String(d.id)===String(debId);});
    if (deb) { debNr = deb.nr || ''; }
  }

  var data = Object.assign({}, bestaand, {
    id:            id || maakId(),
    naam:          naam,
    debId:         debId,
    debNr:         debNr,
    contactpersoon:document.getElementById('sk-contact').value.trim(),
    adres:         document.getElementById('sk-adres').value.trim(),
    postcode:      document.getElementById('sk-postcode').value.trim(),
    plaats:        document.getElementById('sk-plaats').value.trim(),
    email:         document.getElementById('sk-email').value.trim(),
    telefoon:      document.getElementById('sk-telefoon').value.trim(),
    contractType:  contract,
    pomptype:      document.getElementById('sk-pomptype').value.trim(),
    besturing:     document.getElementById('sk-besturing').value.trim(),
    laatsteDatum:  laatste,
    volgendeDatum: volgende,
    notitie:       document.getElementById('sk-notitie').value.trim(),
  });

  if (isNew) APP.serviceklanten.push(data);
  else {
    var idx = APP.serviceklanten.findIndex(function(x){return String(x.id)===String(id);});
    if (idx > -1) APP.serviceklanten[idx] = data;
  }
  dbSaveItem('serviceklanten', data.id, data);
  closeModal();
  renderServiceklanten();
  toast((isNew ? 'Serviceklant toegevoegd' : 'Serviceklant bijgewerkt'), 'success');
}

function berekenVolgendeBeurt(laatste, contract) {
  if (!laatste) return '';
  var d = new Date(laatste);
  if (contract === 'A') d.setFullYear(d.getFullYear() + 1);
  else if (contract === 'C') d.setMonth(d.getMonth() + 6);
  else return '';
  return d.toISOString().split('T')[0];
}

function verwijderSk(id) {
  var k = APP.serviceklanten.find(function(x){return String(x.id)===String(id);});
  if (!k || !confirm('Serviceklant "' + k.naam + '" verwijderen?')) return;
  APP.serviceklanten = APP.serviceklanten.filter(function(x){return String(x.id)!==String(id);});
  dbRemoveItem('serviceklanten', id);
  renderServiceklanten();
  toast('Serviceklant verwijderd', 'success');
}

function importSkCsv() {
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.csv';
  inp.onchange = function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) { verwerkSkCsv(ev.target.result); };
    reader.readAsText(file, 'utf-8');
  };
  inp.click();
}

function verwerkSkCsv(tekst) {
  var regels = tekst.split('\n').filter(function(r){return r.trim();});
  if (regels.length < 2) { toast('CSV heeft te weinig regels', 'error'); return; }
  var headers = regels[0].split(';').map(function(h){return h.trim().toLowerCase();});
  var toegevoegd = 0, bijgewerkt = 0;
  regels.slice(1).forEach(function(regel) {
    var cols = regel.split(';');
    var rij  = {};
    headers.forEach(function(h,i){ rij[h] = (cols[i]||'').trim(); });
    var naam = rij['naam'] || rij['naam (relatie)'] || '';
    if (!naam) return;
    var bestaand = APP.serviceklanten.find(function(k){
      return k.naam.toLowerCase() === naam.toLowerCase();
    });
    var contract = (rij['contract']||rij['soort']||'').toUpperCase() || 'B';
    var laatste  = rij['datum'] || rij['laatste'] || '';
    var data = Object.assign(bestaand || {}, {
      id:           bestaand ? bestaand.id : maakId(),
      naam:         naam,
      debNr:        rij['debiteur'] || rij['nr'] || '',
      adres:        rij['straat'] || rij['adres'] || '',
      postcode:     rij['postcode'] || '',
      plaats:       rij['plaats'] || rij['woonplaats'] || '',
      email:        rij['email'] || rij['e-mail'] || '',
      telefoon:     rij['telefoon'] || rij['tel'] || '',
      contractType: contract,
      pomptype:     rij['pomptype'] || '',
      besturing:    rij['besturing'] || '',
      laatsteDatum: laatste,
      volgendeDatum:berekenVolgendeBeurt(laatste, contract),
    });
    if (bestaand) { Object.assign(bestaand, data); bijgewerkt++; }
    else { APP.serviceklanten.push(data); toegevoegd++; }
    dbSaveItem('serviceklanten', data.id, data);
  });
  renderServiceklanten();
  toast(toegevoegd + ' toegevoegd, ' + bijgewerkt + ' bijgewerkt', 'success');
}

  html += v('Email', d.email);
  html += v('Telefoon', d.telefoon);
  html += '</div>';

  if (sk) {
    html += '<div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2);border-radius:8px;padding:12px;margin-bottom:16px">';
    html += '<div style="font-size:12px;font-weight:600;color:var(--green);margin-bottom:4px">✓ Servicecontract</div>';
    html += '<div style="font-size:13px;font-weight:600">' + esc(sk.naam) + '</div>';
    html += '<div style="font-size:12px;color:var(--muted)">Contract ' + esc(sk.contractType) + ' · Volgende beurt: ' + fmtDatum(sk.volgendeDatum) + '</div>';
    html += '<button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="openSkPanel(\'' + sk.id + '\');closePanel()">→ Naar serviceklant</button>';
    html += '</div>';
  } else {
    html += '<div style="background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--muted)">Geen servicecontract gekoppeld</div>';
  }

  html += '<div style="display:flex;flex-direction:column;gap:8px">';
  if (magSchrijven('debiteuren')) {
    html += '<button class="btn btn-ghost" style="justify-content:center" onclick="openDebModal(\'' + id + '\');closePanel()">✏️ Bewerken</button>';
    html += '<button class="btn btn-ghost" style="justify-content:center;color:var(--red)" onclick="verwijderDeb(\'' + id + '\');closePanel()">🗑 Verwijderen</button>';
  }
  html += '</div>';
  openPanel(d.naam, html);
}

function openDebModal(id) {
  var isNew = !id;
  var d = id ? (APP.debiteuren.find(function(x){return String(x.id)===String(id);}) || {}) : {};

  var body = '<div class="form-grid">';
  body += fg('Debiteurnummer', '<input class="input" id="df-nr" value="' + esc(d.nr||'') + '" placeholder="D-00001">');
  body += fgFull('Naam *', '<input class="input" id="df-naam" value="' + esc(d.naam||'') + '">');
  body += fgFull('Adres', '<input class="input" id="df-adres" value="' + esc(d.adres||'') + '" placeholder="Straat + nummer">');
  body += fg('Postcode', '<input class="input" id="df-postcode" value="' + esc(d.postcode||'') + '">');
  body += fg('Plaats', '<input class="input" id="df-plaats" value="' + esc(d.plaats||'') + '">');
  body += fg('Contactpersoon', '<input class="input" id="df-contact" value="' + esc(d.contactpersoon||'') + '">');
  body += fg('Email', '<input class="input" type="email" id="df-email" value="' + esc(d.email||'') + '">');
  body += fg('Telefoon', '<input class="input" id="df-telefoon" value="' + esc(d.telefoon||'') + '">');
  body += '</div>';

  var footer = '<button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>';
  footer += '<button class="btn btn-primary" onclick="saveDeb(\'' + (id||'') + '\')">Opslaan</button>';
  openModal(isNew ? 'Debiteur toevoegen' : 'Debiteur bewerken', body, footer);
}

function saveDeb(id) {
  var naam = document.getElementById('df-naam').value.trim();
  if (!naam) { toast('Naam is verplicht', 'error'); return; }
  var isNew = !id;
  var bestaand = id ? (APP.debiteuren.find(function(x){return String(x.id)===String(id);}) || {}) : {};
  var data = Object.assign({}, bestaand, {
    id:            id || maakId(),
    nr:            document.getElementById('df-nr').value.trim(),
    naam:          naam,
    adres:         document.getElementById('df-adres').value.trim(),
    postcode:      document.getElementById('df-postcode').value.trim(),
    plaats:        document.getElementById('df-plaats').value.trim(),
    contactpersoon:document.getElementById('df-contact').value.trim(),
    email:         document.getElementById('df-email').value.trim(),
    telefoon:      document.getElementById('df-telefoon').value.trim(),
  });
  if (isNew) APP.debiteuren.push(data);
  else {
    var idx = APP.debiteuren.findIndex(function(x){return String(x.id)===String(id);});
    if (idx > -1) APP.debiteuren[idx] = data;
  }
  dbSaveItem('debiteuren', data.id, data);
  closeModal();
  renderDebiteuren();
  toast(isNew ? 'Debiteur toegevoegd' : 'Debiteur bijgewerkt', 'success');
}

function verwijderDeb(id) {
  var d = APP.debiteuren.find(function(x){return String(x.id)===String(id);});
  if (!d || !confirm('Debiteur "' + d.naam + '" verwijderen?')) return;
  APP.debiteuren = APP.debiteuren.filter(function(x){return String(x.id)!==String(id);});
  dbRemoveItem('debiteuren', id);
  renderDebiteuren();
  toast('Debiteur verwijderd', 'success');
}

function importDebCsv() {
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.csv';
  inp.onchange = function(e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) { verwerkDebCsv(ev.target.result); };
    reader.readAsText(file, 'utf-8');
  };
  inp.click();
}

function verwerkDebCsv(tekst) {
  var regels = tekst.split('\n').filter(function(r){return r.trim();});
  if (regels.length < 2) { toast('CSV heeft te weinig regels', 'error'); return; }
  var headers = regels[0].split(';').map(function(h){return h.trim().toLowerCase();});
  var toegevoegd = 0, bijgewerkt = 0;
  regels.slice(1).forEach(function(regel) {
    var cols = regel.split(';');
    var rij  = {};
    headers.forEach(function(h,i){ rij[h] = (cols[i]||'').trim(); });
    var naam = rij['naam'] || rij['naam (relatie)'] || '';
    var nr   = rij['debiteur'] || rij['nr'] || rij['debiteurnummer'] || '';
    if (!naam) return;
    var bestaand = nr ? APP.debiteuren.find(function(d){return d.nr===nr;}) : null;
    var data = Object.assign(bestaand || {}, {
      id:  bestaand ? bestaand.id : maakId(),
      nr:  nr,
      naam:naam,
      adres:       rij['straat'] || rij['adres'] || '',
      postcode:    rij['postcode'] || '',
      plaats:      rij['woonplaats'] || rij['plaats'] || '',
      contactpersoon: rij['contact'] || rij['contactpersoon'] || '',
      email:       rij['email'] || rij['e-mail'] || '',
      telefoon:    rij['telefoon'] || rij['tel'] || '',
    });
    if (bestaand) { Object.assign(bestaand, data); bijgewerkt++; }
    else { APP.debiteuren.push(data); toegevoegd++; }
    dbSaveItem('debiteuren', data.id, data);
  });
  renderDebiteuren();
  toast(toegevoegd + ' toegevoegd, ' + bijgewerkt + ' bijgewerkt', 'success');
}

// MODULE: VERLOF
// ════════════════════════════════════════════════════════
var _verlofFilter = 'alle';

function renderVerlof() {
  var mijnId = getMijnMedId();
  var zichtbaar = magSchrijven('verlof') || isAdmin()
    ? APP.verlof
    : APP.verlof.filter(function(v){ return String(v.medId) === String(mijnId); });

  var html = '';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
  html += '<div class="filter-row" style="margin:0">';
  [['alle','Alle'],['aangevraagd','Aangevraagd'],['goedgekeurd','Goedgekeurd'],['afgewezen','Afgewezen']].forEach(function(f){
    html += '<button class="chip' + (_verlofFilter===f[0]?' active':'') + '" onclick="_verlofFilter=\'' + f[0] + '\';renderVerlof()">' + f[1] + '</button>';
  });
  html += '</div>';
  html += '<button class="btn btn-primary btn-sm" onclick="openVerlofModal()">+ Aanvragen</button>';
  html += '</div>';

  var lijst = _verlofFilter === 'alle' ? zichtbaar : zichtbaar.filter(function(v){return v.status===_verlofFilter;});

  html += '<div class="card" style="padding:0"><div class="table-wrap"><table>';
  html += '<thead><tr><th>Medewerker</th><th>Van</th><th>Tot</th><th>Dagen</th><th>Type</th><th>Status</th>';
  if (isAdmin() || magSchrijven('verlof')) html += '<th></th>';
  html += '</tr></thead><tbody>';

  if (lijst.length === 0) {
    html += '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted)">Geen verlofaanvragen gevonden</td></tr>';
  } else {
    lijst.forEach(function(v) {
      var m = getMedewerker(v.medId);
      html += '<tr>';
      html += '<td><div style="display:flex;align-items:center;gap:8px">';
      if (m) {
        html += '<div class="avatar" style="width:28px;height:28px;font-size:10px;background:' + (m.kleur||'#3b82f6') + '">' + initials(m) + '</div>';
        html += '<span>' + esc(m.voornaam + ' ' + m.achternaam) + '</span>';
      } else { html += '<span style="color:var(--muted)">—</span>'; }
      html += '</div></td>';
      html += '<td>' + fmtDatumKort(v.van) + '</td>';
      html += '<td>' + fmtDatumKort(v.tot) + '</td>';
      html += '<td style="font-weight:600">' + (v.dagen||'—') + '</td>';
      html += '<td><span class="tag tag-blue">' + esc(v.type||'Vakantie') + '</span></td>';
      html += '<td>' + verlofStatusTag(v.status) + '</td>';
      if (isAdmin() || magSchrijven('verlof')) {
        html += '<td style="white-space:nowrap">';
        if (v.status === 'aangevraagd') {
          html += '<button class="btn btn-ghost btn-sm" style="color:var(--green)" onclick="keurVerlof(\'' + v.id + '\',true)">✓</button> ';
          html += '<button class="btn btn-ghost btn-sm" style="color:var(--red)" onclick="keurVerlof(\'' + v.id + '\',false)">✗</button>';
        }
        html += ' <button class="btn btn-ghost btn-sm btn-icon" style="color:var(--red)" onclick="verwijderVerlof(\'' + v.id + '\')">🗑</button>';
        html += '</td>';
      }
      html += '</tr>';
    });
  }
  html += '</tbody></table></div></div>';
  document.getElementById('content').innerHTML = html;
}

function getMijnMedId() {
  if (!APP.profiel) return null;
  var m = APP.medewerkers.find(function(x){ return x.email && x.email.toLowerCase() === APP.profiel.email.toLowerCase(); });
  return m ? m.id : null;
}

function openVerlofModal(medId) {
  var medOpties = APP.medewerkers.filter(function(m){return m.status!=='inactief';}).map(function(m) {
    var sel = medId && String(m.id)===String(medId) ? ' selected' : (!medId && String(m.id)===String(getMijnMedId()) ? ' selected' : '');
    return '<option value="' + m.id + '"' + sel + '>' + esc(m.voornaam + ' ' + m.achternaam) + '</option>';
  }).join('');

  var body = '<div class="form-grid">';
  body += fgFull('Medewerker', '<select class="input" id="vl-med">' + medOpties + '</select>');
  body += fg('Van', '<input class="input" type="date" id="vl-van">');
  body += fg('Tot', '<input class="input" type="date" id="vl-tot">');
  body += fg('Type', '<select class="input" id="vl-type"><option>Vakantie</option><option>Bijzonder verlof</option><option>Onbetaald verlof</option><option>ATV</option></select>');
  body += fgFull('Opmerking', '<input class="input" id="vl-opmerking" placeholder="Optioneel">');
  body += '</div>';

  var footer = '<button class="btn btn-ghost" onclick="closeModal()">Annuleren</button>';
  footer += '<button class="btn btn-primary" onclick="submitVerlof()">Indienen</button>';
  openModal('Verlof aanvragen', body, footer);
}

function submitVerlof() {
  var medId = document.getElementById('vl-med').value;
  var van   = document.getElementById('vl-van').value;
  var tot   = document.getElementById('vl-tot').value;
  if (!medId || !van || !tot) { toast('Vul alle verplichte velden in', 'error'); return; }
  if (van > tot) { toast('Einddatum moet na startdatum liggen', 'error'); return; }
  var dagen = Math.max(1, Math.round((new Date(tot)-new Date(van))/(86400000)) * 5/7);
  var data = {
    id: maakId(), medId: medId, van: van, tot: tot,
    dagen: Math.round(dagen), type: document.getElementById('vl-type').value,
    opmerking: document.getElementById('vl-opmerking').value.trim(),
    status: 'aangevraagd', aangevraagdOp: new Date().toISOString().split('T')[0],
  };
  APP.verlof.push(data);
  dbSaveItem('verlof', data.id, data);
  closeModal();
  renderVerlof();
  toast('Verlofaanvraag ingediend', 'success');
}

function keurVerlof(id, goed) {
  var v = APP.verlof.find(function(x){return String(x.id)===String(id);});
  if (!v) return;
  v.status = goed ? 'goedgekeurd' : 'afgewezen';
  v.beoordeeldOp = new Date().toISOString().split('T')[0];
  v.beoordeeldDoor = APP.profiel ? APP.profiel.naam : '';
  // Update verlof saldo van medewerker
  if (goed) {
    var m = getMedewerker(v.medId);
    if (m) {
      m.verlofSaldo = Math.max(0, (m.verlofSaldo||0) - (v.dagen||0));
      dbSaveItem('medewerkers', m.id, m);
    }
  }
  dbSaveItem('verlof', v.id, v);
  renderVerlof();
  toast(goed ? 'Verlof goedgekeurd' : 'Verlof afgewezen', 'success');
}

function verwijderVerlof(id) {
  if (!confirm('Verlofaanvraag verwijderen?')) return;
  APP.verlof = APP.verlof.filter(function(x){return String(x.id)!==String(id);});
  dbRemoveItem('verlof', id);
  renderVerlof();
  toast('Verlofaanvraag verwijderd', 'success');
}
